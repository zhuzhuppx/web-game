<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>霓虹贪吃蛇-移动适配版</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0a0f;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    height:100vh;
    width:100vw;
    overflow:hidden;
    font-family:'Courier New',monospace;
    touch-action:none;
    user-select:none;
    padding-top: env(safe-area-inset-top);
  }
  #header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:90%;
    max-width:500px;
    margin: 10px 0;
    z-index: 5;
  }
  #score{color:#0ff;font-size:18px;text-shadow:0 0 10px #0ff;letter-spacing:1px}
  #best{color:#f0f;font-size:14px;text-shadow:0 0 8px #f0f}
  
  #game-container {
    position: relative;
    width: 95vw;
    height: 45vh; /* 默认高度，通过JS动态调整 */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas{
    border:2px solid #0ff;
    box-shadow:0 0 15px #0ff33,0 0 30px #0ff22;
    border-radius:4px;
    max-width:100%;
    max-height:100%;
    object-fit: contain;
  }

  #overlay{
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(5,5,15,0.85);
    z-index:10;backdrop-filter:blur(4px);
  }
  #overlay.hidden{display:none}
  #title{font-size:28px;color:#0ff;text-shadow:0 0 20px #0ff;margin-bottom:10px;letter-spacing:4px}
  #subtitle{color:#f0f;font-size:14px;margin-bottom:20px}
  #gameover-text{font-size:32px;color:#f44;text-shadow:0 0 20px #f44;margin-bottom:5px}
  #final-score{font-size:20px;color:#0ff;margin-bottom:20px}
  
  #restart-btn{
    padding:12px 35px;font-size:18px;color:#0a0f;background:#0ff;border:none;border-radius:4px;
    cursor:pointer;box-shadow:0 0 20px #0ff88;font-weight:bold;
  }

  /* 移动端控制区 */
  #controls-wrapper {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 20px;
  }
  #touch-controls{
    position:relative;
    width: 160px;
    height: 160px;
  }
  .touch-btn{
    position:absolute;width:50px;height:50px;
    background:rgba(0,255,255,0.1);border:1px solid rgba(0,255,255,0.3);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#0ff;font-size:24px;touch-action:none;
  }
  .touch-btn:active{background:rgba(0,255,255,0.4);transform:scale(0.9)}
  #btn-up{top:0;left:50%;transform:translateX(-50%)}
  #btn-down{bottom:0;left:50%;transform:translateX(-50%)}
  #btn-left{left:0;top:50%;transform:translateY(-50%)}
  #btn-right{right:0;top:50%;transform:translateY(-50%)}

  /* 横屏适配 */
  @media (orientation: landscape) and (max-height: 500px) {
    body { flex-direction: row; justify-content: space-around; padding-top: 0; }
    #header { position: absolute; top: 10px; left: 10px; width: auto; }
    #game-container { height: 70vh; width: 50vw; }
    #controls-wrapper { width: 30vw; height: 100%; }
    #touch-controls { width: 120px; height: 120px; }
    .touch-btn { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="score">得分: 0</div>
  <div id="best">最高: 0</div>
</div>

<div id="game-container">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="title">霓虹贪吃蛇</div>
    <div id="subtitle">NEON SNAKE</div>
    <div id="gameover-text" style="display:none">游戏结束</div>
    <div id="final-score" style="display:none"></div>
    <button id="restart-btn">开始游戏</button>
  </div>
</div>

<div id="controls-wrapper">
  <div id="touch-controls">
    <div class="touch-btn" id="btn-up">▲</div>
    <div class="touch-btn" id="btn-down">▼</div>
    <div class="touch-btn" id="btn-left">◀</div>
    <div class="touch-btn" id="btn-right">▶</div>
  </div>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const titleEl=document.getElementById('title');
const subtitleEl=document.getElementById('subtitle');
const gameOverText=document.getElementById('gameover-text');
const finalScoreEl=document.getElementById('final-score');
const restartBtn=document.getElementById('restart-btn');

const GRID=20;
let cols,rows,snake,dir,nextDir,food,score,bestScore,speed,gameLoop,running;
let particles=[],foodPulse=0,trail=[];

function init(){
  // 响应式画布计算
  const container = document.getElementById('game-container');
  const maxWidth = container.clientWidth;
  const maxHeight = container.clientHeight;
  const size = Math.min(Math.floor(maxWidth/GRID)*GRID, Math.floor(maxHeight/GRID)*GRID);
  
  canvas.width = size;
  canvas.height = size;
  cols = canvas.width/GRID;
  rows = canvas.height/GRID;
  
  bestScore=parseInt(localStorage.getItem('neonSnakeBest')||'0');
  bestEl.textContent='最高: '+bestScore;
}

function startGame(){
  const cx=Math.floor(cols/2);
  const cy=Math.floor(rows/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  score=0;
  speed=130;
  particles=[];
  trail=[];
  scoreEl.textContent='得分: 0';
  spawnFood();
  overlay.classList.add('hidden');
  gameOverText.style.display='none';
  finalScoreEl.style.display='none';
  titleEl.style.display='block';
  subtitleEl.style.display='block';
  running=true;
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(update,speed);
}

function spawnFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
  foodPulse=0;
}

function update(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows)return gameOver();
  if(snake.some(s=>s.x===head.x&&s.y===head.y))return gameOver();
  
  snake.unshift(head);
  trail.push({x:head.x,y:head.y,alpha:1});
  if(trail.length>8)trail.shift();

  if(head.x===food.x&&head.y===food.y){
    score+=10;
    scoreEl.textContent='得分: '+score;
    spawnParticles(food.x,food.y,'#0ff');
    spawnFood();
    if(speed>60){speed-=2;clearInterval(gameLoop);gameLoop=setInterval(update,speed);}
  }else{
    snake.pop();
  }
  foodPulse+=0.15;
}

function render(){
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // 网格线
  ctx.strokeStyle='rgba(0,255,255,0.05)';
  ctx.lineWidth=1;
  for(let i=0;i<=cols;i++){ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke();}
  for(let j=0;j<=rows;j++){ctx.beginPath();ctx.moveTo(0,j*GRID);ctx.lineTo(canvas.width,j*GRID);ctx.stroke();}

  // 尾迹
  trail.forEach(t=>{
    ctx.fillStyle=`rgba(0,255,255,${t.alpha*0.2})`;
    ctx.fillRect(t.x*GRID+1,t.y*GRID+1,GRID-2,GRID-2);
  });

  // 食物
  if(food){
    const pulse=Math.sin(foodPulse)*0.3+0.7;
    const fx=food.x*GRID+GRID/2, fy=food.y*GRID+GRID/2;
    ctx.shadowColor='#f0f';ctx.shadowBlur=15*pulse;
    ctx.fillStyle='#f0f';
    ctx.beginPath();ctx.arc(fx,fy, (GRID/2-2)*pulse, 0, Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // 蛇
  snake.forEach((seg,i)=>{
    const isHead=i===0;
    ctx.fillStyle=isHead?'#0ff':'#0f8';
    ctx.shadowColor=isHead?'#0ff':'#0f8';
    ctx.shadowBlur=isHead?15:5;
    ctx.fillRect(seg.x*GRID+1,seg.y*GRID+1,GRID-2,GRID-2);
    ctx.shadowBlur=0;
  });

  // 粒子
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)return false;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,3,3);
    return true;
  });

  requestAnimationFrame(render);
}

function spawnParticles(gx,gy,color){
  for(let i=0;i<8;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=Math.random()*2+1;
    particles.push({
      x:gx*GRID+GRID/2,y:gy*GRID+GRID/2,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
      color:color,life:15
    });
  }
}

function gameOver(){
  running=false;
  clearInterval(gameLoop);
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem('neonSnakeBest',bestScore);
    bestEl.textContent='最高: '+bestScore;
  }
  overlay.classList.remove('hidden');
  titleEl.style.display='none';
  subtitleEl.style.display='none';
  gameOverText.style.display='block';
  finalScoreEl.style.display='block';
  finalScoreEl.textContent='得分: '+score;
  restartBtn.textContent='再来一局';
}

// 控制逻辑
const setDir = (x,y) => {
  if(!running) return;
  if(x !== 0 && dir.x !== -x) { nextDir = {x, y:0}; return; }
  if(y !== 0 && dir.y !== -y) { nextDir = {x:0, y}; }
};

// 键盘
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w') setDir(0,-1);
  if(e.key==='ArrowDown'||e.key==='s') setDir(0,1);
  if(e.key==='ArrowLeft'||e.key==='a') setDir(-1,0);
  if(e.key==='ArrowRight'||e.key==='d') setDir(1,0);
});

// 虚拟按键
document.getElementById('btn-up').onclick = () => setDir(0,-1);
document.getElementById('btn-down').onclick = () => setDir(0,1);
document.getElementById('btn-left').onclick = () => setDir(-1,0);
document.getElementById('btn-right').onclick = () => setDir(1,0);

// 滑动控制
let tsX, tsY;
document.addEventListener('touchstart', e => {
  tsX = e.touches[0].clientX;
  tsY = e.touches[0].clientY;
}, {passive:false});

document.addEventListener('touchmove', e => {
  if(!running) return;
  const dx = e.touches[0].clientX - tsX;
  const dy = e.touches[0].clientY - tsY;
  if(Math.abs(dx) > 30 || Math.abs(dy) > 30) {
    if(Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    tsX = e.touches[0].clientX;
    tsY = e.touches[0].clientY;
  }
  e.preventDefault();
}, {passive:false});

restartBtn.addEventListener('click', startGame);
window.addEventListener('resize', init);

init();
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇 - 游戏大厅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 16px;
    max-width: 100vw;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 420px;
    padding: 0 4px;
  }

  .header h1 {
    font-size: 20px;
    background: linear-gradient(135deg, #8844ff, #44bbff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-board {
    display: flex;
    gap: 24px;
    font-size: 14px;
  }

  .score-board .item {
    text-align: center;
  }

  .score-board .label {
    color: #555588;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-board .value {
    font-size: 22px;
    font-weight: 700;
    color: #b388ff;
  }

  .score-board .value.best { color: #ffb400; }

  canvas {
    background: #0d0d22;
    border: 2px solid rgba(136,68,255,0.15);
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(136,68,255,0.06);
    touch-action: none;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1;
    display: block;
  }

  .controls-hint {
    display: flex;
    gap: 20px;
    color: #444477;
    font-size: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls-hint kbd {
    background: rgba(255,255,255,0.04);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
    font-family: inherit;
    font-size: 11px;
    color: #6666aa;
  }

  .back-link {
    color: #444477;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }

  .back-link:hover { color: #8888bb; }

  .mobile-controls {
    display: none;
    gap: 0; justify-content: center; align-items: center; max-width: 300px; width: 100%; padding: 0 8px;
    touch-action: none;
  }
  .mobile-controls .dpad {
    position: relative; width: 144px; height: 144px; flex-shrink: 0;
  }
  .mobile-controls .dpad button {
    position: absolute; width: 44px; height: 44px; border: none; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: #8888bb; font-size: 18px; cursor: pointer;
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  .mobile-controls .dpad button:active { background: rgba(136,68,255,0.2); }
  .mobile-controls .dpad .up    { top: 0; left: 50%; transform: translateX(-50%); border-radius: 6px 6px 2px 2px; }
  .mobile-controls .dpad .down  { bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px 2px 6px 6px; }
  .mobile-controls .dpad .left  { left: 0; top: 50%; transform: translateY(-50%); border-radius: 6px 2px 2px 6px; }
  .mobile-controls .dpad .right { right: 0; top: 50%; transform: translateY(-50%); border-radius: 2px 6px 6px 2px; }
  .mobile-controls .dpad .center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 44px; height: 44px; border-radius: 6px; background: rgba(255,255,255,0.02);
    pointer-events: none;
  }
  .mobile-controls .actions {
    display: flex; flex-direction: column; gap: 8px; margin-left: 24px;
  }
  .mobile-controls .actions button {
    width: 56px; height: 56px; border: none; border-radius: 50%;
    font-size: 14px; font-weight: 700; cursor: pointer;
    touch-action: none; -webkit-tap-highlight-color: transparent;
  }
  .mobile-controls .actions .btn-start {
    background: rgba(136,68,255,0.15); color: #b388ff;
    box-shadow: 0 0 12px rgba(136,68,255,0.15);
  }
  .mobile-controls .actions .btn-start:active { background: rgba(136,68,255,0.3); }
  @media (pointer: coarse) {
    .mobile-controls { display: flex; }
    .controls-hint { display: none; }
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 16px; }
    .score-board .value { font-size: 18px; }
    .game-wrapper { gap: 10px; padding: 10px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">
      <div class="item">
        <div class="label">得分</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="item">
        <div class="label">最高</div>
        <div class="value best" id="best">0</div>
      </div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div class="controls-hint">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或
    <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> ·
    <kbd>Space</kbd> 暂停
  </div>

  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <button class="up" data-action="up">▲</button>
      <button class="left" data-action="left">◀</button>
      <div class="center"></div>
      <button class="right" data-action="right">▶</button>
      <button class="down" data-action="down">▼</button>
    </div>
    <div class="actions">
      <button class="btn-start" data-action="pause">⏸<br>暂停</button>
    </div>
  </div>

  <a class="back-link" href="/">← 返回游戏大厅</a>
</div>

<script>
// ======================== 核心配置 ========================
const GRID = 20;
const BASE_SPEED = 140;
const MIN_SPEED = 60;
const SPEED_STEP = 2;

// ======================== DOM ========================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

// ======================== 自适应尺寸 ========================
function resizeCanvas() {
  const maxW = Math.min(420, window.innerWidth - 32);
  canvas.width = maxW;
  canvas.height = maxW;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ======================== 游戏状态 ========================
let CELL = () => canvas.width / GRID;

let snake, food, dir, nextDir, score, best, state, timer, speed;
let particles = [];
let foodPulse = 0;

const STATES = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };

function initGame() {
  const cx = Math.floor(GRID / 2);
  const cy = Math.floor(GRID / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  best = parseInt(localStorage.getItem('snake_best') || '0');
  speed = BASE_SPEED;
  particles = [];
  state = STATES.PLAYING;
  scoreEl.textContent = '0';
  bestEl.textContent = best;
  spawnFood();
  clearInterval(timer);
  timer = setInterval(gameLoop, speed);
}

function spawnFood() {
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
  if (free.length) {
    food = free[Math.floor(Math.random() * free.length)];
    // 10% 概率出金色食物（+3分）
    food.golden = Math.random() < 0.1;
  }
}

// ======================== 粒子系统 ========================
function emitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x * CELL() + CELL() / 2,
      y: y * CELL() + CELL() / 2,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color,
    });
  }
}

// ======================== 游戏循环 ========================
function gameLoop() {
  if (state === STATES.MENU || state === STATES.PAUSED || state === STATES.GAMEOVER) {
    draw();
    return;
  }

  dir = { ...nextDir };
  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y,
  };

  // 撞墙 = 死亡
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    gameOver();
    return;
  }
  // 撞自己 = 死亡
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    const points = food.golden ? 3 : 1;
    score += points;
    scoreEl.textContent = score;
    emitParticles(food.x, food.y, food.golden ? '#ffb400' : '#ff4488', 12);
    // 速度递增
    const newSpeed = Math.max(MIN_SPEED, BASE_SPEED - Math.floor(score / 3) * SPEED_STEP);
    if (newSpeed !== speed) {
      speed = newSpeed;
      clearInterval(timer);
      timer = setInterval(gameLoop, speed);
    }
    spawnFood();
  } else {
    snake.pop();
  }

  // 更新粒子
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += 0.05;
    return p.life > 0;
  });

  foodPulse += 0.05;
  draw();
}

function gameOver() {
  state = STATES.GAMEOVER;
  clearInterval(timer);
  // 死亡粒子
  snake.forEach(s => emitParticles(s.x, s.y, '#8844ff', 3));
  if (score > best) {
    best = score;
    localStorage.setItem('snake_best', best);
    bestEl.textContent = best;
  }
  draw();
}

// ======================== 渲染 ========================
function draw() {
  const cell = CELL();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ---- 棋盘格 ----
  for (let x = 0; x < GRID; x++) {
    for (let y = 0; y < GRID; y++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.01)';
      ctx.fillRect(x * cell, y * cell, cell, cell);
    }
  }

  // ---- 食物 ----
  if (food) {
    const fx = food.x * cell + cell / 2;
    const fy = food.y * cell + cell / 2;
    const pulse = 1 + Math.sin(foodPulse) * 0.12;
    const r = cell / 2 * pulse - 2;

    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
    if (food.golden) {
      grad.addColorStop(0, '#ffdd44');
      grad.addColorStop(0.6, '#ffb400');
      grad.addColorStop(1, '#ff8800');
      ctx.shadowColor = '#ffb400';
      ctx.shadowBlur = 18;
    } else {
      grad.addColorStop(0, '#ff6699');
      grad.addColorStop(0.6, '#ff4488');
      grad.addColorStop(1, '#cc2266');
      ctx.shadowColor = '#ff4488';
      ctx.shadowBlur = 12;
    }

    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.shadowBlur = 0;

    // 高光
    ctx.beginPath();
    ctx.arc(fx - r * 0.25, fy - r * 0.25, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
  }

  // ---- 蛇 ----
  if (snake && state === STATES.PLAYING) {
  const len = snake.length;
  snake.forEach((s, i) => {
    const t = i / Math.max(len - 1, 1);
    const x = s.x * cell, y = s.y * cell;
    const pad = 1;
    const w = cell - pad * 2;
    const h = cell - pad * 2;

    // 从头部紫色渐变到尾部蓝色
    const r = Math.round(88 + (44 - 88) * t);
    const g = Math.round(68 + (100 - 68) * t);
    const b = Math.round(255 + (200 - 255) * t);
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    // 头部发光
    if (i === 0) {
      ctx.shadowColor = '#8844ff';
      ctx.shadowBlur = 8;
    }

    // 圆角矩形
    const radius = Math.min(6, cell / 4);
    ctx.beginPath();
    ctx.roundRect(x + pad, y + pad, w, h, radius);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 眼睛（头部）
    if (i === 0) {
      const eyeR = cell * 0.08;
      const eyeOff = cell * 0.2;
      let ex1, ey1, ex2, ey2;
      if (dir.x === 1) { ex1 = x + w - eyeOff; ey1 = y + eyeOff; ex2 = x + w - eyeOff; ey2 = y + h - eyeOff; }
      else if (dir.x === -1) { ex1 = x + eyeOff; ey1 = y + eyeOff; ex2 = x + eyeOff; ey2 = y + h - eyeOff; }
      else if (dir.y === -1) { ex1 = x + eyeOff; ey1 = y + eyeOff; ex2 = x + w - eyeOff; ey2 = y + eyeOff; }
      else { ex1 = x + eyeOff; ey1 = y + h - eyeOff; ex2 = x + w - eyeOff; ey2 = y + h - eyeOff; }

      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(ex1 + dir.x * eyeR * 0.4, ey1 + dir.y * eyeR * 0.4, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2 + dir.x * eyeR * 0.4, ey2 + dir.y * eyeR * 0.4, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
    }
  });
  } // end snake guard

  // ---- 粒子 ----
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ---- 状态覆盖层 ----
  if (state === STATES.MENU || state === STATES.GAMEOVER || state === STATES.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';

    if (state === STATES.MENU) {
      ctx.fillStyle = '#b388ff';
      ctx.font = `bold ${canvas.width * 0.08}px system-ui`;
      ctx.fillText('🐍 贪吃蛇', canvas.width / 2, canvas.height * 0.38);

      ctx.fillStyle = '#6666aa';
      ctx.font = `${canvas.width * 0.035}px system-ui`;
      ctx.fillText('按任意方向键开始', canvas.width / 2, canvas.height * 0.55);

      ctx.fillStyle = '#444477';
      ctx.font = `${canvas.width * 0.028}px system-ui`;
      ctx.fillText('方向键 / WASD 移动 · 空格暂停', canvas.width / 2, canvas.height * 0.65);

    } else if (state === STATES.GAMEOVER) {
      ctx.fillStyle = '#b388ff';
      ctx.font = `bold ${canvas.width * 0.07}px system-ui`;
      ctx.fillText('💀 游戏结束', canvas.width / 2, canvas.height * 0.38);

      ctx.fillStyle = '#ffb400';
      ctx.font = `bold ${canvas.width * 0.05}px system-ui`;
      ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height * 0.48);

      if (score >= best && score > 0) {
        ctx.fillStyle = '#ffb400';
        ctx.font = `${canvas.width * 0.035}px system-ui`;
        ctx.fillText('🏆 新纪录！', canvas.width / 2, canvas.height * 0.56);
      }

      ctx.fillStyle = '#6666aa';
      ctx.font = `${canvas.width * 0.032}px system-ui`;
      ctx.fillText('按任意方向键重新开始', canvas.width / 2, canvas.height * 0.66);

    } else if (state === STATES.PAUSED) {
      ctx.fillStyle = '#b388ff';
      ctx.font = `bold ${canvas.width * 0.07}px system-ui`;
      ctx.fillText('⏸ 暂停中', canvas.width / 2, canvas.height / 2);

      ctx.fillStyle = '#6666aa';
      ctx.font = `${canvas.width * 0.032}px system-ui`;
      ctx.fillText('按空格继续', canvas.width / 2, canvas.height * 0.58);
    }
  }
}

// ======================== 输入控制 ========================
function setDirection(dx, dy) {
  if (state === STATES.MENU || state === STATES.GAMEOVER) {
    initGame();
    return;
  }
  if (state === STATES.PLAYING && (dx !== -dir.x || dy !== -dir.y)) {
    nextDir = { x: dx, y: dy };
  }
}

document.addEventListener('keydown', e => {
  const k = e.key;
  if (['ArrowUp', 'w', 'W'].includes(k)) { e.preventDefault(); setDirection(0, -1); }
  else if (['ArrowDown', 's', 'S'].includes(k)) { e.preventDefault(); setDirection(0, 1); }
  else if (['ArrowLeft', 'a', 'A'].includes(k)) { e.preventDefault(); setDirection(-1, 0); }
  else if (['ArrowRight', 'd', 'D'].includes(k)) { e.preventDefault(); setDirection(1, 0); }
  else if (k === ' ' || k === 'p' || k === 'P') {
    e.preventDefault();
    if (state === STATES.PLAYING) state = STATES.PAUSED;
    else if (state === STATES.PAUSED) state = STATES.PLAYING;
    else if (state === STATES.MENU || state === STATES.GAMEOVER) initGame();
  }
});

// 触摸滑动
let touchX, touchY;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchX = t.clientX; touchY = t.clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return; // 忽略点击
  if (Math.abs(dx) > Math.abs(dy)) {
    setDirection(dx > 0 ? 1 : -1, 0);
  } else {
    setDirection(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });

// 手机按钮
document.getElementById('mobileControls').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const a = btn.dataset.action;
  if (a === 'pause') { if (state === STATES.PLAYING) state = STATES.PAUSED; else if (state === STATES.PAUSED) state = STATES.PLAYING; return; }
  if (state === STATES.MENU || state === STATES.GAMEOVER) { initGame(); return; }
  if (state !== STATES.PLAYING) return;
  const dirs = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
  const d = dirs[a];
  if (d) setDirection(d[0], d[1]);
});

// ======================== 启动 ========================
state = STATES.MENU;
best = parseInt(localStorage.getItem('snake_best') || '0');
bestEl.textContent = best;
draw();
</script>
</body>
</html>

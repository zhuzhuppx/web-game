services:
  web:
    build: ./app
    container_name: ai-game-studio
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - LLM_LOCAL=${LLM_LOCAL:-false}
    networks:
      - default
      - d2gpcf

  game-agent:
    build: ./game-agent
    container_name: ai-game-agent
    restart: unless-stopped
    ports:
      - "8764:8764"
    volumes:
      - ./game-agent/games:/app/games
      - ./data:/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    networks:
      - default
      - d2gpcf

  speech:
    build: ./speech
    container_name: whisper-speech
    restart: unless-stopped
    ports:
      - "8766:8766"
    environment:
      - WHISPER_MODEL=large-v3
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - default
      - d2gpcf

networks:
  d2gpcf:
    external: true
    name: d2gpcf_default
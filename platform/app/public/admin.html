<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理后台 · 游戏工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f0f0f;color:#e0e0e0;min-height:100vh;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:22px;margin-bottom:20px;color:#fff}
.card{background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:15px;color:#88aaff;margin-bottom:12px}
input,button{font-family:system-ui}
input{padding:8px 12px;border-radius:8px;border:1px solid #333;background:#2a2a2a;color:#fff;font-size:13px;outline:none;width:100%}
input:focus{border-color:#667eea}
button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.btn-blue{background:#4a6cf7;color:#fff;width:100%;margin-top:10px}
.btn-blue:hover{background:#5a7cf7}
.btn-red{background:rgba(255,60,40,0.2);color:#ff6644}
.btn-red:hover{background:rgba(255,60,40,0.35)}
.btn-green{background:rgba(60,200,60,0.2);color:#88cc88}
.btn-green:hover{background:rgba(60,200,60,0.35)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #222}
th{color:#888;font-weight:500}
td .badge{padding:2px 8px;border-radius:10px;font-size:11px}
td .badge.active{background:rgba(60,200,100,0.15);color:#88cc88}
td .badge.inactive{background:rgba(255,100,60,0.15);color:#ff8866}
.stats{display:flex;gap:16px}
.stat{flex:1;background:#161616;border-radius:10px;padding:16px;text-align:center}
.stat .n{font-size:28px;font-weight:700;color:#fff}
.stat .l{font-size:11px;color:#888;margin-top:4px}
.err{color:#ff4444;font-size:12px;margin-top:6px;min-height:18px}
.login-box{max-width:360px;margin:80px auto}
</style>
</head>
<body>

<div class="login-box card" id="loginBox">
  <h2>🔐 管理员登录</h2>
  <input type="password" id="loginPwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn-blue" onclick="doLogin()">登录</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="dashboard" style="display:none">
<h1>🎮 游戏工坊 · 管理后台</h1>

<div class="card">
  <div class="stats">
    <div class="stat"><div class="n" id="statUsers">-</div><div class="l">用户总数</div></div>
    <div class="stat"><div class="n" id="statActive">-</div><div class="l">活跃用户</div></div>
    <div class="stat"><div class="n" id="statGames">-</div><div class="l">游戏总数</div></div>
  </div>
</div>

<div class="card">
  <h2>👥 用户管理</h2>
  <p style="color:#888;font-size:12px;margin-bottom:10px">用户通过登录页自行注册，管理员可查看和禁用</p>
</div>

<div class="card">
  <h2>📋 用户列表</h2>
  <table><thead><tr><th>用户名</th><th>注册时间</th><th>游戏数</th><th>状态</th><th>操作</th></tr></thead>
  <tbody id="userTable"><tr><td colspan="5" style="text-align:center;color:#555">加载中...</td></tr></tbody></table>
</div>
</div>

<script>
var adminPass='';

async function api(path,method,body){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  if(adminPass)opts.headers['x-admin-password']=adminPass;
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch(path,opts);
  return r.json();
}

async function doLogin(){
  var pwd=document.getElementById('loginPwd').value;
  var err=document.getElementById('loginErr');
  adminPass=pwd;
  var d=await api('/api/admin/users','GET');
  if(d.error){adminPass='';err.textContent=d.error;return}
  document.getElementById('loginBox').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadAll();
}

async function loadAll(){loadStats();loadUsers()}
async function loadStats(){
  var d=await api('/api/stats','GET');
  document.getElementById('statUsers').textContent=d.userCount||0;
  document.getElementById('statActive').textContent=d.activeUsers||0;
  document.getElementById('statGames').textContent=d.gameCount||0;
}
async function loadUsers(){
  var d=await api('/api/admin/users','GET');
  var rows=(d.users||[]).map(function(u){
    return '<tr><td><b>'+u.username+'</b></td><td>'+u.created+'</td><td>'+u.gameCount+'</td>'+
      '<td><span class="badge '+(u.active?'active':'inactive')+'">'+(u.active?'正常':'已禁用')+'</span></td>'+
      '<td><button class="'+(u.active?'btn-red':'btn-green')+'" onclick="toggleUser(\''+u.username+'\')">'+(u.active?'禁用':'启用')+'</button></td></tr>';
  }).join('');
  document.getElementById('userTable').innerHTML=rows||'<tr><td colspan="5" style="text-align:center;color:#555">暂无用户</td></tr>';
}

async function toggleUser(username){
  var d=await api('/api/admin/toggle-user','POST',{username:username});
  if(d.ok)loadAll();
}
</script>
</body>
</html>

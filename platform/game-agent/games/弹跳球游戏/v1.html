<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>弹跳球游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 4px 12px 4px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header .score-wrap,
        .header .lives-wrap {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header .score-wrap span,
        .header .lives-wrap span {
            color: #ffd700;
            margin-left: 6px;
        }

        .header .lives-wrap span {
            color: #ff6b6b;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #111128;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), inset 0 0 60px rgba(88, 60, 200, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            touch-action: none;
            cursor: pointer;
        }

        /* 虚拟按键 - 手机专用 */
        .touch-controls {
            display: none;
            width: 100%;
            justify-content: center;
            gap: 30px;
            margin-top: 16px;
            padding: 8px 0;
        }

        .touch-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            transition: background 0.1s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }

        .touch-btn:active,
        .touch-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.94);
        }

        .touch-btn .arrow {
            line-height: 1;
            font-weight: 300;
        }

        /* 游戏结束 / 开始覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .overlay .sub {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .overlay .btn {
            padding: 14px 48px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            touch-action: manipulation;
            letter-spacing: 2px;
        }

        .overlay .btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .overlay .final-score {
            font-size: 22px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .overlay .final-score span {
            color: #ffd700;
            font-weight: 700;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            border-radius: 16px;
        }

        /* 响应式 */
        @media (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
            .header {
                font-size: 16px;
            }
            .header .score-wrap,
            .header .lives-wrap {
                padding: 4px 14px;
            }
            .overlay h1 {
                font-size: 32px;
            }
            .overlay .btn {
                padding: 12px 36px;
                font-size: 18px;
            }
            .touch-btn {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .header {
                font-size: 14px;
                padding: 4px 2px 8px 2px;
            }
            .header .score-wrap,
            .header .lives-wrap {
                padding: 4px 12px;
            }
            .touch-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .touch-controls {
                gap: 20px;
                margin-top: 12px;
            }
            .overlay h1 {
                font-size: 26px;
            }
            .overlay .btn {
                padding: 10px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <div class="score-wrap">🏆 得分 <span id="scoreDisplay">0</span></div>
            <div class="lives-wrap">❤️ 生命 <span id="livesDisplay">3</span></div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="780" height="520"></canvas>

            <!-- 开始 / 结束 覆盖层 -->
            <div class="overlay show" id="overlay">
                <h1 id="overlayTitle">🎮 弹跳球</h1>
                <div class="sub" id="overlaySub">击碎所有砖块！</div>
                <div class="final-score" id="finalScore" style="display:none;">得分 <span id="finalScoreValue">0</span></div>
                <button class="btn" id="overlayBtn">开始游戏</button>
            </div>
        </div>

        <!-- 虚拟按键 -->
        <div class="touch-controls" id="touchControls">
            <button class="touch-btn" id="btnLeft" aria-label="向左移动">
                <span class="arrow">◀</span>
            </button>
            <button class="touch-btn" id="btnRight" aria-label="向右移动">
                <span class="arrow">▶</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // -------- DOM 引用 ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const livesSpan = document.getElementById('livesDisplay');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const finalScore = document.getElementById('finalScore');
            const finalScoreValue = document.getElementById('finalScoreValue');
            const overlayBtn = document.getElementById('overlayBtn');

            // -------- 尺寸适配 ----------
            let W = 780;
            let H = 520;
            const DESIGN_W = 780;
            const DESIGN_H = 520;
            let scale = 1;

            function resizeCanvas() {
                const container = canvas.parentElement;
                const rect = container.getBoundingClientRect();
                const containerW = rect.width;
                // 保持宽高比
                const ratio = DESIGN_W / DESIGN_H;
                let displayW = containerW;
                let displayH = containerW / ratio;
                if (displayH > window.innerHeight * 0.72) {
                    displayH = window.innerHeight * 0.72;
                    displayW = displayH * ratio;
                }
                canvas.style.width = displayW + 'px';
                canvas.style.height = displayH + 'px';
                // 物理像素不变
                canvas.width = DESIGN_W;
                canvas.height = DESIGN_H;
                W = DESIGN_W;
                H = DESIGN_H;
                scale = 1;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // -------- 游戏参数 ----------
            const PADDLE_W = 120;
            const PADDLE_H = 14;
            const PADDLE_Y_OFFSET = 30;
            const BALL_RADIUS = 9;
            const BALL_SPEED_INITIAL = 4.8;
            const BRICK_ROWS = 5;
            const BRICK_COLS = 8;
            const BRICK_W = 80;
            const BRICK_H = 26;
            const BRICK_PAD = 6;
            const BRICK_TOP = 50;
            const BRICK_LEFT_OFFSET = (DESIGN_W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

            // 颜色方案
            const BRICK_COLORS = [
                '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff',
                '#5f27cd', '#01a3a4', '#f368e0'
            ];

            // -------- 游戏状态 ----------
            let paddle = { x: 0, y: 0, w: PADDLE_W, h: PADDLE_H };
            let ball = { x: 0, y: 0, r: BALL_RADIUS, dx: 0, dy: 0, speed: BALL_SPEED_INITIAL };
            let bricks = [];
            let score = 0;
            let lives = 3;
            let gameState = 'idle'; // 'idle' | 'running' | 'paused' | 'gameover' | 'win'
            let animationId = null;

            // 键盘输入
            let keys = {
                left: false,
                right: false
            };

            // 触控输入 (移动端)
            let touchActive = {
                left: false,
                right: false
            };

            // -------- 初始化砖块 ----------
            function initBricks() {
                bricks = [];
                for (let row = 0; row < BRICK_ROWS; row++) {
                    for (let col = 0; col < BRICK_COLS; col++) {
                        const x = BRICK_LEFT_OFFSET + col * (BRICK_W + BRICK_PAD);
                        const y = BRICK_TOP + row * (BRICK_H + BRICK_PAD);
                        const color = BRICK_COLORS[(row + col) % BRICK_COLORS.length];
                        bricks.push({
                            x: x,
                            y: y,
                            w: BRICK_W,
                            h: BRICK_H,
                            alive: true,
                            color: color
                        });
                    }
                }
            }

            // -------- 重置球和挡板 ----------
            function resetBall(keepDirection) {
                ball.x = paddle.x + paddle.w / 2;
                ball.y = paddle.y - ball.r - 2;
                if (!keepDirection) {
                    const angle = -Math.PI / 4 + (Math.random() * 0.5 - 0.25);
                    const speed = ball.speed;
                    ball.dx = Math.cos(angle) * speed;
                    ball.dy = -Math.abs(Math.sin(angle) * speed);
                    // 确保不会太平
                    if (Math.abs(ball.dy) < speed * 0.3) {
                        ball.dy = -speed * 0.5;
                    }
                }
            }

            function resetPaddle() {
                paddle.x = (W - paddle.w) / 2;
                paddle.y = H - paddle.h - PADDLE_Y_OFFSET;
            }

            // -------- 全新开始 ----------
            function resetGame() {
                score = 0;
                lives = 3;
                ball.speed = BALL_SPEED_INITIAL;
                initBricks();
                resetPaddle();
                resetBall(false);
                updateUI();
                gameState = 'idle';
                overlay.classList.add('show');
                overlayTitle.textContent = '🎮 弹跳球';
                overlaySub.textContent = '击碎所有砖块！';
                finalScore.style.display = 'none';
                overlayBtn.textContent = '开始游戏';
            }

            // -------- UI 更新 ----------
            function updateUI() {
                scoreSpan.textContent = score;
                livesSpan.textContent = lives;
            }

            // -------- 碰撞辅助 ----------
            function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
                const nearX = Math.max(rx, Math.min(cx, rx + rw));
                const nearY = Math.max(ry, Math.min(cy, ry + rh));
                const dx = cx - nearX;
                const dy = cy - nearY;
                return (dx * dx + dy * dy) < (cr * cr);
            }

            // -------- 游戏逻辑更新 ----------
            function update() {
                if (gameState !== 'running') return;

                // ----- 挡板移动 (键盘 + 触控) -----
                let moveDir = 0;
                if (keys.left || touchActive.left) moveDir -= 1;
                if (keys.right || touchActive.right) moveDir += 1;

                if (moveDir !== 0) {
                    const speed = 7.2;
                    paddle.x += moveDir * speed;
                    if (paddle.x < 0) paddle.x = 0;
                    if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
                }

                // ----- 球移动 -----
                ball.x += ball.dx;
                ball.y += ball.dy;

                // 墙壁碰撞
                if (ball.x - ball.r < 0) { ball.x = ball.r;
                    ball.dx = -ball.dx; }
                if (ball.x + ball.r > W) { ball.x = W - ball.r;
                    ball.dx = -ball.dx; }
                if (ball.y - ball.r < 0) { ball.y = ball.r;
                    ball.dy = -ball.dy; }

                // 底部出界
                if (ball.y + ball.r > H) {
                    lives--;
                    updateUI();
                    if (lives <= 0) {
                        gameOver(false);
                        return;
                    }
                    resetBall(false);
                    // 挡板归中
                    resetPaddle();
                    return;
                }

                // ----- 挡板碰撞 -----
                if (ball.dy > 0 &&
                    ball.y + ball.r >= paddle.y &&
                    ball.y + ball.r <= paddle.y + paddle.h + 8 &&
                    ball.x >= paddle.x - ball.r &&
                    ball.x <= paddle.x + paddle.w + ball.r) {
                    // 计算反弹角度 (根据击中位置)
                    const hitPos = (ball.x - paddle.x) / paddle.w; // 0~1
                    const angle = (hitPos - 0.5) * 1.2; // -0.6 ~ 0.6 rad
                    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                    ball.dx = Math.sin(angle) * speed;
                    ball.dy = -Math.abs(Math.cos(angle) * speed);
                    // 确保最小垂直速度
                    if (ball.dy > -speed * 0.35) {
                        ball.dy = -speed * 0.45;
                    }
                    ball.y = paddle.y - ball.r;
                }

                // ----- 砖块碰撞 -----
                let hitBrick = false;
                for (let i = 0; i < bricks.length; i++) {
                    const b = bricks[i];
                    if (!b.alive) continue;
                    if (circleRectCollision(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h)) {
                        b.alive = false;
                        hitBrick = true;
                        score += 10;
                        updateUI();

                        // 简单反弹：判断从哪个方向进入
                        // 通过球心与砖块中心的偏移决定
                        const cx = b.x + b.w / 2;
                        const cy = b.y + b.h / 2;
                        const dx = ball.x - cx;
                        const dy = ball.y - cy;
                        const overlapX = (b.w / 2 + ball.r) - Math.abs(dx);
                        const overlapY = (b.h / 2 + ball.r) - Math.abs(dy);
                        if (overlapX < overlapY) {
                            ball.dx = -ball.dx;
                        } else {
                            ball.dy = -ball.dy;
                        }
                        // 微调避免卡砖
                        if (ball.dx === 0) ball.dx = 0.3;
                        if (ball.dy === 0) ball.dy = -0.3;
                        break; // 一帧只打碎一块
                    }
                }

                // 检测胜利
                if (bricks.every(b => !b.alive)) {
                    gameOver(true);
                    return;
                }

                // 球速随得分轻微增加 (增加趣味)
                const currentSpeed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                const targetSpeed = BALL_SPEED_INITIAL + Math.min(score / 200, 2.5);
                if (currentSpeed < targetSpeed && currentSpeed > 0) {
                    const ratio = targetSpeed / currentSpeed;
                    ball.dx *= ratio * 0.998;
                    ball.dy *= ratio * 0.998;
                }
            }

            // -------- 游戏结束 ----------
            function gameOver(win) {
                gameState = win ? 'win' : 'gameover';
                overlay.classList.add('show');
                if (win) {
                    overlayTitle.textContent = '🎉 恭喜通关！';
                    overlaySub.textContent = '你太棒了！';
                } else {
                    overlayTitle.textContent = '💔 游戏结束';
                    overlaySub.textContent = '再接再厉！';
                }
                finalScore.style.display = 'block';
                finalScoreValue.textContent = score;
                overlayBtn.textContent = '🔄 重新开始';
            }

            // -------- 渲染 ----------
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // ----- 背景装饰渐变 -----
                const grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 450);
                grad.addColorStop(0, '#1a1a3e');
                grad.addColorStop(1, '#0a0a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // 微弱的网格线
                ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                ctx.lineWidth = 1;
                for (let i = 0; i < W; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, H);
                    ctx.stroke();
                }
                for (let i = 0; i < H; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(W, i);
                    ctx.stroke();
                }

                // ----- 砖块 -----
                for (const b of bricks) {
                    if (!b.alive) continue;
                    const x = b.x,
                        y = b.y,
                        w = b.w,
                        h = b.h;
                    // 主体
                    ctx.shadowColor = 'rgba(255,255,255,0.08)';
                    ctx.shadowBlur = 12;
                    ctx.fillStyle = b.color;
                    ctx.beginPath();
                    const r = 4;
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + w - r, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                    ctx.lineTo(x + w, y + h - r);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    ctx.lineTo(x + r, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                    ctx.lineTo(x, y + r);
                    ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x + 6, y + 4, w - 12, 6);

                    // 边框
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, w, h);
                }

                // ----- 挡板 -----
                ctx.shadowColor = 'rgba(108,92,231,0.5)';
                ctx.shadowBlur = 25;
                const pGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
                pGrad.addColorStop(0, '#a78bfa');
                pGrad.addColorStop(0.5, '#7c3aed');
                pGrad.addColorStop(1, '#5b21b6');
                ctx.fillStyle = pGrad;
                const pr = 8;
                const px = paddle.x,
                    py = paddle.y,
                    pw = paddle.w,
                    ph = paddle.h;
                ctx.beginPath();
                ctx.moveTo(px + pr, py);
                ctx.lineTo(px + pw - pr, py);
                ctx.quadraticCurveTo(px + pw, py, px + pw, py + pr);
                ctx.lineTo(px + pw, py + ph - pr);
                ctx.quadraticCurveTo(px + pw, py + ph, px + pw - pr, py + ph);
                ctx.lineTo(px + pr, py + ph);
                ctx.quadraticCurveTo(px, py + ph, px, py + ph - pr);
                ctx.lineTo(px, py + pr);
                ctx.quadraticCurveTo(px, py, px + pr, py);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;

                // 挡板高光
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.fillRect(px + 12, py + 4, pw - 24, 4);

                // ----- 球 -----
                ctx.shadowColor = 'rgba(255,215,0,0.6)';
                ctx.shadowBlur = 30;
                const bGrad = ctx.createRadialGradient(
                    ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.2,
                    ball.x, ball.y, ball.r
                );
                bGrad.addColorStop(0, '#fff7b0');
                bGrad.addColorStop(0.4, '#ffd700');
                bGrad.addColorStop(1, '#e67e22');
                ctx.fillStyle = bGrad;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 球的高光
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath();
                ctx.arc(ball.x - ball.r * 0.25, ball.y - ball.r * 0.3, ball.r * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // ----- 底部提示（移动端显示虚拟按键提示） -----
                if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('使用下方按钮控制挡板', W / 2, H - 8);
                }
            }

            // -------- 游戏循环 ----------
            function gameLoop() {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }

            // -------- 开始运行游戏 ----------
            function startGame() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                resetGame();
                overlay.classList.remove('show');
                gameState = 'running';
                animationId = requestAnimationFrame(gameLoop);
            }

            // -------- 事件绑定 ----------

            // --- 键盘 ---
            function handleKeyDown(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                } else if (key === ' ' || key === 'Enter') {
                    if (gameState === 'idle' || gameState === 'gameover' || gameState === 'win') {
                        e.preventDefault();
                        startGame();
                    }
                }
            }

            function handleKeyUp(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                    keys.left = false;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                    keys.right = false;
                    e.preventDefault();
                } else if (key === ' ' || key === 'Enter') {
                    e.preventDefault();
                }
            }

            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // --- 触控 (虚拟按键) ---
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');

            function setupTouchButton(btn, direction) {
                function start(e) {
                    e.preventDefault();
                    touchActive[direction] = true;
                    btn.classList.add('active');
                }

                function end(e) {
                    e.preventDefault();
                    touchActive[direction] = false;
                    btn.classList.remove('active');
                }

                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', end, { passive: false });
                btn.addEventListener('touchcancel', end, { passive: false });
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', end);
                btn.addEventListener('mouseleave', end);
            }
            setupTouchButton(btnLeft, 'left');
            setupTouchButton(btnRight, 'right');

            // --- 开始按钮 ---
            overlayBtn.addEventListener('click', function(e) {
                e.preventDefault();
                startGame();
            });

            // 触控设备点击覆盖层按钮
            overlayBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                startGame();
            });

            // -------- 启动（初始状态 idle） ----------
            resetGame();
            // 显示覆盖层，等待开始
            overlay.classList.add('show');
            overlayTitle.textContent = '🎮 弹跳球';
            overlaySub.textContent = '击碎所有砖块！';
            finalScore.style.display = 'none';
            overlayBtn.textContent = '开始游戏';
            gameState = 'idle';
            // 开始循环（只渲染，不更新逻辑）
            animationId = requestAnimationFrame(gameLoop);

            // 窗口尺寸变化重新绘制
            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // 防止页面滚动
            document.addEventListener('touchmove', function(e) {
                if (e.target.closest('.game-wrapper')) {
                    e.preventDefault();
                }
            }, { passive: false });

            console.log('🎯 弹跳球游戏 v1 已加载！');
            console.log('🕹️ 键盘: ← → 或 A/D   |   触屏: 下方按钮');
            console.log('💡 点击 "开始游戏" 或 按 空格/回车 开始');

        })();
    </script>

</body>
</html>

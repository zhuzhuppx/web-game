<body>

    <div class="game-wrapper" role="application" aria-label="贪吃蛇游戏">
        <!-- 头部信息 -->
        <div class="header">
            <span class="title">🐍 贪吃蛇</span>
            <div class="score-box">
                <span class="score-label">🍎 分数</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
        </div>

        <!-- Canvas 容器 -->
        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            <!-- 游戏结束覆盖层 -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-title">游戏结束</div>
                <div class="game-over-score">
                    得分 <span id="finalScore">0</span>
                </div>
                <button class="restart-btn" id="restartBtn">↻ 重新开始</button>
                <div class="restart-hint">或按 空格键</div>
            </div>
        </div>

        <!-- 虚拟方向键 -->
        <div class="dpad" id="dpad" role="group" aria-label="方向控制">
            <button class="dpad-btn dpad-up" data-dir="up" aria-label="上">▲</button>
            <button class="dpad-btn dpad-left" data-dir="left" aria-label="左">◀</button>
            <div class="dpad-btn dpad-center" aria-hidden="true">✦</div>
            <button class="dpad-btn dpad-right" data-dir="right" aria-label="右">▶</button>
            <button class="dpad-btn dpad-down" data-dir="down" aria-label="下">▼</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  1. DOM 引用
            // ============================================================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvasContainer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const finalScore = document.getElementById('finalScore');
            const overlay = document.getElementById('gameOverOverlay');
            const restartBtn = document.getElementById('restartBtn');
            const dpadBtns = document.querySelectorAll('.dpad-btn[data-dir]');

            // ============================================================
            //  2. 游戏配置
            // ============================================================
            const GRID_SIZE = 20; // 20x20 网格
            const INITIAL_SPEED = 160; // 毫秒/格
            const MIN_SPEED = 60;
            const SPEED_INCREASE_PER_FOOD = 3; // 每吃一个食物减少的毫秒数

            // ============================================================
            //  3. 游戏状态
            // ============================================================
            let snake = []; // [{x, y}, ...]  蛇头在索引0
            let food = { x: 8, y: 10 };
            let direction = 'right'; // 当前移动方向
            let nextDirection = 'right';
            let score = 0;
            let gameState = 'idle'; // 'idle' | 'playing' | 'over'
            let lastMoveTime = 0;
            let moveInterval = INITIAL_SPEED;
            let animFrameId = null;
            let isPaused = false;

            // 触摸滑动
            let touchStartX = 0;
            let touchStartY = 0;
            const SWIPE_THRESHOLD = 20;

            // ============================================================
            //  4. Canvas 尺寸适配
            // ============================================================
            function resizeCanvas() {
                const rect = container.getBoundingClientRect();
                const size = Math.floor(rect.width);
                const dpr = window.devicePixelRatio || 1;

                // 逻辑尺寸 = 显示尺寸，保证清晰
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';

                // 如果 DPR > 1，可以用更高分辨率渲染（可选，但为了性能统一用1倍）
                // 这里保持 1:1 逻辑像素与物理像素，简单清晰
                // 但为了高清屏，可以乘 dpr，但需要缩放上下文，比较麻烦，暂时不做
                // 实际显示效果已经足够
            }

            // ============================================================
            //  5. 核心游戏逻辑
            // ============================================================

            // 计算每个格子的大小
            function getCellSize() {
                return canvas.width / GRID_SIZE;
            }

            // 初始化/重置游戏
            function initGame() {
                // 蛇：初始长度3，水平放置
                const mid = Math.floor(GRID_SIZE / 2);
                snake = [
                    { x: mid, y: mid },
                    { x: mid - 1, y: mid },
                    { x: mid - 2, y: mid }
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                moveInterval = INITIAL_SPEED;
                updateScore();
                spawnFood();
                gameState = 'idle';
                overlay.classList.remove('show');
                isPaused = false;
                lastMoveTime = 0;
            }

            // 生成食物（不在蛇身上）
            function spawnFood() {
                const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
                const free = [];
                for (let x = 0; x < GRID_SIZE; x++) {
                    for (let y = 0; y < GRID_SIZE; y++) {
                        if (!occupied.has(`${x},${y}`)) {
                            free.push({ x, y });
                        }
                    }
                }
                if (free.length === 0) {
                    // 蛇占满网格 → 胜利！但贪吃蛇通常没有赢，继续游戏会死，这里直接结束
                    gameOver();
                    return;
                }
                const idx = Math.floor(Math.random() * free.length);
                food = free[idx];
            }

            // 蛇移动一步
            function moveSnake() {
                if (gameState !== 'playing') return;

                // 应用下一个有效方向
                const newDir = nextDirection;
                if (!isOpposite(newDir, direction)) {
                    direction = newDir;
                }

                // 计算新蛇头
                const head = snake[0];
                let newHead = { ...head };
                switch (direction) {
                    case 'up':
                        newHead.y--;
                        break;
                    case 'down':
                        newHead.y++;
                        break;
                    case 'left':
                        newHead.x--;
                        break;
                    case 'right':
                        newHead.x++;
                        break;
                    default:
                        break;
                }

                // 检查是否吃到食物
                const ate = (newHead.x === food.x && newHead.y === food.y);

                // 插入新蛇头
                snake.unshift(newHead);
                if (!ate) {
                    snake.pop();
                } else {
                    // 加分 + 加速 + 生成新食物
                    score++;
                    updateScore();
                    moveInterval = Math.max(MIN_SPEED, INITIAL_SPEED - score * SPEED_INCREASE_PER_FOOD);
                    spawnFood();
                }

                // 碰撞检测
                const headCollision = checkCollision(newHead);
                if (headCollision) {
                    gameOver();
                }
            }

            // 检测碰撞（撞墙 或 撞自身）
            function checkCollision(head) {
                // 撞墙
                if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                    return true;
                }
                // 撞自身（蛇头与身体其他部分重叠）
                for (let i = 1; i < snake.length; i++) {
                    if (snake[i].x === head.x && snake[i].y === head.y) {
                        return true;
                    }
                }
                return false;
            }

            // 判断两个方向是否相反
            function isOpposite(a, b) {
                return (a === 'up' && b === 'down') ||
                    (a === 'down' && b === 'up') ||
                    (a === 'left' && b === 'right') ||
                    (a === 'right' && b === 'left');
            }

            // 游戏结束
            function gameOver() {
                if (gameState === 'over') return;
                gameState = 'over';
                finalScore.textContent = score;
                overlay.classList.add('show');
            }

            // 开始游戏（从闲置或重新开始）
            function startGame() {
                initGame();
                gameState = 'playing';
                overlay.classList.remove('show');
                lastMoveTime = performance.now();
                if (!animFrameId

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>反应测试小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 800 / 600;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <script>
        // ============================================================
        // 音效系统 (Web Audio API)
        // ============================================================
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(freq, duration, type = 'square', volume = 0.25) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { /* 静默失败 */ }
        }

        function playHitSound() {
            playBeep(880, 0.15, 'sine', 0.3);
            setTimeout(() => playBeep(1100, 0.1, 'sine', 0.2), 80);
        }

        function playMissSound() {
            playBeep(220, 0.25, 'sawtooth', 0.2);
        }

        function playGameOverSound() {
            playBeep(440, 0.2, 'square', 0.25);
            setTimeout(() => playBeep(330, 0.2, 'square', 0.2), 150);
            setTimeout(() => playBeep(220, 0.4, 'square', 0.2), 300);
        }

        function playBonusSound() {
            playBeep(660, 0.1, 'sine', 0.2);
            setTimeout(() => playBeep(880, 0.1, 'sine', 0.2), 100);
            setTimeout(() => playBeep(1100, 0.15, 'sine', 0.25), 200);
        }

        function playCountdownBeep() {
            playBeep(600, 0.12, 'sine', 0.2);
        }

        // ============================================================
        // 状态钩子
        // ============================================================
        window.__gameState = {
            running: false,
            score: 0,
            lives: 5,
            gameOver: false,
            canRestart: false,
            objects: {
                player: true,
                enemies: 0,
                projectiles: 0
            }
        };

        // ============================================================
        // 主场景
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.score = 0;
                this.lives = 5;
                this.maxLives = 5;
                this.consecutiveHits = 0;
                this.targetDuration = 1.2;
                this.targetInterval = 1.0;
                this.baseDuration = 1.2;
                this.baseInterval = 1.0;
                this.minDuration = 0.6;
                this.minInterval = 0.4;
                this.isGameOver = false;
                this.isPlaying = false;
                this.isCountdown = false;
                this.target = null;
                this.targetGroup = null;
                this.clickDetectorGroup = null;
                this.pendingClick = false;
                this.clickX = 0;
                this.clickY = 0;
                this.spawnTimer = null;
                this.countdownText = null;
                this.gameOverText = null;
                this.restartBtn = null;
                this.scoreText = null;
                this.livesText = null;
                this.bonusText = null;
                this.flashOverlay = null;
                this.btnA = null;
                this.btnB = null;
                this.btnAText = null;
                this.btnBText = null;
                this.startPrompt = null;
                this.targetSprite = null;
                this.detectorSprite = null;
            }

            // ----------------------------------------------------------
            // preload: 生成纹理
            // ----------------------------------------------------------
            preload() {
                this.createButtonTexture();
                this.createDotTexture();
                this.createVirtualBtnTexture();
                this.createFlashTexture();
                this.createCrossTexture();
            }

            createButtonTexture() {
                const g = this.make.graphics({ x: 0, y: 0 }, false);
                const r = 30;
                // 外圈深红
                g.fillStyle(0xcc0000, 1);
                g.fillCircle(r, r, r);
                // 内圈亮红
                g.fillStyle(0xff3333, 0.85);
                g.fillCircle(r, r, r - 6);
                // 高光
                g.fillStyle(0xff7777, 0.4);
                g.fillCircle(r - 6, r - 6, r * 0.35);
                // 感叹号 "!"
                g.fillStyle(0xffffff, 0.9);
                g.fillRect(r - 3, r - 14, 6, 18);
                g.fillCircle(r, r + 8, 4);
                g.generateTexture('target_btn', r * 2, r * 2);
                g.destroy();
            }

            createDotTexture() {
                const g = this.make.graphics({ x: 0, y: 0 }, false);
                g.fillStyle(0x00ff88, 0.9);
                g.fillCircle(8, 8, 8);
                g.generateTexture('dot', 16, 16);
                g.destroy();
            }

            createVirtualBtnTexture() {
                // A 按钮 (绿色)
                let g = this.make.graphics({ x: 0, y: 0 }, false);
                g.fillStyle(0x22aa44, 0.7);
                g.fillCircle(35, 35, 35);
                g.lineStyle(3, 0x44ee66, 0.9);
                g.strokeCircle(35, 35, 33);
                g.generateTexture('vbtn_a', 70, 70);
                g.destroy();

                // B 按钮 (橙色)
                g = this.make.graphics({ x: 0, y: 0 }, false);
                g.fillStyle(0xcc7722, 0.7);
                g.fillCircle(35, 35, 35);
                g.lineStyle(3, 0xee9944, 0.9);
                g.strokeCircle(35, 35, 33);
                g.generateTexture('vbtn_b', 70, 70);
                g.destroy();

                // 重新开始按钮纹理
                g = this.make.graphics({ x: 0, y: 0 }, false);
                g.fillStyle(0x3366cc, 0.85);
                g.fillRoundedRect(0, 0, 220, 60, 16);
                g.lineStyle(3, 0x6699ff, 0.9);
                g.strokeRoundedRect(0, 0, 220, 60, 16);
                g.generateTexture('restart_btn', 220, 60);
                g.destroy();
            }

            createFlashTexture() {
                const g = this.make.graphics({ x: 0, y: 0 }, false);
                g.fillStyle(0xffffff, 1);
                g.fillRect(0, 0, 4, 4);
                g.generateTexture('flash_pixel', 4, 4);
                g.destroy();
            }

            createCrossTexture() {
                const g = this.make.graphics({ x: 0, y: 0 }, false);
                g.lineStyle(4, 0xff4444, 0.9);
                g.lineBetween(4, 4, 28, 28);
                g.lineBetween(28, 4, 4, 28);
                g.generateTexture('cross', 32, 32);
                g.destroy();
            }

            // ----------------------------------------------------------
            // create: 初始化场景
            // ----------------------------------------------------------
            create() {
                const W = this.cameras.main.width;
                const H = this.cameras.main.height;

                // 背景
                this.cameras.main.setBackgroundColor('#1a1a2e');

                // 粒子背景装饰
                this.drawBackgroundDecor(W, H);

                // 分数 / 生命值 UI
                const uiStyle = {
                    font: 'bold 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 4
                };
                this.scoreText = this.add.text(20, 20, '分数: 0', uiStyle).setDepth(10);
                this.livesText = this.add.text(W - 20, 20, '❤️ x 5', uiStyle)
                    .setOrigin(1, 0).setDepth(10);

                // 连击提示
                this.bonusText = this.add.text(W / 2, 80, '', {
                    font: 'bold 28px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#ffdd44',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5, 0.5).setAlpha(0).setDepth(10);

                // 倒计时文字 (准备)
                this.countdownText = this.add.text(W / 2, H / 2 - 40, '', {
                    font: 'bold 72px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5, 0.5).setDepth(20).setAlpha(0);

                // Game Over 文字
                this.gameOverText = this.add.text(W / 2, H / 2 - 80, '游戏结束', {
                    font: 'bold 56px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#ff4444',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5, 0.5).setDepth(20).setAlpha(0);

                // 重新开始按钮
                this.restartBtn = this.add.image(W / 2, H / 2 + 30, 'restart_btn')
                    .setDepth(20).setAlpha(0).setInteractive({ useHandCursor: true });
                this.restartText = this.add.text(W / 2, H / 2 + 30, '重新开始', {
                    font: 'bold 26px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5, 0.5).setDepth(21).setAlpha(0);

                this.restartBtn.on('pointerdown', () => {
                    this.restartGame();
                });

                // 开始提示
                this.startPrompt = this.add.text(W / 2, H / 2 + 100, '点击屏幕任意位置开始', {
                    font: '22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                    fill: '#aaaaaa',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5, 0.5).setDepth(10);

                // 目标分组 (用来检测点击)
                this.targetGroup = this.add.group();
                this.clickDetectorGroup = this.add.group();

                // 目标按钮本身
                this.targetSprite = this.add.image(-100, -100, 'target_btn')
                    .setDepth(5).setAlpha(0).setInteractive({ useHandCursor: true });
                this.targetGroup.add(this.targetSprite);

                // 点击探测器 (透明覆盖)
                this.detectorSprite = this.add.image(-100, -100, 'dot')
                    .setDepth(6).setAlpha(0).setScale(3).setInteractive({ useHandCursor: true });
                this.clickDetectorGroup.add(this.detectorSprite);

                // 点击事件
                this.targetSprite.on('pointerdown', (pointer) => {
                    this.onTargetHit(pointer);
                });
                this.detectorSprite.on('pointerdown', (pointer) => {
                    this.onTargetHit(pointer);
                });

                // 闪屏覆盖
                this.flashOverlay = this.add.image(W / 2, H / 2, 'flash_pixel')
                    .setDepth(30).setAlpha(0).setDisplaySize(W, H);

                // 虚拟按键 (手机)
                this.createVirtualButtons(W, H);

                // 键盘控制 (PC)
                this.cursors = this.input.keyboard.createCursorKeys();
                this.keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                this.keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);
                this.keyR = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
                this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // 键盘按下事件
                this.keyJ.on('down', () => {
                    if (this.isGameOver) return;
                    if (!this.isPlaying && !this.isCountdown) {
                        this.startCountdown();
                        return;
                    }
                    // 模拟点击目标
                    if (this.targetSprite.alpha > 0.5) {
                        this.onTargetHit(null);
                    }
                });
                this.keyK.on('down', () => {
                    if (this.isGameOver) return;
                    if (!this.isPlaying && !this.isCountdown) {
                        this.startCountdown();
                        return;
                    }
                    // 模拟点击目标
                    if (this.targetSprite.alpha > 0.5) {
                        this.onTargetHit(null);
                    }
                });
                this.keyR.on('down', () => {
                    if (this.isGameOver) {
                        this.restartGame();
                    }
                });
                this.keySpace.on('down', () => {
                    if (this.isGameOver) {
                        this.restartGame();
                        return;
                    }
                    if (!this.isPlaying && !this.isCountdown) {
                        this.startCountdown();
                    }
                });

                // 点击屏幕开始
                this.input.on('pointerdown', (pointer) => {
                    // 忽略虚拟按键区域
                    const vbx = W - 100;
                    const vby = H - 100;
                    if (pointer.x > vbx - 60 && pointer.y > vby - 60) return;
                    const vbx2 = W - 40;
                    const vby2 = H - 40;
                    if (pointer.x > vbx2 - 60 && pointer.y > vby2 - 60) return;
                    // 忽略重新开始按钮
                    if (this.restartBtn.alpha > 0) {
                        const b = this.restartBtn;
                        if (Math.abs(pointer.x - b.x) < 120 && Math.abs(pointer.y - b.y) < 40) return;
                    }
                    if (!this.isPlaying && !this.isCountdown && !this.isGameOver) {
                        this.startCountdown();
                    }
                });

                // 初始状态
                this.showStartPrompt(true);
                window.__gameState.running = true;
                window.__gameState.score = 0;
                window.__gameState.lives = this.lives;
                window.__gameState.gameOver = false;
            }

            // ----------------------------------------------------------
            // 背景装饰
            // ----------------------------------------------------------
            drawBackgroundDecor(W, H) {
                const g = this.add.graphics().setDepth(0);
                // 网格
                g.lineStyle(1, 0x333355, 0.2);
                for (let x = 0; x < W; x += 40) {
                    g.lineBetween(x, 0, x, H);
                }
                for (let y = 0; y < H; y += 40) {
                    g.lineBetween(0, y, W, y);
                }
                // 随机亮点
                for (let i = 0; i < 50; i++) {
                    const x = Phaser.Math.Between(0, W);
                    const y = Phaser.Math.Between(0, H);
                    const d = Phaser.Math.Between(2, 5);
                    g.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.05, 0.15));
                    g.fillCircle(x, y, d);
                }
            }

            // ----------------------------------------------------------
            // 虚拟按键
            // ----------------------------------------------------------
            createVirtualButtons(W, H) {
                // A 按钮 (左下)
                const ax = 80;
                const ay = H - 80;
                this.btnA = this.add.image(ax, ay, 'vbtn_a')
                    .setDepth(50).setAlpha(0.7).setScale(1.2)
                    .setInteractive({ useHandCursor: true });
                this.btnAText = this.add.text(ax, ay, 'A', {
                    font: 'bold 28px "Microsoft YaHei", Arial, sans-serif',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5, 0.5).setDepth(51).setAlpha(0.8);
                this.btnA.on('pointerdown', () => {
                    initAudio();
                    if (this.isGameOver) return;
                    if (!this.isPlaying && !this.isCountdown) {
                        this.startCountdown();
                        return;
                    }
                    if (this.targetSprite.alpha > 0.5) {
                        this.onTargetHit(null);
                    }
                });

                // B 按钮 (右下)
                const bx = 190;
                const by = H - 80;
                this.btnB = this.add.image(bx, by, 'vbtn_b')
                    .setDepth(50).setAlpha(0.7).setScale(1.2)
                    .setInteractive({ useHandCursor: true });
                this.btnBText = this.add.text(bx, by, 'B', {
                    font: 'bold 28px "Microsoft YaHei", Arial, sans-serif',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5, 0.5).setDepth(51).setAlpha(0.8);
                this.btnB.on('pointerdown', () => {
                    initAudio();
                    if (this.isGameOver) return;
                    if (!this.isPlaying && !this.isCountdown) {
                        this.startCountdown();
                        return;
                    }
                    if (this.targetSprite.alpha > 0.5) {
                        this.onTargetHit(null);
                    }
                });

                // 键盘提示
                this.add.text(ax, ay + 50, '键盘 J', {
                    font: '14px "Microsoft YaHei", Arial, sans-serif',
                    fill: '#888888',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5, 0.5).setDepth(50).setAlpha(0.6);
                this.add.text(bx, by + 50, '键盘 K', {
                    font: '14px "Microsoft YaHei", Arial, sans-serif',
                    fill: '#888888',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5, 0.5).setDepth(50).setAlpha(0.6);
            }

            // ----------------------------------------------------------
            // 显示/隐藏开始提示
            // ----------------------------------------------------------
            showStartPrompt(show) {
                if (this.startPrompt) {
                    this.startPrompt.setAlpha(show ? 1 : 0);
                }
                // 闪烁动画
                if (show && this.startPrompt) {
                    this.tweens.add({
                        targets: this.startPrompt,
                        alpha: 0.3,
                        duration: 800,
                        yoyo: true,
                        repeat: -1
                    });
                } else if (this.startPrompt) {
                    this.tweens.killTweensOf(this.startPrompt);
                }
            }

            // ----------------------------------------------------------
            // 倒计时
            // ----------------------------------------------------------
            startCountdown() {
                if (this.isCountdown || this.isPlaying) return;
                this.isCountdown = true;
                this.showStartPrompt(false);
                this.resetTargetPosition();

                let count = 3;
                this.countdownText.setAlpha(1);
                this.countdownText.setText(count.toString());
                playCountdownBeep();

                const timer = this.time.addEvent({
                    delay: 700,
                    callback: () => {
                        count--;
                        if (count > 0) {
                            this.countdownText.setText(count.toString());
                            playCountdownBeep();
                        } else if (count === 0) {
                            this.countdownText.setText('开始!');
                            playBeep(880, 0.2, 'sine', 0.3);
                        } else {
                            this.countdownText.setAlpha(0);
                            this.isCountdown = false;
                            this.isPlaying = true;
                            this.startSpawning();
                        }
                    },
                    repeat: 3
                });
            }

            // ----------------------------------------------------------
            // 开始生成目标
            // ----------------------------------------------------------
            startSpawning() {
                this.spawnTarget();
                // 定时生成
                this.spawnTimer = this.time.addEvent({
                    delay: this.targetInterval * 1000,
                    callback: () => {
                        if (!this.isPlaying || this.isGameOver) return;
                        this.spawnTarget();
                    },
                    loop: true
                });
            }

            // ----------------------------------------------------------
            // 生成目标
            // ----------------------------------------------------------
            spawnTarget() {
                if (!this.isPlaying || this.isGameOver) return;

                const W = this.cameras.main.width;
                const H = this.cameras.main.height;

                // 随机位置 (避开边缘和虚拟按键区域)
                const margin = 60;
                let x = Phaser.Math.Between(margin, W - margin);
                let y = Phaser.Math.Between(margin + 60, H - margin - 80);

                // 避免覆盖 UI
                if (y < 100) y = 100;
                if (x < 80 && y > H - 150) x = 120;
                if (x > W - 80 && y > H - 150) x = W - 120;

                // 放置目标
                this.targetSprite.setPosition(x, y);
                this.targetSprite.setAlpha(1);
                this.targetSprite.setScale(0.5);
                this.detectorSprite.setPosition(x, y);
                this.detectorSprite.setAlpha(0.01);
                this.detectorSprite.setScale(4);

                // 弹出动画
                this.tweens.add({
                    targets: [this.targetSprite],
                    scale: 1,
                    duration: 150,
                    ease: 'Back.easeOut'
                });

                // 显示连击提示
                if (this.consecutiveHits >= 3) {
                    this.bonusText.setText(`🔥 连击 x${this.consecutiveHits}`);
                    this.bonusText.setAlpha(1);
                    this.tweens.add({
                        targets: this.bonusText,
                        alpha: 0,
                        duration: 800,
                        delay: 400
                    });
                }

                // 限时消失
                this.time.delayedCall(this.targetDuration * 1000, () => {
                    if (this.targetSprite.alpha > 0.5 && this.isPlaying && !this.isGameOver) {
                        this.onTargetMiss();
                    }
                });
            }

            // ----------------------------------------------------------
            // 击中目标
            // ----------------------------------------------------------
            onTargetHit(pointer) {
                if (!this.isPlaying || this.isGameOver) return;
                if (this.targetSprite.alpha < 0.5) return;

                initAudio();

                // 得分
                let points = 10 + Math.floor(this.consecutiveHits * 2);
                if (this.consecutiveHits >= 5) points += 5;
                if (this.consecutiveHits >= 10) points += 10;
                this.score += points;
                this.consecutiveHits++;
                this.updateUI();

                // 音效
                if (this.consecutiveHits % 5 === 0) {
                    playBonusSound();
                    // 闪屏
                    this.flashScreen(0xffdd44, 0.2);
                    // 显示奖励
                    this.showBonusText(`+${points} 🔥 奖励!`);
                } else {
                    playHitSound();
                    this.flashScreen(0x44ff88, 0.1);
                }

                // 粒子效果
                this.createHitParticles(this.targetSprite.x, this.targetSprite.y);

                // 隐藏目标
                this.targetSprite.setAlpha(0);
                this.detectorSprite.setAlpha(0);

                // 调整难度
                this.increaseDifficulty();

                // 更新全局状态
                window.__gameState.score = this.score;
            }

            // ----------------------------------------------------------
            // 未击中目标 (超时)
            // ----------------------------------------------------------
            onTargetMiss() {
                if (!this.isPlaying || this.isGameOver) return;
                if (this.targetSprite.alpha < 0.5) return;

                initAudio();
                this.lives--;
                this.livesLost++;
                this.consecutiveHits = 0;
                this.updateUI();

                playMissSound();

                // 红色闪屏
                this.flashScreen(0xff4444, 0.25);

                // 显示叉号
                const cross = this.add.image(this.targetSprite.x, this.targetSprite.y, 'cross')
                    .setDepth(15).setAlpha(0.9).setScale(1.5);
                this.tweens.add({
                    targets: cross,
                    alpha: 0,
                    scale: 0.5,
                    duration: 600,
                    onComplete: () => cross.destroy()
                });

                // 隐藏目标
                this.targetSprite.setAlpha(0);
                this.detectorSprite.setAlpha(0);

                // 检查游戏结束
                if (this.lives <= 0) {
                    this.gameOver();
                    return;
                }

                // 重置难度
                this.targetDuration = this.baseDuration;
                this.targetInterval = this.baseInterval;
                if (this.spawnTimer) {
                    this.spawnTimer.delay = this.targetInterval * 1000;
                }

                window.__gameState.lives = this.lives;
            }

            // ----------------------------------------------------------
            // 增加难度
            // ----------------------------------------------------------
            increaseDifficulty() {
                // 每击中3次增加难度
                if (this.consecutiveHits % 3 === 0 && this.consecutiveHits > 0) {
                    this.targetDuration = Math.max(this.minDuration, this.targetDuration - 0.05);
                    this.targetInterval = Math.max(this.minInterval, this.targetInterval - 0.04);
                    if (this.spawnTimer) {
                        this.spawnTimer.delay = this.targetInterval * 1000;
                    }
                }
            }

            // ----------------------------------------------------------
            // 游戏结束
            // ----------------------------------------------------------
            gameOver() {
                this.isPlaying = false;
                this.isGameOver = true;
                if (this.spawnTimer) {
                    this.spawnTimer.destroy();
                    this.spawnTimer = null;
                }
                this.targetSprite.setAlpha(0);
                this.detectorSprite.setAlpha(0);

                playGameOverSound();

                // 显示结束界面
                this.gameOverText.setAlpha(1);
                this.gameOverText.setScale(0.5);
                this.tweens.add({
                    targets: this.gameOverText,
                    scale: 1,
                    duration: 400,
                    ease: 'Back.easeOut'
                });

                this.restartBtn.setAlpha(1).setScale(0.5);
                this.restartText.setAlpha(1).setScale(0.5);
                this.tweens.add({
                    targets: [this.restartBtn, this.restartText],
                    scale: 1,
                    duration: 400,
                    ease: 'Back.easeOut',
                    delay: 200
                });

                // 最终分数
                const finalScoreText = this.add.text(
                    this.cameras.main.width / 2,
                    this.cameras.main.height / 2 + 90,
                    `最终分数: ${this.score}`,
                    {
                        font: 'bold 32px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                        fill: '#ffdd44',
                        stroke: '#000000',
                        strokeThickness: 4
                    }
                ).setOrigin(0.5, 0.5).setDepth(20).setAlpha(0);
                this.tweens.add({
                    targets: finalScoreText,
                    alpha: 1,
                    duration: 500,
                    delay: 400
                });
                this.finalScoreText = finalScoreText;

                window.__gameState.running = false;
                window.__gameState.gameOver = true;
                window.__gameState.canRestart = true;
            }

            // ----------------------------------------------------------
            // 重新开始
            // ----------------------------------------------------------
            restartGame() {
                // 清理
                if (this.spawnTimer) {
                    this.spawnTimer.destroy();
                    this.spawnTimer = null;
                }
                this.tweens.killAll();

                // 重置状态
                this.score = 0;
                this.lives = this.maxLives;
                this.consecutiveHits = 0;
                this.livesLost = 0;
                this.targetDuration = this.baseDuration;
                this.targetInterval = this.baseInterval;
                this.isGameOver = false;
                this.isPlaying = false;
                this.isCountdown = false;

                // 隐藏 UI
                this.gameOverText.setAlpha(0);
                this.restartBtn.setAlpha(0);
                this.restartText.setAlpha(0);
                this.bonusText.setAlpha(0);
                if (this.finalScoreText) {
                    this.finalScoreText.destroy();
                    this.finalScoreText = null;
                }
                this.targetSprite.setAlpha(0);
                this.detectorSprite.setAlpha(0);
                this.flashOverlay.setAlpha(0);

                this.updateUI();
                this.showStartPrompt(true);

                window.__gameState.running = true;
                window.__gameState.score = 0;
                window.__gameState.lives = this.lives;
                window.__gameState.gameOver = false;
                window.__gameState.canRestart = false;
            }

            // ----------------------------------------------------------
            // 更新 UI
            // ----------------------------------------------------------
            updateUI() {
                this.scoreText.setText(`分数: ${this.score}`);
                let hearts = '';
                for (let i = 0; i < this.lives; i++) hearts += '❤️';
                for (let i = this.lives; i < this.maxLives; i++) hearts += '🖤';
                this.livesText.setText(hearts);
            }

            // ----------------------------------------------------------
            // 闪屏
            // ----------------------------------------------------------
            flashScreen(color, duration) {
                this.flashOverlay.setTint(color);
                this.flashOverlay.setAlpha(0.4);
                this.tweens.add({
                    targets: this.flashOverlay,
                    alpha: 0,
                    duration: duration * 1000
                });
            }

            // ----------------------------------------------------------
            // 显示奖励文字
            // ----------------------------------------------------------
            showBonusText(text) {
                const t = this.add.text(
                    this.targetSprite.x,
                    this.targetSprite.y - 40,
                    text, {
                        font: 'bold 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif',
                        fill: '#ffdd44',
                        stroke: '#000000',
                        strokeThickness: 4
                    }
                ).setOrigin(0.5, 0.5).setDepth(15);
                this.tweens.add({
                    targets: t,
                    y: t.y - 60,
                    alpha: 0,
                    duration: 900,
                    onComplete: () => t.destroy()
                });
            }

            // ----------------------------------------------------------
            // 击中粒子效果
            // ----------------------------------------------------------
            createHitParticles(x, y) {
                for (let i = 0; i < 12; i++) {
                    const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
                    const speed = Phaser.Math.Between(80, 200);
                    const size = Phaser.Math.Between(4, 10);
                    const color = Phaser.Utils.Array.GetRandom([0xff4444, 0xffaa00, 0xffff00, 0x44ff88]);
                    const p = this.add.circle(x, y, size, color, 0.9).setDepth(12);
                    this.tweens.add({
                        targets: p,
                        x: x + Math.cos(angle) * speed,
                        y: y + Math.sin(angle) * speed,
                        alpha: 0,
                        scale: 0.2,
                        duration: Phaser.Math.Between(300, 600),
                        onComplete: () => p.destroy()
                    });
                }
            }

            // ----------------------------------------------------------
            // 重置目标位置
            // ----------------------------------------------------------
            resetTargetPosition() {
                this.targetSprite.setPosition(-100, -100);
                this.targetSprite.setAlpha(0);
                this.detectorSprite.setPosition(-100, -100);
                this.detectorSprite.setAlpha(0);
            }

            // ----------------------------------------------------------
            // update: 每帧更新
            // ----------------------------------------------------------
            update(time, delta) {
                // 更新全局状态
                window.__gameState.score = this.score;
                window.__gameState.lives = this.lives;
                window.__gameState.gameOver = this.isGameOver;

                // 键盘快捷键提示闪烁
                if (!this.isPlaying && !this.isCountdown && !this.isGameOver) {
                    // 空格/R 提示在 startPrompt 中已有
                }

                // 如果游戏结束，允许按 R 或 空格 重新开始
                if (this.isGameOver) {
                    if (Phaser.Input.Keyboard.JustDown(this.keyR) ||
                        Phaser.Input.Keyboard.JustDown(this.keySpace)) {
                        this.restartGame();
                    }
                }
            }
        }

        // ============================================================
        // Phaser 配置
        // ============================================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [GameScene],
            input: {
                activePointers: 3,
                touch: true
            },
            render: {
                antialias: true,
                pixelArt: false,
                transparent: false
            }
        };

        // ============================================================
        // 启动游戏
        // ============================================================
        const game = new Phaser.Game(config);

        // 页面加载完成后初始化音效上下文
        window.addEventListener('load', () => {
            // 延迟初始化音频上下文，避免自动播放策略
            setTimeout(() => {
                try {
                    initAudio();
                } catch (e) { /* ignore */ }
            }, 500);
        });

        // 用户交互时唤醒音频
        document.addEventListener('click', () => {
            try { initAudio(); } catch (e) { /* ignore */ }
        }, { once: true });
        document.addEventListener('touchstart', () => {
            try { initAudio(); } catch (e) { /* ignore */ }
        }, { once: true });

        console.log('反应测试小游戏已启动！');
        console.log('操作说明:');
        console.log('  - 点击屏幕 / 按 J/K / 按 A/B 按钮 击中目标');
        console.log('  - 空格键 或 点击屏幕 开始游戏');
        console.log('  - R 键 或 点击按钮 重新开始');
    </script>
</body>
</html>

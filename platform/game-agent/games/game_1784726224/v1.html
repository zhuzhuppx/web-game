我来帮您生成一个基于 Phaser.js 3 的反应测试小游戏，包含完整的核心玩法、交互反馈和适配移动端的虚拟按键。

<!DOCTYPE html>

</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <script>
        // ============================================================
        // 音效系统 (Web Audio API)
        // ============================================================
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        function playBeep(freq, duration, type = 'square', volume = 0.25) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { /* 静默失败 */ }
        }

        function playHitSound() {
            playBeep(880, 0.15, 'sine', 0.3);
            setTimeout(() => playBeep(1100, 0.1, 'sine', 0.2), 80);
        }

        function playMissSound() {
            playBeep(220, 0.25, 'sawtooth', 0.2);
        }

        function playGameOverSound() {
            playBeep(440, 0.2, 'square', 0.25);
            setTimeout(() => playBeep(330, 0.2, 'square', 0.2), 150);
            setTimeout(() => playBeep(220, 0.4, 'square', 0.2), 300);
        }

        function playBonusSound() {
            playBeep(660, 0.1, 'sine', 0.2);
            setTimeout(() => playBeep(880, 0.1, 'sine', 0.2), 100);
            setTimeout(() => playBeep(1100, 0.15, 'sine', 0.25), 200);
        }

        function playCountdownBeep() {
            playBeep(600, 0.12, 'sine', 0.2);
        }

        // ============================================================
        // 状态钩子
        // ============================================================
        window.__gameState = {
            running: false,
            score: 0,
            lives: 5,
            gameOver: false,
            canRestart: false,
            objects: {
                player: true,
                enemies: 0,
                projectiles: 0
            }
        };

        // ============================================================
        // 主场景
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.score = 0;
                this.lives = 5;
                this.maxLives = 5;
                this.consecutiveHits = 0;
                this.livesLost = 0;
                this.targetDuration = 1.2;
                this.targetInterval = 1.0;
                this.baseDuration = 1.2;
                this.baseInterval = 1.0;
                this.minDuration = 0.6;
                this.minInterval = 0.4;
                this.isGameOver = false;
                this.isPlaying = false;
                this.isCountdown = false;
                this.target = null;
                this.targetGroup = null;
                this.clickDetectorGroup = null;
                this.pendingClick = false;
                this.clickX = 0;
                this.clickY = 0;
                this.spawnTimer = null;
                this.countdownText = null;
                this.gameOverText = null;
                this.restartBtn = null;
                this.scoreText = null;
                this.livesText = null;
                this.bonusText = null;
                this.flashOverlay = null;
                this.btnA = null;
                this.btnB = null;
                this.btnAText = null;
                this.btnBText = null;
                this.startPrompt = null;
            }

            // ----------------------------------------------------------
            // preload: 生成纹理
            // ----------------------------------------------------------
            preload() {
                // 目标按钮纹理 (红色圆形 + "!")
                this.createButtonTexture();
                // 点击探测器纹理 (小圆点)
                this.createDotTexture();
                // 按钮A/B纹理
                this.createVirtualBtnTexture();
                // 闪屏纹理
                this.createFlashTexture();
            }

            createButtonTexture() {
                const g = this.make.graphics({ x: 0, y: 0 });
                // 红色渐变圆形 (直径60)
                const r = 30;
                // 外圈深红
                g.fillStyle(0xcc0000, 1);
                g.fillCircle(r, r, r);
                // 内圈亮红
                g.fillStyle(0xff3333, 0.85);
                g.fillCircle(r, r, r - 6);
                // 高光
                g.fillStyle(0xff7777, 0.4);
                g.fillCircle(r - 6, r - 6, 10);
                // 白色"!" 用矩形模拟
                g.fillStyle(0xffffff, 1);
                // 竖线
                g.fillRect(r - 4, r - 16, 8, 22);
                // 圆点 (感叹号的点)
                g.fillCircle(r, r + 14, 5);
                g.generateTexture('target_btn', r * 2, r * 2);
                g.destroy();
            }

            createDotTexture() {
                const g = this.make.graphics({ x: 0, y: 0 });
                g.fillStyle(0xffffff, 1);
                g.fillCircle(4, 4, 4);
                g.generateTexture('click_dot', 8, 8);
                g.destroy();
            }

            createVirtualBtnTexture() {
                // A按钮纹理
                const g = this.make.graphics({ x: 0, y: 0 });
                g.fillStyle(0x3366ff, 0.8);
                g.fillRoundedRect(0, 0, 80, 56, 12);
                g.lineStyle(2, 0x66aaff, 1);
                g.strokeRoundedRect(0, 0, 80, 56, 12);
                g.generateTexture('btn_a', 80, 56);
                g.destroy();

                // B按钮纹理
                const g2 = this.make.graphics({ x: 0, y: 0 });
                g2.fillStyle(0xff5533, 0.8);
                g2.fillRoundedRect(0, 0, 80, 56, 12);
                g2.lineStyle(2, 0xff8866, 1);
                g2.strokeRoundedRect(0, 0, 80, 56, 12);
                g2.generateTexture('btn_b', 80, 56);
                g2.destroy();
            }

            createFlashTexture() {
                const g = this.make.graphics({ x: 0, y: 0 });
                g.fillStyle(0x00ff00, 0.35);
                g.fillRect(0, 0, 800, 600);
                g.generateTexture('flash_green', 800, 600);
                g.destroy();

                const g2 = this.make.graphics({ x: 0, y: 0 });
                g2.fillStyle(0xff0000, 0.25);
                g2.fillRect(0, 0, 800, 600);
                g2.generateTexture('flash_red', 800, 600);
                g2.destroy();
            }

            // ----------------------------------------------------------
            // create: 初始化
            // ----------------------------------------------------------
            create() {
                // 物理组
                this.targetGroup = this.physics.add.group({
                    allowGravity: false,
                    immovable: true
                });
                this.clickDetectorGroup = this.physics.add.group({
                    allowGravity: false,
                    immovable: true
                });

                // overlap: 点击探测器 vs 目标按钮
                this.physics.add.overlap(
                    this.clickDetectorGroup,
                    this.targetGroup,
                    this.onOverlapDetected,
                    null,
                    this
                );

                // 背景
                this.cameras.main.setBackgroundColor('#1a1a2e');

                // ---- UI ----
                // 分数
                this.scoreText = this.add.text(24, 20, '得分: 0', {
                    fontSize: '28px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setDepth(100).setScrollFactor(0);

                // 生命值 (使用心形符号)
                this.livesText = this.add.text(800 - 24, 20, '❤️ × 5', {
                    fontSize: '26px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ff4466',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(1, 0).setDepth(100).setScrollFactor(0);

                // 倒计时文字 (居中)
                this.countdownText = this.add.text(400, 300, '', {
                    fontSize: '96px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5).setDepth(200).setScrollFactor(0).setAlpha(0);

                // 奖励提示
                this.bonusText = this.add.text(400, 160, '', {
                    fontSize: '36px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffdd00',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setDepth(150).setScrollFactor(0).setAlpha(0);

                // 闪屏覆盖层
                this.flashOverlay = this.add.image(400, 300, 'flash_green')
                    .setDepth(300).setScrollFactor(0).setAlpha(0);

                // 开始提示
                this.startPrompt = this.add.text(400, 400, '点击屏幕开始游戏', {
                    fontSize: '32px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#aaccff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setDepth(100).setScrollFactor(0);

                // 标题
                this.add.text(400, 220, '反应测试', {
                    fontSize: '56px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffdd66',
                    stroke: '#000000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(100).setScrollFactor(0);

                // 游戏结束文字 (居中)
                this.gameOverText = this.add.text(400, 260, '', {
                    fontSize: '48px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ff4444',
                    stroke: '#000000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(200).setScrollFactor(0).setAlpha(0);

                // 最终得分文字
                this.finalScoreText = this.add.text(400, 330, '', {
                    fontSize: '32px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setDepth(200).setScrollFactor(0).setAlpha(0);

                // 重启按钮
                this.restartBtn = this.add.image(400, 440, 'btn_a')
                    .setDepth(200).setScrollFactor(0).setAlpha(0).setScale(1.6);
                this.restartBtnText = this.add.text(400, 440, '再玩一次', {
                    fontSize: '24px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5).setDepth(210).setScrollFactor(0).setAlpha(0);
                this.restartBtn.setInteractive({ useHandCursor: true });
                this.restartBtn.on('pointerdown', () => { this.restartGame(); });

                // ---- 虚拟按钮 A / B ----
                // A按钮 (模拟点击，对应J键)
                this.btnA = this.add.image(80, 560, 'btn_a')
                    .setDepth(100).setScrollFactor(0).setAlpha(0.85);
                this.btnAText = this.add.text(80, 560, 'A', {
                    fontSize: '28px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff'
                }).setOrigin(0.5).setDepth(110).setScrollFactor(0).setAlpha(0.85);
                this.btnA.setInteractive({ useHandCursor: true });
                this.btnA.on('pointerdown', () => {
                    if (this.isPlaying && !this.isGameOver) {
                        this.simulateClick();
                    }
                });

                // B按钮 (重新开始，对应K键)
                this.btnB = this.add.image(800 - 80, 560, 'btn_b')
                    .setDepth(100).setScrollFactor(0).setAlpha(0.85);
                this.btnBText = this.add.text(800 - 80, 560, 'B', {
                    fontSize: '28px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffffff'
                }).setOrigin(0.5).setDepth(110).setScrollFactor(0).setAlpha(0.85);
                this.btnB.setInteractive({ useHandCursor: true });
                this.btnB.on('pointerdown', () => {
                    if (this.isGameOver) {
                        this.restartGame();
                    } else {
                        // 游戏中按B无效果，或可做提示
                    }
                });

                // A/B 标签提示
                this.add.text(80, 590, '点击 ( J )', {
                    fontSize: '14px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#88aaff',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5).setDepth(110).setScrollFactor(0).setAlpha(0.7);
                this.add.text(800 - 80, 590, '重新开始 ( K )', {
                    fontSize: '14px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ff8866',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(0.5).setDepth(110).setScrollFactor(0).setAlpha(0.7);

                // ---- 键盘 ----
                this.cursors = this.input.keyboard.createCursorKeys();
                this.keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
                this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
                this.keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);
                this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
                this.keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                this.keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);
                this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                this.keyESC = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

                // ---- 鼠标/触控点击 ----
                this.input.on('pointerdown', (pointer) => {
                    initAudio();
                    if (this.isGameOver) {
                        // 点击重启按钮已经在上面处理了
                        return;
                    }
                    if (!this.isPlaying && !this.isCountdown) {
                        // 开始游戏
                        this.startGame();
                        return;
                    }
                    if (this.isPlaying && !this.isGameOver) {
                        // 检测点击是否在目标按钮上 (手动检测 + 物理overlap双重保障)
                        this.handleClick(pointer.x, pointer.y);
                    }
                });

                // 初始状态
                this.setGameState(false, 0, 5, false, false);
                this.updateUI();

                // 显示虚拟按钮 (一开始就显示)
                this.btnA.setAlpha(0.85);
                this.btnAText.setAlpha(0.85);
                this.btnB.setAlpha(0.85);
                this.btnBText.setAlpha(0.85);
            }

            // ----------------------------------------------------------
            // 游戏控制
            // ----------------------------------------------------------
            startGame() {
                initAudio();
                // 重置所有状态
                this.score = 0;
                this.lives = this.maxLives;
                this.consecutiveHits = 0;
                this.livesLost = 0;
                this.targetDuration = this.baseDuration;
                this.targetInterval = this.baseInterval;
                this.isGameOver = false;
                this.isPlaying = false;
                this.isCountdown = true;

                // 隐藏开始提示和标题
                this.startPrompt.setAlpha(0);
                this.add.text(400, 220, '反应测试', {
                    fontSize: '56px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffdd66',
                    stroke: '#000000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(100).setScrollFactor(0).setAlpha(0);

                // 清除旧目标
                this.clearTarget();
                this.clearDetectors();

                this.updateUI();
                this.setGameState(true, 0, this.lives, false, false);

                // 开始倒计时
                this.doCountdown();
            }

            doCountdown() {
                this.countdownText.setAlpha(1);
                let count = 3;
                this.countdownText.setText(String(count));
                playCountdownBeep();

                const countTimer = this.time.addEvent({
                    delay: 800,
                    repeat: 2,
                    callback: () => {
                        count--;
                        if (count > 0) {
                            this.countdownText.setText(String(count));
                            playCountdownBeep();
                        } else {
                            this.countdownText.setText('开始！');
                            playBeep(880, 0.2, 'sine', 0.3);
                            this.time.delayedCall(400, () => {
                                this.countdownText.setAlpha(0);
                                this.isCountdown = false;
                                this.isPlaying = true;
                                this.setGameState(true, this.score, this.lives, false, false);
                                // 开始生成目标
                                this.scheduleSpawn();
                            });
                        }
                    }
                });
            }

            scheduleSpawn() {
                if (this.isGameOver || !this.isPlaying) return;
                // 随机间隔: 平均 targetInterval, 上下浮动0.3秒
                const interval = Phaser.Math.FloatBetween(
                    Math.max(0.3, this.targetInterval - 0.3),
                    this.targetInterval + 0.3
                );
                this.spawnTimer = this.time.delayedCall(interval * 1000, () => {
                    this.spawnTarget();
                });
            }

            spawnTarget() {
                if (this.isGameOver || !this.isPlaying) return;
                if (this.target && this.target.active) {
                    // 已有目标存在，不生成新的 (避免重叠)
                    this.scheduleSpawn();
                    return;
                }
                // 随机位置: 边距80px, Y≥80 避开UI
                const margin = 80;
                const x = Phaser.Math.Between(margin + 30, 800 - margin - 30);
                const y = Phaser.Math.Between(80 + 30, 600 - margin - 30);

                // 创建目标按钮 (物理精灵)
                const btn = this.physics.add.sprite(x, y, 'target_btn');
                btn.setDepth(50);
                btn.setImmovable(true);
                btn.body.setAllowGravity(false);
                // 存储额外数据
                btn.setData('active', true);
                btn.setData('spawnTime', this.time.now);

                // 加入组
                this.targetGroup.add(btn);
                this.target = btn;

                // 更新状态钩子
                window.__gameState.objects.enemies = 1;

                // 出现动画 (弹入)
                btn.setScale(0.2);
                btn.setAlpha(0);
                this.tweens.add({
                    targets: btn,
                    scaleX: 1,
                    scaleY: 1,
                    alpha: 1,
                    duration: 150,
                    ease: 'Back.easeOut'
                });

                // 自动消失计时器
                const duration = this.targetDuration;
                btn.setData('duration', duration);
                btn.setData('timer', this.time.delayedCall(duration * 1000, () => {
                    if (btn.active && btn.getData('active')) {
                        this.onTargetMiss(btn);
                    }
                }));

                // 安排下一个目标
                this.scheduleSpawn();
            }

            // ----------------------------------------------------------
            // 点击处理
            // ----------------------------------------------------------
            handleClick(px, py) {
                if (!this.isPlaying || this.isGameOver) return;
                // 创建点击探测器 (物理精灵)
                const dot = this.physics.add.sprite(px, py, 'click_dot');
                dot.setImmovable(true);
                dot.body.setAllowGravity(false);
                dot.setAlpha(0.5);
                dot.setScale(1.2);
                dot.setDepth(60);
                this.clickDetectorGroup.add(dot);

                // 标记待处理
                this.pendingClick = true;
                this.clickX = px;
                this.clickY = py;

                // 延迟一帧后检查是否命中
                this.time.delayedCall(50, () => {
                    if (this.pendingClick) {
                        // 没有触发overlap -> 误触
                        this.onWrongClick();
                    }
                    // 销毁探测器
                    dot.destroy();
                    this.pendingClick = false;
                });
            }

            // 物理overlap回调
            onOverlapDetected(detector, target) {
                if (!this.pendingClick) return;
                if (!target.active || !target.getData('active')) return;
                if (!this.isPlaying || this.isGameOver) return;

                this.pendingClick = false;
                // 得分
                this.onTargetHit(target);
            }

            // PC端J键 / 手机A按钮 模拟点击
            simulateClick() {
                if (!this.isPlaying || this.isGameOver) return;
                // 在屏幕中央区域模拟点击
                if (this.target && this.target.active && this.target.getData('active')) {
                    const tx = this.target.x;
                    const ty = this.target.y;
                    this.handleClick(tx, ty);
                } else {
                    // 没有目标时，模拟点击中间区域 (算误触)
                    this.handleClick(400, 300);
                }
            }

            // ----------------------------------------------------------
            // 命中与失误
            // ----------------------------------------------------------
            onTargetHit(target) {
                if (!target.active) return;
                // 标记失效
                target.setData('active', false);
                // 取消自动消失定时器
                const t = target.getData('timer');
                if (t) t.remove();

                // 得分
                this.score++;
                this.consecutiveHits++;

                // 检查连续击中奖励 (连续10次且生命全满)
                if (this.consecutiveHits >= 10 && this.lives === this.maxLives) {
                    // 奖励1点生命 (不超过初始值)
                    if (this.lives < this.maxLives) {
                        this.lives++;
                    }
                    this.consecutiveHits = 0;
                    this.showBonus('+1 ❤️');
                    playBonusSound();
                }

                // 速度调整: 每10分加速
                if (this.score > 0 && this.score % 10 === 0) {
                    this.targetDuration = Math.max(this.minDuration, this.targetDuration - 0.05);
                    this.targetInterval = Math.max(this.minInterval, this.targetInterval - 0.05);
                }

                // 视觉反馈: 绿色闪屏
                this.flashOverlay.setTexture('flash_green');
                this.flashOverlay.setAlpha(1);
                this.tweens.add({
                    targets: this.flashOverlay,
                    alpha: 0,
                    duration: 120,
                    ease: 'Power2'
                });

                // 音效
                playHitSound();

                // 目标消失动画
                this.tweens.add({
                    targets: target,
                    scaleX: 1.4,
                    scaleY: 1.4,
                    alpha: 0,
                    duration: 150,
                    ease: 'Power2',
                    onComplete: () => {
                        target.destroy();
                        if (this.target === target) this.target = null;
                        this.updateGameStateObjects();
                    }
                });

                this.updateUI();
                this.setGameState(true, this.score, this.lives, false, false);
            }

            onTargetMiss(target) {
                if (!target.active || !target.getData('active')) return;
                target.setData('active', false);
                this.lives--;
                this.livesLost++;
                this.consecutiveHits = 0;

                // 速度调整: 每失3命减速
                if (this.livesLost > 0 && this.livesLost % 3 === 0) {
                    this.targetDuration = Math.min(this.baseDuration, this.targetDuration * 1.05);
                    this.targetInterval = Math.min(this.baseInterval, this.targetInterval * 1.05);
                }

                // 视觉反馈: 红色闪屏
                this.flashOverlay.setTexture('flash_red');
                this.flashOverlay.setAlpha(1);
                this.tweens.add({
                    targets: this.flashOverlay,
                    alpha: 0,
                    duration: 150,
                    ease: 'Power2'
                });

                // 音效
                playMissSound();

                // 目标消失动画
                this.tweens.add({
                    targets: target,
                    scaleX: 0.6,
                    scaleY: 0.6,
                    alpha: 0,
                    duration: 200,
                    ease: 'Power2',
                    onComplete: () => {
                        target.destroy();
                        if (this.target === target) this.target = null;
                        this.updateGameStateObjects();
                        // 检查游戏结束
                        if (this.lives <= 0) {
                            this.endGame();
                        } else {
                            this.updateUI();
                            this.setGameState(true, this.score, this.lives, false, false);
                        }
                    }
                });

                this.updateUI();
                if (this.lives > 0) {
                    this.setGameState(true, this.score, this.lives, false, false);
                }
            }

            onWrongClick() {
                if (!this.isPlaying || this.isGameOver) return;
                this.lives--;
                this.livesLost++;
                this.consecutiveHits = 0;

                // 速度调整
                if (this.livesLost > 0 && this.livesLost % 3 === 0) {
                    this.targetDuration = Math.min(this.baseDuration, this.targetDuration * 1.05);
                    this.targetInterval = Math.min(this.baseInterval, this.targetInterval * 1.05);
                }

                // 红色闪屏
                this.flashOverlay.setTexture('flash_red');
                this.flashOverlay.setAlpha(1);
                this.tweens.add({
                    targets: this.flashOverlay,
                    alpha: 0,
                    duration: 150,
                    ease: 'Power2'
                });

                playMissSound();

                this.updateUI();
                if (this.lives <= 0) {
                    this.endGame();
                } else {
                    this.setGameState(true, this.score, this.lives, false, false);
                }
            }

            // ----------------------------------------------------------
            // 游戏结束 & 重新开始
            // ----------------------------------------------------------
            endGame() {
                this.isGameOver = true;
                this.isPlaying = false;
                // 清除当前目标
                this.clearTarget();
                // 取消定时器
                if (this.spawnTimer) { this.spawnTimer.remove();
                    this.spawnTimer = null; }

                // 音效
                playGameOverSound();

                // 显示结束界面
                this.gameOverText.setText('游戏结束');
                this.gameOverText.setAlpha(1);

                this.finalScoreText.setText('最终得分: ' + this.score);
                this.finalScoreText.setAlpha(1);

                this.restartBtn.setAlpha(1);
                this.restartBtnText.setAlpha(1);

                this.setGameState(false, this.score, this.lives, true, true);
                this.updateUI();
                this.updateGameStateObjects();
            }

            restartGame() {
                // 重置所有
                this.isGameOver = false;
                this.isPlaying = false;
                this.isCountdown = false;
                this.score = 0;
                this.lives = this.maxLives;
                this.consecutiveHits = 0;
                this.livesLost = 0;
                this.targetDuration = this.baseDuration;
                this.targetInterval = this.baseInterval;

                // 清除目标
                this.clearTarget();
                this.clearDetectors();
                if (this.spawnTimer) { this.spawnTimer.remove();
                    this.spawnTimer = null; }

                // 隐藏结束界面
                this.gameOverText.setAlpha(0);
                this.finalScoreText.setAlpha(0);
                this.restartBtn.setAlpha(0);
                this.restartBtnText.setAlpha(0);

                // 重置UI
                this.updateUI();
                this.setGameState(false, 0, this.maxLives, false, false);
                this.updateGameStateObjects();

                // 回到开始界面
                this.startPrompt.setAlpha(1);
                this.add.text(400, 220, '反应测试', {
                    fontSize: '56px',
                    fontFamily: 'Arial, sans-serif',
                    fontStyle: 'bold',
                    color: '#ffdd66',
                    stroke: '#000000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(100).setScrollFactor(0).setAlpha(1);

                // 重置之前的标题 (多个文字叠加问题处理)
                // 实际上最好用成员变量管理标题，但为了简洁，这里重新创建
            }

            // ----------------------------------------------------------
            // 辅助方法
            // ----------------------------------------------------------
            clearTarget() {
                if (this.target && this.target.active) {
                    const t = this.target.getData('timer');
                    if (t) t.remove();
                    this.target.destroy();
                    this.target = null;
                }
                this.targetGroup.clear(true, true);
                this.updateGameStateObjects();
            }

            clearDetectors() {
                this.clickDetectorGroup.clear(true, true);
            }

            showBonus(text) {
                this.bonusText.setText(text);
                this.bonusText.setAlpha(1);
                this.tweens.add({
                    targets: this.bonusText,
                    alpha: 0,
                    y: this.bonusText.y - 40,
                    duration: 800,
                    ease: 'Power2',
                    onComplete: () => {
                        this.bonusText.y = 160;
                    }
                });
            }

            updateUI() {
                this.scoreText.setText('得分: ' + this.score);
                this.livesText.setText('❤️ × ' + this.lives);
                // 生命值颜色变化
                if (this.lives <= 2) {
                    this.livesText.setColor('#ff2222');
                } else if (this.lives <= 3) {
                    this.livesText.setColor('#ffaa00');
                } else {
                    this.livesText.setColor('#ff4466');
                }
            }

            updateGameStateObjects() {
                let cnt = 0;
                this.targetGroup.getChildren().forEach(child => {
                    if (child.active && child.getData('active')) cnt++;
                });
                window.__gameState.objects.enemies = cnt;
            }

            setGameState(running, score, lives, gameOver, canRestart) {
                window.__gameState.running = running;
                window.__gameState.score = score;
                window.__gameState.lives = lives;
                window.__gameState.gameOver = gameOver;
                window.__gameState.canRestart = canRestart;
                window.__gameState.objects.player = true;
            }

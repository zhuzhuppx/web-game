<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phaser小鸟飞行</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        /* 虚拟按键 */
        #virtual-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #virtual-controls button {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        #virtual-controls button:active {
            background: rgba(255, 255, 255, 0.45);
        }
        @media (pointer: coarse) {
            #virtual-controls {
                display: flex;
            }
        }
        @media (max-width: 500px) {
            #virtual-controls button {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="virtual-controls">
        <button id="btn-flap" aria-label="跳跃">A</button>
        <button id="btn-restart" aria-label="重新开始">B</button>
    </div>

    <script>
        // ============================================================
        //  Phaser 小鸟飞行 - 完整修复版
        //  引擎: Phaser 3.87.0 (Arcade Physics)
        //  设计: 横版卷轴无尽跑酷
        //  修复: 加载超时 / 代码截断 / 手机适配
        // ============================================================

        (function() {
            'use strict';

            const GAME_WIDTH = 800;
            const GAME_HEIGHT = 600;

            // ---------- 物理常量 ----------
            const GRAVITY = 800;
            const FLAP_VELOCITY = -350;
            const MAX_FALL_SPEED = 600;
            const BASE_SCROLL_SPEED = 200;
            const PIPE_WIDTH = 60;
            const PIPE_GAP_HEIGHT_MIN = 150;
            const PIPE_GAP_HEIGHT_MAX = 180;
            const PIPE_CENTER_Y_MIN = 180;
            const PIPE_CENTER_Y_MAX = 420;
            const PIPE_SPACING_MIN = 250;
            const PIPE_SPACING_MAX = 350;
            const GROUND_Y = 550;
            const GROUND_VISUAL_Y = 520;
            const BIRD_X = 150;
            const BIRD_INIT_Y = 300;
            const BIRD_WIDTH = 40;
            const BIRD_HEIGHT = 30;
            const BIRD_BODY_WIDTH = 36;
            const BIRD_BODY_HEIGHT = 26;

            // ---------- 难度递增 ----------
            function getScrollSpeed(score) {
                if (score <= 10) return 200;
                if (score <= 20) return 220;
                if (score <= 40) return 240;
                if (score <= 60) return 260;
                return Math.min(280, 300);
            }

            // ============================================================
            //  主场景
            // ============================================================
            class GameScene extends Phaser.Scene {
                constructor() {
                    super({ key: 'GameScene' });
                    this.score = 0;
                    this.state = 'waiting'; // waiting | playing | gameover
                    this.pipePairs = [];
                    this.nextSpawnX = GAME_WIDTH + 100;
                    this.currentSpeed = BASE_SCROLL_SPEED;
                    this.birdTween = null;
                    this.pipeSpawnTimer = 0;
                    this.bestScore = parseInt(localStorage.getItem('birdBestScore') || '0');
                    this.waitingIdle = 0;
                }

                // ----------------------------------------
                //  preload - 生成纹理
                // ----------------------------------------
                preload() {
                    // 生成小鸟纹理 (红色小三角形 + 圆形)
                    this.createBirdTexture();
                    // 生成管道纹理
                    this.createPipeTextures();
                    // 生成背景纹理
                    this.createBgTexture();
                }

                // ----------------------------------------
                //  create
                // ----------------------------------------
                create() {
                    // ---- 物理世界 ----
                    this.physics.world.gravity.y = GRAVITY;

                    // ---- 背景 ----
                    this.drawBackground();

                    // ---- 地面 (视觉) ----
                    this.groundVisual = this.add.rectangle(
                        GAME_WIDTH / 2,
                        GROUND_VISUAL_Y + (GAME_HEIGHT - GROUND_VISUAL_Y) / 2,
                        GAME_WIDTH,
                        GAME_HEIGHT - GROUND_VISUAL_Y,
                        0x8B5E3C
                    );
                    this.groundVisual.setDepth(1);

                    this.groundLine = this.add.rectangle(
                        GAME_WIDTH / 2,
                        GROUND_VISUAL_Y,
                        GAME_WIDTH,
                        4,
                        0x6B3E1C
                    );
                    this.groundLine.setDepth(1);

                    // ---- 管道组 (物理) ----
                    this.pipeGroup = this.physics.add.group({
                        allowGravity: false,
                        immovable: true
                    });

                    // ---- 小鸟 (物理) ----
                    this.bird = this.physics.add.sprite(BIRD_X, BIRD_INIT_Y, 'birdTex');
                    this.bird.setDisplaySize(BIRD_WIDTH, BIRD_HEIGHT);
                    this.bird.body.setSize(BIRD_BODY_WIDTH, BIRD_BODY_HEIGHT);
                    this.bird.body.setMaxVelocityY(MAX_FALL_SPEED);
                    this.bird.body.setAllowGravity(false);
                    this.bird.setDepth(10);

                    // ---- 碰撞: 小鸟 vs 管道 ----
                    this.physics.add.overlap(
                        this.bird,
                        this.pipeGroup,
                        this.onHitPipe,
                        null,
                        this
                    );

                    // ---- 碰撞: 小鸟 vs 地面 (Game Over) ----
                    this.groundZone = this.add.zone(GAME_WIDTH / 2, GROUND_Y, GAME_WIDTH, 20);
                    this.physics.add.existing(this.groundZone, true);
                    this.physics.add.overlap(
                        this.bird,
                        this.groundZone,
                        this.onHitGround,
                        null,
                        this
                    );

                    // ---- UI 文字 ----
                    this.scoreText = this.add.text(40, 40, '得分：0', {
                        fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                        fontSize: '32px',
                        color: '#ffffff',
                        fontStyle: 'bold',
                        stroke: '#000000',
                        strokeThickness: 4
                    });
                    this.scoreText.setDepth(20);

                    this.bestScoreText = this.add.text(GAME_WIDTH - 40, 40, '最高：' + this.bestScore, {
                        fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                        fontSize: '24px',
                        color: '#ffd700',
                        fontStyle: 'bold',
                        stroke: '#000000',
                        strokeThickness: 3
                    });
                    this.bestScoreText.setOrigin(1, 0);
                    this.bestScoreText.setDepth(20);

                    // ---- 提示文字 ----
                    this.hintText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40, '点击 / 按 空格 / A 键 开始', {
                        fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                        fontSize: '28px',
                        color: '#ffffff',
                        fontStyle: 'bold',
                        stroke: '#000000',
                        strokeThickness: 4,
                        align: 'center'
                    });
                    this.hintText.setOrigin(0.5);
                    this.hintText.setDepth(20);

                    // ---- 等待模式 idle 动画 ----
                    this.bird.setAllowGravity(false);
                    this.idleTween = this.tweens.add({
                        targets: this.bird,
                        y: BIRD_INIT_Y - 18,
                        duration: 500,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });

                    // ---- 输入处理 ----
                    this.cursors = this.input.keyboard.createCursorKeys();
                    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                    this.keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                    this.keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);

                    // 鼠标/触控点击
                    this.input.on('pointerdown', (pointer) => {
                        if (this.state === 'waiting') {
                            this.startGame();
                        } else if (this.state === 'playing') {
                            this.flap();
                        } else if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    // 键盘事件
                    this.input.keyboard.on('keydown-SPACE', () => {
                        if (this.state === 'waiting') {
                            this.startGame();
                        } else if (this.state === 'playing') {
                            this.flap();
                        } else if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    this.input.keyboard.on('keydown-J', () => {
                        if (this.state === 'waiting') {
                            this.startGame();
                        } else if (this.state === 'playing') {
                            this.flap();
                        } else if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    this.input.keyboard.on('keydown-K', () => {
                        if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    // ---- 虚拟按键 ----
                    const btnFlap = document.getElementById('btn-flap');
                    const btnRestart = document.getElementById('btn-restart');

                    btnFlap.addEventListener('click', (e) => {
                        e.preventDefault();
                        if (this.state === 'waiting') {
                            this.startGame();
                        } else if (this.state === 'playing') {
                            this.flap();
                        } else if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    btnRestart.addEventListener('click', (e) => {
                        e.preventDefault();
                        if (this.state === 'gameover') {
                            this.restartGame();
                        }
                    });

                    // 触摸时防止页面滚动
                    document.addEventListener('touchmove', function(e) {
                        if (e.target.closest('#game-container') || e.target.closest('#virtual-controls')) {
                            e.preventDefault();
                        }
                    }, { passive: false });

                    // ---- 初始化状态 ----
                    this.state = 'waiting';
                    this.score = 0;
                    this.currentSpeed = BASE_SCROLL_SPEED;
                    this.pipePairs = [];
                    this.nextSpawnX = GAME_WIDTH + 100;
                    this.pipeSpawnTimer = 0;
                    this.gameOverHandled = false;

                    console.log('[GameScene] create 完成，状态: waiting');
                }

                // ----------------------------------------
                //  update
                // ----------------------------------------
                update(time, delta) {
                    if (this.state === 'waiting') {
                        // 什么都不做，小鸟 idle 动画由 tween 控制
                        return;
                    }

                    if (this.state === 'gameover') {
                        // 仍然更新管道滚动，让视觉效果继续
                        this.updatePipes(delta);
                        return;
                    }

                    // ---- playing ----

                    // 更新速度（根据分数）
                    this.currentSpeed = getScrollSpeed(this.score);

                    // 生成管道
                    this.pipeSpawnTimer += delta;
                    const spawnInterval = Phaser.Math.Between(PIPE_SPACING_MIN, PIPE_SPACING_MAX);
                    if (this.pipeSpawnTimer >= spawnInterval) {
                        this.pipeSpawnTimer = 0;
                        this.spawnPipePair();
                    }

                    // 更新管道位置
                    this.updatePipes(delta);

                    // 更新分数（通过管道）
                    this.updateScoreFromPipes();

                    // 检测小鸟是否超出屏幕顶部或底部
                    if (this.bird.y < -30 || this.bird.y > GROUND_Y + 30) {
                        if (!this.gameOverHandled) {
                            this.handleGameOver();
                        }
                    }
                }

                // ----------------------------------------
                //  绘制纹理
                // ----------------------------------------
                createBirdTexture() {
                    if (this.textures.exists('birdTex')) return;
                    const g = this.make.graphics({ x: 0, y: 0 });
                    // 红色身体 (椭圆)
                    g.fillStyle(0xE74C3C, 1);
                    g.fillEllipse(20, 15, 34, 24);
                    // 翅膀
                    g.fillStyle(0xC0392B, 1);
                    g.fillTriangle(8, 8, 2, 22, 20, 14);
                    // 眼睛
                    g.fillStyle(0xFFFFFF, 1);
                    g.fillCircle(28, 10, 6);
                    g.fillStyle(0x000000, 1);
                    g.fillCircle(30, 10, 3);
                    // 喙
                    g.fillStyle(0xF39C12, 1);
                    g.fillTriangle(36, 14, 42, 16, 36, 18);
                    g.generateTexture('birdTex', 44, 30);
                    g.destroy();
                }

                createPipeTextures() {
                    if (!this.textures.exists('pipeTopTex')) {
                        const g1 = this.make.graphics({ x: 0, y: 0 });
                        g1.fillStyle(0x27AE60, 1);
                        g1.fillRect(0, 0, PIPE_WIDTH, 40);
                        g1.fillStyle(0x2ECC71, 1);
                        g1.fillRect(4, 40, PIPE_WIDTH - 8, 20);
                        g1.fillStyle(0x1E8449, 1);
                        g1.fillRect(0, 0, PIPE_WIDTH, 6);
                        g1.generateTexture('pipeTopTex', PIPE_WIDTH, 60);
                        g1.destroy();
                    }
                    if (!this.textures.exists('pipeBottomTex')) {
                        const g2 = this.make.graphics({ x: 0, y: 0 });
                        g2.fillStyle(0x27AE60, 1);
                        g2.fillRect(0, 0, PIPE_WIDTH, 40);
                        g2.fillStyle(0x2ECC71, 1);
                        g2.fillRect(4, 0, PIPE_WIDTH - 8, 20);
                        g2.fillStyle(0x1E8449, 1);
                        g2.fillRect(0, 34, PIPE_WIDTH, 6);
                        g2.generateTexture('pipeBottomTex', PIPE_WIDTH, 40);
                        g2.destroy();
                    }
                }

                createBgTexture() {
                    if (this.textures.exists('bgTex')) return;
                    const g = this.make.graphics({ x: 0, y: 0 });
                    // 天空渐变
                    for (let i = 0; i < GAME_HEIGHT; i++) {
                        const t = i / GAME_HEIGHT;
                        const r = Math.floor(135 + 80 * t);
                        const gv = Math.floor(206 + 20 * t);
                        const b = Math.floor(235 - 40 * t);
                        g.fillStyle(Phaser.Display.Color.GetColor(r, gv, b), 1);
                        g.fillRect(0, i, GAME_WIDTH, 1);
                    }
                    // 简单云朵
                    g.fillStyle(0xFFFFFF, 0.6);
                    g.fillEllipse(150, 100, 80, 40);
                    g.fillEllipse(180, 90, 60, 30);
                    g.fillEllipse(500, 140, 90, 45);
                    g.fillEllipse(530, 130, 60, 30);
                    g.fillEllipse(680, 80, 70, 35);
                    g.generateTexture('bgTex', GAME_WIDTH, GAME_HEIGHT);
                    g.destroy();
                }

                // ----------------------------------------
                //  绘制背景
                // ----------------------------------------
                drawBackground() {
                    if (!this.bgImage) {
                        this.bgImage = this.add.image(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'bgTex');
                        this.bgImage.setDepth(0);
                    }
                }

                // ----------------------------------------
                //  开始游戏
                // ----------------------------------------
                startGame() {
                    if (this.state !== 'waiting') return;
                    this.state = 'playing';
                    this.score = 0;
                    this.scoreText.setText('得分：0');
                    this.currentSpeed = BASE_SCROLL_SPEED;
                    this.gameOverHandled = false;

                    // 停止 idle 动画
                    if (this.idleTween) {
                        this.idleTween.stop();
                        this.idleTween = null;
                    }
                    this.bird.setY(BIRD_INIT_Y);
                    this.bird.body.setAllowGravity(true);
                    this.bird.body.setVelocityY(0);

                    // 清除提示
                    if (this.hintText) {
                        this.hintText.setVisible(false);
                    }

                    // 清除现有管道
                    this.pipeGroup.clear(true, true);
                    this.pipePairs = [];
                    this.pipeSpawnTimer = 0;
                    this.nextSpawnX = GAME_WIDTH + 100;

                    // 生成第一对管道
                    this.spawnPipePair();

                    console.log('[Game] 开始游戏');
                }

                // ----------------------------------------
                //  flap
                // ----------------------------------------
                flap() {
                    if (this.state !== 'playing') return;
                    this.bird.body.setVelocityY(FLAP_VELOCITY);
                    // 小幅度旋转效果
                    this.bird.setAngle(-20);
                    this.tweens.add({
                        targets: this.bird,
                        angle: 0,
                        duration: 300,
                        ease: 'Sine.easeOut'
                    });
                }

                // ----------------------------------------
                //  生成管道对
                // ----------------------------------------
                spawnPipePair() {
                    const gapHeight = Phaser.Math.Between(PIPE_GAP_HEIGHT_MIN, PIPE_GAP_HEIGHT_MAX);
                    const centerY = Phaser.Math.Between(PIPE_CENTER_Y_MIN, PIPE_CENTER_Y_MAX);
                    const topPipeHeight = centerY - gapHeight / 2;
                    const bottomPipeY = centerY + gapHeight / 2;
                    const x = this.nextSpawnX;

                    // 上管道 (翻转)
                    const topPipe = this.physics.add.sprite(x, topPipeHeight, 'pipeTopTex');
                    topPipe.setOrigin(0.5, 1);
                    topPipe.setDisplaySize(PIPE_WIDTH, topPipeHeight);
                    topPipe.body.setAllowGravity(false);
                    topPipe.body.setImmovable(true);
                    topPipe.body.checkCollision = true;
                    this.pipeGroup.add(topPipe);

                    // 下管道
                    const bottomPipe = this.physics.add.sprite(x, bottomPipeY, 'pipeBottomTex');
                    bottomPipe.setOrigin(0.5, 0);
                    bottomPipe.setDisplaySize(PIPE_WIDTH, GAME_HEIGHT - bottomPipeY);
                    bottomPipe.body.setAllowGravity(false);
                    bottomPipe.body.setImmovable(true);
                    bottomPipe.body.checkCollision = true;
                    this.pipeGroup.add(bottomPipe);

                    // 记录管道对 (用于分数)
                    this.pipePairs.push({
                        top: topPipe,
                        bottom: bottomPipe,
                        scored: false,
                        x: x
                    });

                    // 更新下一个生成位置
                    this.nextSpawnX = x + Phaser.Math.Between(PIPE_SPACING_MIN, PIPE_SPACING_MAX);

                    // 限制管道数量，防止内存泄漏
                    if (this.pipePairs.length > 20) {
                        const old = this.pipePairs.shift();
                        if (old && old.top) old.top.destroy();
                        if (old && old.bottom) old.bottom.destroy();
                    }
                }

                // ----------------------------------------
                //  更新管道位置
                // ----------------------------------------
                updatePipes(delta) {
                    const dx = this.currentSpeed * (delta / 1000);
                    for (let i = this.pipePairs.length - 1; i >= 0; i--) {
                        const pair = this.pipePairs[i];
                        if (!pair || !pair.top || !pair.bottom) {
                            this.pipePairs.splice(i, 1);
                            continue;
                        }
                        pair.top.x -= dx;
                        pair.bottom.x -= dx;
                        pair.x = pair.top.x;

                        // 移除超出屏幕左侧的管道
                        if (pair.top.x < -PIPE_WIDTH * 2) {
                            pair.top.destroy();
                            pair.bottom.destroy();
                            this.pipePairs.splice(i, 1);
                        }
                    }
                }

                // ----------------------------------------
                //  更新分数 (通过管道)
                // ----------------------------------------
                updateScoreFromPipes() {
                    for (const pair of this.pipePairs) {
                        if (!pair.scored && pair.x < BIRD_X - 10) {
                            pair.scored = true;
                            this.score += 1;
                            this.scoreText.setText('得分：' + this.score);
                            // 更新最高分
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('birdBestScore', String(this.bestScore));
                                this.bestScoreText.setText('最高：' + this.bestScore);
                            }
                        }
                    }
                }

                // ----------------------------------------
                //  碰撞: 管道
                // ----------------------------------------
                onHitPipe(bird, pipe) {
                    if (this.state !== 'playing') return;
                    if (this.gameOverHandled) return;
                    this.handleGameOver();
                }

                // ----------------------------------------
                //  碰撞: 地面
                // ----------------------------------------
                onHitGround(bird, ground) {
                    if (this.state !== 'playing') return;
                    if (this.gameOverHandled) return;
                    this.handleGameOver();
                }

                // ----------------------------------------
                //  游戏结束
                // ----------------------------------------
                handleGameOver() {
                    if (this.gameOverHandled) return;
                    this.gameOverHandled = true;
                    this.state = 'gameover';

                    // 停止小鸟物理
                    this.bird.body.setAllowGravity(false);
                    this.bird.body.setVelocityY(0);
                    this.bird.body.setVelocityX(0);

                    // 显示游戏结束文字
                    if (!this.gameOverText) {
                        this.gameOverText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 60, '游戏结束', {
                            fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                            fontSize: '48px',
                            color: '#ff4444',
                            fontStyle: 'bold',
                            stroke: '#000000',
                            strokeThickness: 6,
                            align: 'center'
                        });
                        this.gameOverText.setOrigin(0.5);
                        this.gameOverText.setDepth(20);
                        this.gameOverText.setVisible(false);

                        this.restartHintText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20,
                            '点击 / 按 K / B 键 重新开始', {
                                fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                                fontSize: '24px',
                                color: '#ffffff',
                                fontStyle: 'bold',
                                stroke: '#000000',
                                strokeThickness: 4,
                                align: 'center'
                            });
                        this.restartHintText.setOrigin(0.5);
                        this.restartHintText.setDepth(20);
                        this.restartHintText.setVisible(false);
                    }

                    this.gameOverText.setVisible(true);
                    this.restartHintText.setVisible(true);

                    // 更新最高分
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('birdBestScore', String(this.bestScore));
                        this.bestScoreText.setText('最高：' + this.bestScore);
                    }

                    console.log('[Game] 游戏结束，得分：' + this.score);
                }

                // ----------------------------------------
                //  重新开始
                // ----------------------------------------
                restartGame() {
                    if (this.state !== 'gameover') return;

                    // 重置场景
                    this.state = 'waiting';
                    this.gameOverHandled = false;
                    this.score = 0;
                    this.currentSpeed = BASE_SCROLL_SPEED;

                    // 隐藏结束文字
                    if (this.gameOverText) this.gameOverText.setVisible(false);
                    if (this.restartHintText) this.restartHintText.setVisible(false);

                    // 清除管道
                    this.pipeGroup.clear(true, true);
                    this.pipePairs = [];
                    this.pipeSpawnTimer = 0;
                    this.nextSpawnX = GAME_WIDTH + 100;

                    // 重置小鸟
                    this.bird.setPosition(BIRD_X, BIRD_INIT_Y);
                    this.bird.body.setAllowGravity(false);
                    this.bird.body.setVelocityY(0);
                    this.bird.body.setVelocityX(0);
                    this.bird.setAngle(0);

                    // 显示提示
                    if (this.hintText) {
                        this.hintText.setVisible(true);
                    }

                    // 重新开始 idle 动画
                    if (this.idleTween) {
                        this.idleTween.stop();
                    }
                    this.idleTween = this.tweens.add({
                        targets: this.bird,
                        y: BIRD_INIT_Y - 18,
                        duration: 500,
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });

                    // 重置分数显示
                    this.scoreText.setText('得分：0');

                    console.log('[Game] 重新开始');
                }
            }

            // ============================================================
            //  Phaser 配置
            // ============================================================
            const config = {
                type: Phaser.AUTO,
                width: GAME_WIDTH,
                height: GAME_HEIGHT,
                parent: 'game-container',
                backgroundColor: '#87CEEB',
                physics: {
                    default: 'arcade',
                    arcade: {
                        gravity: { y: 0 },
                        debug: false
                    }
                },
                scale: {
                    mode: Phaser.Scale.FIT,
                    autoCenter: Phaser.Scale.CENTER_BOTH,
                    width: GAME_WIDTH,
                    height: GAME_HEIGHT
                },
                scene: GameScene,
                render: {
                    pixelArt: false,
                    antialias: true
                },
                input: {
                    activePointers: 3,
                    touch: {
                        capture: true
                    }
                },
                callbacks: {
                    postBoot: function(game) {
                        console.log('[Phaser] 启动完成');
                    }
                }
            };

            // ============================================================
            //  启动
            // ============================================================
            window.addEventListener('DOMContentLoaded', function() {
                const game = new Phaser.Game(config);
                window.game = game;
                console.log('[Phaser] 游戏实例创建');
            });

            // 备用: 如果 DOMContentLoaded 已触发
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                if (!window.game) {
                    const game = new Phaser.Game(config);
                    window.game = game;
                    console.log('[Phaser] 游戏实例创建 (备用)');
                }
            }

        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>打砖块 - Phaser 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 800 / 600;
        }
        .touch-hint {
            display: none;
            color: #aaa;
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
            user-select: none;
        }
        @media (pointer: coarse) {
            .touch-hint {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div id="game-container"></div>
    <div class="touch-hint">👆 拖动挡板 · 点击发射小球</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <script>
        // ============================================================
        //  Phaser 打砖块 — 完整修复版
        //  修复清单：
        //    1. 小球掉到底部检测 → loseLife()
        //    2. 触控输入支持 → pointermove + pointerdown
        //    3. 发射逻辑状态保护 → 防止反复触发
        //    4. 物理边界 → 全局关闭底部碰撞，挡板Y固定
        //    5. UI → 分数/生命/游戏结束/胜利/重新开始
        //    6. 补全所有缺失方法
        //    7. 缩放配置 → Phaser.Scale.FIT
        //    8. 虚拟按键 A/B (手机) + 键盘提示 J/K (PC)
        // ============================================================

        const CONFIG = {
            width: 800,
            height: 600,
            // 砖块
            brickWidth: 64,
            brickHeight: 24,
            brickCols: 10,
            brickRows: 6,
            brickSpacingX: 4,
            brickSpacingY: 4,
            brickOffsetX: 62,
            brickOffsetY: 60,
            // 挡板
            paddleWidth: 100,
            paddleHeight: 16,
            paddleY: 560,
            paddleSpeed: 400,
            // 小球
            ballRadius: 5,
            ballDiameter: 10,
            ballSpeed: 280,
            ballLaunchAngleRange: 18,
            // 生命
            initialLives: 3,
            maxLives: 5,
            // 分数
            pointsPerRow: [10, 20, 30, 40, 50, 60],
            goldPoints: 100,
            goldChance: 0.05,
            // 颜色
            rowColors: [
                { name: 'red', hex: 0xff4444 },
                { name: 'orange', hex: 0xff8800 },
                { name: 'yellow', hex: 0xffdd00 },
                { name: 'green', hex: 0x44cc44 },
                { name: 'blue', hex: 0x4488ff },
                { name: 'purple', hex: 0xcc44cc },
            ],
            goldColor: { name: 'gold', hex: 0xffd700 },
            damagedColor: { name: 'red_damaged', hex: 0xffaaaa },
        };

        // ============================================================
        //  场景：GameScene
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
                this.score = 0;
                this.lives = CONFIG.initialLives;
                this.ballLaunched = false;
                this.gameOver = false;
                this.gameWon = false;
                this.brickCount = 0;
            }

            // ============================================================
            //  create
            // ============================================================
            create() {
                // ----- 生成纹理 -----
                this.generateTextures();

                // ----- 物理世界边界 (左右上碰撞, 底部不碰撞) -----
                this.physics.world.setBounds(0, 0, CONFIG.width, CONFIG.height);
                this.physics.world.setBoundsCollision(true, true, true, false);

                // ----- UI (分数/生命/提示/按钮) -----
                this.createUI();

                // ----- 砖块 -----
                this.bricks = this.physics.add.staticGroup();
                this.createBricks();

                // ----- 挡板 -----
                this.paddle = this.physics.add.sprite(CONFIG.width / 2, CONFIG.paddleY, 'paddle');
                this.paddle.setImmovable(true);
                this.paddle.body.setCollideWorldBounds(true);
                this.paddle.body.setAllowGravity(false);

                // ----- 小球 -----
                this.ball = this.physics.add.sprite(CONFIG.width / 2, CONFIG.paddleY - 30, 'ball');
                this.ball.body.setAllowGravity(false);
                this.ball.body.setBounce(1, 1);
                // 小球与世界边界碰撞 (底部已全局关闭，所以不会碰底)
                this.ball.body.setCollideWorldBounds(true);
                this.ball.body.setMaxVelocity(CONFIG.ballSpeed * 1.5, CONFIG.ballSpeed * 1.5);

                // ----- 碰撞 -----
                this.physics.add.collider(this.ball, this.bricks, this.hitBrick, null, this);
                this.physics.add.collider(this.ball, this.paddle, this.hitPaddle, null, this);

                // ----- 键盘 -----
                this.cursors = this.input.keyboard.createCursorKeys();
                this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
                this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
                this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                this.keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                this.keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);

                // 键盘发射 (带状态保护)
                this.input.keyboard.on('keydown-SPACE', () => { this.launchBall(); });
                this.input.keyboard.on('keydown-J', () => { this.launchBall(); });
                this.input.keyboard.on('keydown-K', () => { this.launchBall(); });

                // ----- 触控 / 鼠标 输入 (修复 #2) -----
                this.input.on('pointermove', (pointer) => {
                    if (this.gameOver || this.gameWon) return;
                    this.paddle.x = Phaser.Math.Clamp(
                        pointer.x,
                        CONFIG.paddleWidth / 2,
                        CONFIG.width - CONFIG.paddleWidth / 2
                    );
                    // 小球未发射时跟随挡板
                    if (!this.ballLaunched) {
                        this.ball.x = this.paddle.x;
                        this.ball.y = CONFIG.paddleY - 30;
                    }
                });
                this.input.on('pointerdown', () => {
                    this.launchBall();
                });

                // ----- 虚拟按键 A/B (修复 #2 / #8) -----
                this.createVirtualButtons();

                // ----- 游戏状态标记 -----
                this.ballLaunched = false;
            }

            // ============================================================
            //  generateTextures — 生成所有纹理
            // ============================================================
            generateTextures() {
                // 挡板
                const pg = this.make.graphics({ add: false });
                pg.fillStyle(0xffffff, 1);
                pg.fillRoundedRect(0, 0, CONFIG.paddleWidth, CONFIG.paddleHeight, 6);
                pg.generateTexture('paddle', CONFIG.paddleWidth, CONFIG.paddleHeight);
                pg.destroy();

                // 小球
                const bg = this.make.graphics({ add: false });
                bg.fillStyle(0xffffff, 1);
                bg.fillCircle(CONFIG.ballRadius, CONFIG.ballRadius, CONFIG.ballRadius);
                bg.generateTexture('ball', CONFIG.ballDiameter, CONFIG.ballDiameter);
                bg.destroy();

                // 砖块颜色
                CONFIG.rowColors.forEach((c) => {
                    const g = this.make.graphics({ add: false });
                    g.fillStyle(c.hex, 1);
                    g.fillRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                    g.lineStyle(1, 0x000000, 0.3);
                    g.strokeRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                    g.generateTexture('brick_' + c.name, CONFIG.brickWidth, CONFIG.brickHeight);
                    g.destroy();
                });

                // 金色砖块
                const gg = this.make.graphics({ add: false });
                gg.fillStyle(CONFIG.goldColor.hex, 1);
                gg.fillRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                gg.lineStyle(2, 0xffaa00, 0.8);
                gg.strokeRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                gg.generateTexture('brick_gold', CONFIG.brickWidth, CONFIG.brickHeight);
                gg.destroy();

                // 受损砖块 (用于金色砖块受损后)
                const dg = this.make.graphics({ add: false });
                dg.fillStyle(CONFIG.damagedColor.hex, 1);
                dg.fillRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                dg.lineStyle(1, 0x000000, 0.3);
                dg.strokeRect(0, 0, CONFIG.brickWidth, CONFIG.brickHeight);
                dg.generateTexture('brick_damaged', CONFIG.brickWidth, CONFIG.brickHeight);
                dg.destroy();
            }

            // ============================================================
            //  createUI — 分数 / 生命 / 游戏状态文字
            // ============================================================
            createUI() {
                const style = {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '20px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3,
                };
                this.scoreText = this.add.text(16, 16, '分数: 0', style).setDepth(10);

                this.livesText = this.add.text(CONFIG.width - 16, 16, '❤️ x ' + this.lives, {
                    ...style,
                    fontSize: '22px',
                }).setOrigin(1, 0).setDepth(10);

                // 键盘提示 (PC)
                this.hintText = this.add.text(CONFIG.width / 2, 40, '按 J / K / 空格 发射', {
                    ...style,
                    fontSize: '16px',
                    color: '#cccccc',
                }).setOrigin(0.5, 0).setDepth(10).setAlpha(0.8);

                // 游戏结束 / 胜利 文字 (初始隐藏)
                const bigStyle = {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '52px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 6,
                };
                this.resultText = this.add.text(CONFIG.width / 2, CONFIG.height / 2 - 30, '', {
                    ...bigStyle,
                }).setOrigin(0.5, 0.5).setDepth(100).setVisible(false);

                this.subText = this.add.text(CONFIG.width / 2, CONFIG.height / 2 + 40, '', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '22px',
                    color: '#dddddd',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0.5, 0.5).setDepth(100).setVisible(false);

                // 重新开始按钮 (初始隐藏)
                this.restartBtn = this.add.text(CONFIG.width / 2, CONFIG.height / 2 + 90, '🔄 重新开始', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '28px',
                    color: '#ffdd44',
                    stroke: '#000000',
                    strokeThickness: 4,
                    backgroundColor: '#33333388',
                    padding: { x: 24, y: 12 },
                }).setOrigin(0.5, 0.5).setDepth(100).setVisible(false).setInteractive({ useHandCursor: true });

                this.restartBtn.on('pointerdown', () => {
                    this.scene.restart();
                });
            }

            // ============================================================
            //  createVirtualButtons — 手机虚拟按键 A/B (修复 #2 / #8)
            // ============================================================
            createVirtualButtons() {
                const btnSize = 52;
                const btnY = CONFIG.height - 36;

                // 按钮 A (左)
                this.btnA = this.add.graphics().setDepth(200);
                this.btnA.fillStyle(0xffffff, 0.20);
                this.btnA.fillCircle(0, 0, btnSize / 2);
                this.btnA.setPosition(60, btnY);
                this.btnA.setInteractive(new Phaser.Geom.Circle(0, 0, btnSize / 2), Phaser.Geom.Circle.Contains);

                const labelA = this.add.text(60, btnY, 'A', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '26px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0.5, 0.5).setDepth(201);

                this.btnA.on('pointerdown', () => { this.launchBall(); });
                this.btnA.on('pointerover', () => { this.btnA.clear();
                    this.btnA.fillStyle(0xffffff, 0.35);
                    this.btnA.fillCircle(0, 0, btnSize / 2); });
                this.btnA.on('pointerout', () => { this.btnA.clear();
                    this.btnA.fillStyle(0xffffff, 0.20);
                    this.btnA.fillCircle(0, 0, btnSize / 2); });

                // 按钮 B (右)
                this.btnB = this.add.graphics().setDepth(200);
                this.btnB.fillStyle(0xffffff, 0.20);
                this.btnB.fillCircle(0, 0, btnSize / 2);
                this.btnB.setPosition(CONFIG.width - 60, btnY);
                this.btnB.setInteractive(new Phaser.Geom.Circle(0, 0, btnSize / 2), Phaser.Geom.Circle.Contains);

                const labelB = this.add.text(CONFIG.width - 60, btnY, 'B', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '26px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0.5, 0.5).setDepth(201);

                this.btnB.on('pointerdown', () => { this.launchBall(); });
                this.btnB.on('pointerover', () => { this.btnB.clear();
                    this.btnB.fillStyle(0xffffff, 0.35);
                    this.btnB.fillCircle(0, 0, btnSize / 2); });
                this.btnB.on('pointerout', () => { this.btnB.clear();
                    this.btnB.fillStyle(0xffffff, 0.20);
                    this.btnB.fillCircle(0, 0, btnSize / 2); });

                // 虚拟按键默认半透明，在触控设备上更明显
                if (!this.sys.game.device.input.touch) {
                    this.btnA.setAlpha(0.3);
                    this.btnB.setAlpha(0.3);
                    labelA.setAlpha(0.3);
                    labelB.setAlpha(0.3);
                }
            }

            // ============================================================
            //  createBricks — 生成砖块阵
            // ============================================================
            createBricks() {
                this.brickCount = 0;
                const { brickCols, brickRows, brickWidth, brickHeight, brickSpacingX, brickSpacingY, brickOffsetX,
                    brickOffsetY } = CONFIG;

                for (let row = 0; row < brickRows; row++) {
                    for (let col = 0; col < brickCols; col++) {
                        const x = brickOffsetX + col * (brickWidth + brickSpacingX) + brickWidth / 2;
                        const y = brickOffsetY + row * (brickHeight + brickSpacingY) + brickHeight / 2;

                        // 是否金色
                        const isGold = Math.random() < CONFIG.goldChance;
                        const textureKey = isGold ? 'brick_gold' : ('brick_' + CONFIG.rowColors[row].name);

                        const brick = this.bricks.create(x, y, textureKey);
                        brick.setData('row', row);
                        brick.setData('gold', isGold);
                        brick.setData('hp', isGold ? 2 : 1); // 金色砖块需要打2次
                        brick.setData('textureKey', textureKey);
                        this.brickCount++;
                    }
                }
            }

            // ============================================================
            //  launchBall — 发射小球 (修复 #3: 状态保护)
            // ============================================================
            launchBall() {
                // 状态保护：已发射 / 游戏结束 / 胜利 时禁止重复发射
                if (this.ballLaunched || this.gameOver || this.gameWon) return;

                this.ballLaunched = true;
                this.hintText.setVisible(false);

                // 随机发射角度 (± launchAngleRange 度)
                const angleRange = CONFIG.ballLaunchAngleRange;
                const angleDeg = Phaser.Math.Between(-angleRange, angleRange);
                const angleRad = Phaser.Math.DegToRad(angleDeg - 90); // 向上为 -90°

                const vx = CONFIG.ballSpeed * Math.cos(angleRad);
                const vy = CONFIG.ballSpeed * Math.sin(angleRad);

                this.ball.body.setVelocity(vx, vy);
            }

            // ============================================================
            //  hitBrick — 砖块碰撞
            // ============================================================
            hitBrick(ball, brick) {
                const isGold = brick.getData('gold');
                let hp = brick.getData('hp') - 1;
                brick.setData('hp', hp);

                if (hp <= 0) {
                    // 砖块消失
                    brick.destroy();
                    this.brickCount--;

                    // 计分
                    if (isGold) {
                        this.score += CONFIG.goldPoints;
                    } else {
                        const row = brick.getData('row');
                        this.score += CONFIG.pointsPerRow[row] || 10;
                    }
                    this.scoreText.setText('分数: ' + this.score);

                    // 检查胜利
                    if (this.brickCount <= 0) {
                        this.gameWon = true;
                        this.showEndScreen(true);
                    }
                } else {
                    // 金色砖块第一次被打 → 变色
                    if (isGold) {
                        brick.setTexture('brick_damaged');
                        brick.setData('gold', false); // 不再算金色
                        // 仍给少量分
                        this.score += 5;
                        this.scoreText.setText('分数: ' + this.score);
                    }
                }

                // 小特效：碰撞粒子感 (简易 flash)
                this.tweens.add({
                    targets: ball,
                    scaleX: 1.15,
                    scaleY: 1.15,
                    duration: 40,
                    yoyo: true,
                });
            }

            // ============================================================
            //  hitPaddle — 挡板碰撞 (控制反弹角度)
            // ============================================================
            hitPaddle(ball, paddle) {
                // 根据碰撞点在挡板上的位置计算反弹角度
                const diff = ball.x - paddle.x;
                const normalized = diff / (CONFIG.paddleWidth / 2); // -1 ~ 1
                const maxAngle = 60; // 最大偏转角 (度)

                const angleDeg = normalized * maxAngle;
                const angleRad = Phaser.Math.DegToRad(angleDeg - 90); // 向上为 -90°

                const speed = Math.sqrt(ball.body.velocity.x * ball.body.velocity.x +
                    ball.body.velocity.y * ball.body.velocity.y);
                const finalSpeed = Math.max(speed, CONFIG.ballSpeed * 0.8);

                const vx = finalSpeed * Math.cos(angleRad);
                const vy = finalSpeed * Math.sin(angleRad);

                ball.body.setVelocity(vx, vy);

                // 保证小球不会水平弹射 (最低垂直分量)
                if (Math.abs(ball.body.velocity.y) < 40) {
                    ball.body.velocity.y = (ball.body.velocity.y >= 0) ? 40 : -40;
                }
            }

            // ============================================================
            //  loseLife — 失去一条生命 (修复 #1)
            // ============================================================
            loseLife() {
                if (this.gameOver || this.gameWon) return;

                this.lives--;
                this.livesText.setText('❤️ x ' + this.lives);

                // 重置小球
                this.ballLaunched = false;
                this.ball.body.setVelocity(0, 0);
                this.ball.x = this.paddle.x;
                this.ball.y = CONFIG.paddleY - 30;

                // 显示提示
                this.hintText.setVisible(true);

                if (this.lives <= 0) {
                    this.gameOver = true;
                    this.showEndScreen(false);
                }
            }

            // ============================================================
            //  showEndScreen — 显示结束/胜利画面
            // ============================================================
            showEndScreen(won) {
                if (won) {
                    this.resultText.setText('🎉 胜利!').setVisible(true);
                    this.subText.setText('恭喜通关! 得分: ' + this.score).setVisible(true);
                } else {
                    this.resultText.setText('💀 游戏结束').setVisible(true);
                    this.subText.setText('最终得分: ' + this.score).setVisible(true);
                }
                this.restartBtn.setVisible(true);
                this.hintText.setVisible(false);

                // 停止小球
                this.ball.body.setVelocity(0, 0);
                this.ball.setVisible(false);
            }

            // ============================================================
            //  update — 每帧更新 (修复 #1: 小球掉落检测)
            // ============================================================
            update() {
                // ----- 游戏结束 / 胜利 时不再更新控制 -----
                if (this.gameOver || this.gameWon) {
                    return;
                }

                // ----- 小球掉落检测 (修复 #1) -----
                if (this.ball.y > CONFIG.height + 20) {
                    this.loseLife();
                    return;
                }

                // ----- 挡板移动 (键盘) -----
                let paddleDir = 0;
                if (this.cursors.left.isDown || this.keyA.isDown) {
                    paddleDir = -1;
                } else if (this.cursors.right.isDown || this.keyD.isDown) {
                    paddleDir = 1;
                }

                if (paddleDir !== 0) {
                    this.paddle.x += paddleDir * CONFIG.paddleSpeed * (1 / 60);
                    this.paddle.x = Phaser.Math.Clamp(
                        this.paddle.x,
                        CONFIG.paddleWidth / 2,
                        CONFIG.width - CONFIG.paddleWidth / 2
                    );
                }

                // 固定挡板 Y 位置 (防止底部碰撞关闭后意外下沉)
                this.paddle.y = CONFIG.paddleY;

                // ----- 小球未发射时跟随挡板 -----
                if (!this.ballLaunched) {
                    this.ball.x = this.paddle.x;
                    this.ball.y = CONFIG.paddleY - 30;
                }

                // ----- 防止小球水平弹跳 (速度过水平) -----
                if (this.ballLaunched) {
                    const vx = this.ball.body.velocity.x;
                    const vy = this.ball.body.velocity.y;
                    const speed = Math.sqrt(vx * vx + vy * vy);
                    // 如果速度几乎水平，给一个小的垂直分量
                    if (speed > 10 && Math.abs(vy / speed) < 0.1) {
                        const dir = vy >= 0 ? 1 : -1;
                        this.ball.body.velocity.y = dir * 60;
                        // 重新归一化速度
                        const newSpeed = Math.sqrt(vx * vx + this.ball.body.velocity.y * this.ball.body.velocity.y);
                        const ratio = speed / newSpeed;
                        this.ball.body.velocity.x *= ratio;
                        this.ball.body.velocity.y *= ratio;
                    }
                }

                // ----- 提示文字淡出 (发射后隐藏) -----
                if (this.ballLaunched && this.hintText.visible) {
                    this.hintText.setVisible(false);
                }
            }
        }

        // ============================================================
        //  Phaser 游戏实例化 (修复 #7: 缩放配置)
        // ============================================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: CONFIG.width,
            height: CONFIG.height,
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false,
                },
            },
            scene: GameScene,
            input: {
                activePointers: 2,
            },
        };

        const game = new Phaser.Game(config);
    </script>

</body>
</html>

<body>

    <div class="game-wrapper" id="gameWrapper">
        <!-- 生命值 HUD -->
        <div class="hud-lives" id="hudLives">
            <span class="label">生命</span>
            <span id="livesDisplay">❤️❤️❤️</span>
        </div>

        <!-- 主画布 -->
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <!-- 虚拟按键 (手机) -->
        <div class="virtual-buttons" id="virtualButtons">
            <button class="btn-a" id="btnA">A<span class="sub-label">击打</span></button>
            <button class="btn-b" id="btnB">B<span class="sub-label">暂停</span></button>
        </div>

        <!-- 覆盖层：开始 / 结束 -->
        <div class="overlay" id="overlay">
            <h1 id="overlayTitle">🐭 打地鼠</h1>
            <div class="sub" id="overlaySub">点击地鼠得 10 分 · 小心炸弹！</div>
            <div class="score-final" id="overlayScore" style="display:none;"></div>
            <div class="best-score" id="overlayBest" style="display:none;"></div>
            <button class="btn-restart" id="overlayBtn">开始游戏</button>
            <div class="hint" id="overlayHint">PC 点击地鼠 · 手机直接触摸</div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  1. 配置参数 ———— 加快地鼠频率 + 缩短停留时间
            // ============================================================
            const CONFIG = {
                // 地鼠停留时间范围 (ms) —— 原版通常 1500~1800，现缩短
                MOLE_SHOW_MIN: 600, // 最短停留 0.6s
                MOLE_SHOW_MAX: 1100, // 最长停留 1.1s

                // 地鼠出现间隔范围 (ms) —— 原版通常 2000~3000，现加快
                SPAWN_INTERVAL_MIN: 550, // 最短间隔 0.55s
                SPAWN_INTERVAL_MAX: 1100, // 最长间隔 1.1s

                // 游戏时长 (秒)
                GAME_DURATION: 60,

                // 初始生命值
                INITIAL_LIVES: 3,

                // 击中地鼠得分
                HIT_MOLE_SCORE: 10,

                // 点击炸弹扣分
                HIT_BOMB_PENALTY: -5,

                // 炸弹出现概率 (0~1)
                BOMB_CHANCE: 0.18,

                // 漏掉地鼠是否扣生命 (true / false)
                PENALTY_MISS: true,

                // 每漏掉一只地鼠扣几命
                MISS_LIFE_COST: 1,

                // 游戏难度递增：每过多少秒减少一点停留时间
                DIFFICULTY_INTERVAL: 12, // 秒
                DIFFICULTY_SHOW_REDUCE: 80, // ms
                DIFFICULTY_SPAWN_REDUCE: 60, // ms

                // 网格
                GRID_COLS: 3,
                GRID_ROWS: 3,
            };

            // ============================================================
            //  2. DOM 引用
            // ============================================================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlayTitle');
            const overlaySub = document.getElementById('overlaySub');
            const overlayScore = document.getElementById('overlayScore');
            const overlayBest = document.getElementById('overlayBest');
            const overlayBtn = document.getElementById('overlayBtn');
            const overlayHint = document.getElementById('overlayHint');
            const livesDisplay = document.getElementById('livesDisplay');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');

            // ============================================================
            //  3. 游戏状态
            // ============================================================
            const state = {
                // 网格
                holes: [], // 每个洞: { x, y, w, h, moleVisible, bomb, showStartTime, showDuration }
                cols: CONFIG.GRID_COLS,
                rows: CONFIG.GRID_ROWS,

                // 游戏流程
                phase: 'idle', // 'idle' | 'playing' | 'over'
                score: 0,
                lives: CONFIG.INITIAL_LIVES,
                timeLeft: CONFIG.GAME_DURATION, // 秒
                bestScore: parseInt(localStorage.getItem('whackMoleBest')) || 0,

                // 计时
                lastSpawnTime: 0,
                gameStartTime: 0, // 毫秒
                elapsedGameTime: 0, // 秒

                // 动画
                hitEffects: [], // { x, y, time, type: 'mole'|'bomb' }
                lastFrameTime: 0,

                // 输入锁 (防止短时间内重复点击)
                inputLock: false,
                inputLockTime: 0,
            };

            // ============================================================
            //  4. 初始化网格
            // ============================================================
            function initHoles() {
                const cols = state.cols;
                const rows = state.rows;
                const totalW = canvas.width * 0.72;
                const totalH = canvas.height * 0.56;
                const startX = (canvas.width - totalW) / 2;
                const startY = (canvas.height - totalH) / 2 + 10;
                const gapX = totalW / cols;
                const gapY = totalH / rows;
                const holeW = gapX * 0.75;
                const holeH = gapY * 0.75;

                state.holes = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        state.holes.push({
                            x: startX + c * gapX + (gapX - holeW) / 2,
                            y: startY + r * gapY + (gapY - holeH) / 2,
                            w: holeW,
                            h: holeH,
                            moleVisible: false,
                            bomb: false,
                            showStartTime: 0,
                            showDuration: 0,
                            // 用于平滑动画
                            popProgress: 0, // 0~1
                            popDir: 0, // 0=静止, 1=升起, -1=降下
                        });
                    }
                }
            }

            // ============================================================
            //  5. 工具函数
            // ============================================================
            function rand(min, max) { return Math.random() * (max - min) + min; }

            function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function lerp(a, b, t) { return a + (b - a) * t; }

            function getDifficultyFactor() {
                // 基于已过时间 0~1
                const t = state.elapsedGameTime / CONFIG.GAME_DURATION;
                return clamp(t, 0, 1);
            }

            function getAdjustedShowDuration() {
                const base = rand(CONFIG.MOLE_SHOW_MIN, CONFIG.MOLE_SHOW_MAX);
                const factor = getDifficultyFactor();
                const reduce = factor * CONFIG.DIFFICULTY_SHOW_REDUCE;
                return Math.max(300, base - reduce);
            }

            function getAdjustedSpawnInterval() {
                const base = rand(CONFIG.SPAWN_INTERVAL_MIN, CONFIG.SPAWN_INTERVAL_MAX);
                const factor = getDifficultyFactor();
                const reduce = factor * CONFIG.DIFFICULTY_SPAWN_REDUCE;
                return Math.max(300, base - reduce);
            }

            // ============================================================
            //  6. 核心游戏逻辑
            // ============================================================

            // 开始一局
            function startGame() {
                state.phase = 'playing';
                state.score = 0;
                state.lives = CONFIG.INITIAL_LIVES;
                state.timeLeft = CONFIG.GAME_DURATION;
                state.gameStartTime = performance.now();
                state.elapsedGameTime = 0;
                state.lastSpawnTime = 0;
                state.hitEffects = [];
                state.inputLock = false;

                // 重置所有洞
                for (const hole of state.holes) {
                    hole.moleVisible = false;
                    hole.bomb = false;
                    hole.showStartTime = 0;
                    hole.showDuration = 0;
                    hole.popProgress = 0;
                    hole.popDir = 0;
                }

                // 隐藏覆盖层
                overlay.classList.add('hidden');
                overlayScore.style.display = 'none';
                overlayBest.style.display = 'none';

                updateHUD();
            }

            // 游戏结束
            function endGame() {
                state.phase = 'over';

                // 更新最高分
                if (state.score > state.bestScore) {
                    state.bestScore = state.score;
                    localStorage.setItem('whackMoleBest', state.bestScore);
                }

                // 显示覆盖层
                overlay.classList.remove('hidden');
                overlayTitle.textContent = '⏰ 游戏结束';
                overlaySub.textContent = '再来一局，打破纪录！';
                overlayScore.style.display = 'block';
                overlayScore.textContent = '得分：' + state.score;
                overlayBest.style.display = 'block';
                overlayBest.textContent = '🏆 最高纪录：' + state.bestScore;
                overlayBtn.textContent = '再来一局';
                overlayHint.textContent = '点击按钮重新开始';
            }

            // 生命归零结束
            function gameOverNoLives() {
                state.phase = 'over';

                if (state.score > state.bestScore) {
                    state.bestScore = state.score;
                    localStorage.setItem('whackMoleBest', state.bestScore);
                }

                overlay.classList.remove('hidden');
                overlayTitle.textContent = '💔 生命耗尽';
                overlaySub.textContent = '地鼠太狡猾了…';
                overlayScore.style.display = 'block';
                overlayScore.textContent = '得分：' + state.score;
                overlayBest.style.display = 'block';
                overlayBest.textContent = '🏆 最高纪录：' + state.bestScore;
                overlayBtn.textContent = '重新挑战';
                overlayHint.textContent = '点击按钮继续';
            }

            // 生成地鼠 / 炸弹
            function spawnMole() {
                if (state.phase !== 'playing') return;

                // 找当前没有显示的洞
                const available = state.holes.filter(h => !h.moleVisible);
                if (available.length === 0) return;

                const hole = available[randInt(0, available.length - 1)];

                // 是否炸弹
                const isBomb = Math.random() < CONFIG.BOMB_CHANCE;

                hole.moleVisible = true;
                hole.bomb = isBomb;
                hole.showStartTime = performance.now();
                hole.showDuration = getAdjustedShowDuration();
                hole.popProgress = 0;
                hole.popDir = 1; // 升起
            }

            // 处理点击洞
            function handleHit(holeIndex) {
                if (state.phase !== 'playing') return;
                if (holeIndex < 0 || holeIndex >= state.holes.length) return;

                const hole = state.holes[holeIndex];
                if (!hole.moleVisible) return;

                // 防止双击
                const now = performance.now();
                if (state.inputLock) {
                    if (now - state.inputLockTime < 120) return;
                }
                state.inputLock = true;
                state.inputLockTime = now;
                setTimeout(() => { state.inputLock = false; }, 100);

                if (hole.bomb) {
                    // 炸弹 💥
                    state.score += CONFIG.HIT_BOMB_PENALTY;
                    state.lives -= 1;
                    state.hitEffects.push({ x: hole.x + hole.w / 2, y: hole.y + hole.h / 2, time: now, type: 'bomb' });
                    // 震动反馈（轻）
                    if (navigator.vibrate) navigator.vibrate(30);
                } else {
                    // 地鼠 ✅
                    state.score += CONFIG.HIT_MOLE_SCORE;
                    state.hitEffects.push({ x: hole.x + hole.w / 2, y: hole.y + hole.h / 2, time: now, type: 'mole' });
                    // 震动反馈
                    if (navigator.vibrate) navigator.vibrate(15);
                }

                // 地鼠/炸弹消失
                hole.moleVisible = false;
                hole.bomb = false;
                hole.popDir = -1; // 降下

                updateHUD();

                // 检查生命
                if (state.lives <= 0) {
                    gameOverNoLives();
                }
            }

            // 漏掉地鼠 (超时缩回)
            function missMole(hole) {
                if (!hole.moleVisible) return;
                hole.moleVisible = false;
                hole.bomb = false;
                hole.popDir = -1; // 降下

                if (CONFIG.PENALTY_MISS) {
                    state.lives -= CONFIG.MISS_LIFE_COST;
                    updateHUD();
                    if (state.lives <= 0) {
                        gameOverNoLives();
                    }
                }
            }

            // 更新 HUD
            function updateHUD() {
                // 生命
                let hearts = '';
                for (let i = 0; i < state.lives; i++) hearts += '❤️';
                for (let i = state.lives; i < CONFIG.INITIAL_LIVES; i++) hearts += '🖤';
                livesDisplay.textContent = hearts || '💀';
            }

            // ============================================================
            //  7. 更新循环
            // ============================================================
            function update(timestamp) {
                if (state.phase === 'playing') {
                    const elapsedMs = timestamp - state.gameStartTime;
                    const elapsedSec = elapsedMs / 1000;
                    state.elapsedGameTime = elapsedSec;
                    state.timeLeft = Math.max(0, CONFIG.GAME_DURATION - elapsedSec);

                    // 检查时间结束
                    if (state.timeLeft <= 0) {
                        endGame();
                        return;
                    }

                    // 生成地鼠
                    const timeSinceLastSpawn = timestamp - state.lastSpawnTime;
                    const spawnInterval = getAdjustedSpawnInterval();
                    if (timeSinceLastSpawn > spawnInterval) {
                        spawnMole();
                        state.lastSpawnTime = timestamp;
                    }

                    // 检查地鼠超时 & 更新弹出动画
                    const now = timestamp;
                    for (const hole of state.holes) {
                        if (hole.moleVisible) {
                            const elapsed = now - hole.showStartTime;
                            if (elapsed > hole.showDuration) {
                                missMole(hole);
                            } else {
                                // 弹出动画进度
                                const progress = Math.min(elapsed / 150, 1);
                                hole.popProgress = progress;
                                hole.popDir = 1;
                            }
                        } else if (hole.popDir === -1) {
                            // 缩回动画
                            hole.popProgress -= 0.06;
                            if (hole.popProgress <= 0) {
                                hole.popProgress = 0;
                                hole.popDir = 0;
                            }
                        }
                    }
                }

                // 清理过期的 hit 特效 (持续 400ms)
                const now = timestamp;
                state.hitEffects = state.hitEffects.filter(e => (now - e.time) < 400);
            }

            // ============================================================
            //  8. 渲染
            // ============================================================
            function draw(timestamp) {
                const w = canvas.width;
                const h = canvas.height;

                // ---- 背景 ----
                // 草地渐变
                const grad = ctx.createRadialGradient(w / 2, h / 2, 50, w / 2, h / 2, w * 0.7);
                grad.addColorStop(0, '#5f9f4f');
                grad.addColorStop(0.7, '#3d7a2f');
                grad.addColorStop(1, '#2a5a1f');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // 装饰小草丛
                ctx.fillStyle = 'rgba(80,160,60,0.15)';
                for (let i = 0; i < 40; i++) {
                    const x = (i * 97 + 33) % w;
                    const y = (i * 131 + 77) % h;
                    ctx.beginPath();
                    ctx.ellipse(x, y, 12 + (i % 7), 6 + (i % 4), 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ---- 绘制洞 ----
                for (const hole of state.holes) {
                    const cx = hole.x + hole.w / 2;
                    const cy = hole.y + hole.h / 2;
                    const rx = hole.w / 2;
                    const ry = hole.h / 2;

                    // 洞阴影 (凹陷)
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 4;

                    // 洞底 (深色椭圆)
                    const gradHole = ctx.createRadialGradient(cx - 6, cy - 6, 4, cx, cy, rx + 4);
                    gradHole.addColorStop(0, '#3d2b1a');
                    gradHole.addColorStop(0.7, '#1f1208');
                    gradHole.addColorStop(1, '#0d0804');
                    ctx.fillStyle =

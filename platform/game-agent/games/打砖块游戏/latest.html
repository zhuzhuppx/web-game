<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打砖块 · 经典版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #080820;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            touch-action: none;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 120, 255, 0.12), 0 0 120px rgba(0, 60, 255, 0.04);
            touch-action: none;
        }
        .touch-tip {
            display: none;
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            pointer-events: none;
            z-index: 10;
        }
        @media (pointer: coarse) {
            .touch-tip {
                display: block;
            }
        }
        @media (max-height: 520px) {
            .touch-tip {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="touch-tip">← 滑动屏幕移动 →</div>

    <script>
        // ================================================================
        //  经典打砖块 · Phaser 3 版 (完整修复)
        //  - 响应式适配 (Scale.FIT + CENTER_BOTH)
        //  - 键盘: 方向键 / WASD · J=发射 · K=暂停
        //  - 手机: 屏幕虚拟按键 (← → A B)
        //  - 音效: Web Audio API 生成 (发射/碰撞/得分/掉落/过关/结束)
        //  - 状态钩子: window.__gameState
        //  - 中文界面 · 3条命 · 无限关卡 · 每100分奖励生命
        // ================================================================

        (function() {
            'use strict';

            // ============================================================
            //  音效系统 (Web Audio API)
            // ============================================================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API 不可用:', e);
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(function(e) {
                        console.warn('AudioContext resume 失败:', e);
                    });
                }
                return audioCtx;
            }

            // 播放简单波形音
            function playBeep(freq, duration, type, vol) {
                var ctx = initAudio();
                if (!ctx) return;
                try {
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    osc.type = type || 'square';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    var v = (vol !== undefined) ? vol : 0.20;
                    gain.gain.setValueAtTime(v, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.warn('playBeep 失败:', e);
                }
            }

            // 噪声音效 (用于碰撞)
            function playNoise(duration, vol) {
                var ctx = initAudio();
                if (!ctx) return;
                try {
                    var bufSize = Math.floor(ctx.sampleRate * duration);
                    if (bufSize < 10) bufSize = 10;
                    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    var data = buf.getChannelData(0);
                    for (var i = 0; i < bufSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3));
                    }
                    var src = ctx.createBufferSource();
                    src.buffer = buf;
                    var gain = ctx.createGain();
                    var v = (vol !== undefined) ? vol : 0.12;
                    gain.gain.setValueAtTime(v, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    src.connect(gain);
                    gain.connect(ctx.destination);
                    src.start();
                    src.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.warn('playNoise 失败:', e);
                }
            }

            // 统一音效接口
            function playSfx(name) {
                initAudio();
                switch (name) {
                    case 'launch':
                        // 上升音 — 发射球
                        playBeep(380, 0.10, 'sine', 0.18);
                        setTimeout(function() { playBeep(880, 0.06, 'sine', 0.12); }, 50);
                        break;
                    case 'hit':
                        // 短促噪声 — 球碰砖块
                        playNoise(0.04, 0.12);
                        break;
                    case 'score':
                        // 上升音阶 — 消除砖块
                        playBeep(660, 0.06, 'sine', 0.15);
                        setTimeout(function() { playBeep(880, 0.08, 'sine', 0.12); }, 60);
                        break;
                    case 'lose':
                        // 下降音 — 球掉落
                        playBeep(400, 0.15, 'sawtooth', 0.12);
                        setTimeout(function() { playBeep(200, 0.20, 'sawtooth', 0.10); }, 120);
                        break;
                    case 'levelup':
                        // 欢快上升 — 过关
                        playBeep(523, 0.08, 'sine', 0.16);
                        setTimeout(function() { playBeep(659, 0.08, 'sine', 0.16); }, 80);
                        setTimeout(function() { playBeep(784, 0.12, 'sine', 0.18); }, 160);
                        break;
                    case 'gameover':
                        // 下降序列 — 游戏结束
                        playBeep(523, 0.15, 'sawtooth', 0.14);
                        setTimeout(function() { playBeep(392, 0.15, 'sawtooth', 0.14); }, 150);
                        setTimeout(function() { playBeep(262, 0.25, 'sawtooth', 0.12); }, 300);
                        break;
                    case 'extraLife':
                        // 特别上升 — 奖励生命
                        playBeep(440, 0.06, 'sine', 0.16);
                        setTimeout(function() { playBeep(554, 0.06, 'sine', 0.16); }, 70);
                        setTimeout(function() { playBeep(659, 0.06, 'sine', 0.16); }, 140);
                        setTimeout(function() { playBeep(880, 0.10, 'sine', 0.18); }, 210);
                        break;
                    default:
                        break;
                }
            }

            // 第一次用户交互时初始化音频
            function ensureAudio() {
                initAudio();
            }

            // ============================================================
            //  状态钩子
            // ============================================================
            window.__gameState = {
                score: 0,
                lives: 3,
                level: 1,
                isGameOver: false,
                isPaused: false
            };

            function updateGameState(partial) {
                if (partial && typeof partial === 'object') {
                    for (var key in partial) {
                        if (partial.hasOwnProperty(key)) {
                            window.__gameState[key] = partial[key];
                        }
                    }
                }
            }

            // ============================================================
            //  游戏主场景
            // ============================================================
            var GameScene = new Phaser.Class({

                Extends: Phaser.Scene,

                initialize: function GameScene() {
                    Phaser.Scene.call(this, { key: 'GameScene' });
                },

                create: function() {
                    var self = this;

                    // ---------- 尺寸常量 ----------
                    this.W = 800;
                    this.H = 600;
                    this.paddleW = 120;
                    this.paddleH = 16;
                    this.ballRadius = 8;
                    this.brickW = 70;
                    this.brickH = 25;
                    this.brickGap = 6;
                    this.brickCols = 8;
                    this.brickRows = 5;
                    this.ballSpeed = 360;

                    // ---------- 游戏状态 ----------
                    this.score = 0;
                    this.lives = 3;
                    this.level = 1;
                    this.isGameOver = false;
                    this.isPaused = false;
                    this.ballLaunched = false;
                    this.extraLifeThreshold = 100;

                    // ---------- 背景 ----------
                    this.cameras.main.setBackgroundColor('#0a0a2e');

                    // ---------- 物理世界 ----------
                    this.physics.world.setBounds(0, 0, this.W, this.H);

                    // ---------- 挡板 ----------
                    this.paddle = this.physics.add.sprite(this.W / 2, this.H - 30, '__DEFAULT');
                    this.paddle.setDisplaySize(this.paddleW, this.paddleH);
                    this.paddle.setImmovable(true);
                    this.paddle.body.allowGravity = false;
                    this.paddle.setCollideWorldBounds(true);
                    // 绘制挡板
                    this.paddle.setTexture('__DEFAULT');
                    this.paddle.setTint(0x4488ff);
                    // 用图形覆盖
                    var paddleGfx = this.add.graphics();
                    paddleGfx.fillStyle(0x4488ff, 1);
                    paddleGfx.fillRoundedRect(-this.paddleW / 2, -this.paddleH / 2, this.paddleW, this.paddleH, 6);
                    paddleGfx.fillStyle(0x66aaff, 0.5);
                    paddleGfx.fillRoundedRect(-this.paddleW / 2 + 4, -this.paddleH / 2 + 3, this.paddleW - 8, this.paddleH /
                        2, 4);
                    paddleGfx.generateTexture('paddleTex', this.paddleW, this.paddleH);
                    paddleGfx.destroy();
                    this.paddle.setTexture('paddleTex');
                    this.paddle.setDisplaySize(this.paddleW, this.paddleH);
                    this.paddle.refreshBody();

                    // ---------- 小球 ----------
                    this.ball = this.physics.add.sprite(this.W / 2, this.H - 56, '__DEFAULT');
                    this.ball.setDisplaySize(this.ballRadius * 2, this.ballRadius * 2);
                    this.ball.setCircle(this.ballRadius);
                    this.ball.setBounce(1);
                    this.ball.setCollideWorldBounds(true);
                    this.ball.body.allowGravity = false;
                    this.ball.body.setMaxSpeed(this.ballSpeed * 1.5);
                    // 球图形
                    var ballGfx = this.add.graphics();
                    ballGfx.fillStyle(0xffffff, 1);
                    ballGfx.fillCircle(this.ballRadius, this.ballRadius, this.ballRadius);
                    ballGfx.fillStyle(0xaaddff, 0.4);
                    ballGfx.fillCircle(this.ballRadius - 3, this.ballRadius - 3, this.ballRadius * 0.5);
                    ballGfx.generateTexture('ballTex', this.ballRadius * 2, this.ballRadius * 2);
                    ballGfx.destroy();
                    this.ball.setTexture('ballTex');
                    this.ball.setDisplaySize(this.ballRadius * 2, this.ballRadius * 2);
                    this.ball.refreshBody();

                    // 球粘在挡板上
                    this.ballOnPaddle = true;

                    // 球与挡板碰撞
                    this.physics.add.collider(this.ball, this.paddle, this.ballHitPaddle, null, this);

                    // 球与世界边界碰撞 — 底部掉落
                    this.physics.world.on('worldbounds', function(body, up, down, left, right) {
                        if (down && body === self.ball.body) {
                            self.ballFell();
                        }
                    });
                    this.ball.body.onWorldBounds = true;

                    // ---------- 砖块组 ----------
                    this.bricks = this.physics.add.staticGroup();
                    this.createBricks();

                    // 球与砖块碰撞
                    this.physics.add.collider(this.ball, this.bricks, this.ballHitBrick, null, this);

                    // ---------- UI 文本 ----------
                    var uiStyle = {
                        fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                        fontSize: '18px',
                        color: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 2
                    };
                    this.scoreText = this.add.text(16, 14, '分数: 0', uiStyle).setDepth(10);
                    this.livesText = this.add.text(this.W - 16, 14, '生命: 3', uiStyle).setOrigin(1, 0).setDepth(10);
                    this.levelText = this.add.text(this.W / 2, 14, '关卡 1', uiStyle).setOrigin(0.5, 0).setDepth(10);

                    var tipStyle = {
                        fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                        fontSize: '14px',
                        color: '#aaccff',
                        stroke: '#000000',
                        strokeThickness: 1
                    };
                    this.tipText = this.add.text(this.W / 2, this.H - 8, 'J / 点击 → 发射  |  K → 暂停', tipStyle)
                        .setOrigin(0.5, 1).setDepth(10);

                    // ---------- 暂停/结束 覆盖层 ----------
                    this.overlay = this.add.graphics().setDepth(20);
                    this.overlayText = this.add.text(this.W / 2, this.H / 2, '', {
                        fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                        fontSize: '36px',
                        color: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 4,
                        align: 'center'
                    }).setOrigin(0.5, 0.5).setDepth(21).setVisible(false);

                    this.overlaySub = this.add.text(this.W / 2, this.H / 2 + 50, '', {
                        fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                        fontSize: '18px',
                        color: '#aaccff',
                        stroke: '#000000',
                        strokeThickness: 2,
                        align: 'center'
                    }).setOrigin(0.5, 0.5).setDepth(22).setVisible(false);

                    // ---------- 虚拟按键 (手机) ----------
                    this.createVirtualButtons();

                    // ---------- 键盘控制 ----------
                    this.cursors = this.input.keyboard.createCursorKeys();
                    this.wasd = this.input.keyboard.addKeys({
                        up: Phaser.Input.Keyboard.KeyCodes.W,
                        down: Phaser.Input.Keyboard.KeyCodes.S,
                        left: Phaser.Input.Keyboard.KeyCodes.A,
                        right: Phaser.Input.Keyboard.KeyCodes.D
                    });
                    this.jKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                    this.kKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);
                    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                    this.escKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

                    // 键盘事件
                    this.jKey.on('down', function() {
                        if (self.isGameOver) {
                            self.restartGame();
                            return;
                        }
                        self.launchBall();
                    });
                    this.spaceKey.on('down', function() {
                        if (self.isGameOver) {
                            self.restartGame();
                            return;
                        }
                        self.launchBall();
                    });
                    this.kKey.on('down', function() {
                        self.togglePause();
                    });
                    this.escKey.on('down', function() {
                        if (self.isGameOver) {
                            self.restartGame();
                        } else {
                            self.togglePause();
                        }
                    });

                    // 点击/触摸 发射
                    this.input.on('pointerdown', function(pointer) {
                        // 如果点击在虚拟按键区域，不触发发射
                        if (self.isOverButton(pointer.x, pointer.y)) return;
                        if (self.isGameOver) {
                            self.restartGame();
                            return;
                        }
                        self.launchBall();
                    });

                    // ---------- 更新状态钩子 ----------
                    updateGameState({
                        score: 0,
                        lives: 3,
                        level: 1,
                        isGameOver: false,
                        isPaused: false
                    });

                    // ---------- 音频初始化 (用户手势) ----------
                    this.input.once('pointerdown', function() {
                        ensureAudio();
                    });
                    this.input.keyboard.once('keydown', function() {
                        ensureAudio();
                    });

                    // ---------- 初始显示提示 ----------
                    this.showReady();
                },

                // ---------- 创建砖块 ----------
                createBricks: function() {
                    var colors = [0xff4444, 0xff8844, 0xffcc44, 0x44cc44, 0x4488ff, 0x8844ff];
                    var self = this;
                    var totalW = this.brickCols * (this.brickW + this.brickGap) - this.brickGap;
                    var startX = (this.W - totalW) / 2 + this.brickW / 2;
                    var startY = 60;

                    for (var row = 0; row < this.brickRows; row++) {
                        var colorIdx = row % colors.length;
                        var rowColor = colors[colorIdx];
                        // 每关稍微调整颜色
                        var offset = (this.level - 1) * 10;
                        var r = ((rowColor >> 16) & 0xff) + offset;
                        var g = ((rowColor >> 8) & 0xff) + offset * 0.5;
                        var b = (rowColor & 0xff) + offset * 0.3;
                        r = Math.min(255, Math.max(40, r));
                        g = Math.min(255, Math.max(40, g));
                        b = Math.min(255, Math.max(40, b));
                        var finalColor = (Math.floor(r) << 16) | (Math.floor(g) << 8) | Math.floor(b);

                        for (var col = 0; col < this.brickCols; col++) {
                            var bx = startX + col * (this.brickW + this.brickGap);
                            var by = startY + row * (this.brickH + this.brickGap);

                            // 用图形生成纹理
                            var gfx = this.add.graphics();
                            gfx.fillStyle(finalColor, 1);
                            gfx.fillRoundedRect(-this.brickW / 2, -this.brickH / 2, this.brickW, this.brickH, 4);
                            gfx.fillStyle(0xffffff, 0.15);
                            gfx.fillRoundedRect(-this.brickW / 2 + 3, -this.brickH / 2 + 3, this.brickW - 6, this
                                .brickH * 0.4, 3);
                            var texKey = 'brick_' + row + '_' + col + '_' + this.level;
                            gfx.generateTexture(texKey, this.brickW, this.brickH);
                            gfx.destroy();

                            var brick = this.bricks.create(bx, by, texKey);
                            brick.setDisplaySize(this.brickW, this.brickH);
                            brick.refreshBody();
                            brick.setData('hp', 1);
                            // 每关给砖块增加一点厚度感
                        }
                    }
                },

                // ---------- 显示准备就绪 ----------
                showReady: function() {
                    this.ballOnPaddle = true;
                    this.ballLaunched = false;
                    this.ball.setPosition(this.paddle.x, this.paddle.y - this.paddleH / 2 - this.ballRadius - 2);
                    this.ball.setVelocity(0, 0);
                    this.ball.setVisible(true);

                    this.overlay.clear();
                    this.overlay.fillStyle(0x000000, 0.3);
                    this.overlay.fillRect(0, 0, this.W, this.H);

                    this.overlayText.setText('关卡 ' + this.level);
                    this.overlayText.setVisible(true);
                    this.overlaySub.setText('点击 / 按 J 发射');
                    this.overlaySub.setVisible(true);
                },

                // ---------- 发射球 ----------
                launchBall: function() {
                    if (this.isGameOver || this.isPaused) return;
                    if (!this.ballOnPaddle) return;
                    this.ballOnPaddle = false;
                    this.ballLaunched = true;

                    // 随机角度发射，但偏向向上
                    var angle = Phaser.Math.Between(-60, 60);
                    var rad = Phaser.Math.DegToRad(angle - 90);
                    var vx = Math.cos(rad) * this.ballSpeed;
                    var vy = Math.sin(rad) * this.ballSpeed;
                    if (vy > -100) vy = -100;
                    this.ball.setVelocity(vx, vy);

                    playSfx('launch');

                    this.overlay.clear();
                    this.overlayText.setVisible(false);
                    this.overlaySub.setVisible(false);
                },

                // ---------- 球碰到挡板 ----------
                ballHitPaddle: function(ball, paddle) {
                    // 根据碰撞位置改变反弹角度
                    var diff = ball.x - paddle.x;
                    var normalized = diff / (this.paddleW / 2);
                    normalized = Phaser.Math.Clamp(normalized, -1, 1);
                    var angle = normalized * 70;
                    var rad = Phaser.Math.DegToRad(angle - 90);
                    var speed = Math.sqrt(ball.body.velocity.x * ball.body.velocity.x + ball.body.velocity.y * ball.body
                        .velocity.y);
                    if (speed < this.ballSpeed) speed = this.ballSpeed;
                    speed = Math.min(speed, this.ballSpeed * 1.3);
                    var vx = Math.cos(rad) * speed;
                    var vy = Math.sin(rad) * speed;
                    ball.setVelocity(vx, vy);

                    playSfx('hit');
                },

                // ---------- 球碰到砖块 ----------
                ballHitBrick: function(ball, brick) {
                    brick.destroy();
                    this.score += 10;
                    this.updateUI();
                    playSfx('score');

                    // 每100分奖励生命
                    if (this.score > 0 && this.score % this.extraLifeThreshold === 0) {
                        this.lives += 1;
                        this.updateUI();
                        playSfx('extraLife');
                        // 显示奖励提示
                        var bonusText = this.add.text(ball.x, ball.y, '+1 命!', {
                            fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                            fontSize: '20px',
                            color: '#ffdd44',
                            stroke: '#000000',
                            strokeThickness: 3
                        }).setOrigin(0.5, 0.5).setDepth(15);
                        this.tweens.add({
                            targets: bonusText,
                            y: bonusText.y - 60,
                            alpha: 0,
                            duration: 800,
                            ease: 'Power2',
                            onComplete: function() { bonusText.destroy(); }
                        });
                        this.extraLifeThreshold += 100;
                    }

                    // 检查是否所有砖块都被消除
                    if (this.bricks.countActive() === 0) {
                        this.levelComplete();
                    }
                },

                // ---------- 球掉落 ----------
                ballFell: function() {
                    if (this.isGameOver) return;
                    this.lives -= 1;
                    this.updateUI();
                    playSfx('lose');

                    if (this.lives <= 0) {
                        this.gameOver();
                        return;
                    }

                    // 重置球
                    this.ballOnPaddle = true;
                    this.ballLaunched = false;
                    this.ball.setVelocity(0, 0);
                    this.ball.setPosition(this.paddle.x, this.paddle.y - this.paddleH / 2 - this.ballRadius - 2);
                    this.ball.setVisible(true);

                    this.overlay.clear();
                    this.overlay.fillStyle(0x000000, 0.25);
                    this.overlay.fillRect(0, 0, this.W, this.H);
                    this.overlayText.setText('剩余 ' + this.lives + ' 条命');
                    this.overlayText.setVisible(true);
                    this.overlaySub.setText('点击 / 按 J 继续');
                    this.overlaySub.setVisible(true);

                    // 3秒后自动继续
                    var self = this;
                    if (this.continueTimer) this.continueTimer.remove();
                    this.continueTimer = this.time.delayedCall(2000, function() {
                        if (!self.isGameOver && self.ballOnPaddle) {
                            self.overlay.clear();
                            self.overlayText.setVisible(false);
                            self.overlaySub.setVisible(false);
                            self.launchBall();
                        }
                    });
                },

                // ---------- 过关 ----------
                levelComplete: function() {
                    this.level += 1;
                    this.ballLaunched = false;
                    playSfx('levelup');
                    updateGameState({ level: this.level });
                    this.updateUI();

                    // 显示过关信息
                    this.overlay.clear();
                    this.overlay.fillStyle(0x000000, 0.35);
                    this.overlay.fillRect(0, 0, this.W, this.H);
                    this.overlayText.setText('🎉 过关!');
                    this.overlayText.setVisible(true);
                    this.overlaySub.setText('进入第 ' + this.level + ' 关');
                    this.overlaySub.setVisible(true);

                    var self = this;
                    this.time.delayedCall(1500, function() {
                        // 重建砖块
                        self.bricks.clear(true, true);
                        self.createBricks();

                        // 重置球
                        self.ballOnPaddle = true;
                        self.ball.setVelocity(0, 0);
                        self.ball.setPosition(self.paddle.x, self.paddle.y - self.paddleH / 2 - self.ballRadius - 2);
                        self.ball.setVisible(true);

                        self.overlay.clear();
                        self.overlay.fillStyle(0x000000, 0.2);
                        self.overlay.fillRect(0, 0, self.W, self.H);
                        self.overlayText.setText('第 ' + self.level + ' 关');
                        self.overlayText.setVisible(true);
                        self.overlaySub.setText('点击 / 按 J 发射');
                        self.overlaySub.setVisible(true);

                        // 自动发射
                        self.time.delayedCall(1200, function() {
                            if (self.ballOnPaddle && !self.isGameOver) {
                                self.overlay.clear();
                                self.overlayText.setVisible(false);
                                self.overlaySub.setVisible(false);
                                self.launchBall();
                            }
                        });
                    });
                },

                // ---------- 游戏结束 ----------
                gameOver: function() {
                    this.isGameOver = true;
                    this.ballLaunched = false;
                    this.ballOnPaddle = false;
                    this.ball.setVelocity(0, 0);
                    this.ball.setVisible(false);
                    playSfx('gameover');
                    updateGameState({ isGameOver: true });

                    this.overlay.clear();
                    this.overlay.fillStyle(0x000000, 0.6);
                    this.overlay.fillRect(0, 0, this.W, this.H);
                    this.overlayText.setText('💔 游戏结束');
                    this.overlayText.setVisible(true);
                    this.overlaySub.setText('最终得分: ' + this.score + '  |  点击 / 按 J 重新开始');
                    this.overlaySub.setVisible(true);
                },

                // ---------- 重新开始 ----------
                restartGame: function() {
                    // 重置状态
                    this.score = 0;
                    this.lives = 3;
                    this.level = 1;
                    this.isGameOver = false;
                    this.isPaused = false;
                    this.ballLaunched = false;
                    this.ballOnPaddle = true;
                    this.extraLifeThreshold = 100;

                    // 清除砖块
                    this.bricks.clear(true, true);
                    this.createBricks();

                    // 重置球
                    this.ball.setVelocity(0, 0);
                    this.ball.setPosition(this.paddle.x, this.paddle.y - this.paddleH / 2 - this.ballRadius - 2);
                    this.ball.setVisible(true);

                    // 重置挡板
                    this.paddle.setPosition(this.W / 2, this.H - 30);

                    this.overlay.clear();
                    this.overlayText.setVisible(false);
                    this.overlaySub.setVisible(false);

                    this.updateUI();
                    updateGameState({
                        score: 0,
                        lives: 3,
                        level: 1,
                        isGameOver: false,
                        isPaused: false
                    });

                    this.showReady();

                    // 自动发射
                    var self = this;
                    this.time.delayedCall(1500, function() {
                        if (self.ballOnPaddle && !self.isGameOver) {
                            self.overlay.clear();
                            self.overlayText.setVisible(false);
                            self.overlaySub.setVisible(false);
                            self.launchBall();
                        }
                    });
                },

                // ---------- 暂停切换 ----------
                togglePause: function() {
                    if (this.isGameOver) return;
                    this.isPaused = !this.isPaused;
                    updateGameState({ isPaused: this.isPaused });

                    if (this.isPaused) {
                        this.physics.pause();
                        this.overlay.clear();
                        this.overlay.fillStyle(0x000000, 0.4);
                        this.overlay.fillRect(0, 0, this.W, this.H);
                        this.overlayText.setText('⏸ 暂停中');
                        this.overlayText.setVisible(true);
                        this.overlaySub.setText('按 K / ESC 继续');
                        this.overlaySub.setVisible(true);
                    } else {
                        this.physics.resume();
                        this.overlay.clear();
                        this.overlayText.setVisible(false);
                        this.overlaySub.setVisible(false);
                    }
                },

                // ---------- 更新UI ----------
                updateUI: function() {
                    this.scoreText.setText('分数: ' + this.score);
                    this.livesText.setText('生命: ' + this.lives);
                    this.levelText.setText('关卡 ' + this.level);
                    updateGameState({
                        score: this.score,
                        lives: this.lives,
                        level: this.level
                    });
                },

                // ---------- 检测点击是否在虚拟按键上 ----------
                isOverButton: function(x, y) {
                    if (!this.btnLeft || !this.btnRight) return false;
                    var bx = this.W - 80;
                    var by = this.H - 80;
                    var r = 36;
                    // 检查A/B按钮区域
                    if (Phaser.Math.Distance.Between(x, y, bx, by) < r) return true;
                    if (Phaser.Math.Distance.Between(x, y, bx - 70, by) < r) return true;
                    // 检查左右按钮区域
                    if (x < 120 && y > this.H - 120) return true;
                    if (x < 220 && y > this.H - 120 && x > 100) return true;
                    return false;
                },

                // ---------- 创建虚拟按键 ----------
                createVirtualButtons: function() {
                    var self = this;
                    var btnAlpha = 0.3;
                    var btnSize = 48;
                    var gap = 16;

                    // 左侧：← 按钮
                    var lx = 60;
                    var ly = this.H - 70;

                    this.btnLeft = this.add.graphics().setDepth(30);
                    this.btnLeft.fillStyle(0xffffff, btnAlpha);
                    this.btnLeft.fillRoundedRect(lx - btnSize / 2, ly - btnSize / 2, btnSize, btnSize, 10);
                    this.btnLeft.lineStyle(2, 0xffffff, 0.5);
                    this.btnLeft.strokeRoundedRect(lx - btnSize / 2, ly - btnSize / 2, btnSize, btnSize, 10);
                    // 箭头
                    var arrowL = this.add.text(lx, ly, '◀', {
                        fontFamily: 'Arial',
                        fontSize: '26px',
                        color: 'rgba(255,255,255,0.7)'
                    }).setOrigin(0.5, 0.5).setDepth(31);

                    // 右侧：→ 按钮
                    var rx = lx + btnSize + gap;
                    this.btnRight = this.add.graphics().setDepth(30);
                    this.btnRight.fillStyle(0xffffff, btnAlpha);
                    this.btnRight.fillRoundedRect(rx - btnSize / 2, ly - btnSize / 2, btnSize, btnSize, 10);
                    this.btnRight.lineStyle(2, 0xffffff, 0.5);
                    this.btnRight.strokeRoundedRect(rx - btnSize / 2, ly - btnSize / 2, btnSize, btnSize, 10);
                    var arrowR = this.add.text(rx, ly, '▶', {
                        fontFamily: 'Arial',
                        fontSize: '26px',
                        color: 'rgba(255,255,255,0.7)'
                    }).setOrigin(0.5, 0.5).setDepth(31);

                    // 右下：A 按钮 (发射)
                    var ax = this.W - 80;
                    var ay = this.H - 80;
                    this.btnA = this.add.graphics().setDepth(30);
                    this.btnA.fillStyle(0x44ff88, btnAlpha + 0.1);
                    this.btnA.fillCircle(ax, ay, 36);
                    this.btnA.lineStyle(2, 0x44ff88, 0.6);
                    this.btnA.strokeCircle(ax, ay, 36);
                    var labelA = this.add.text(ax, ay, 'A', {
                        fontFamily: 'Arial',
                        fontSize: '22px',
                        color: '#ffffff',
                        fontStyle: 'bold'
                    }).setOrigin(0.5, 0.5).setDepth(31);
                    var hintA = this.add.text(ax, ay + 42, 'J', {
                        fontFamily: 'Arial',
                        fontSize: '12px',
                        color: 'rgba(255,255,255,0.35)'
                    }).setOrigin(0.5, 0.5).setDepth(31);

                    // 右下：B 按钮 (暂停) 在A左侧
                    var bx2 = ax - 70;
                    var by2 = ay;
                    this.btnB = this.add.graphics().setDepth(30);
                    this.btnB.fillStyle(0xff8844, btnAlpha + 0.1);
                    this.btnB.fillCircle(bx2, by2, 36);
                    this.btnB.lineStyle(2, 0xff8844, 0.6);
                    this.btnB.strokeCircle(bx2, by2, 36);
                    var labelB = this.add.text(bx2, by2, 'B', {
                        fontFamily: 'Arial',
                        fontSize: '22px',
                        color: '#ffffff',
                        fontStyle: 'bold'
                    }).setOrigin(0.5, 0.5).setDepth(31);
                    var hintB = this.add.text(bx2, by2 + 42, 'K', {
                        fontFamily: 'Arial',
                        fontSize: '12px',
                        color: 'rgba(255,255,255,0.35)'
                    }).setOrigin(0.5, 0.5).setDepth(31);

                    // 按键交互 (拖拽挡板)
                    var leftPressed = false;
                    var rightPressed = false;

                    // 左按钮交互
                    this.setupButtonInteraction(this.btnLeft, lx, ly, btnSize, btnSize,
                        function() { leftPressed = true; },
                        function() { leftPressed = false; }
                    );

                    // 右按钮交互
                    this.setupButtonInteraction(this.btnRight, rx, ly, btnSize, btnSize,
                        function() { rightPressed = true; },
                        function() { rightPressed = false; }
                    );

                    // A 按钮 (发射)
                    this.setupCircleButtonInteraction(this.btnA, ax, ay, 36,
                        function() {
                            if (self.isGameOver) { self.restartGame(); return; }
                            self.launchBall();
                        }
                    );

                    // B 按钮 (暂停)
                    this.setupCircleButtonInteraction(this.btnB, bx2, by2, 36,
                        function() {
                            self.togglePause();
                        }
                    );

                    // 触摸滑动控制挡板
                    this.input.on('pointermove', function(pointer) {
                        if (self.isGameOver || self.isPaused) return;
                        if (!pointer.isDown) return;
                        // 如果触摸在虚拟按键区域，不移动挡板
                        if (self.isOverButton(pointer.x, pointer.y)) return;
                        var targetX = Phaser.Math.Clamp(pointer.x, self.paddleW / 2, self.W - self.paddleW / 2);
                        self.paddle.x = targetX;
                        if (self.ballOnPaddle) {
                            self.ball.x = self.paddle.x;
                        }
                    });

                    // 更新循环中处理按键状态
                    this.leftPressed = function() { return leftPressed; };
                    this.rightPressed = function() { return rightPressed; };

                    // 存储按钮引用用于 isOverButton
                    this.btnLeftRef = { x: lx, y: ly, w: btnSize, h: btnSize };
                    this.btnRightRef = { x: rx, y: ly, w: btnSize, h: btnSize };
                    this.btnARef = { x: ax, y: ay, r: 36 };
                    this.btnBRef = { x: bx2, y: by2, r: 36 };
                },

                // ---------- 辅助：矩形按钮交互 ----------
                setupButtonInteraction: function(gfx, cx, cy, w, h, onDown, onUp) {
                    var hitZone = this.add.zone(cx, cy, w, h).setInteractive().setDepth(32);
                    hitZone.on('pointerdown', function() {
                        onDown();
                    });
                    hitZone.on('pointerup', function() {
                        onUp();
                    });
                    hitZone.on('pointerout', function() {
                        onUp();
                    });
                    // 也支持全局释放
                    this.input.on('pointerup', function(pointer) {
                        // 被动释放由具体事件处理
                    });
                    return hitZone;
                },

                // ---------- 辅助：圆形按钮交互 ----------
                setupCircleButtonInteraction: function(gfx, cx, cy, r, onClick) {
                    var hitZone = this.add.zone(cx, cy, r * 2, r * 2).setInteractive().setDepth(32);
                    hitZone.on('pointerdown', function() {
                        onClick();
                    });
                    return hitZone;
                },

                // ---------- 更新循环 ----------
                update: function() {
                    if (this.isGameOver || this.isPaused) return;

                    // 键盘控制挡板
                    var moveSpeed = 400;
                    var dx = 0;
                    if (this.cursors.left.isDown || this.wasd.left.isDown || this.leftPressed()) {
                        dx = -moveSpeed;
                    } else if (this.cursors.right.isDown || this.wasd.right.isDown || this.rightPressed()) {
                        dx = moveSpeed;
                    }

                    if (dx !== 0) {
                        var dt = this.game.loop.delta / 1000;
                        var newX = this.paddle.x + dx * dt;
                        newX = Phaser.Math.Clamp(newX, this.paddleW / 2, this.W - this.paddleW / 2);
                        this.paddle.x = newX;
                        if (this.ballOnPaddle) {
                            this.ball.x = this.paddle.x;
                        }
                    }

                    // 如果球在挡板上但不在暂停/结束状态，保持位置
                    if (this.ballOnPaddle && !this.isGameOver) {
                        this.ball.x = this.paddle.x;
                        this.ball.y = this.paddle.y - this.paddleH / 2 - this.ballRadius - 2;
                    }

                    // 确保球的速度不会太慢
                    if (this.ballLaunched && !this.ballOnPaddle) {
                        var vx = this.ball.body.velocity.x;
                        var vy = this.ball.body.velocity.y;
                        var speed = Math.sqrt(vx * vx + vy * vy);
                        if (speed < 60 && speed > 0) {
                            // 速度太慢时加速
                            var ratio = this.ballSpeed / speed;
                            this.ball.setVelocity(vx * ratio * 0.5, vy * ratio * 0.5);
                        }
                        // 防止水平速度太小导致太垂直
                        if (Math.abs(vx) < 30 && speed > 0) {
                            var sign = vx >= 0 ? 1 : -1;
                            this.ball.setVelocity(sign * 50, vy);
                        }
                    }

                    // 更新UI提示
                    if (this.ballOnPaddle && !this.isGameOver) {
                        this.tipText.setText('J / 点击 → 发射  |  K → 暂停');
                    } else if (this.isGameOver) {
                        this.tipText.setText('游戏结束 · 点击 / J 重新开始');
                    } else {
                        this.tipText.setText('方向键/WASD 移动  |  K → 暂停');
                    }
                }
            });

            // ============================================================
            //  游戏配置
            // ============================================================
            var config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                width: 800,
                height: 600,
                backgroundColor: '#0a0a2e',
                scale: {
                    mode: Phaser.Scale.FIT,
                    autoCenter: Phaser.Scale.CENTER_BOTH
                },
                physics: {
                    default: 'arcade',
                    arcade: {
                        gravity: { y: 0 },
                        debug: false
                    }
                },
                scene: GameScene,
                input: {
                    activePointers: 3
                }
            };

            // ============================================================
            //  启动游戏
            // ============================================================
            var game = new Phaser.Game(config);

            // 暴露游戏实例以便调试
            window.__game = game;

            // 确保在页面卸载时释放音频
            window.addEventListener('beforeunload', function() {
                if (audioCtx && audioCtx.close) {
                    audioCtx.close().catch(function() {});
                }
            });

        })();
    </script>
</body>
</html>

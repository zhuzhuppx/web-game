<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陨石防御者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            max-width: 480px;
            max-height: 800px;
        }
        canvas {
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <script>
        // =====================================================================
        //  全局状态钩子 (game_state_hook)
        // =====================================================================
        window.__gameState = {
            running: false,
            score: 0,
            lives: 3,
            gameOver: false,
            canRestart: true,
            objects: {
                player: true,
                enemies: 0,
                projectiles: 0
            }
        };

        // =====================================================================
        //  音效引擎（Web Audio API）
        // =====================================================================
        let audioCtx = null;
        let audioInitialized = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audioInitialized = true;
        }

        function playBeep(freq, duration, type, volume) {
            type = type || 'square';
            volume = volume || 0.25;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { /* 静默失败 */ }
        }

        function playShoot() { playBeep(1200, 0.06, 'square', 0.12); }

        function playHit() {
            playBeep(300, 0.15, 'sawtooth', 0.20);
            playBeep(200, 0.10, 'square', 0.10);
        }

        function playScore() {
            playBeep(880, 0.10, 'square', 0.15);
            setTimeout(() => playBeep(1100, 0.10, 'square', 0.12), 80);
        }

        function playExplode() {
            playBeep(160, 0.30, 'sawtooth', 0.25);
            playBeep(100, 0.25, 'square', 0.15);
        }

        function playPowerup() {
            playBeep(660, 0.12, 'square', 0.18);
            setTimeout(() => playBeep(880, 0.12, 'square', 0.15), 100);
            setTimeout(() => playBeep(1100, 0.15, 'square', 0.12), 200);
        }

        function playGameOver() {
            playBeep(440, 0.25, 'square', 0.20);
            setTimeout(() => playBeep(330, 0.25, 'square', 0.18), 250);
            setTimeout(() => playBeep(220, 0.40, 'square', 0.15), 500);
        }

        function playCombo() {
            playBeep(1320, 0.08, 'square', 0.18);
            setTimeout(() => playBeep(1540, 0.08, 'square', 0.15), 70);
            setTimeout(() => playBeep(1760, 0.10, 'square', 0.12), 140);
        }

        function playDamage() { playBeep(200, 0.20, 'sawtooth', 0.30); }

        function playRestart() {
            playBeep(660, 0.12, 'square', 0.18);
            setTimeout(() => playBeep(880, 0.12, 'square', 0.15), 120);
            setTimeout(() => playBeep(1100, 0.15, 'square', 0.12), 240);
        }

        // =====================================================================
        //  Phaser 配置
        // =====================================================================
        const GAME_W = 480;
        const GAME_H = 800;

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: GAME_W,
            height: GAME_H,
            backgroundColor: '#0a0a1a',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                create: create,
                update: update
            },
            input: {
                activePointers: 3
            }
        };

        // =====================================================================
        //  全局游戏变量
        // =====================================================================
        let player, bullets, asteroids, powerups;
        let cursors, keysWASD, keysJK;
        let scoreText, livesText, comboText, powerupText, gameOverText, restartText, titleText, startHintText;
        let leftBtn, rightBtn, fireBtn, bombBtn;
        let lives = 3;
        let score = 0;
        let comboCount = 0;
        let gameOver = false;
        let canRestart = true;
        let gameStarted = false;
        let invincible = false;
        let invincibleTimer = 0;
        let fireCooldown = 0;
        let fireRate = 280;
        let baseFireRate = 280;
        let bulletSpeed = 650;
        let difficultyLevel = 1;
        let difficultyTimer = 0;
        let spawnTimer = 0;
        let spawnInterval = 1200;
        let maxAsteroids = 12;
        let powerupSpawnTimer = 0;
        let powerupInterval = 12000;
        let hasBomb = 1;
        let shieldActive = false;
        let shieldTimer = 0;
        let rapidFireActive = false;
        let rapidFireTimer = 0;

        // =====================================================================
        //  Create
        // =====================================================================
        function create() {
            const self = this;

            // 初始化音频（首次用户交互时激活）
            self.input.once('pointerdown', () => {
                initAudio();
            });

            // ---- 星空背景 ----
            const stars = [];
            for (let i = 0; i < 120; i++) {
                const star = this.add.circle(
                    Phaser.Math.Between(0, GAME_W),
                    Phaser.Math.Between(0, GAME_H),
                    Phaser.Math.Between(1, 3),
                    0xffffff,
                    Phaser.Math.FloatBetween(0.2, 0.8)
                );
                star.alphaSpeed = Phaser.Math.FloatBetween(0.005, 0.02);
                star.depth = -1;
                stars.push(star);
            }
            self.stars = stars;

            // ---- 物理组 ----
            player = this.physics.add.sprite(GAME_W / 2, GAME_H - 80, '__DEFAULT');
            player.setTexture('__DEFAULT');
            player.setSize(32, 32);
            player.setCollideWorldBounds(true);
            player.setTint(0x00ccff);
            player.body.setAllowGravity(false);

            // 绘制玩家飞船（三角形）
            const playerGFX = this.add.graphics();
            playerGFX.fillStyle(0x00ccff, 1);
            playerGFX.fillTriangle(0, -20, -14, 14, 14, 14);
            playerGFX.fillStyle(0x00eeff, 0.6);
            playerGFX.fillTriangle(0, -12, -8, 10, 8, 10);
            player.setSize(28, 28);
            player.setOffset(2, 2);
            // 用graphics作为子对象跟随
            playerGFX.setPosition(0, 0);
            // 我们直接用graphics绘制，不用texture
            // 改用简单方式：绘制一个矩形带三角形
            player.setVisible(false);
            const playerSprite = this.add.graphics();
            playerSprite.setPosition(GAME_W / 2, GAME_H - 80);
            playerSprite.fillStyle(0x00ccff, 1);
            playerSprite.fillTriangle(0, -20, -16, 16, 16, 16);
            playerSprite.fillStyle(0x44eeff, 0.8);
            playerSprite.fillTriangle(0, -12, -8, 10, 8, 10);
            playerSprite.fillStyle(0x0088ff, 1);
            playerSprite.fillRect(-3, -6, 6, 12);
            self.playerSprite = playerSprite;
            // 用physics sprite做碰撞，graphics做显示
            player.setAlpha(0.01); // 透明但保留碰撞

            bullets = this.physics.add.group({
                defaultKey: '__DEFAULT',
                maxSize: 30,
                runChildUpdate: false
            });

            asteroids = this.physics.add.group({
                defaultKey: '__DEFAULT',
                maxSize: 25,
                runChildUpdate: false
            });

            powerups = this.physics.add.group({
                defaultKey: '__DEFAULT',
                maxSize: 5,
                runChildUpdate: false
            });

            // ---- 键盘 ----
            cursors = this.input.keyboard.createCursorKeys();
            keysWASD = this.input.keyboard.addKeys({
                w: Phaser.Input.Keyboard.KeyCodes.W,
                a: Phaser.Input.Keyboard.KeyCodes.A,
                s: Phaser.Input.Keyboard.KeyCodes.S,
                d: Phaser.Input.Keyboard.KeyCodes.D
            });
            keysJK = this.input.keyboard.addKeys({
                j: Phaser.Input.Keyboard.KeyCodes.J,
                k: Phaser.Input.Keyboard.KeyCodes.K,
                space: Phaser.Input.Keyboard.KeyCodes.SPACE,
                r: Phaser.Input.Keyboard.KeyCodes.R,
                enter: Phaser.Input.Keyboard.KeyCodes.ENTER
            });

            // ---- UI 文字 ----
            titleText = this.add.text(GAME_W / 2, GAME_H * 0.28, '☄ 陨石防御者 ☄', {
                fontSize: '40px',
                fontFamily: 'Arial, sans-serif',
                color: '#00ccff',
                fontStyle: 'bold',
                stroke: '#003366',
                strokeThickness: 4
            }).setOrigin(0.5);

            startHintText = this.add.text(GAME_W / 2, GAME_H * 0.42, '点击屏幕 或 按 Enter 开始', {
                fontSize: '18px',
                fontFamily: 'Arial, sans-serif',
                color: '#88bbff',
                stroke: '#002244',
                strokeThickness: 2
            }).setOrigin(0.5);

            this.add.text(GAME_W / 2, GAME_H * 0.52, '← → / A D 移动    J / 空格 射击', {
                fontSize: '14px',
                fontFamily: 'Arial, sans-serif',
                color: '#6688aa',
                stroke: '#001122',
                strokeThickness: 1
            }).setOrigin(0.5);

            this.add.text(GAME_W / 2, GAME_H * 0.58, 'K 投放炸弹 (清屏)   收集道具强化', {
                fontSize: '14px',
                fontFamily: 'Arial, sans-serif',
                color: '#6688aa',
                stroke: '#001122',
                strokeThickness: 1
            }).setOrigin(0.5);

            // 游戏内UI
            scoreText = this.add.text(16, 16, '分数: 0', {
                fontSize: '22px',
                fontFamily: 'Arial, sans-serif',
                color: '#ffffff',
                stroke: '#000000',
                strokeThickness: 3,
                fontStyle: 'bold'
            }).setScrollFactor(0).setDepth(10);

            livesText = this.add.text(GAME_W - 16, 16, '❤ ❤ ❤', {
                fontSize: '24px',
                fontFamily: 'Arial, sans-serif',
                color: '#ff4466',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(1, 0).setScrollFactor(0).setDepth(10);

            comboText = this.add.text(16, 48, '', {
                fontSize: '18px',
                fontFamily: 'Arial, sans-serif',
                color: '#ffcc00',
                stroke: '#000000',
                strokeThickness: 2
            }).setScrollFactor(0).setDepth(10);

            powerupText = this.add.text(GAME_W / 2, 50, '', {
                fontSize: '16px',
                fontFamily: 'Arial, sans-serif',
                color: '#66ffaa',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setScrollFactor(0).setDepth(10);

            gameOverText = this.add.text(GAME_W / 2, GAME_H * 0.38, '游戏结束', {
                fontSize: '52px',
                fontFamily: 'Arial, sans-serif',
                color: '#ff3344',
                fontStyle: 'bold',
                stroke: '#220000',
                strokeThickness: 5
            }).setOrigin(0.5).setDepth(20).setVisible(false);

            restartText = this.add.text(GAME_W / 2, GAME_H * 0.50, '点击屏幕 或 按 R 重新开始', {
                fontSize: '20px',
                fontFamily: 'Arial, sans-serif',
                color: '#88bbff',
                stroke: '#000022',
                strokeThickness: 3
            }).setOrigin(0.5).setDepth(20).setVisible(false);

            // ---- 触控虚拟按钮 ----
            createTouchButtons(this);

            // ---- 碰撞 ----
            this.physics.add.overlap(bullets, asteroids, bulletHitAsteroid, null, this);
            this.physics.add.overlap(player, asteroids, playerHitAsteroid, null, this);
            this.physics.add.overlap(player, powerups, playerCollectPowerup, null, this);

            // ---- 状态钩子初始化 ----
            window.__gameState.running = false;
            window.__gameState.score = 0;
            window.__gameState.lives = 3;
            window.__gameState.gameOver = false;
            window.__gameState.canRestart = true;
            window.__gameState.objects.player = true;
            window.__gameState.objects.enemies = 0;
            window.__gameState.objects.projectiles = 0;

            // ---- 开始等待 ----
            gameOver = false;
            gameStarted = false;
            canRestart = true;

            // 点击或按键开始
            const startGameFn = () => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                }
            };
            this.input.on('pointerdown', startGameFn);
            this.input.keyboard.on('keydown-ENTER', startGameFn);
            this.input.keyboard.on('keydown-SPACE', startGameFn);
            // 游戏结束后重新开始
            this.input.on('pointerdown', () => {
                if (gameOver && canRestart) {
                    restartGame(this);
                }
            });
            this.input.keyboard.on('keydown-R', () => {
                if (gameOver && canRestart) {
                    restartGame(this);
                }
            });
            this.input.keyboard.on('keydown-ENTER', () => {
                if (gameOver && canRestart) {
                    restartGame(this);
                }
            });

            // 保存场景引用
            self.gameScene = this;
        }

        // =====================================================================
        //  触控按钮
        // =====================================================================
        function createTouchButtons(scene) {
            const btnW = 80;
            const btnH = 70;
            const btnY = GAME_H - 60;
            const gap = 20;
            const totalW = btnW * 4 + gap * 3;
            const startX = (GAME_W - totalW) / 2;

            // 左
            leftBtn = scene.add.graphics();
            leftBtn.setInteractive(new Phaser.Geom.Rectangle(startX, btnY - btnH / 2, btnW, btnH), Phaser.Geom.Rectangle
            .Contains);
            leftBtn.on('pointerdown', () => { if (gameStarted && !gameOver) player.setVelocityX(-320); });
            leftBtn.on('pointerup', () => { if (!cursors.left.isDown && !keysWASD.a.isDown) player.setVelocityX(0); });
            leftBtn.on('pointerout', () => { if (!cursors.left.isDown && !keysWASD.a.isDown) player.setVelocityX(0); });

            // 右
            rightBtn = scene.add.graphics();
            rightBtn.setInteractive(new Phaser.Geom.Rectangle(startX + btnW + gap, btnY - btnH / 2, btnW, btnH), Phaser.Geom
                .Rectangle.Contains);
            rightBtn.on('pointerdown', () => { if (gameStarted && !gameOver) player.setVelocityX(320); });
            rightBtn.on('pointerup', () => { if (!cursors.right.isDown && !keysWASD.d.isDown) player.setVelocityX(0); });
            rightBtn.on('pointerout', () => { if (!cursors.right.isDown && !keysWASD.d.isDown) player.setVelocityX(0); });

            // 射击 (J)
            fireBtn = scene.add.graphics();
            fireBtn.setInteractive(new Phaser.Geom.Rectangle(startX + (btnW + gap) * 2, btnY - btnH / 2, btnW, btnH),
                Phaser.Geom.Rectangle.Contains);
            fireBtn.on('pointerdown', () => {
                if (gameStarted && !gameOver) {
                    tryShoot(scene);
                    scene.time.addEvent({ delay: 120, callback: () => { if (gameStarted && !gameOver) tryShoot(
                            scene); }, loop: false });
                }
            });
            fireBtn.on('pointerup', () => {});
            fireBtn.on('pointerout', () => {});

            // 炸弹 (K)
            bombBtn = scene.add.graphics();
            bombBtn.setInteractive(new Phaser.Geom.Rectangle(startX + (btnW + gap) * 3, btnY - btnH / 2, btnW, btnH),
                Phaser.Geom.Rectangle.Contains);
            bombBtn.on('pointerdown', () => {
                if (gameStarted && !gameOver) useBomb(scene);
            });

            // 存储引用以便重绘
            scene.leftBtnRef = { x: startX, y: btnY, w: btnW, h: btnH };
            scene.rightBtnRef = { x: startX + btnW + gap, y: btnY, w: btnW, h: btnH };
            scene.fireBtnRef = { x: startX + (btnW + gap) * 2, y: btnY, w: btnW, h: btnH };
            scene.bombBtnRef = { x: startX + (btnW + gap) * 3, y: btnY, w: btnW, h: btnH };
            scene.btnGap = gap;
            scene.btnStartX = startX;

            drawButtons(scene);
        }

        function drawButtons(scene) {
            const alpha = 0.25;
            // 左
            leftBtn.clear();
            leftBtn.fillStyle(0x4488ff, alpha);
            leftBtn.fillRoundedRect(scene.leftBtnRef.x, scene.leftBtnRef.y - scene.leftBtnRef.h / 2, scene.leftBtnRef.w,
                scene.leftBtnRef.h, 12);
            leftBtn.lineStyle(2, 0x88bbff, 0.5);
            leftBtn.strokeRoundedRect(scene.leftBtnRef.x, scene.leftBtnRef.y - scene.leftBtnRef.h / 2, scene.leftBtnRef.w,
                scene.leftBtnRef.h, 12);
            // 箭头
            leftBtn.fillStyle(0xffffff, 0.6);
            leftBtn.fillTriangle(
                scene.leftBtnRef.x + 20, scene.leftBtnRef.y,
                scene.leftBtnRef.x + 55, scene.leftBtnRef.y - 16,
                scene.leftBtnRef.x + 55, scene.leftBtnRef.y + 16
            );

            // 右
            rightBtn.clear();
            rightBtn.fillStyle(0x4488ff, alpha);
            rightBtn.fillRoundedRect(scene.rightBtnRef.x, scene.rightBtnRef.y - scene.rightBtnRef.h / 2, scene.rightBtnRef
                .w, scene.rightBtnRef.h, 12);
            rightBtn.lineStyle(2, 0x88bbff, 0.5);
            rightBtn.strokeRoundedRect(scene.rightBtnRef.x, scene.rightBtnRef.y - scene.rightBtnRef.h / 2, scene.rightBtnRef
                .w, scene.rightBtnRef.h, 12);
            rightBtn.fillStyle(0xffffff, 0.6);
            rightBtn.fillTriangle(
                scene.rightBtnRef.x + 60, scene.rightBtnRef.y,
                scene.rightBtnRef.x + 25, scene.rightBtnRef.y - 16,
                scene.rightBtnRef.x + 25, scene.rightBtnRef.y + 16
            );

            // 射击
            fireBtn.clear();
            fireBtn.fillStyle(0xff6644, alpha);
            fireBtn.fillRoundedRect(scene.fireBtnRef.x, scene.fireBtnRef.y - scene.fireBtnRef.h / 2, scene.fireBtnRef.w,
                scene.fireBtnRef.h, 12);
            fireBtn.lineStyle(2, 0xff8866, 0.5);
            fireBtn.strokeRoundedRect(scene.fireBtnRef.x, scene.fireBtnRef.y - scene.fireBtnRef.h / 2, scene.fireBtnRef.w,
                scene.fireBtnRef.h, 12);
            scene.add.text(scene.fireBtnRef.x + scene.fireBtnRef.w / 2, scene.fireBtnRef.y, '射击', {
                fontSize: '16px',
                fontFamily: 'Arial',
                color: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setDepth(5);

            // 炸弹
            bombBtn.clear();
            bombBtn.fillStyle(0xffaa22, alpha);
            bombBtn.fillRoundedRect(scene.bombBtnRef.x, scene.bombBtnRef.y - scene.bombBtnRef.h / 2, scene.bombBtnRef.w,
                scene.bombBtnRef.h, 12);
            bombBtn.lineStyle(2, 0xffcc66, 0.5);
            bombBtn.strokeRoundedRect(scene.bombBtnRef.x, scene.bombBtnRef.y - scene.bombBtnRef.h / 2, scene.bombBtnRef.w,
                scene.bombBtnRef.h, 12);
            scene.add.text(scene.bombBtnRef.x + scene.bombBtnRef.w / 2, scene.bombBtnRef.y, '炸弹', {
                fontSize: '16px',
                fontFamily: 'Arial',
                color: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setDepth(5);

            // 方向键提示
            scene.add.text(scene.leftBtnRef.x + scene.leftBtnRef.w / 2, scene.leftBtnRef.y, '◀', {
                fontSize: '28px',
                fontFamily: 'Arial',
                color: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setDepth(5);

            scene.add.text(scene.rightBtnRef.x + scene.rightBtnRef.w / 2, scene.rightBtnRef.y, '▶', {
                fontSize: '28px',
                fontFamily: 'Arial',
                color: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setDepth(5);
        }

        // =====================================================================
        //  游戏开始 / 重新开始
        // =====================================================================
        function startGame(scene) {
            if (gameStarted) return;
            gameStarted = true;
            gameOver = false;
            canRestart = false;

            titleText.setVisible(false);
            startHintText.setVisible(false);

            // 重置状态
            lives = 3;
            score = 0;
            comboCount = 0;
            difficultyLevel = 1;
            difficultyTimer = 0;
            spawnTimer = 0;
            spawnInterval = 1200;
            powerupSpawnTimer = 0;
            hasBomb = 1;
            shieldActive = false;
            shieldTimer = 0;
            rapidFireActive = false;
            rapidFireTimer = 0;
            invincible = false;
            invincibleTimer = 0;
            fireCooldown = 0;
            fireRate = baseFireRate;

            player.setPosition(GAME_W / 2, GAME_H - 80);
            player.setVelocityX(0);
            player.setAlpha(0.01);
            player.body.enable = true;

            // 清空所有陨石、子弹、道具
            asteroids.clear(true, true);
            bullets.clear(true, true);
            powerups.clear(true, true);

            updateUI(scene);

            window.__gameState.running = true;
            window.__gameState.gameOver = false;
            window.__gameState.lives = lives;
            window.__gameState.score = score;

            initAudio();
            playRestart();
        }

        function restartGame(scene) {
            if (!gameOver || !canRestart) return;
            gameOver = false;
            canRestart = false;
            gameStarted = true;

            gameOverText.setVisible(false);
            restartText.setVisible(false);
            titleText.setVisible(false);
            startHintText.setVisible(false);

            lives = 3;
            score = 0;
            comboCount = 0;
            difficultyLevel = 1;
            difficultyTimer = 0;
            spawnTimer = 0;
            spawnInterval = 1200;
            powerupSpawnTimer = 0;
            hasBomb = 1;
            shieldActive = false;
            shieldTimer = 0;
            rapidFireActive = false;
            rapidFireTimer = 0;
            invincible = false;
            invincibleTimer = 0;
            fireCooldown = 0;
            fireRate = baseFireRate;

            player.setPosition(GAME_W / 2, GAME_H - 80);
            player.setVelocityX(0);
            player.setAlpha(0.01);
            player.body.enable = true;

            asteroids.clear(true, true);
            bullets.clear(true, true);
            powerups.clear(true, true);

            updateUI(scene);

            window.__gameState.running = true;
            window.__gameState.gameOver = false;
            window.__gameState.lives = lives;
            window.__gameState.score = score;

            initAudio();
            playRestart();
        }

        // =====================================================================
        //  UI 更新
        // =====================================================================
        function updateUI(scene) {
            scoreText.setText('分数: ' + score);
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤ ';
            livesText.setText(hearts.trim());

            if (comboCount >= 3) {
                comboText.setText('🔥 连击 x' + comboCount);
                comboText.setVisible(true);
            } else {
                comboText.setVisible(false);
            }

            let powMsg = '';
            if (shieldActive) powMsg = '🛡 护盾';
            else if (rapidFireActive) powMsg = '⚡ 速射';
            if (hasBomb > 0) powMsg += (powMsg ? ' | ' : '') + '💣 x' + hasBomb;
            powerupText.setText(powMsg);

            // 更新状态钩子
            window.__gameState.score = score;
            window.__gameState.lives = lives;
            window.__gameState.objects.enemies = asteroids.countActive();
            window.__gameState.objects.projectiles = bullets.countActive();
        }

        // =====================================================================
        //  射击
        // =====================================================================
        function tryShoot(scene) {
            if (!gameStarted || gameOver) return;
            const now = scene.time.now;
            if (fireCooldown > now) return;
            fireCooldown = now + fireRate;

            const bullet = bullets.get(player.x, player.y - 24);
            if (!bullet) return;
            bullet.setActive(true).setVisible(true);
            bullet.setTexture('__DEFAULT');
            bullet.setSize(6, 14);
            bullet.setTint(0x44ffaa);
            bullet.body.setAllowGravity(false);
            bullet.setVelocityY(-bulletSpeed);
            bullet.setPosition(player.x, player.y - 24);
            bullet.body.setSize(6, 14);
            bullet.setAlpha(0.9);
            // 子弹发光效果
            bullet.setData('life', 2000);
            playShoot();

            window.__gameState.objects.projectiles = bullets.countActive();
        }

        // =====================================================================
        //  炸弹
        // =====================================================================
        function useBomb(scene) {
            if (!gameStarted || gameOver) return;
            if (hasBomb <= 0) return;
            hasBomb--;
            playExplode();

            // 清除所有陨石
            asteroids.getChildren().forEach(ast => {
                if (ast.active) {
                    const exp = scene.add.circle(ast.x, ast.y, 6, 0xff8844, 0.8);
                    scene.tweens.add({
                        targets: exp,
                        scale: 3,
                        alpha: 0,
                        duration: 400,
                        onComplete: () => exp.destroy()
                    });
                    ast.destroy();
                    score += 5;
                    comboCount++;
                    if (comboCount % 5 === 0) playCombo();
                    else playScore();
                }
            });
            // 屏幕闪白
            const flash = scene.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0xffffff, 0.2);
            flash.setDepth(15);
            scene.tweens.add({
                targets: flash,
                alpha: 0,
                duration: 300,
                onComplete: () => flash.destroy()
            });
            updateUI(scene);
        }

        // =====================================================================
        //  生成陨石
        // =====================================================================
        function spawnAsteroid(scene) {
            if (!gameStarted || gameOver) return;
            if (asteroids.countActive() >= maxAsteroids) return;

            const size = Phaser.Math.Between(18, 48);
            const x = Phaser.Math.Between(30, GAME_W - 30);
            const speed = Phaser.Math.Between(80, 160) + difficultyLevel * 8;
            const ast = asteroids.get(x, -30);
            if (!ast) return;

            ast.setActive(true).setVisible(true);
            ast.setTexture('__DEFAULT');
            ast.setTint(0xcc6633);
            ast.setSize(size, size);
            ast.body.setAllowGravity(false);
            ast.setPosition(x, -30);
            ast.setVelocityY(speed);
            ast.setAngularVelocity(Phaser.Math.Between(-60, 60));
            ast.body.setSize(size * 0.8, size * 0.8);
            ast.setData('size', size);
            ast.setData('hp', Math.ceil(size / 20));
            // 绘制陨石效果用graphics跟随
            const gfx = scene.add.graphics();
            gfx.fillStyle(0xcc6633, 0.9);
            gfx.fillCircle(0, 0, size / 2);
            gfx.fillStyle(0x884422, 0.5);
            gfx.fillCircle(-size / 6, -size / 6, size / 4);
            gfx.fillStyle(0xaa5522, 0.4);
            gfx.fillCircle(size / 5, size / 5, size / 5);
            gfx.lineStyle(1, 0x664422, 0.3);
            gfx.strokeCircle(0, 0, size / 2);
            ast.setData('gfx', gfx);
            ast.setAlpha(0.01); // 透明物理体，用graphics显示

            window.__gameState.objects.enemies = asteroids.countActive();
        }

        // =====================================================================
        //  生成道具
        // =====================================================================
        function spawnPowerup(scene) {
            if (!gameStarted || gameOver) return;
            if (powerups.countActive() >= 5) return;

            const types = ['shield', 'rapid', 'bomb'];
            const type = Phaser.Math.RND.pick(types);
            const x = Phaser.Math.Between(60, GAME_W - 60);
            const pu = powerups.get(x, -20);
            if (!pu) return;

            pu.setActive(true).setVisible(true);
            pu.setTexture('__DEFAULT');
            pu.setSize(24, 24);
            pu.body.setAllowGravity(false);
            pu.setPosition(x, -20);
            pu.setVelocityY(60);
            pu.body.setSize(24, 24);
            pu.setData('type', type);

            const gfx = scene.add.graphics();
            if (type === 'shield') {
                gfx.fillStyle(0x44aaff, 0.9);
                gfx.fillCircle(0, 0, 14);
                gfx.fillStyle(0xffffff, 0.5);
                gfx.fillCircle(0, 0, 8);
                gfx.lineStyle(2, 0x88ccff, 0.8);
                gfx.strokeCircle(0, 0, 14);
            } else if (type === 'rapid') {
                gfx.fillStyle(0xffdd44, 0.9);
                gfx.fillTriangle(-10, 10, 10, 10, 0, -12);
                gfx.fillStyle(0xffee88, 0.5);
                gfx.fillTriangle(-5, 5, 5, 5, 0, -6);
            } else if (type === 'bomb') {
                gfx.fillStyle(0xff6622, 0.9);
                gfx.fillCircle(0, 0, 13);
                gfx.fillStyle(0xffaa44, 0.6);
                gfx.fillCircle(0, 0, 8);
                gfx.lineStyle(2, 0xff8844, 0.8);
                gfx.strokeCircle(0, 0, 13);
                // 引信
                gfx.lineStyle(2, 0x886644, 0.9);
                gfx.beginPath();
                gfx.moveTo(0, -13);
                gfx.lineTo(2, -18);
                gfx.strokePath();
            }
            pu.setData('gfx', gfx);
            pu.setAlpha(0.01);
        }

        // =====================================================================
        //  碰撞回调
        // =====================================================================
        function bulletHitAsteroid(bullet, asteroid) {
            if (!bullet.active || !asteroid.active) return;

            // 子弹消失
            const gfxBullet = bullet.getData('gfx');
            if (gfxBullet) gfxBullet.destroy();
            bullet.setActive(false).setVisible(false);
            bullet.body.enable = false;

            // 陨石掉血
            let hp = asteroid.getData('hp') || 1;
            hp--;
            asteroid.setData('hp', hp);

            if (hp <= 0) {
                // 陨石摧毁
                const gfx = asteroid.getData('gfx');
                if (gfx) gfx.destroy();
                const size = asteroid.getData('size') || 20;
                // 爆炸粒子效果
                const scene = bullet.scene || window.gameScene;
                if (scene) {
                    for (let i = 0; i < 6; i++) {
                        const p = scene.add.circle(asteroid.x + Phaser.Math.Between(-8, 8), asteroid.y + Phaser.Math
                            .Between(-8, 8),
                            Phaser.Math.Between(2, 5), 0xff8844, 0.8);
                        scene.tweens.add({
                            targets: p,
                            x: p.x + Phaser.Math.Between(-30, 30),
                            y: p.y + Phaser.Math.Between(-20, 20),
                            alpha: 0,
                            scale: 0.2,
                            duration: 350,
                            onComplete: () => p.destroy()
                        });
                    }
                }
                asteroid.setActive(false).setVisible(false);
                asteroid.body.enable = false;

                // 得分
                comboCount++;
                const bonus = Math.min(comboCount, 10);
                const addScore = 10 + bonus * 2;
                score += addScore;
                if (comboCount >= 5) playCombo();
                else playScore();

                updateUI(bullet.scene || window.gameScene);
                window.__gameState.objects.enemies = asteroids.countActive();
            } else {
                // 未摧毁，闪一下
                const gfx = asteroid.getData('gfx');
                if (gfx) {
                    gfx.setAlpha(0.4);
                    setTimeout(() => { if (gfx && gfx.active) gfx.setAlpha(0.9); }, 80);
                }
                playHit();
            }
        }

        function playerHitAsteroid(playerSprite, asteroid) {
            if (!gameStarted || gameOver) return;
            if (invincible) return;
            if (shieldActive) {
                // 护盾抵挡，销毁陨石
                const gfx = asteroid.getData('gfx');
                if (gfx) gfx.destroy();
                asteroid.setActive(false).setVisible(false);
                asteroid.body.enable = false;
                shieldActive = false;
                shieldTimer = 0;
                playPowerup();
                updateUI(playerSprite.scene || window.gameScene);
                return;
            }

            // 受伤
            const gfx = asteroid.getData('gfx');
            if (gfx) gfx.destroy();
            asteroid.setActive(false).setVisible(false);
            asteroid.body.enable = false;

            lives--;
            invincible = true;
            invincibleTimer = 1500;
            playDamage();

            // 闪烁效果
            const scene = playerSprite.scene || window.gameScene;
            if (scene && scene.playerSprite) {
                scene.tweens.add({
                    targets: scene.playerSprite,
                    alpha: 0.3,
                    duration: 100,
                    yoyo: true,
                    repeat: 5,
                    onComplete: () => {
                        if (scene.playerSprite && scene.playerSprite.active) {
                            scene.playerSprite.setAlpha(1);
                        }
                    }
                });
            }

            updateUI(scene);
            window.__gameState.lives = lives;

            if (lives <= 0) {
                endGame(scene);
            }
        }

        function playerCollectPowerup(playerSprite, pu) {
            if (!pu.active) return;
            const type = pu.getData('type');
            const gfx = pu.getData('gfx');
            if (gfx) gfx.destroy();
            pu.setActive(false).setVisible(false);
            pu.body.enable = false;

            const scene = playerSprite.scene || window.gameScene;
            playPowerup();

            switch (type) {
                case 'shield':
                    shieldActive = true;
                    shieldTimer = 8000;
                    break;
                case 'rapid':
                    rapidFireActive = true;
                    rapidFireTimer = 7000;
                    fireRate = 120;
                    break;
                case 'bomb':
                    hasBomb = Math.min(hasBomb + 1, 3);
                    break;
            }
            // 拾取特效
            if (scene) {
                const txt = scene.add.text(pu.x, pu.y, {
                    'shield': '🛡 护盾!',
                    'rapid': '⚡ 速射!',
                    'bomb': '💣 +1'
                } [type] || '道具', {
                    fontSize: '20px',
                    fontFamily: 'Arial',
                    color: '#ffdd88',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setDepth(12);
                scene.tweens.add({
                    targets: txt,
                    y: txt.y - 50,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => txt.destroy()
                });
            }
            updateUI(scene);
        }

        // =====================================================================
        //  游戏结束
        // =====================================================================
        function endGame(scene) {
            gameOver = true;
            canRestart = true;
            gameStarted = false;

            player.setVelocityX(0);
            player.body.enable = false;

            gameOverText.setVisible(true);
            restartText.setVisible(true);

            // 显示最终分数
            gameOverText.setText('游戏结束\n分数: ' + score);

            playGameOver();

            window.__gameState.running = false;
            window.__gameState.gameOver = true;
            window.__gameState.canRestart = true;
        }

        // =====================================================================
        //  Update
        // =====================================================================
        function update(time, delta) {
            const self = this;
            if (!self.playerSprite) return;

            // ---- 更新星空 ----
            if (self.stars) {
                self.stars.forEach(star => {
                    star.y += 0.5 + difficultyLevel * 0.1;
                    if (star.y > GAME_H) {
                        star.y = 0;
                        star.x = Phaser.Math.Between(0, GAME_W);
                    }
                    star.alpha += star.alphaSpeed;
                    if (star.alpha > 0.9 || star.alpha < 0.15) star.alphaSpeed *= -1;
                });
            }

            // ---- 游戏未开始 ----
            if (!gameStarted && !gameOver) {
                // 标题闪烁
                if (startHintText) {
                    startHintText.alpha = 0.5 + Math.sin(time / 400) * 0.3;
                }
                return;
            }

            // ---- 游戏结束 ----
            if (gameOver) {
                if (restartText) {
                    restartText.alpha = 0.6 + Math.sin(time / 350) * 0.3;
                }
                // 检测 R 键重新开始
                if (keysJK.r.isDown && canRestart) {
                    restartGame(self);
                }
                return;
            }

            // =================================================================
            //  活跃游戏循环 (game_loop_active)
            // =================================================================

            // ---- 玩家移动 (keyboard_response) ----
            let vx = 0;
            if (cursors.left.isDown || keysWASD.a.isDown) vx = -300;
            else if (cursors.right.isDown || keysWASD.d.isDown) vx = 300;

            // 触控按钮状态（在touch事件中已设置速度，这里补充）
            if (vx === 0 && player.body && player.body.velocity.x !== 0) {
                // 如果触控已经设置了速度，保留
            } else {
                player.setVelocityX(vx);
            }

            // 同步graphics位置
            self.playerSprite.setPosition(player.x, player.y);

            // ---- 射击 (keyboard_response) ----
            if (keysJK.j.isDown || keysJK.space.isDown) {
                tryShoot(self);
            }

            // 炸弹
            if (keysJK.k.isDown && hasBomb > 0) {
                useBomb(self);
            }

            // ---- 更新子弹 ----
            bullets.getChildren().forEach(b => {
                if (b.active) {
                    if (b.y < -30) {
                        b.setActive(false).setVisible(false);
                        b.body.enable = false;
                    }
                    // 子弹发光
                    if (!b.getData('gfx')) {
                        const g = self.add.graphics();
                        g.fillStyle(0x44ffaa, 0.7);
                        g.fillRect(-3, -7, 6, 14);
                        g.fillStyle(0x88ffcc, 0.4);
                        g.fillRect(-1, -5, 2, 10);
                        b.setData('gfx', g);
                    }
                    const gfxB = b.getData('gfx');
                    if (gfxB && gfxB.active) {
                        gfxB.setPosition(b.x, b.y);
                    }
                }
            });

            // ---- 更新陨石 ----
            asteroids.getChildren().forEach(a => {
                if (a.active) {
                    if (a.y > GAME_H + 60) {
                        const g = a.getData('gfx');
                        if (g && g.active) g.destroy();
                        a.setActive(false).setVisible(false);
                        a.body.enable = false;
                        return;
                    }
                    const gfxA = a.getData('gfx');
                    if (gfxA && gfxA.active) {
                        gfxA.setPosition(a.x, a.y);
                        gfxA.setRotation(a.rotation || 0);
                    }
                }
            });

            // ---- 更新道具 ----
            powerups.getChildren().forEach(p => {
                if (p.active) {
                    if (p.y > GAME_H + 40) {
                        const g = p.getData('gfx');
                        if (g && g.active) g.destroy();
                        p.setActive(false).setVisible(false);
                        p.body.enable = false;
                        return;
                    }
                    const gfxP = p.getData('gfx');
                    if (gfxP && gfxP.active) {
                        gfxP.setPosition(p.x, p.y);
                        // 浮动效果
                        gfxP.setAlpha(0.7 + Math.sin(time / 300 + p.x) * 0.3);
                    }
                }
            });

            // ---- 无敌计时 ----
            if (invincible) {
                invincibleTimer -= delta;
                if (invincibleTimer <= 0) {
                    invincible = false;
                    if (self.playerSprite) self.playerSprite.setAlpha(1);
                } else {
                    // 闪烁
                    if (self.playerSprite) {
                        self.playerSprite.setAlpha(0.4 + Math.sin(time / 50) * 0.3);
                    }
                }
            }

            // ---- 护盾计时 ----
            if (shieldActive) {
                shieldTimer -= delta;
                if (shieldTimer <= 0) {
                    shieldActive = false;
                    updateUI(self);
                }
                // 护盾光环
                if (!self.shieldGFX) {
                    self.shieldGFX = self.add.graphics();
                    self.shieldGFX.setDepth(8);
                }
                self.shieldGFX.clear();
                self.shieldGFX.lineStyle(3, 0x44aaff, 0.4 + Math.sin(time / 200) * 0.2);
                self.shieldGFX.strokeCircle(player.x, player.y, 24);
                self.shieldGFX.fillStyle(0x44aaff, 0.05);
                self.shieldGFX.fillCircle(player.x, player.y, 24);
            } else {
                if (self.shieldGFX) {
                    self.shieldGFX.clear();
                }
            }

            // ---- 速射计时 ----
            if (rapidFireActive) {
                rapidFireTimer -= delta;
                if (rapidFireTimer <= 0) {
                    rapidFireActive = false;
                    fireRate = baseFireRate;
                    updateUI(self);
                }
            }

            // ---- 难度递增 ----
            difficultyTimer += delta;
            if (difficultyTimer > 8000) {
                difficultyTimer = 0;
                difficultyLevel = Math.min(difficultyLevel + 1, 20);
                spawnInterval = Math.max(400, 1200 - difficultyLevel * 40);
                maxAsteroids = Math.min(25, 12 + Math.floor(difficultyLevel / 2));
            }

            // ---- 生成陨石 ----
            spawnTimer += delta;
            if (spawnTimer >= spawnInterval) {
                spawnTimer = 0;
                spawnAsteroid(self);
            }

            // ---- 生成道具 ----
            powerupSpawnTimer += delta;
            if (powerupSpawnTimer >= powerupInterval) {
                powerupSpawnTimer = 0;
                if (Phaser.Math.Between(1, 100) <= 40) {
                    spawnPowerup(self);
                }
            }

            // ---- UI更新 ----
            updateUI(self);

            // ---- 更新状态钩子 ----
            window.__gameState.running = true;
            window.__gameState.objects.enemies = asteroids.countActive();
            window.__gameState.objects.projectiles = bullets.countActive();
        }

        // =====================================================================
        //  启动游戏
        // =====================================================================
        const game = new Phaser.Game(config);

        // 暴露场景引用
        game.events.on('ready', () => {
            window.gameScene = game.scene.scenes[0];
        });

        console.log('🌠 陨石防御者已加载 — 按 Enter 或点击开始');
        console.log('📖 控制: 方向键/WASD 移动 | J/空格 射击 | K 炸弹');
        console.log('📱 触控: 底部虚拟按钮');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太空射击 - 陨石猎手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
            position: relative;
        }
        #game-container canvas {
            display: block;
        }
        /* 移动端虚拟按键 */
        #mobile-controls {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }
        #mobile-controls .ctrl-left,
        #mobile-controls .ctrl-right {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        #mobile-controls button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            touch-action: none;
            pointer-events: auto;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s, transform 0.1s;
        }
        #mobile-controls button:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.92);
        }
        #mobile-controls button.active {
            background: rgba(255, 255, 255, 0.45);
            transform: scale(0.88);
        }
        @media (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
        }
        @media (max-width: 500px) {
            #mobile-controls button {
                width: 52px;
                height: 52px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Phaser 会将 canvas 注入到这里 -->
        <!-- 移动端虚拟按键 -->
        <div id="mobile-controls">
            <div class="ctrl-left">
                <button id="btn-up">▲</button>
                <button id="btn-down">▼</button>
                <button id="btn-left">◀</button>
                <button id="btn-right">▶</button>
            </div>
            <div class="ctrl-right">
                <button id="btn-fire">A</button>
                <button id="btn-pause">⏸</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>

    <script>
        // ============================================================
        // 太空射击游戏 - 完整实现
        // 使用 Phaser.js 3 + Arcade Physics
        // ============================================================

        // ---- 音效系统 (Web Audio API) ----
        let audioCtx = null;

        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return true;
            } catch (e) {
                console.warn('Web Audio 不可用:', e);
                return false;
            }
        }

        function playBeep(freq, duration, type, volume) {
            try {
                if (!initAudio()) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type || 'square';
                osc.frequency.value = freq;
                const vol = volume || 0.25;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { /* 静默 */ }
        }

        function sfxShoot() { playBeep(880, 0.08, 'square', 0.12); }

        function sfxHit() { playBeep(220, 0.2, 'sawtooth', 0.18); }

        function sfxScore() { playBeep(1320, 0.1, 'sine', 0.18); }

        function sfxCombo() { playBeep(1760, 0.12, 'sine', 0.22);
            setTimeout(() => playBeep(1980, 0.08, 'sine', 0.18), 60); }

        function sfxDie() { playBeep(160, 0.4, 'sawtooth', 0.25);
            setTimeout(() => playBeep(120, 0.5, 'sawtooth', 0.18), 200); }

        function sfxPowerup() { playBeep(660, 0.1, 'sine', 0.18);
            setTimeout(() => playBeep(990, 0.12, 'sine', 0.18), 100); }

        function sfxGameOver() { playBeep(400, 0.3, 'sawtooth', 0.25);
            setTimeout(() => playBeep(300, 0.3, 'sawtooth', 0.2), 250);
            setTimeout(() => playBeep(200, 0.5, 'sawtooth', 0.16), 500); }

        function sfxShield() { playBeep(520, 0.15, 'sine', 0.16);
            setTimeout(() => playBeep(780, 0.15, 'sine', 0.16), 80); }

        // ---- 游戏场景 ----
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
                // 游戏状态
                this.score = 0;
                this.lives = 3;
                this.combo = 0;
                this.lastKillTime = 0;
                this.comboBonus = 0;
                this.gameTime = 0;
                this.isPaused = false;
                this.isGameOver = false;
                this.autoFire = true;
                this.fireTimer = 0;
                this.fireInterval = 300; // ms
                this.shieldActive = false;
                this.shieldTimer = 0;

                // 移动端输入状态
                this.mobileDir = {
                    up: false,
                    down: false,
                    left: false,
                    right: false
                };
                this.mobileFire = false;
            }

            // -------- create ----------
            create() {
                // 重置状态
                this.score = 0;
                this.lives = 3;
                this.combo = 0;
                this.lastKillTime = 0;
                this.comboBonus = 0;
                this.gameTime = 0;
                this.isPaused = false;
                this.isGameOver = false;
                this.fireTimer = 0;
                this.shieldActive = false;
                this.shieldTimer = 0;
                this.mobileDir = { up: false, down: false, left: false, right: false };
                this.mobileFire = false;

                // 生成纹理
                this.createTextures();

                // ---- 背景星空 ----
                this.stars = [];
                for (let i = 0; i < 80; i++) {
                    const s = this.add.circle(
                        Phaser.Math.Between(0, 800),
                        Phaser.Math.Between(0, 600),
                        Phaser.Math.Between(1, 3),
                        0xffffff,
                        0.6 + Math.random() * 0.4
                    );
                    s.setDepth(-1);
                    s.speed = 20 + Math.random() * 40;
                    this.stars.push(s);
                }

                // ---- 玩家飞船 ----
                this.player = this.physics.add.sprite(400, 520, 'ship');
                this.player.setCollideWorldBounds(true);
                this.player.setDepth(5);
                this.player.setScale(1);
                this.player.body.setSize(30, 30);
                this.player.isInvincible = false;
                this.player.invincibleTimer = 0;

                // ---- 子弹组 ----
                this.bullets = this.physics.add.group({
                    defaultKey: 'bullet',
                    maxSize: 40,
                    runChildUpdate: false
                });

                // ---- 陨石组 ----
                this.asteroids = this.physics.add.group({
                    defaultKey: 'asteroid_large',
                    runChildUpdate: false
                });

                // ---- 粒子发射器（用于爆炸效果） ----
                // 使用简单圆点模拟粒子

                // ---- 键盘输入 ----
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.W,
                    down: Phaser.Input.Keyboard.KeyCodes.S,
                    left: Phaser.Input.Keyboard.KeyCodes.A,
                    right: Phaser.Input.Keyboard.KeyCodes.D
                });
                this.fireKey1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                this.fireKey2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                this.pauseKey1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.P);
                this.pauseKey2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
                this.restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);

                // ---- 移动端虚拟按键绑定 ----
                this.setupMobileControls();

                // ---- 碰撞检测 ----
                this.physics.add.overlap(
                    this.bullets,
                    this.asteroids,
                    this.onBulletHitAsteroid,
                    null,
                    this
                );
                this.physics.add.overlap(
                    this.player,
                    this.asteroids,
                    this.onPlayerHitAsteroid,
                    null,
                    this
                );

                // ---- UI ----
                this.scoreText = this.add.text(16, 16, '分数: 0', {
                    fontFamily: 'monospace',
                    fontSize: '22px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setDepth(20);

                this.livesText = this.add.text(16, 48, '生命: ❤❤❤', {
                    fontFamily: 'monospace',
                    fontSize: '22px',
                    color: '#ff6666',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setDepth(20);

                this.comboText = this.add.text(16, 80, '', {
                    fontFamily: 'monospace',
                    fontSize: '18px',
                    color: '#ffcc00',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setDepth(20);

                this.pauseText = this.add.text(400, 280, '⏸ 暂停中', {
                    fontFamily: 'monospace',
                    fontSize: '40px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setDepth(30).setVisible(false);

                this.gameOverText = this.add.text(400, 240, '', {
                    fontFamily: 'monospace',
                    fontSize: '48px',
                    color: '#ff4444',
                    stroke: '#000000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(30).setVisible(false);

                this.gameOverSubText = this.add.text(400, 310, '', {
                    fontFamily: 'monospace',
                    fontSize: '22px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setDepth(30).setVisible(false);

                // ---- 生成初始陨石 ----
                this.spawnWave(3);
                this.asteroidTimer = 0;
                this.asteroidInterval = 2500;

                // ---- 游戏控制提示 ----
                this.add.text(800 - 16, 16, '键盘: WASD/方向键 移动 | J/空格 射击 | P 暂停', {
                    fontFamily: 'monospace',
                    fontSize: '12px',
                    color: '#888888',
                    stroke: '#000000',
                    strokeThickness: 2
                }).setOrigin(1, 0).setDepth(20);

                // ---- 音效初始化（预创建 AudioContext） ----
                initAudio();
            }

            // -------- 生成纹理 ----------
            createTextures() {
                // 飞船纹理 (32x32，朝上三角形)
                const shipG = this.make.graphics({ x: 0, y: 0, add: false });
                shipG.fillStyle(0x00ccff, 1);
                shipG.fillTriangle(16, 0, 2, 32, 30, 32);
                shipG.fillStyle(0x66eeff, 1);
                shipG.fillTriangle(16, 6, 8, 28, 24, 28);
                shipG.generateTexture('ship', 32, 32);
                shipG.destroy();

                // 子弹纹理 (6x12)
                const bulletG = this.make.graphics({ x: 0, y: 0, add: false });
                bulletG.fillStyle(0xffff66, 1);
                bulletG.fillRect(1, 0, 4, 12);
                bulletG.fillStyle(0xffffff, 1);
                bulletG.fillRect(2, 2, 2, 8);
                bulletG.generateTexture('bullet', 6, 12);
                bulletG.destroy();

                // 大型陨石纹理 (64x64)
                const lg = this.make.graphics({ x: 0, y: 0, add: false });
                lg.fillStyle(0x886644, 1);
                lg.fillCircle(32, 32, 30);
                lg.fillStyle(0xaa8866, 1);
                lg.fillCircle(28, 28, 18);
                lg.fillStyle(0x664422, 1);
                lg.fillCircle(34, 36, 10);
                lg.generateTexture('asteroid_large', 64, 64);
                lg.destroy();

                // 中型陨石纹理 (40x40)
                const mg = this.make.graphics({ x: 0, y: 0, add: false });
                mg.fillStyle(0x997755, 1);
                mg.fillCircle(20, 20, 18);
                mg.fillStyle(0xbb9977, 1);
                mg.fillCircle(17, 17, 10);
                mg.fillStyle(0x775533, 1);
                mg.fillCircle(22, 23, 7);
                mg.generateTexture('asteroid_medium', 40, 40);
                mg.destroy();

                // 小型陨石纹理 (24x24)
                const sg = this.make.graphics({ x: 0, y: 0, add: false });
                sg.fillStyle(0xaa8866, 1);
                sg.fillCircle(12, 12, 10);
                sg.fillStyle(0xccaa88, 1);
                sg.fillCircle(10, 10, 6);
                sg.fillStyle(0x886644, 1);
                sg.fillCircle(13, 14, 4);
                sg.generateTexture('asteroid_small', 24, 24);
                sg.destroy();
            }

            // -------- 移动端虚拟按键绑定 ----------
            setupMobileControls() {
                const bindBtn = (id, dir) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        if (dir === 'fire') {
                            this.mobileFire = true;
                        } else if (dir === 'pause') {
                            this.togglePause();
                        } else {
                            this.mobileDir[dir] = true;
                        }
                        el.classList.add('active');
                    });
                    el.addEventListener('pointerup', (e) => {
                        e.preventDefault();
                        if (dir === 'fire') {
                            this.mobileFire = false;
                        } else if (dir !== 'pause') {
                            this.mobileDir[dir] = false;
                        }
                        el.classList.remove('active');
                    });
                    el.addEventListener('pointerleave', (e) => {
                        if (dir === 'fire') {
                            this.mobileFire = false;
                        } else if (dir !== 'pause') {
                            this.mobileDir[dir] = false;
                        }
                        el.classList.remove('active');
                    });
                };
                bindBtn('btn-up', 'up');
                bindBtn('btn-down', 'down');
                bindBtn('btn-left', 'left');
                bindBtn('btn-right', 'right');
                bindBtn('btn-fire', 'fire');
                bindBtn('btn-pause', 'pause');
            }

            // -------- 暂停切换 ----------
            togglePause() {
                if (this.isGameOver) return;
                this.isPaused = !this.isPaused;
                this.pauseText.setVisible(this.isPaused);
                if (this.isPaused) {
                    this.physics.pause();
                } else {
                    this.physics.resume();
                }
            }

            // -------- 生成一波陨石 ----------
            spawnWave(count) {
                for (let i = 0; i < count; i++) {
                    const x = Phaser.Math.Between(60, 740);
                    const y = Phaser.Math.Between(-80, -30);
                    this.spawnAsteroid(x, y, 'large');
                }
            }

            // -------- 生成单个陨石 ----------
            spawnAsteroid(x, y, size) {
                let key, scale, speed, radius;
                if (size === 'large') {
                    key = 'asteroid_large';
                    scale = 1;
                    speed = 50 + Math.random() * 40;
                    radius = 30;
                } else if (size === 'medium') {
                    key = 'asteroid_medium';
                    scale = 1;
                    speed = 70 + Math.random() * 50;
                    radius = 18;
                } else {
                    key = 'asteroid_small';
                    scale = 1;
                    speed = 90 + Math.random() * 60;
                    radius = 10;
                }

                const ast = this.asteroids.create(x, y, key);
                if (!ast) return null;
                ast.setScale(scale);
                ast.setDepth(3);
                ast.body.setCircle(radius);
                ast.body.setOffset(
                    ast.width / 2 - radius,
                    ast.height / 2 - radius
                );
                // 随机水平速度
                const vx = Phaser.Math.Between(-30, 30);
                ast.setVelocity(vx, speed);
                ast.setAngularVelocity(Phaser.Math.Between(-60, 60));
                ast.asteroidSize = size;
                ast.health = size === 'large' ? 2 : (size === 'medium' ? 1 : 1);
                return ast;
            }

            // -------- 子弹发射 ----------
            fireBullet() {
                if (this.isPaused || this.isGameOver) return;
                const bullet = this.bullets.get(this.player.x, this.player.y - 20, 'bullet');
                if (!bullet) return;
                bullet.setActive(true);
                bullet.setVisible(true);
                bullet.setDepth(4);
                bullet.body.enable = true;
                bullet.body.setSize(6, 12);
                bullet.setVelocity(0, -500);
                bullet.setAngularVelocity(0);
                sfxShoot();
            }

            // -------- 子弹击中陨石 ----------
            onBulletHitAsteroid(bullet, asteroid) {
                if (!bullet.active || !asteroid.active) return;

                // 回收子弹
                bullet.setActive(false);
                bullet.setVisible(false);
                bullet.body.enable = false;
                this.bullets.killAndHide(bullet);

                // 减少陨石生命
                asteroid.health--;
                if (asteroid.health > 0) return;

                // 计算分数
                let points = 0;
                const size = asteroid.asteroidSize;
                if (size === 'large') points = 20;
                else if (size === 'medium') points = 30;
                else points = 50;

                // 连击判定 (2秒内)
                const now = this.time.now;
                if (now - this.lastKillTime < 2000) {
                    this.combo++;
                    this.comboBonus = Math.min(this.combo * 5, 50);
                    points += this.comboBonus;
                    if (this.combo >= 2) {
                        sfxCombo();
                        this.showComboEffect(asteroid.x, asteroid.y);
                    } else {
                        sfxScore();
                    }
                } else {
                    this.combo = 1;
                    this.comboBonus = 0;
                    sfxScore();
                }
                this.lastKillTime = now;

                this.score += points;
                this.updateUI();

                // 爆炸效果
                this.createExplosion(asteroid.x, asteroid.y, asteroid.asteroidSize);

                // 分裂
                const sx = asteroid.x;
                const sy = asteroid.y;
                if (size === 'large') {
                    // 分裂成2个中型
                    const a1 = this.spawnAsteroid(sx - 20, sy, 'medium');
                    const a2 = this.spawnAsteroid(sx + 20, sy, 'medium');
                    if (a1) a1.setVelocity(Phaser.Math.Between(-60, -20), Phaser.Math.Between(40, 80));
                    if (a2) a2.setVelocity(Phaser.Math.Between(20, 60), Phaser.Math.Between(40, 80));
                } else if (size === 'medium') {
                    // 分裂成2个小型
                    const a1 = this.spawnAsteroid(sx - 15, sy, 'small');
                    const a2 = this.spawnAsteroid(sx + 15, sy, 'small');
                    if (a1) a1.setVelocity(Phaser.Math.Between(-80, -30), Phaser.Math.Between(60, 110));
                    if (a2) a2.setVelocity(Phaser.Math.Between(30, 80), Phaser.Math.Between(60, 110));
                }

                // 移除当前陨石
                asteroid.destroy();

                // 连击文本更新
                this.updateComboText();
            }

            // -------- 玩家被陨石撞击 ----------
            onPlayerHitAsteroid(player, asteroid) {
                if (!player.active || !asteroid.active) return;
                if (player.isInvincible) return;
                if (this.isGameOver) return;

                // 扣命
                this.lives--;
                this.updateUI();
                sfxDie();
                this.createExplosion(player.x, player.y, 'medium');

                if (this.lives <= 0) {
                    // 游戏结束
                    this.gameOver();
                    return;
                }

                // 无敌闪烁
                player.isInvincible = true;
                player.invincibleTimer = 2000;
                this.tweens.add({
                    targets: player,
                    alpha: { from: 1, to: 0.2 },
                    duration: 120,
                    yoyo: true,
                    repeat: 10,
                    onComplete: () => {
                        player.alpha = 1;
                    }
                });

                // 移除撞击的陨石
                const size = asteroid.asteroidSize;
                const sx = asteroid.x;
                const sy = asteroid.y;
                asteroid.destroy();

                // 如果是大/中型陨石，撞击后不分裂（被撞碎了）
                // 但小型陨石直接消失

                // 短暂重置玩家位置
                player.setPosition(400, 520);
                player.setVelocity(0, 0);
            }

            // -------- 爆炸效果 ----------
            createExplosion(x, y, size) {
                const count = size === 'large' ? 20 : (size === 'medium' ? 14 : 8);
                const colors = [0xff6633, 0xffaa33, 0xffcc44, 0xffffff, 0xff8844];
                for (let i = 0; i < count; i++) {
                    const p = this.add.circle(
                        x + Phaser.Math.Between(-8, 8),
                        y + Phaser.Math.Between(-8, 8),
                        Phaser.Math.Between(2, 5),
                        Phaser.Utils.Array.GetRandom(colors),
                        0.9
                    );
                    p.setDepth(8);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 80 + Math.random() * 160;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    this.tweens.add({
                        targets: p,
                        x: p.x + vx * 0.15,
                        y: p.y + vy * 0.15,
                        alpha: 0,
                        scale: 0.2,
                        duration: 300 + Math.random() * 200,
                        ease: 'Power2',
                        onComplete: () => p.destroy()
                    });
                }
            }

            // -------- 连击特效 ----------
            showComboEffect(x, y) {
                const txt = this.add.text(x, y, `连击 x${this.combo} +${this.comboBonus}`, {
                    fontFamily: 'monospace',
                    fontSize: '18px',
                    color: '#ffcc00',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setDepth(15);
                this.tweens.add({
                    targets: txt,
                    y: y - 60,
                    alpha: 0,
                    scale: 1.3,
                    duration: 700,
                    ease: 'Power2',
                    onComplete: () => txt.destroy()
                });
            }

            // -------- 游戏结束 ----------
            gameOver() {
                this.isGameOver = true;
                this.physics.pause();
                sfxGameOver();

                this.gameOverText.setText('💀 游戏结束');
                this.gameOverText.setVisible(true);

                this.gameOverSubText.setText(`最终得分: ${this.score}  按 Enter 或点击重新开始`);
                this.gameOverSubText.setVisible(true);

                // 等待重新开始
                this.input.keyboard.once('keydown-ENTER', () => {
                    this.restartGame();
                });
                this.input.keyboard.once('keydown-SPACE', () => {
                    this.restartGame();
                });
                // 触屏点击重新开始
                this.input.once('pointerdown', () => {
                    this.restartGame();
                });
                // 也支持点击按钮
                const btnFire = document.getElementById('btn-fire');
                const restartHandler = () => {
                    this.restartGame();
                    if (btnFire) btnFire.removeEventListener('pointerdown', restartHandler);
                };
                if (btnFire) btnFire.addEventListener('pointerdown', restartHandler);
            }

            // -------- 重新开始 ----------
            restartGame() {
                this.physics.resume();
                this.scene.restart();
            }

            // -------- UI更新 ----------
            updateUI() {
                this.scoreText.setText(`分数: ${this.score}`);
                let hearts = '';
                for (let i = 0; i < this.lives; i++) hearts += '❤';
                if (this.lives === 0) hearts = '💀';
                this.livesText.setText(`生命: ${hearts}`);
            }

            updateComboText() {
                if (this.combo >= 2) {
                    this.comboText.setText(`🔥 连击 x${this.combo} (+${this.comboBonus})`);
                } else {
                    this.comboText.setText('');
                }
            }

            // -------- update ----------
            update(time, delta) {
                if (this.isGameOver) {
                    // 星星继续动
                    this.updateStars(delta);
                    return;
                }

                if (this.isPaused) {
                    return;
                }

                const dt = delta;

                // ---- 星星滚动 ----
                this.updateStars(dt);

                // ---- 玩家移动 ----
                let vx = 0,
                    vy = 0;
                // 键盘
                if (this.cursors.left.isDown || this.wasd.left.isDown) vx = -280;
                else if (this.cursors.right.isDown || this.wasd.right.isDown) vx = 280;
                if (this.cursors.up.isDown || this.wasd.up.isDown) vy = -280;
                else if (this.cursors.down.isDown || this.wasd.down.isDown) vy = 280;

                // 移动端
                if (this.mobileDir.left) vx = -280;
                else if (this.mobileDir.right) vx = 280;
                if (this.mobileDir.up) vy = -280;
                else if (this.mobileDir.down) vy = 280;

                this.player.setVelocity(vx, vy);

                // ---- 射击 ----
                const firePressed = this.fireKey1.isDown || this.fireKey2.isDown || this.mobileFire;
                if (this.autoFire) {
                    this.fireTimer += dt;
                    if (this.fireTimer >= this.fireInterval) {
                        this.fireTimer = 0;
                        this.fireBullet();
                    }
                }
                if (firePressed) {
                    // 手动射击（按下即射，但限制频率）
                    if (!this._lastManualFire || time - this._lastManualFire > 250) {
                        this._lastManualFire = time;
                        this.fireBullet();
                    }
                }

                // ---- 无敌计时 ----
                if (this.player.isInvincible) {
                    this.player.invincibleTimer -= dt;
                    if (this.player.invincibleTimer <= 0) {
                        this.player.isInvincible = false;
                        this.player.alpha = 1;
                    }
                }

                // ---- 陨石生成 ----
                this.asteroidTimer += dt;
                if (this.asteroidTimer >= this.asteroidInterval) {
                    this.asteroidTimer = 0;
                    // 根据游戏时间增加难度
                    const count = Math.min(1 + Math.floor(this.gameTime / 30), 5);
                    this.spawnWave(count);
                    // 逐渐加快生成速度
                    this.asteroidInterval = Math.max(800, 2500 - this.gameTime * 20);
                }

                // ---- 游戏时间 ----
                this.gameTime += dt / 1000;

                // ---- 清理超出边界的陨石和子弹 ----
                this.cleanupOffscreen();

                // ---- 更新连击UI ----
                const now = this.time.now;
                if (now - this.lastKillTime > 2000 && this.combo > 0) {
                    this.combo = 0;
                    this.comboBonus = 0;
                    this.updateComboText();
                }
            }

            // -------- 星星更新 ----------
            updateStars(dt) {
                for (const s of this.stars) {
                    s.y += s.speed * (dt / 1000);
                    if (s.y > 620) {
                        s.y = -20;
                        s.x = Phaser.Math.Between(0, 800);
                    }
                }
            }

            // -------- 清理越界对象 ----------
            cleanupOffscreen() {
                // 子弹越界
                this.bullets.getChildren().forEach(b => {
                    if (b.active && (b.y < -30 || b.y > 650 || b.x < -30 || b.x > 830)) {
                        b.setActive(false);
                        b.setVisible(false);
                        b.body.enable = false;
                        this.bullets.killAndHide(b);
                    }
                });
                // 陨石越界（底部）
                this.asteroids.getChildren().forEach(a => {
                    if (a.active && a.y > 650) {
                        a.destroy();
                    }
                });
                // 陨石越界（左右太远）
                this.asteroids.getChildren().forEach(a => {
                    if (a.active && (a.x < -100 || a.x > 900)) {
                        a.destroy();
                    }
                });
            }
        }

        // ---- Phaser 游戏配置 ----
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 800,
                height: 600
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: GameScene,
            backgroundColor: '#0a0a1a',
            input: {
                activePointers: 3
            }
        };

        // ---- 启动游戏 ----
        const game = new Phaser.Game(config);

        // 暴露游戏实例以便调试
        window.game = game;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>打飞碟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 800 / 600;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>

    <script>
        // ============================================================
        //  打飞碟 — v1 完整修复版
        //  功能：飞碟生成/移动/点击击中 / 计分(含连击) / 60秒倒计时
        //        / 速度递增 / 生成间隔自适应 / 游戏结束重新开始
        // ============================================================

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const UFO_RADIUS = 25;
        const GAME_DURATION = 60; // 秒
        const BASE_SCORE = 10;

        // ---- 飞碟速度参数 ----
        const SPEED_INIT_MIN = 150;
        const SPEED_INIT_MAX = 250;
        const SPEED_MAX = 450;
        const SPEED_INTERVAL = 15; // 每15秒递增
        const SPEED_MULTIPLIER = 1.3;

        // ---- 生成间隔参数 ----
        const SPAWN_INTERVAL_INIT_MIN = 800; // 毫秒
        const SPAWN_INTERVAL_INIT_MAX = 1500;
        const SPAWN_INTERVAL_FINAL_MIN = 400;
        const SPAWN_INTERVAL_FINAL_MAX = 1000;
        const SPAWN_INTERVAL_STEP = 20; // 每20秒调整

        // ---- 连击参数 ----
        const COMBO_WINDOW = 2000; // 2秒
        const COMBO_BONUS_CAP = 50;

        // ---- 飞碟生成方向 ----
        const DIRECTIONS = ['left', 'right', 'top', 'bottom'];

        // ============================================================
        //  GameScene
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
            }

            preload() {
                this.generateTextures();
            }

            // ---------- 生成纹理 (修复: 中心对齐到 25,25) ----------
            generateTextures() {
                const g = this.make.graphics({ x: 0, y: 0 });

                // ---- 飞碟纹理 (50x50) ----
                g.clear();

                // 主体 —— 暗银灰色圆盘 (中心 25,25)
                g.fillStyle(0x8899aa);
                g.fillCircle(25, 25, 22);

                // 主体高光
                g.fillStyle(0xaabbcc, 0.5);
                g.fillCircle(25, 21, 16);

                // 边缘线
                g.lineStyle(2, 0x667788);
                g.strokeCircle(25, 25, 22);

                // 驾驶舱 —— 淡蓝色半透明圆顶
                g.fillStyle(0x66ddff, 0.7);
                g.fillCircle(25, 14, 10);

                // 驾驶舱高光
                g.fillStyle(0xaaeeff, 0.4);
                g.fillCircle(23, 11, 5);

                // 底部小灯 (相对位置调整)
                g.fillStyle(0xffaa33);
                g.fillCircle(16, 37, 3);
                g.fillCircle(25, 39, 3);
                g.fillCircle(34, 37, 3);

                g.generateTexture('ufo', 50, 50);

                // ---- 击中特效纹理 (30x30 亮星) ----
                g.clear();
                g.fillStyle(0xffee44, 1);
                g.fillCircle(15, 15, 12);
                g.fillStyle(0xffffff, 0.6);
                g.fillCircle(15, 12, 6);
                g.fillCircle(12, 18, 4);
                g.fillCircle(18, 18, 4);
                g.generateTexture('hit_effect', 30, 30);

                g.destroy();
            }

            // ---------- 创建 ----------
            create() {
                // ---- 游戏状态 ----
                this.isPlaying = true;
                this.score = 0;
                this.timeLeft = GAME_DURATION;
                this.comboCount = 0;
                this.lastHitTime = 0;
                this.elapsedSeconds = 0;
                this.gameOverShown = false;

                // ---- 物理世界 ----
                this.physics.world.setBounds(0, 0, GAME_WIDTH, GAME_HEIGHT);

                // ---- 飞碟分组 (修复: runChildUpdate: true) ----
                this.ufos = this.physics.add.group({
                    runChildUpdate: true,
                    allowGravity: false,
                    collideWorldBounds: false
                });

                // ---- UI (含倒计时) ----
                this.createUI();

                // ---- 点击事件 ----
                this.input.on('pointerdown', (pointer) => {
                    this.onPointerDown(pointer);
                });

                // ---- 倒计时 ----
                this.timerEvent = this.time.addEvent({
                    delay: 1000,
                    callback: this.onTimerTick,
                    callbackScope: this,
                    loop: true
                });

                // ---- 开始生成飞碟 ----
                this.scheduleNextSpawn();
            }

            // ---------- UI (含倒计时显示) ----------
            createUI() {
                // 标题
                this.titleText = this.add.text(GAME_WIDTH / 2, 18, '打飞碟', {
                    fontSize: '26px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5, 0.5).setDepth(100);

                // 分数
                this.scoreText = this.add.text(20, 18, '分数: 0', {
                    fontSize: '20px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffdd44'
                }).setDepth(100);

                // 倒计时 (右上角)
                this.timerText = this.add.text(GAME_WIDTH - 20, 18, '时间: ' + GAME_DURATION, {
                    fontSize: '20px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#66ffaa'
                }).setOrigin(1, 0).setDepth(100);

                // 连击提示 (中间偏下)
                this.comboText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT - 40, '', {
                    fontSize: '18px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffaa44'
                }).setOrigin(0.5, 0.5).setDepth(100).setAlpha(0);

                // 游戏结束文本 (先隐藏)
                this.gameOverText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 - 30, '', {
                    fontSize: '42px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ff6666',
                    fontStyle: 'bold'
                }).setOrigin(0.5, 0.5).setDepth(200).setAlpha(0);

                this.finalScoreText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30, '', {
                    fontSize: '24px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff'
                }).setOrigin(0.5, 0.5).setDepth(200).setAlpha(0);

                this.restartText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2 + 80, '点击重新开始', {
                    fontSize: '20px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#88ddff'
                }).setOrigin(0.5, 0.5).setDepth(200).setAlpha(0);
            }

            // ---------- 安排下一次飞碟生成 ----------
            scheduleNextSpawn() {
                if (!this.isPlaying) return;

                // 根据已过时间计算当前生成间隔
                const t = Math.min(this.elapsedSeconds / SPAWN_INTERVAL_STEP, 1);
                const minDelay = Phaser.Math.Linear(SPAWN_INTERVAL_INIT_MIN, SPAWN_INTERVAL_FINAL_MIN, t);
                const maxDelay = Phaser.Math.Linear(SPAWN_INTERVAL_INIT_MAX, SPAWN_INTERVAL_FINAL_MAX, t);
                const delay = Phaser.Math.Between(minDelay, maxDelay);

                // 随机决定本次生成几个飞碟 (1~3, 随时间增多)
                const count = Math.min(1 + Math.floor(this.elapsedSeconds / 20), 3);

                this.time.delayedCall(delay, () => {
                    if (!this.isPlaying) return;
                    for (let i = 0; i < count; i++) {
                        this.spawnUFO();
                    }
                    this.scheduleNextSpawn();
                });
            }

            // ---------- 生成单个飞碟 ----------
            spawnUFO() {
                // 根据已过时间计算速度倍率
                const stage = Math.floor(this.elapsedSeconds / SPEED_INTERVAL);
                const multiplier = Math.pow(SPEED_MULTIPLIER, stage);
                const minSpeed = Math.min(SPEED_INIT_MIN * multiplier, SPEED_MAX);
                const maxSpeed = Math.min(SPEED_INIT_MAX * multiplier, SPEED_MAX);
                const speed = Phaser.Math.Between(minSpeed, maxSpeed);

                // 随机选择方向和起始位置
                const dir = Phaser.Math.RND.pick(DIRECTIONS);
                let x, y, vx, vy;

                const margin = 60;
                switch (dir) {
                    case 'left':
                        x = -margin;
                        y = Phaser.Math.Between(80, GAME_HEIGHT - 80);
                        vx = speed;
                        vy = Phaser.Math.Between(-80, 80);
                        break;
                    case 'right':
                        x = GAME_WIDTH + margin;
                        y = Phaser.Math.Between(80, GAME_HEIGHT - 80);
                        vx = -speed;
                        vy = Phaser.Math.Between(-80, 80);
                        break;
                    case 'top':
                        x = Phaser.Math.Between(80, GAME_WIDTH - 80);
                        y = -margin;
                        vx = Phaser.Math.Between(-80, 80);
                        vy = speed;
                        break;
                    case 'bottom':
                        x = Phaser.Math.Between(80, GAME_WIDTH - 80);
                        y = GAME_HEIGHT + margin;
                        vx = Phaser.Math.Between(-80, 80);
                        vy = -speed;
                        break;
                }

                // 创建飞碟 (设置 origin 0.5, 确保物理体以中心定位)
                const ufo = this.ufos.create(x, y, 'ufo');
                ufo.setOrigin(0.5, 0.5);
                ufo.setDepth(50);
                ufo.body.setCircle(22, 3, 3); // 圆形物理体，偏移使与视觉中心对齐
                ufo.setVelocity(vx, vy);
                ufo.setAngularVelocity(Phaser.Math.Between(-30, 30));

                // 存储生成时间 (用于后续可能的速度变化)
                ufo.setData('spawnTime', this.elapsedSeconds);
            }

            // ---------- 指针点击处理 (击中检测 + 连击) ----------
            onPointerDown(pointer) {
                if (!this.isPlaying) return;

                const px = pointer.x;
                const py = pointer.y;
                let hit = false;

                // 遍历飞碟组，检测点击是否命中
                const children = this.ufos.getChildren();
                for (let i = children.length - 1; i >= 0; i--) {
                    const ufo = children[i];
                    if (!ufo.active) continue;

                    // 使用圆形碰撞检测 (视觉中心)
                    const dx = px - ufo.x;
                    const dy = py - ufo.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist <= UFO_RADIUS) {
                        // 击中！
                        hit = true;

                        // ---- 连击计算 ----
                        const now = this.elapsedSeconds;
                        if (now - this.lastHitTime <= COMBO_WINDOW / 1000) {
                            this.comboCount++;
                        } else {
                            this.comboCount = 0;
                        }
                        this.lastHitTime = now;

                        // 计算额外连击加分
                        const comboBonus = Math.min(this.comboCount * 5, COMBO_BONUS_CAP);
                        const totalScore = BASE_SCORE + comboBonus;
                        this.score += totalScore;

                        // ---- 更新UI ----
                        this.scoreText.setText('分数: ' + this.score);
                        if (this.comboCount >= 2) {
                            this.comboText.setText('连击 x' + (this.comboCount + 1) + '  +' + comboBonus);
                            this.comboText.setAlpha(1);
                            this.tweens.add({
                                targets: this.comboText,
                                alpha: 0,
                                duration: 800,
                                delay: 300,
                                ease: 'Power2'
                            });
                        }

                        // ---- 击中特效 ----
                        const effect = this.add.image(ufo.x, ufo.y, 'hit_effect').setDepth(150);
                        this.tweens.add({
                            targets: effect,
                            scale: 2.5,
                            alpha: 0,
                            duration: 400,
                            ease: 'Power2',
                            onComplete: () => effect.destroy()
                        });

                        // ---- 销毁飞碟 ----
                        ufo.destroy();
                        break; // 一次点击只打掉一个飞碟
                    }
                }

                // 如果没打中，重置连击
                if (!hit) {
                    this.comboCount = 0;
                }
            }

            // ---------- 每秒倒计时 ----------
            onTimerTick() {
                if (!this.isPlaying) return;

                this.timeLeft--;
                this.elapsedSeconds = GAME_DURATION - this.timeLeft;

                this.timerText.setText('时间: ' + this.timeLeft);

                // 时间不足10秒时变红闪烁
                if (this.timeLeft <= 10) {
                    this.timerText.setColor('#ff4444');
                    this.tweens.add({
                        targets: this.timerText,
                        scaleX: 1.15,
                        scaleY: 1.15,
                        duration: 150,
                        yoyo: true,
                        ease: 'Sine.easeInOut'
                    });
                }

                // 游戏结束
                if (this.timeLeft <= 0) {
                    this.endGame();
                }
            }

            // ---------- 游戏结束 ----------
            endGame() {
                this.isPlaying = false;
                this.gameOverShown = true;

                // 停止所有计时器
                this.timerEvent.remove();
                // 清除所有待生成
                this.time.removeAllEvents();

                // 销毁所有飞碟
                this.ufos.clear(true, true);

                // 禁用输入 (但保留重新开始需要重新启用)
                this.input.enabled = false;

                // 显示结束界面
                this.gameOverText.setText('游戏结束');
                this.gameOverText.setAlpha(1);

                this.finalScoreText.setText('最终得分: ' + this.score);
                this.finalScoreText.setAlpha(1);

                this.restartText.setText('点击重新开始');
                this.restartText.setAlpha(1);

                // 播放动画
                this.tweens.add({
                    targets: [this.gameOverText, this.finalScoreText, this.restartText],
                    y: '+=8',
                    duration: 600,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                // 1.5秒后启用点击重新开始
                this.time.delayedCall(600, () => {
                    this.input.enabled = true;
                    this.input.once('pointerdown', () => {
                        this.scene.restart();
                    });
                });
            }

            // ---------- 每帧更新 (边界检测) ----------
            update() {
                if (!this.isPlaying) return;

                const margin = 80;
                const children = this.ufos.getChildren();
                for (let i = children.length - 1; i >= 0; i--) {
                    const ufo = children[i];
                    if (!ufo.active) continue;

                    const x = ufo.x;
                    const y = ufo.y;
                    if (x < -margin || x > GAME_WIDTH + margin ||
                        y < -margin || y > GAME_HEIGHT + margin) {
                        ufo.destroy();
                    }
                }
            }
        }

        // ============================================================
        //  Phaser 配置
        // ============================================================
        const config = {
            type: Phaser.AUTO,
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            parent: 'game-container',
            backgroundColor: '#1a2a3a',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [GameScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>

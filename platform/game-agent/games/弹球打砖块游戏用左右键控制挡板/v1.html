<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弹球打砖块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>

    <script>
        // ============================================================
        //  GameScene - 弹球打砖块核心场景
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
                // ---------- 游戏状态 ----------
                this.score = 0;
                this.lives = 3;
                this.ballSpeed = 400;
                this.maxBallSpeed = 600;
                this.speedIncrement = 10;
                this.paddleSpeed = 600;
                this.gameState = 'READY'; // READY | PLAYING | WIN | GAMEOVER
                this.rows = 6;
                this.cols = 8;
                this.brickWidth = 90;
                this.brickHeight = 30;
                this.brickGap = 2;
                this.paddleWidth = 150;
                this.paddleHeight = 20;
                this.ballRadius = 8;
                this.ballDiameter = 16;
                // 砖块颜色 (彩虹色)
                this.brickColors = [
                    0xFF3333, 0xFF8800, 0xFFDD00,
                    0x33DD33, 0x3388FF, 0x8833FF
                ];
                // 引用
                this.paddle = null;
                this.ball = null;
                this.bricks = null;
                this.scoreText = null;
                this.livesText = null;
                this.msgText = null;
                this.msgSubText = null;
                this.topWall = null;
                this.leftWall = null;
                this.rightWall = null;
                this.btnA = null;
                this.btnB = null;
                this.btnAText = null;
                this.btnBText = null;
                this.btnAPressed = false;
                this.btnBPressed = false;
                // 键盘
                this.cursors = null;
                this.keyA = null;
                this.keyD = null;
                this.keyJ = null;
                this.keyK = null;
                this.keySpace = null;
                // 触摸拖动
                this.isDragging = false;
            }

            // ========================================================
            //  CREATE
            // ========================================================
            create() {
                // ---------- 生成纹理 ----------
                this.createTextures();

                // ---------- 物理世界边界 (可视范围 800x600) ----------
                this.physics.world.setBounds(0, 0, 800, 600);
                // 关闭底部碰撞 (让小球掉出去)
                // 但我们手动添加上、左、右墙壁

                // ---------- 墙壁 (上、左、右) ----------
                this.topWall = this.add.rectangle(400, -15, 800, 30, 0x222222);
                this.physics.add.existing(this.topWall, true);

                this.leftWall = this.add.rectangle(-15, 300, 30, 600, 0x222222);
                this.physics.add.existing(this.leftWall, true);

                this.rightWall = this.add.rectangle(815, 300, 30, 600, 0x222222);
                this.physics.add.existing(this.rightWall, true);

                // ---------- 砖块 (staticGroup) ----------
                this.bricks = this.physics.add.staticGroup();
                this.createBricks();

                // ---------- 挡板 ----------
                this.paddle = this.physics.add.sprite(400, 570, 'paddle');
                this.paddle.setImmovable(true);
                this.paddle.body.setCollideWorldBounds(true);
                this.paddle.body.allowGravity = false;

                // ---------- 小球 ----------
                this.ball = this.physics.add.sprite(400, 550, 'ball');
                this.ball.setCircle(8);
                this.ball.body.setBounce(1);
                this.ball.body.setCollideWorldBounds(false);
                this.ball.body.allowGravity = false;
                this.ball.body.setMaxVelocity(this.maxBallSpeed, this.maxBallSpeed);
                this.resetBall();

                // ---------- 碰撞 ----------
                // 小球 ↔ 墙壁
                this.physics.add.collider(this.ball, this.topWall);
                this.physics.add.collider(this.ball, this.leftWall);
                this.physics.add.collider(this.ball, this.rightWall);

                // 小球 ↔ 挡板
                this.physics.add.collider(this.ball, this.paddle, this.hitPaddle, null, this);

                // 小球 ↔ 砖块
                this.physics.add.collider(this.ball, this.bricks, this.hitBrick, null, this);

                // ---------- UI ----------
                // 分数
                this.scoreText = this.add.text(20, 12, '分数: 0', {
                    fontSize: '22px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold'
                });

                // 生命值
                this.livesText = this.add.text(780, 12, '生命: 3', {
                    fontSize: '22px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(1, 0);

                // 提示文字 (居中)
                this.msgText = this.add.text(400, 280, '', {
                    fontSize: '42px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5).setShadow(2, 2, '#000000', 4);

                this.msgSubText = this.add.text(400, 340, '', {
                    fontSize: '22px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#dddddd'
                }).setOrigin(0.5).setShadow(1, 1, '#000000', 3);

                this.showReadyMsg();

                // ---------- 虚拟按钮 A / B ----------
                this.createVirtualButtons();

                // ---------- 键盘 ----------
                this.cursors = this.input.keyboard.createCursorKeys();
                this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
                this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
                this.keyJ = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.J);
                this.keyK = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.K);
                this.keySpace = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // 空格发球 / 重新开始
                this.input.keyboard.on('keydown-SPACE', () => {
                    if (this.gameState === 'READY') {
                        this.launchBall();
                    } else if (this.gameState === 'WIN' || this.gameState === 'GAMEOVER') {
                        this.restartGame();
                    }
                });

                // ---------- 触控: 点击发球 ----------
                this.input.on('pointerdown', (pointer) => {
                    // 如果点击在虚拟按钮区域则不触发发球
                    if (pointer.y > 560 && (pointer.x < 100 || pointer.x > 700)) return;
                    if (this.gameState === 'READY') {
                        this.launchBall();
                    } else if (this.gameState === 'WIN' || this.gameState === 'GAMEOVER') {
                        this.restartGame();
                    }
                });

                // ---------- 触控: 拖动挡板 ----------
                this.input.on('pointerdown', (pointer) => {
                    this.isDragging = true;
                    this.movePaddleTo(pointer.x);
                });
                this.input.on('pointermove', (pointer) => {
                    if (this.isDragging) {
                        this.movePaddleTo(pointer.x);
                    }
                });
                this.input.on('pointerup', () => {
                    this.isDragging = false;
                });

                // ---------- 状态 ----------
                this.gameState = 'READY';
            }

            // ========================================================
            //  UPDATE
            // ========================================================
            update() {
                // 挡板移动: 键盘
                if (this.gameState === 'PLAYING' || this.gameState === 'READY') {
                    let moveDir = 0;
                    if (this.cursors.left.isDown || this.keyA.isDown || this.keyJ.isDown || this.btnAPressed) {
                        moveDir = -1;
                    } else if (this.cursors.right.isDown || this.keyD.isDown || this.keyK.isDown || this.btnBPressed) {
                        moveDir = 1;
                    }
                    if (moveDir !== 0) {
                        this.paddle.body.setVelocityX(moveDir * this.paddleSpeed);
                    } else {
                        // 只有没用触控拖动时才停止
                        if (!this.isDragging) {
                            this.paddle.body.setVelocityX(0);
                        }
                    }
                } else {
                    this.paddle.body.setVelocityX(0);
                }

                // 如果是 READY 状态，让小球跟随挡板
                if (this.gameState === 'READY' && this.ball) {
                    this.ball.setPosition(this.paddle.x, this.paddle.y - 20);
                    this.ball.body.setVelocity(0, 0);
                }

                // 检测小球出界 (底部丢失)
                if (this.gameState === 'PLAYING' && this.ball) {
                    if (this.ball.y > 620) {
                        this.ballLost();
                    }
                }

                // 更新 UI 中的生命值颜色 (低生命警告)
                if (this.lives <= 1) {
                    this.livesText.setColor('#ff4444');
                } else {
                    this.livesText.setColor('#ffffff');
                }
            }

            // ========================================================
            //  核心游戏逻辑
            // ========================================================

            // ---- 发球 ----
            launchBall() {
                if (this.gameState !== 'READY') return;
                this.gameState = 'PLAYING';
                this.msgText.setText('');
                this.msgSubText.setText('');

                // 随机方向斜上方
                let angle = Phaser.Math.Between(-60, 60);
                let rad = Phaser.Math.DegToRad(angle);
                let vx = this.ballSpeed * Math.sin(rad);
                let vy = -this.ballSpeed * Math.cos(rad);
                // 确保 vy 是负的 (向上)
                if (vy >= 0) vy = -vy;
                this.ball.body.setVelocity(vx, vy);
            }

            // ---- 重置小球 ----
            resetBall() {
                if (!this.ball) return;
                this.ball.setPosition(this.paddle.x, this.paddle.y - 20);
                this.ball.body.setVelocity(0, 0);
                this.ball.body.setBounce(1);
                this.ball.body.setMaxVelocity(this.maxBallSpeed, this.maxBallSpeed);
                this.gameState = 'READY';
                this.showReadyMsg();
            }

            // ---- 小球碰挡板 ----
            hitPaddle(ball, paddle) {
                // 根据碰撞位置调整反弹角度
                let diff = ball.x - paddle.x;
                let halfW = paddle.displayWidth / 2;
                let t = Phaser.Math.Clamp(diff / halfW, -1, 1);

                let speed = Math.sqrt(
                    ball.body.velocity.x * ball.body.velocity.x +
                    ball.body.velocity.y * ball.body.velocity.y
                );
                if (speed < 100) speed = this.ballSpeed;

                // 角度范围 -65° ~ 65° (从垂直向上偏转)
                let angleDeg = t * 65;
                let rad = Phaser.Math.DegToRad(angleDeg);
                let newVx = speed * Math.sin(rad);
                let newVy = -speed * Math.cos(rad);
                // 确保向上
                if (newVy >= 0) newVy = -newVy;
                ball.body.setVelocity(newVx, newVy);
            }

            // ---- 小球碰砖块 ----
            hitBrick(ball, brick) {
                // 销毁砖块
                brick.destroy();

                // 加分
                this.score += 10;
                this.scoreText.setText('分数: ' + this.score);

                // 速度递增
                let vx = ball.body.velocity.x;
                let vy = ball.body.velocity.y;
                let curSpeed = Math.sqrt(vx * vx + vy * vy);
                if (curSpeed < this.maxBallSpeed) {
                    let newSpeed = Math.min(curSpeed + this.speedIncrement, this.maxBallSpeed);
                    let ratio = newSpeed / curSpeed;
                    ball.body.setVelocity(vx * ratio, vy * ratio);
                    this.ballSpeed = newSpeed;
                }

                // 检查是否胜利
                if (this.bricks.countActive() === 0) {
                    this.gameWin();
                }
            }

            // ---- 小球丢失 ----
            ballLost() {
                this.lives--;
                this.livesText.setText('生命: ' + this.lives);

                if (this.lives <= 0) {
                    this.gameOver();
                } else {
                    // 重置小球
                    this.resetBall();
                    // 小球回到挡板
                    this.ball.setPosition(this.paddle.x, this.paddle.y - 20);
                    this.ball.body.setVelocity(0, 0);
                    this.gameState = 'READY';
                    this.showReadyMsg();
                }
            }

            // ---- 游戏胜利 ----
            gameWin() {
                this.gameState = 'WIN';
                this.ball.body.setVelocity(0, 0);
                this.msgText.setText('🎉 恭喜通关！');
                this.msgSubText.setText('最终得分: ' + this.score + '  按空格键重新开始');
                this.msgText.setColor('#ffdd00');
            }

            // ---- 游戏结束 ----
            gameOver() {
                this.gameState = 'GAMEOVER';
                this.ball.body.setVelocity(0, 0);
                this.ball.setVisible(false);
                this.msgText.setText('💔 游戏结束');
                this.msgSubText.setText('最终得分: ' + this.score + '  按空格键重新开始');
                this.msgText.setColor('#ff4444');
            }

            // ---- 重新开始 ----
            restartGame() {
                // 重置所有状态
                this.score = 0;
                this.lives = 3;
                this.ballSpeed = 400;
                this.gameState = 'READY';

                // 重置 UI
                this.scoreText.setText('分数: 0');
                this.livesText.setText('生命: 3');
                this.msgText.setColor('#ffffff');

                // 清除所有砖块
                this.bricks.clear(true, true);

                // 重新生成砖块
                this.createBricks();

                // 重置小球
                this.ball.setVisible(true);
                this.ball.setPosition(this.paddle.x, this.paddle.y - 20);
                this.ball.body.setVelocity(0, 0);
                this.ball.body.setBounce(1);
                this.ball.body.setMaxVelocity(this.maxBallSpeed, this.maxBallSpeed);

                // 重置挡板位置
                this.paddle.setPosition(400, 570);
                this.paddle.body.setVelocityX(0);

                this.showReadyMsg();
            }

            // ---- 显示就绪提示 ----
            showReadyMsg() {
                this.msgText.setText('🟡 弹球打砖块');
                this.msgSubText.setText('按 空格键 或 点击屏幕 发球');
                this.msgText.setColor('#ffffff');
            }

            // ========================================================
            //  辅助：生成纹理
            // ========================================================
            createTextures() {
                // 砖块 (每行不同颜色)
                for (let i = 0; i < this.rows; i++) {
                    let color = this.brickColors[i];
                    let g = this.make.graphics({ x: 0, y: 0 });
                    // 填充
                    g.fillStyle(color);
                    g.fillRect(0, 0, this.brickWidth, this.brickHeight);
                    // 边框 (高光线)
                    g.lineStyle(2, 0xffffff, 0.25);
                    g.strokeRect(1, 1, this.brickWidth - 2, this.brickHeight - 2);
                    // 底部高光
                    g.fillStyle(0xffffff, 0.08);
                    g.fillRect(2, 2, this.brickWidth - 4, 6);
                    g.generateTexture('brick' + i, this.brickWidth, this.brickHeight);
                    g.destroy();
                }

                // 挡板
                let gp = this.make.graphics({ x: 0, y: 0 });
                gp.fillStyle(0x88ccff);
                gp.fillRect(0, 0, this.paddleWidth, this.paddleHeight);
                gp.lineStyle(2, 0xffffff, 0.5);
                gp.strokeRect(1, 1, this.paddleWidth - 2, this.paddleHeight - 2);
                gp.fillStyle(0xffffff, 0.2);
                gp.fillRect(4, 2, this.paddleWidth - 8, 6);
                gp.generateTexture('paddle', this.paddleWidth, this.paddleHeight);
                gp.destroy();

                // 小球
                let gb = this.make.graphics({ x: 0, y: 0 });
                gb.fillStyle(0xffee44);
                gb.fillCircle(this.ballRadius, this.ballRadius, this.ballRadius);
                gb.fillStyle(0xffffff, 0.4);
                gb.fillCircle(this.ballRadius - 2, this.ballRadius - 3, 3);
                gb.generateTexture('ball', this.ballDiameter, this.ballDiameter);
                gb.destroy();
            }

            // ========================================================
            //  辅助：创建砖块
            // ========================================================
            createBricks() {
                let startX = (800 - (this.cols * this.brickWidth + (this.cols - 1) * this.brickGap)) / 2;
                let startY = 70;

                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        let x = startX + col * (this.brickWidth + this.brickGap) + this.brickWidth / 2;
                        let y = startY + row * (this.brickHeight + this.brickGap) + this.brickHeight / 2;
                        let key = 'brick' + row;
                        let brick = this.bricks.create(x, y, key);
                        brick.setOrigin(0.5);
                        brick.refreshBody();
                    }
                }
            }

            // ========================================================
            //  辅助：虚拟按钮
            // ========================================================
            createVirtualButtons() {
                const btnY = 580;
                const btnR = 40;

                // ---- 按钮 A (左) ----
                let gA = this.make.graphics({ x: 0, y: 0 });
                gA.fillStyle(0xffffff, 0.2);
                gA.fillCircle(btnR, btnR, btnR);
                gA.lineStyle(3, 0xffffff, 0.6);
                gA.strokeCircle(btnR, btnR, btnR);
                gA.generateTexture('btnA_bg', btnR * 2, btnR * 2);
                gA.destroy();

                this.btnA = this.add.image(60, btnY, 'btnA_bg').setInteractive();
                this.btnAText = this.add.text(60, btnY - 2, 'A', {
                    fontSize: '28px',
                    fontFamily: 'Arial',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                // 键盘提示小字
                this.add.text(60, btnY + 24, 'J', {
                    fontSize: '14px',
                    fontFamily: 'Arial',
                    color: '#bbbbbb'
                }).setOrigin(0.5);

                // 按钮交互
                this.btnA.on('pointerdown', () => { this.btnAPressed = true; });
                this.btnA.on('pointerup', () => { this.btnAPressed = false; });
                this.btnA.on('pointerout', () => { this.btnAPressed = false; });

                // ---- 按钮 B (右) ----
                let gB = this.make.graphics({ x: 0, y: 0 });
                gB.fillStyle(0xffffff, 0.2);
                gB.fillCircle(btnR, btnR, btnR);
                gB.lineStyle(3, 0xffffff, 0.6);
                gB.strokeCircle(btnR, btnR, btnR);
                gB.generateTexture('btnB_bg', btnR * 2, btnR * 2);
                gB.destroy();

                this.btnB = this.add.image(740, btnY, 'btnB_bg').setInteractive();
                this.btnBText = this.add.text(740, btnY - 2, 'B', {
                    fontSize: '28px',
                    fontFamily: 'Arial',
                    color: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                this.add.text(740, btnY + 24, 'K', {
                    fontSize: '14px',
                    fontFamily: 'Arial',
                    color: '#bbbbbb'
                }).setOrigin(0.5);

                this.btnB.on('pointerdown', () => { this.btnBPressed = true; });
                this.btnB.on('pointerup', () => { this.btnBPressed = false; });
                this.btnB.on('pointerout', () => { this.btnBPressed = false; });
            }

            // ========================================================
            //  辅助：触控移动挡板
            // ========================================================
            movePaddleTo(x) {
                let halfW = this.paddle.displayWidth / 2;
                let target = Phaser.Math.Clamp(x, halfW, 800 - halfW);
                this.paddle.setPosition(target, this.paddle.y);
                this.paddle.body.setVelocityX(0);
                // 如果处于 READY 状态，小球跟随
                if (this.gameState === 'READY' && this.ball) {
                    this.ball.setPosition(this.paddle.x, this.paddle.y - 20);
                }
            }
        }

        // ============================================================
        //  Phaser 配置
        // ============================================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: GameScene
        };

        // 启动游戏
        const game = new Phaser.Game(config);
    </script>
</body>
</html>

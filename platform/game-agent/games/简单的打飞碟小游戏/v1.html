<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打飞碟 · 休闲射击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            width: 800px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 4 / 3;
        }
        /* 画布自适应 */
        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(100, 180, 255, 0.15);
        }
        /* 移动端虚拟按键提示（隐藏，由 Phaser 内绘制） */
        .mobile-hint {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js">
    </script>
    <script>
        // ============================================================
        //  打飞碟小游戏  v1.0
        //  引擎：Phaser.js 3.87  |  类型：休闲射击 / 点击
        //  核心玩法：点击飞碟得分，60 秒限时挑战
        // ============================================================

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;

        // ---------- 飞碟类型配置 ----------
        const SAUCER_TYPES = {
            normal: {
                key: 'saucer_normal',
                color: 0xFFD700,
                borderColor: 0xB8860B,
                width: 50,
                height: 30,
                score: 10,
                speedMin: 200,
                speedMax: 300,
                weight: 60, // 出现概率权重
                label: '普通'
            },
            golden: {
                key: 'saucer_golden',
                color: 0xFFDD00,
                borderColor: 0xFFA500,
                width: 40,
                height: 25,
                score: 50,
                speedMin: 300,
                speedMax: 400,
                weight: 20,
                label: '金色'
            },
            small: {
                key: 'saucer_small',
                color: 0xFF4500,
                borderColor: 0xCC3300,
                width: 30,
                height: 18,
                score: 30,
                speedMin: 350,
                speedMax: 450,
                weight: 20,
                label: '小型'
            }
        };

        // ---------- 工具：加权随机选择 ----------
        function weightedRandom(types) {
            const totalWeight = Object.values(types).reduce((sum, t) => sum + t.weight, 0);
            let r = Math.random() * totalWeight;
            for (const [key, t] of Object.entries(types)) {
                r -= t.weight;
                if (r <= 0) return key;
            }
            return 'normal';
        }

        // ============================================================
        //  BootScene：生成所有纹理
        // ============================================================
        class BootScene extends Phaser.Scene {
            constructor() {
                super('BootScene');
            }

            create() {
                this.createSaucerTextures();
                this.scene.start('GameScene');
            }

            createSaucerTextures() {
                // 为每种飞碟生成纹理
                for (const [typeKey, cfg] of Object.entries(SAUCER_TYPES)) {
                    this.makeSaucerTexture(cfg.key, cfg.color, cfg.borderColor, cfg.width, cfg.height);
                }

                // 生成「点击爆炸」小圆点纹理 (用于命中特效)
                const g = this.make.graphics({ x: 0, y: 0 });
                g.fillStyle(0xFFFFFF, 1);
                g.fillCircle(6, 6, 6);
                g.generateTexture('particle', 12, 12);
                g.destroy();

                // 生成按钮背景纹理 (圆角矩形)
                this.makeButtonTexture('btn_green', 0x4CAF50, 200, 60);
                this.makeButtonTexture('btn_green_sm', 0x4CAF50, 140, 50);
                this.makeButtonTexture('btn_blue', 0x2196F3, 100, 60);
                this.makeButtonTexture('btn_orange', 0xFF9800, 100, 60);
                this.makeButtonTexture('btn_overlay', 0x000000, 800, 600);
            }

            makeSaucerTexture(key, color, borderColor, w, h) {
                const g = this.make.graphics({ x: 0, y: 0 });
                // 主体椭圆
                g.fillStyle(color, 1);
                g.fillEllipse(w / 2, h / 2, w, h);
                // 边框
                g.lineStyle(2, borderColor, 0.8);
                g.strokeEllipse(w / 2, h / 2, w, h);
                // 驾驶舱 (半透明小椭圆)
                g.fillStyle(0xE0F7FA, 0.45);
                g.fillEllipse(w / 2, h / 2 - h * 0.12, w * 0.42, h * 0.40);
                // 高光点
                g.fillStyle(0xFFFFFF, 0.35);
                g.fillCircle(w * 0.38, h * 0.30, w * 0.07);
                g.generateTexture(key, w, h);
                g.destroy();
            }

            makeButtonTexture(key, color, w, h) {
                const g = this.make.graphics({ x: 0, y: 0 });
                g.fillStyle(color, 1);
                g.fillRoundedRect(0, 0, w, h, 12);
                g.lineStyle(2, 0xFFFFFF, 0.25);
                g.strokeRoundedRect(0, 0, w, h, 12);
                g.generateTexture(key, w, h);
                g.destroy();
            }
        }

        // ============================================================
        //  GameScene：主游戏场景
        // ============================================================
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
            }

            // ---------- 数据 ----------
            initData() {
                this.score = 0;
                this.timeLeft = 60;
                this.gameActive = false; // 游戏是否进行中
                this.gameOver = false;
                this.isPaused = false;
                this.saucerGroup = this.physics.add.group({ runChildUpdate: false });
                this.spawnTimer = null;
                this.countdownTimer = null;
                this.activeTweens = [];
            }

            create() {
                this.initData();

                // ---- 背景 ----
                this.bg = this.add.graphics();
                this.bg.fillStyle(0x0a0a2a, 1);
                this.bg.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                // 星星
                for (let i = 0; i < 120; i++) {
                    const sx = Phaser.Math.Between(0, GAME_WIDTH);
                    const sy = Phaser.Math.Between(0, GAME_HEIGHT);
                    const sr = Math.random() * 2 + 0.5;
                    const alpha = Math.random() * 0.6 + 0.2;
                    this.bg.fillStyle(0xFFFFFF, alpha);
                    this.bg.fillCircle(sx, sy, sr);
                }

                // ---- UI 层 (分数 / 倒计时) ----
                this.scoreText = this.add.text(24, 20, '分数：000', {
                    fontSize: '28px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0, 0).setDepth(10).setAlpha(0);

                this.timerText = this.add.text(GAME_WIDTH - 24, 20, '时间：60', {
                    fontSize: '28px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(1, 0).setDepth(10).setAlpha(0);

                // 暂停提示 (中央)
                this.pauseText = this.add.text(GAME_WIDTH / 2, GAME_HEIGHT / 2, '⏸ 已暂停', {
                    fontSize: '42px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 5,
                }).setOrigin(0.5).setDepth(20).setAlpha(0).setVisible(false);

                // ---- 虚拟按钮 A / B (底部) ----
                this.createVirtualButtons();

                // ---- 覆盖层 (开始 / 结束) ----
                this.overlay = this.add.image(0, 0, 'btn_overlay').setOrigin(0, 0).setDepth(30).setAlpha(0.55);
                this.overlay.setDisplaySize(GAME_WIDTH, GAME_HEIGHT);

                // 开始 / 结束 面板容器
                this.panelContainer = this.add.container(GAME_WIDTH / 2, GAME_HEIGHT / 2).setDepth(40);

                // ---- 初始化开始界面 ----
                this.showStartPanel();

                // ---- 键盘 ----
                this.input.keyboard.on('keydown-J', () => this.handleButtonA());
                this.input.keyboard.on('keydown-K', () => this.handleButtonB());
                this.input.keyboard.on('keydown-SPACE', () => {
                    if (this.gameOver) this.handleButtonA();
                });

                // ---- 全局点击（用于调试，但不干扰飞碟点击） ----
                // 飞碟点击在生成时单独绑定
            }

            // ---------- 虚拟按钮 ----------
            createVirtualButtons() {
                const btnY = GAME_HEIGHT - 44;
                const btnStyle = {
                    fontSize: '22px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 2,
                };
                const hintStyle = {
                    fontSize: '13px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#aaaaaa',
                    stroke: '#000000',
                    strokeThickness: 1,
                };

                // ---- A 按钮 (左) ----
                const ax = 80;
                this.btnA_bg = this.add.image(ax, btnY, 'btn_blue').setDepth(15).setAlpha(0.85).setInteractive({ useHandCursor: true });
                this.btnA_bg.setDisplaySize(88, 52);
                this.btnA_text = this.add.text(ax, btnY - 2, 'A', {
                    ...btnStyle,
                    fontSize: '26px',
                    color: '#ffffff'
                }).setOrigin(0.5).setDepth(16);
                this.btnA_hint = this.add.text(ax, btnY + 28, '键盘 J', {
                    ...hintStyle,
                    fontSize: '11px'
                }).setOrigin(0.5).setDepth(16);
                this.btnA_bg.on('pointerdown', () => this.handleButtonA());
                // 点击反馈
                this.btnA_bg.on('pointerover', () => this.btnA_bg.setAlpha(1));
                this.btnA_bg.on('pointerout', () => this.btnA_bg.setAlpha(0.85));

                // ---- B 按钮 (右) ----
                const bx = GAME_WIDTH - 80;
                this.btnB_bg = this.add.image(bx, btnY, 'btn_orange').setDepth(15).setAlpha(0.85).setInteractive({ useHandCursor: true });
                this.btnB_bg.setDisplaySize(88, 52);
                this.btnB_text = this.add.text(bx, btnY - 2, 'B', {
                    ...btnStyle,
                    fontSize: '26px',
                    color: '#ffffff'
                }).setOrigin(0.5).setDepth(16);
                this.btnB_hint = this.add.text(bx, btnY + 28, '键盘 K', {
                    ...hintStyle,
                    fontSize: '11px'
                }).setOrigin(0.5).setDepth(16);
                this.btnB_bg.on('pointerdown', () => this.handleButtonB());
                this.btnB_bg.on('pointerover', () => this.btnB_bg.setAlpha(1));
                this.btnB_bg.on('pointerout', () => this.btnB_bg.setAlpha(0.85));

                // 按钮功能标签
                this.btnA_label = this.add.text(ax, btnY + 44, '开始', {
                    fontSize: '11px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#8cf',
                    stroke: '#000000',
                    strokeThickness: 1,
                }).setOrigin(0.5).setDepth(16);

                this.btnB_label = this.add.text(bx, btnY + 44, '暂停', {
                    fontSize: '11px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#fc8',
                    stroke: '#000000',
                    strokeThickness: 1,
                }).setOrigin(0.5).setDepth(16);
            }

            // ---------- 按钮 A 处理（开始 / 重新开始） ----------
            handleButtonA() {
                if (this.gameOver) {
                    // 重新开始
                    this.scene.restart();
                    return;
                }
                if (!this.gameActive && !this.gameOver) {
                    this.startGame();
                }
                // 游戏进行中时，A 按钮不做事（或可定义为重开，但为避免误触，不处理）
            }

            // ---------- 按钮 B 处理（暂停 / 继续） ----------
            handleButtonB() {
                if (!this.gameActive || this.gameOver) return;
                this.togglePause();
            }

            // ---------- 暂停切换 ----------
            togglePause() {
                if (!this.gameActive || this.gameOver) return;
                this.isPaused = !this.isPaused;

                if (this.isPaused) {
                    // 暂停
                    this.physics.pause();
                    if (this.spawnTimer) this.spawnTimer.paused = true;
                    if (this.countdownTimer) this.countdownTimer.paused = true;
                    this.pauseText.setVisible(true).setAlpha(1);
                    this.btnB_text.setText('B');
                    this.btnB_label.setText('继续');
                } else {
                    // 继续
                    this.physics.resume();
                    if (this.spawnTimer) this.spawnTimer.paused = false;
                    if (this.countdownTimer) this.countdownTimer.paused = false;
                    this.pauseText.setVisible(false).setAlpha(0);
                    this.btnB_text.setText('B');
                    this.btnB_label.setText('暂停');
                }
            }

            // ---------- 开始游戏 ----------
            startGame() {
                this.gameActive = true;
                this.gameOver = false;
                this.score = 0;
                this.timeLeft = 60;
                this.updateScoreDisplay();
                this.updateTimerDisplay();

                // 隐藏开始面板
                this.hidePanel();

                // 显示 UI
                this.scoreText.setAlpha(1);
                this.timerText.setAlpha(1);

                // 更新按钮标签
                this.btnA_label.setText('重开');
                this.btnB_label.setText('暂停');

                // 清空残留飞碟
                this.clearAllSaucers();

                // 开始生成飞碟
                this.startSpawning();

                // 开始倒计时
                this.startCountdown();
            }

            // ---------- 结束游戏 ----------
            endGame() {
                this.gameActive = false;
                this.gameOver = true;
                this.isPaused = false;

                // 停止生成和倒计时
                if (this.spawnTimer) { this.spawnTimer.remove();
                    this.spawnTimer = null; }
                if (this.countdownTimer) { this.countdownTimer.remove();
                    this.countdownTimer = null; }

                // 暂停物理
                this.physics.pause();

                // 清空飞碟
                this.clearAllSaucers();

                // 隐藏暂停文字
                this.pauseText.setVisible(false);

                // 更新按钮
                this.btnA_label.setText('重开');
                this.btnB_label.setText('--');

                // 显示结束面板
                this.showEndPanel();
            }

            // ---------- 生成飞碟 ----------
            startSpawning() {
                // 每 0.8~1.5 秒生成一个
                const scheduleNext = () => {
                    if (!this.gameActive || this.gameOver) return;
                    const delay = Phaser.Math.Between(800, 1500);
                    this.spawnTimer = this.time.delayedCall(delay, () => {
                        if (!this.gameActive || this.gameOver) return;
                        this.spawnSaucer();
                        scheduleNext();
                    });
                };
                scheduleNext();
                // 立即生成第一个
                this.time.delayedCall(300, () => {
                    if (this.gameActive && !this.gameOver) this.spawnSaucer();
                });
            }

            spawnSaucer() {
                if (!this.gameActive || this.gameOver) return;

                // 选择类型
                const typeKey = weightedRandom(SAUCER_TYPES);
                const cfg = SAUCER_TYPES[typeKey];

                // 方向：0 左→右，1 右→左
                const dir = Math.random() < 0.5 ? 1 : -1;
                const speed = Phaser.Math.Between(cfg.speedMin, cfg.speedMax) * dir;

                // 起始位置
                const pad = cfg.width + 10;
                const x = dir > 0 ? -pad : GAME_WIDTH + pad;
                const y = Phaser.Math.Between(60, GAME_HEIGHT - 60);

                // 创建物理精灵
                const saucer = this.physics.add.sprite(x, y, cfg.key);
                saucer.setDisplaySize(cfg.width, cfg.height);
                saucer.body.setAllowGravity(false);
                saucer.body.setVelocity(speed, 0);
                saucer.setDepth(5);
                saucer.setInteractive({ useHandCursor: true });
                saucer.saucerType = typeKey;
                saucer.scoreValue = cfg.score;

                // 添加到组
                this.saucerGroup.add(saucer);

                // ---- 点击事件 ----
                saucer.on('pointerdown', (pointer) => {
                    if (!this.gameActive || this.gameOver || this.isPaused) return;
                    this.hitSaucer(saucer);
                });

                // ---- 自动销毁：2.8 秒后未点击则消失 ----
                saucer.autoDestroyTimer = this.time.delayedCall(Phaser.Math.Between(2500, 3000), () => {
                    if (saucer.active) {
                        this.flyAwaySaucer(saucer);
                    }
                });

                // 标记生成时间（用于调试）
                saucer.spawnTime = this.time.now;
            }

            // ---------- 命中飞碟 ----------
            hitSaucer(saucer) {
                if (!saucer.active) return;
                const score = saucer.scoreValue || 10;

                // 加分
                this.score += score;
                this.updateScoreDisplay();

                // 取消自动销毁定时器
                if (saucer.autoDestroyTimer) {
                    saucer.autoDestroyTimer.remove();
                    saucer.autoDestroyTimer = null;
                }

                // 爆炸特效：粒子爆发 + 缩放消失
                this.playHitEffect(saucer.x, saucer.y, saucer.saucerType);

                // 飞碟消失动画
                this.tweens.add({
                    targets: saucer,
                    scaleX: 0.2,
                    scaleY: 0.2,
                    alpha: 0,
                    duration: 180,
                    ease: 'Power2',
                    onComplete: () => {
                        if (saucer.active) saucer.destroy();
                    }
                });

                // 小飘分文字
                this.showFloatingScore(saucer.x, saucer.y, score);
            }

            // ---------- 飞碟飞走（未命中） ----------
            flyAwaySaucer(saucer) {
                if (!saucer.active) return;
                // 快速缩小消失
                this.tweens.add({
                    targets: saucer,
                    alpha: 0,
                    scaleX: 0.3,
                    scaleY: 0.3,
                    duration: 250,
                    ease: 'Power1',
                    onComplete: () => {
                        if (saucer.active) saucer.destroy();
                    }
                });
            }

            // ---------- 爆炸特效 ----------
            playHitEffect(x, y, typeKey) {
                const colorMap = {
                    normal: 0xFFD700,
                    golden: 0xFFEE44,
                    small: 0xFF6633
                };
                const color = colorMap[typeKey] || 0xFFD700;

                // 8 个粒子
                for (let i = 0; i < 10; i++) {
                    const p = this.add.image(x, y, 'particle').setDepth(8).setScale(0.6 + Math.random() * 0.8);
                    p.setTint(color);
                    p.setAlpha(0.9);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Phaser.Math.Between(30, 70);
                    const tx = x + Math.cos(angle) * dist;
                    const ty = y + Math.sin(angle) * dist;
                    this.tweens.add({
                        targets: p,
                        x: tx,
                        y: ty,
                        alpha: 0,
                        scaleX: 0.1,
                        scaleY: 0.1,
                        duration: 280 + Math.random() * 150,
                        ease: 'Power2',
                        onComplete: () => { if (p.active) p.destroy(); }
                    });
                }

                // 中心闪光
                const flash = this.add.circle(x, y, 18, 0xFFFFFF, 0.7).setDepth(9);
                this.tweens.add({
                    targets: flash,
                    scaleX: 2.5,
                    scaleY: 2.5,
                    alpha: 0,
                    duration: 220,
                    ease: 'Power1',
                    onComplete: () => { if (flash.active) flash.destroy(); }
                });
            }

            // ---------- 飘分文字 ----------
            showFloatingScore(x, y, score) {
                const txt = this.add.text(x, y - 10, `+${score}`, {
                    fontSize: '22px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0.5).setDepth(12);

                this.tweens.add({
                    targets: txt,
                    y: y - 55,
                    alpha: 0,
                    duration: 700,
                    ease: 'Power1',
                    onComplete: () => { if (txt.active) txt.destroy(); }
                });
            }

            // ---------- 清空所有飞碟 ----------
            clearAllSaucers() {
                this.saucerGroup.getChildren().forEach(s => {
                    if (s.active) {
                        if (s.autoDestroyTimer) { s.autoDestroyTimer.remove();
                            s.autoDestroyTimer = null; }
                        s.destroy();
                    }
                });
                this.saucerGroup.clear(true, true);
            }

            // ---------- 倒计时 ----------
            startCountdown() {
                this.countdownTimer = this.time.addEvent({
                    delay: 1000,
                    repeat: 59,
                    callback: () => {
                        if (!this.gameActive || this.gameOver) return;
                        if (this.isPaused) return; // 暂停时不减时间
                        this.timeLeft -= 1;
                        this.updateTimerDisplay();
                        if (this.timeLeft <= 0) {
                            this.endGame();
                        }
                    }
                });
            }

            // ---------- UI 更新 ----------
            updateScoreDisplay() {
                const str = String(Math.min(this.score, 999)).padStart(3, '0');
                this.scoreText.setText(`分数：${str}`);
            }

            updateTimerDisplay() {
                const t = Math.max(0, this.timeLeft);
                this.timerText.setText(`时间：${t}`);
                // 时间少于 10 秒变红
                if (t <= 10) {
                    this.timerText.setColor('#ff4444');
                } else {
                    this.timerText.setColor('#ffffff');
                }
            }

            // ---------- 面板系统 ----------
            hidePanel() {
                this.overlay.setAlpha(0);
                this.panelContainer.removeAll(true);
                this.panelContainer.setVisible(false);
            }

            showStartPanel() {
                this.overlay.setAlpha(0.55);
                this.panelContainer.setVisible(true);
                this.panelContainer.removeAll(true);

                // 标题
                const title = this.add.text(0, -110, '🛸 打飞碟', {
                    fontSize: '48px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 6,
                }).setOrigin(0.5);
                this.panelContainer.add(title);

                // 副标题
                const sub = this.add.text(0, -50, '点击飞碟得分 · 限时 60 秒', {
                    fontSize: '18px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#cceeff',
                    stroke: '#000000',
                    strokeThickness: 2,
                }).setOrigin(0.5);
                this.panelContainer.add(sub);

                // 开始按钮
                const btn = this.add.image(0, 30, 'btn_green').setInteractive({ useHandCursor: true });
                btn.setDisplaySize(200, 60);
                const btnText = this.add.text(0, 30, '点 击 开 始', {
                    fontSize: '26px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 2,
                }).setOrigin(0.5);
                this.panelContainer.add(btn);
                this.panelContainer.add(btnText);

                // 快捷键提示
                const tip = this.add.text(0, 85, '或按 J / 点击 A 按钮', {
                    fontSize: '14px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#88bbdd',
                    stroke: '#000000',
                    strokeThickness: 1,
                }).setOrigin(0.5);
                this.panelContainer.add(tip);

                // 飞碟图例
                const legendY = 140;
                const legendItems = [
                    { key: 'saucer_normal', label: '+10 普通', w: 40, h: 24 },
                    { key: 'saucer_golden', label: '+50 金色', w: 34, h: 20 },
                    { key: 'saucer_small', label: '+30 小型', w: 26, h: 16 },
                ];
                let lx = -140;
                legendItems.forEach((item, idx) => {
                    const sx = lx + idx * 100;
                    const icon = this.add.image(sx, legendY, item.key).setDisplaySize(item.w, item.h);
                    const lbl = this.add.text(sx, legendY + 22, item.label, {
                        fontSize: '12px',
                        fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                        color: '#ffffff',
                        stroke: '#000000',
                        strokeThickness: 1,
                    }).setOrigin(0.5);
                    this.panelContainer.add(icon);
                    this.panelContainer.add(lbl);
                });

                // 入场动画
                this.panelContainer.setAlpha(0);
                this.tweens.add({
                    targets: this.panelContainer,
                    alpha: 1,
                    y: GAME_HEIGHT / 2,
                    duration: 400,
                    ease: 'Back.easeOut'
                });

                // 按钮点击
                btn.on('pointerdown', () => {
                    if (!this.gameActive) this.startGame();
                });

                // 更新按钮状态
                this.btnA_label.setText('开始');
                this.btnB_label.setText('--');
                this.btnB_text.setText('B');
                this.scoreText.setAlpha(0);
                this.timerText.setAlpha(0);
            }

            showEndPanel() {
                this.overlay.setAlpha(0.6);
                this.panelContainer.setVisible(true);
                this.panelContainer.removeAll(true);

                // 标题
                const title = this.add.text(0, -110, '⏱ 游戏结束', {
                    fontSize: '42px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 5,
                }).setOrigin(0.5);
                this.panelContainer.add(title);

                // 最终得分
                const finalScore = this.add.text(0, -30, `最终得分：${this.score}`, {
                    fontSize: '34px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 4,
                }).setOrigin(0.5);
                this.panelContainer.add(finalScore);

                // 评级
                let rating = '🌟 继续加油';
                if (this.score >= 300) rating = '🏆 飞碟猎手！';
                else if (this.score >= 150) rating = '🔥 神枪手！';
                else if (this.score >= 80) rating = '👍 不错哦！';
                const ratingText = this.add.text(0, 30, rating, {
                    fontSize: '24px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 3,
                }).setOrigin(0.5);
                this.panelContainer.add(ratingText);

                // 再玩一次按钮
                const btn = this.add.image(0, 90, 'btn_green').setInteractive({ useHandCursor: true });
                btn.setDisplaySize(200, 60);
                const btnText = this.add.text(0, 90, '再玩一次', {
                    fontSize: '26px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    stroke: '#000000',
                    strokeThickness: 2,
                }).setOrigin(0.5);
                this.panelContainer.add(btn);
                this.panelContainer.add(btnText);

                // 快捷键
                const tip = this.add.text(0, 135, '按 J / 空格 / 点击 A 重新开始', {
                    fontSize: '14px',
                    fontFamily: 'Arial, "Microsoft YaHei", sans-serif',
                    color: '#88bbdd',
                    stroke: '#000000',
                    strokeThickness: 1,
                }).setOrigin(0.5);
                this.panelContainer.add(tip);

                // 入场动画
                this.panelContainer.setAlpha(0);
                this.tweens.add({
                    targets: this.panelContainer,
                    alpha: 1,
                    duration: 450,
                    ease: 'Back.easeOut'
                });

                btn.on('pointerdown', () => {
                    this.scene.restart();
                });

                // 更新按钮
                this.btnA_label.setText('重开');
                this.btnB_label.setText('--');
            }

            // ---------- update (空, 由物理和定时器驱动) ----------
            update() {
                // 可选的边界清理：飞碟完全离开屏幕后销毁 (安全措施)
                if (this.gameActive) {
                    this.saucerGroup.getChildren().forEach(s => {
                        if (!s.active) return;
                        const margin = 120;
                        if (s.x < -margin || s.x > GAME_WIDTH + margin) {
                            if (s.autoDestroyTimer) {
                                s.autoDestroyTimer.remove();
                                s.autoDestroyTimer = null;
                            }
                            s.destroy();
                        }
                    });
                }
            }
        }

        // ============================================================
        //  Phaser 配置
        // ============================================================
        const config = {
            type: Phaser.AUTO,
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            parent: 'game-container',
            backgroundColor: '#0a0a2a',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                min: {
                    width: 320,
                    height: 240
                },
                max: {
                    width: 1600,
                    height: 1200
                }
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false,
                }
            },
            scene: [BootScene, GameScene],
            input: {
                activePointers: 3,
                touch: {
                    target: null,
                    capture: true
                }
            },
            render: {
                pixelArt: false,
                antialias: true,
            }
        };

        // ============================================================
        //  启动游戏
        // ============================================================
        const game = new Phaser.Game(config);

        // 全局错误捕获（开发辅助）
        window.addEventListener('error', (e) => {
            console.warn('[游戏运行时错误]', e.message);
        });

        console.log('🛸 打飞碟 v1.0 已启动！');
        console.log('📖 操作提示：点击飞碟得分 | A/J 开始/重开 | B/K 暂停/继续');
    </script>
</body>
</html>

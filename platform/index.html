<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>AI 游戏工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f0f0f;color:#e0e0e0;height:100dvh;overflow:hidden}
.app{display:flex;height:100dvh}
.preview-panel{flex:1;display:flex;flex-direction:column;background:#111;min-width:0}
.preview-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #222;background:#1a1a1a;flex-shrink:0}
.preview-header .name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.preview-header .dot{width:7px;height:7px;border-radius:50%;background:#44cc44}
.preview-header .vers{font-size:11px;color:#666}
.preview-header .btns{display:flex;gap:6px}
.preview-header .btns button{padding:4px 10px;border-radius:6px;border:1px solid #333;background:#2a2a2a;color:#ccc;cursor:pointer;font-size:12px;font-family:system-ui;transition:all 0.15s}
.preview-header .btns button:hover{background:#3a3a3a}
.preview-header .btns .save-btn{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.preview-header .btns .save-btn:hover{background:#5a7cf7}
.preview-frame{flex:1;border:none;background:#0a1a0a}
.empty-preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;gap:12px;font-size:14px}
.empty-preview .icon{font-size:56px}

.chat-panel{width:380px;min-width:320px;display:flex;flex-direction:column;border-left:1px solid #222;background:#1a1a1a;flex-shrink:0}
.chat-top{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #222;background:#1e1e1e}
.chat-top .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-top .info{flex:1;min-width:0}
.chat-top .uname{font-size:13px;font-weight:600;color:#fff}
.chat-top .sub{font-size:11px;color:#666}
.chat-top .logout{font-size:11px;color:#888;cursor:pointer;background:none;border:1px solid #333;padding:3px 8px;border-radius:4px;font-family:system-ui}
.chat-top .logout:hover{color:#ff4444;border-color:#ff4444}

.games-section{border-bottom:1px solid #222;padding:6px 14px;flex-shrink:0}
.games-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:#888;padding:4px 0}
.games-toggle:hover{color:#ccc}
.games-toggle .arrow{transition:transform 0.2s}
.games-toggle.open .arrow{transform:rotate(90deg)}
.games-list{display:none;max-height:120px;overflow-y:auto;margin-top:4px}
.games-list.open{display:block}
.game-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;margin:2px 0;background:rgba(255,255,255,0.03);border-radius:4px;font-size:11px;transition:all 0.15s;cursor:pointer}
.game-item:hover{background:rgba(255,255,255,0.08)}
.game-item .gtitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ccc}
.game-item .gver{font-size:10px;color:#555;margin:0 8px}
.game-item .gdel{color:#666;cursor:pointer;padding:2px 4px;font-size:14px;border-radius:2px;opacity:0;transition:all 0.15s}
.game-item:hover .gdel{opacity:1}
.game-item .gdel:hover{color:#ff4444;background:rgba(255,0,0,0.1)}
.no-games{font-size:11px;color:#444;text-align:center;padding:8px}

.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.chat-msgs .time{text-align:center;font-size:10px;color:#444;margin:4px 0}
.msg{max-width:85%;padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:#2a2a2a;border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:#4a6cf7;border-bottom-right-radius:4px;color:#fff}
.chat-input{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid #222;background:#1e1e1e}
.chat-input input{flex:1;padding:8px 14px;border-radius:18px;border:none;background:#2a2a2a;color:#e0e0e0;font-size:13px;outline:none;font-family:system-ui}
.chat-input input::placeholder{color:#444}
.chat-input .btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-input .btn-send{background:#4a6cf7;color:#fff}
.chat-input .btn-send:hover{background:#5a7cf7}
.chat-input .btn-send:disabled{background:#2a2a2a;color:#444;cursor:default}
.turn-warn{text-align:center;font-size:10px;color:#664400;padding:4px}

@media(max-width:768px){
  .app{flex-direction:column}
  .chat-panel{width:100%;min-width:unset;flex:1;border-left:none}
  .preview-panel{position:fixed;top:0;left:0;width:100vw;height:100dvh;z-index:50;display:none}
  .preview-panel.show{display:flex}
}
.mobile-toggle{display:none;position:fixed;bottom:16px;right:16px;z-index:60;background:rgba(0,0,0,0.7);color:#fff;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:system-ui}
@media(max-width:768px){.mobile-toggle{display:block}}
</style>
</head>
<body>
<div class="app">
  <!-- Preview Panel -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <div class="name"><span class="dot" id="liveDot"></span><span id="gameName">我的游戏</span></div>
      <div class="btns">
        <span class="vers" id="gameVer">v0</span>
        <button class="save-btn" id="saveBtn" onclick="saveGame()">💾 保存</button>
      </div>
    </div>
    <div class="empty-preview" id="emptyState">
      <div class="icon">🎮</div>
      <p>在右边聊天，游戏会在这里显示</p>
    </div>
    <iframe class="preview-frame" id="previewFrame" style="display:none"></iframe>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-top">
      <div class="avatar">🤖</div>
      <div class="info">
        <div class="uname" id="userName">加载中...</div>
        <div class="sub">AI 游戏开发助手</div>
      </div>
      <button class="logout" onclick="logout()">🚪 退出</button>
    </div>

    <div class="games-section">
      <div class="games-toggle" id="gamesToggle" onclick="toggleGames()">
        <span>📂 我的游戏</span><span class="arrow">▶</span>
      </div>
      <div class="games-list" id="gamesList">
        <div class="no-games" id="noGames">还没有保存的游戏</div>
      </div>
    </div>

    <div class="chat-msgs" id="msgs">
      <div class="time">今天</div>
      <div class="msg ai">嗨！我是你的游戏开发助手 🎮<br>告诉我你想做什么游戏，咱们一起做出来！</div>
    </div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="说说你的游戏想法..." onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="toggleMobile()">🎮 预览</button>

<script>
var msgs=document.getElementById('msgs'),input=document.getElementById('input');
var previewFrame=document.getElementById('previewFrame'),emptyState=document.getElementById('emptyState');
var gameName=document.getElementById('gameName'),gameVer=document.getElementById('gameVer');
var version=0,gameStarted=false,gameCode='',currentSlug='';
var messages=[],turnCount=0,maxTurns=15;
var DS_KEY='sk-9f144fd5a6af47919a1875cfc019511e';

var SYSTEM_PROMPT="你是'游戏工坊'的AI助手，专门帮儿童设计和开发网页小游戏。\n"+
"规则：\n"+
"1. 只能做游戏。非游戏问题回复：'我只会做游戏哦～说说你想做什么吧！'\n"+
"2. 完整可运行的单文件HTML，用Canvas绘制，零外部依赖\n"+
"3. 完整代码用 ```html ... ``` 包裹\n"+
"4. 代码控制在200行以内，简洁好玩\n"+
"5. 先简短确认需求（一句话），再给代码\n"+
"6. 要有操作说明和输赢条件\n"+
"7. 多鼓励，语气友好\n"+
"8. 画布自适应，手机也能玩";

// === Auth ===
async function checkAuth(){
  try{
    var r=await fetch('/api/me');var d=await r.json();
    if(!d.loggedIn){location.href='/platform/login.html';return}
    document.getElementById('userName').textContent='👤 '+d.username+' 的工作台';
    loadGameList();
  }catch(e){location.href='/platform/login.html'}
}

async function logout(){
  await fetch('/api/logout',{method:'POST'});
  location.href='/platform/login.html';
}

// === Game List ===
function toggleGames(){
  var list=document.getElementById('gamesList'),tog=document.getElementById('gamesToggle');
  list.classList.toggle('open');tog.classList.toggle('open');
}

async function loadGameList(){
  try{
    var r=await fetch('/api/my-games');var d=await r.json();
    var list=document.getElementById('gamesList'),no=document.getElementById('noGames');
    list.querySelectorAll('.game-item').forEach(function(el){el.remove()});
    if(!d.games||d.games.length===0){no.style.display='block';return}
    no.style.display='none';
    d.games.forEach(function(g){
      var item=document.createElement('div');item.className='game-item';
      item.innerHTML='<span class="gtitle">'+esc(g.title)+'</span><span class="gver">v'+g.ver+'</span><span class="gdel" title="删除">🗑️</span>';
      item.querySelector('.gtitle').onclick=function(){loadGame(g.slug)};
      item.querySelector('.gdel').onclick=function(e){e.stopPropagation();deleteGame(g.slug)};
      list.appendChild(item);
    });
  }catch(e){}
}

async function saveGame(){
  if(!gameCode)return addMsg('还没有游戏可以保存',false);
  var title=prompt('给游戏起个名字：',gameName.textContent==='我的游戏'?'':gameName.textContent);
  if(!title)return;
  var slug=title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g,'-').slice(0,30)||'game'+Date.now();
  try{
    var r=await fetch('/api/save-game',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slug:slug,title:title,html:gameCode})});
    var d=await r.json();
    if(d.ok){currentSlug=slug;gameName.textContent=title;addMsg('✅ 已保存：「'+title+'」',false);loadGameList()}
    else addMsg('保存失败：'+d.error,false);
  }catch(e){addMsg('保存失败，请重试',false)}
}

async function loadGame(slug){
  try{
    var r=await fetch('/api/load-game/'+slug);var d=await r.json();
    if(d.html){gameCode=d.html;currentSlug=slug;gameStarted=true;version++;
      emptyState.style.display='none';previewFrame.style.display='block';
      gameName.textContent=slug;gameVer.textContent='已加载';
      updatePreview();addMsg('📂 已加载游戏',false)}
  }catch(e){addMsg('加载失败',false)}
}

async function deleteGame(slug){
  if(!confirm('确定删除这个游戏？'))return;
  try{
    await fetch('/api/delete-game',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug})});
    loadGameList();
    if(currentSlug===slug){currentSlug='';addMsg('已删除',false)}
  }catch(e){}
}

// === Chat ===
function addMsg(text,isUser){
  var div=document.createElement('div');
  div.className='msg '+(isUser?'user':'ai');
  div.innerHTML=text;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

async function send(){
  var text=input.value.trim();if(!text)return;
  if(turnCount>=maxTurns){addMsg('🎉 今天做得很棒了！游戏已保存在左边，明天继续～',false);return}
  addMsg(text,true);input.value='';turnCount++;

  var typing=document.createElement('div');
  typing.className='msg ai';typing.textContent='...';typing.id='typing';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;
  messages.push({role:'user',content:text});

  try{
    var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_KEY},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:SYSTEM_PROMPT}].concat(messages),max_tokens:4096,temperature:0.7})
    });
    var data=await resp.json();typing.remove();
    if(data.error){addMsg('出错了：'+data.error.message,false);return}
    var reply=data.choices[0].message.content;
    messages.push({role:'assistant',content:reply});

    var codeMatch=reply.match(/```html\n?([\s\S]*?)```/);
    if(codeMatch){
      gameCode=codeMatch[1];currentSlug='';
      if(!gameStarted){gameStarted=true;gameName.textContent='我的游戏'}
      version++;gameVer.textContent='v'+version;
      emptyState.style.display='none';previewFrame.style.display='block';updatePreview();
    }
    var display=reply.replace(/```html[\s\S]*?```/g,'[🎮 游戏已更新到左边预览区]');
    addMsg(display,false);
  }catch(e){typing.remove();addMsg('网络出错了，再试一次吧～',false)}
}

function updatePreview(){previewFrame.srcdoc=gameCode}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function toggleMobile(){
  var panel=document.getElementById('previewPanel'),btn=document.getElementById('mobileToggle');
  panel.classList.toggle('show');btn.textContent=panel.classList.contains('show')?'💬 聊天':'🎮 预览';
}

checkAuth();
</script>
</html>

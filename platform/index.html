<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>AI 游戏工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;font-family:system-ui;background:#0f0f0f;color:#e0e0e0}

.app{display:flex;height:100dvh}
.chat-panel{width:380px;min-width:320px;display:flex;flex-direction:column;border-left:1px solid #222;background:#1a1a1a;flex-shrink:0}
.chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #222;background:#1e1e1e}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:18px}
.chat-header .title{font-weight:600;font-size:15px}
.chat-header .sub{font-size:11px;color:#888}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.chat-msgs .time{text-align:center;font-size:11px;color:#555;margin:6px 0}
.msg{max-width:85%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:#2a2a2a;border-bottom-left-radius:6px}
.msg.user{align-self:flex-end;background:#4a6cf7;border-bottom-right-radius:6px;color:#fff}
.msg .card{padding:8px 10px;margin-top:6px;background:rgba(255,255,255,0.06);border-radius:10px;font-size:12px;color:#aaa}
.msg .card .act{display:inline-block;margin:4px 4px 0 0;padding:4px 10px;background:rgba(100,140,255,0.2);border-radius:12px;color:#88aaff;cursor:pointer;font-size:12px;transition:all 0.2s}
.msg .card .act:hover{background:rgba(100,140,255,0.35)}
.chat-input{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid #222;background:#1e1e1e}
.chat-input input{flex:1;padding:10px 16px;border-radius:20px;border:none;background:#2a2a2a;color:#e0e0e0;font-size:14px;outline:none;font-family:system-ui}
.chat-input input::placeholder{color:#555}
.chat-input .btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.chat-input .btn-voice{background:#2a2a2a;color:#888}
.chat-input .btn-voice:hover{background:#333}
.chat-input .btn-send{background:#4a6cf7;color:#fff}
.chat-input .btn-send:hover{background:#5a7cf7}
.chat-input .btn-send:disabled{background:#333;color:#555;cursor:default}

.preview-panel{flex:1;display:flex;flex-direction:column;background:#111}
.preview-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #222;background:#1a1a1a;flex-shrink:0}
.preview-header .name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.preview-header .dot{width:8px;height:8px;border-radius:50%;background:#44cc44}
.preview-header .vers{font-size:11px;color:#888}
.preview-frame{flex:1;border:none;background:#1a2a1a}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#444;gap:12px}
.empty-state .big{font-size:64px}
.empty-state p{font-size:15px}

/* Voice recording indicator */
.voice-indicator{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#ff4444;padding:12px 24px;border-radius:24px;font-size:14px;display:none;z-index:999;align-items:center;gap:8px}
.voice-indicator.show{display:flex}
.voice-indicator .wave{display:flex;gap:2px;align-items:flex-end;height:20px}
.voice-indicator .wave span{width:3px;background:#ff4444;border-radius:2px;animation:wave 0.6s ease-in-out infinite}
.voice-indicator .wave span:nth-child(2){animation-delay:0.1s}
.voice-indicator .wave span:nth-child(3){animation-delay:0.2s}
.voice-indicator .wave span:nth-child(4){animation-delay:0.3s}
.voice-indicator .wave span:nth-child(5){animation-delay:0.4s}
@keyframes wave{0%,100%{height:6px}50%{height:18px}}

/* Mobile */
.mobile-toggle{display:none;position:fixed;top:10px;right:10px;z-index:100;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer}
@media(max-width:768px){
  .app{flex-direction:column}
  .chat-panel{width:100%;min-width:unset;flex:1;border-right:none}
  .preview-panel{position:fixed;top:0;left:0;width:100vw;height:100dvh;z-index:50;display:none}
  .preview-panel.show{display:flex}
  .mobile-toggle{display:block}
}
</style>

<div class="app">
  <!-- Preview Panel -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <div class="name"><span class="dot" id="liveDot"></span><span id="gameName">我的游戏</span></div>
      <div class="vers" id="gameVer">v0</div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="big">🎮</div>
      <p>在右边聊天，游戏会在这里显示</p>
    </div>
    <iframe class="preview-frame" id="previewFrame" style="display:none"></iframe>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div><div class="title">AI 游戏工坊</div><div class="sub">说出你的游戏想法</div></div>
    </div>
    <div class="chat-msgs" id="msgs">
      <div class="time">今天</div>
      <div class="msg ai">嗨！我是你的游戏开发助手 🎮<br>告诉我你想做什么游戏，咱们一起做出来！</div>
    </div>
    <div class="chat-input">
      <button class="btn btn-voice" id="voiceBtn" title="按住说话">🎤</button>
      <input type="text" id="input" placeholder="说说你的游戏想法..." onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="togglePreview()">🎮 预览</button>
<div class="voice-indicator" id="voiceIndicator">
  <span>🎤</span><span>正在听...</span>
  <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
</div>

<script>
var msgs=document.getElementById('msgs');
var input=document.getElementById('input');
var sendBtn=document.getElementById('sendBtn');
var previewFrame=document.getElementById('previewFrame');
var emptyState=document.getElementById('emptyState');
var gameName=document.getElementById('gameName');
var gameVer=document.getElementById('gameVer');
var liveDot=document.getElementById('liveDot');
var version=0;
var gameStarted=false;

// Mock game code storage (in production, this would be server-side)
var gameCode='';
var gameTitle='我的游戏';

function addMsg(text,isUser){
  var div=document.createElement('div');
  div.className='msg '+(isUser?'user':'ai');
  div.innerHTML=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

var messages=[];
var turnCount=0;
var maxTurns=15;

var SYSTEM_PROMPT="你是'游戏工坊'的AI助手，专门帮儿童设计和开发网页小游戏。\n"+
"你的规则：\n"+
"1. 只能做游戏。非游戏问题回复：'我只会做游戏哦～说说你想做什么吧！'\n"+
"2. 游戏用 Canvas 绘制，单文件 HTML，不要外部依赖\n"+
"3. 完整代码用 ```html ... ``` 包裹，每次输出完整可运行文件\n"+
"4. 代码控制在200行以内，简洁好玩\n"+
"5. 先简短确认需求（一句话），再给代码\n"+
"6. 要有分数/输赢条件\n"+
"7. 多鼓励小孩，语气友好\n"+
"8. 游戏要有WASD或方向键操控说明\n"+
"9. 画布自适应屏幕，手机也能玩";

async function aiRespond(userText){
  turnCount++;
  if(turnCount>maxTurns){addMsg('🎉 今天做得很棒了！<br>游戏已经保存在右边，明天继续改进吧～',false);return}

  var typing=document.createElement('div');
  typing.className='msg ai';typing.textContent='...';typing.id='typing';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;

  messages.push({role:'user',content:userText});

  try{
    var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer sk-9f144fd5a6af47919a1875cfc019511e'},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:SYSTEM_PROMPT},...messages],max_tokens:4096,temperature:0.7})
    });
    var data=await resp.json();
    typing.remove();

    if(data.error){addMsg('出错了：'+data.error.message+'<br>换种说法试试？',false);return}
    var reply=data.choices[0].message.content;
    messages.push({role:'assistant',content:reply});

    // Extract HTML code block
    var codeMatch=reply.match(/```html\n?([\s\S]*?)```/);
    if(codeMatch){
      gameCode=codeMatch[1];
      if(!gameStarted){gameStarted=true;gameTitle=userText.slice(0,20);gameName.textContent=gameTitle}
      version++;gameVer.textContent='v'+version;
      emptyState.style.display='none';previewFrame.style.display='block';
      updatePreview();
    }

    // Display reply without code block
    var display=reply.replace(/```html[\s\S]*?```/g,'[游戏已更新到左边]');
    addMsg(display,false);
  }catch(e){
    typing.remove();
    addMsg('网络出错了，再试一次吧～',false);
  }
}

function updatePreview(){
  previewFrame.srcdoc=gameCode;
}

function send(){
  var text=input.value.trim();
  if(!text)return;
  addMsg(text,true);
  input.value='';
  aiRespond(text);
}

// Voice button placeholder
var voiceBtn=document.getElementById('voiceBtn');
var voiceIndicator=document.getElementById('voiceIndicator');
var isRecording=false;

voiceBtn.addEventListener('mousedown',function(){
  isRecording=true;
  voiceIndicator.classList.add('show');
  voiceBtn.style.color='#ff4444';
});
voiceBtn.addEventListener('mouseup',function(){
  if(isRecording){
    isRecording=false;
    voiceIndicator.classList.remove('show');
    voiceBtn.style.color='#888';
    // Placeholder: would send transcribed text here
  }
});
voiceBtn.addEventListener('mouseleave',function(){
  if(isRecording){
    isRecording=false;
    voiceIndicator.classList.remove('show');
    voiceBtn.style.color='#888';
  }
});

function togglePreview(){
  var panel=document.getElementById('previewPanel');
  var btn=document.getElementById('mobileToggle');
  panel.classList.toggle('show');
  btn.textContent=panel.classList.contains('show')?'💬 聊天':'🎮 预览';
}
</script>
</html>

<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>AI 游戏工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;font-family:system-ui;background:#0f0f0f;color:#e0e0e0}
body{display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#1a1a1a;border-bottom:1px solid #222;flex-shrink:0}
.topbar .user{font-size:14px;font-weight:600;color:#fff}
.topbar .btns{display:flex;gap:8px}
.topbar button{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:system-ui;transition:all 0.2s}
.topbar .btn-save{background:rgba(100,200,100,0.15);color:#88cc88}
.topbar .btn-save:hover{background:rgba(100,200,100,0.25)}
.topbar .btn-logout{background:rgba(255,255,255,0.06);color:#888}
.topbar .btn-logout:hover{background:rgba(255,255,255,0.1);color:#aaa}
.main{flex:1;display:flex;overflow:hidden}
.preview{flex:1;display:flex;flex-direction:column;background:#111;min-width:0}
.preview-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.preview-header .name{font-size:13px;color:#fff;display:flex;align-items:center;gap:6px}
.preview-header .dot{width:7px;height:7px;border-radius:50%;background:#44cc44}
.preview-header .vers{font-size:12px;color:#ffcc44;font-weight:600}
.preview-frame{flex:1;border:none;background:#1a2a1a}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;gap:8px}
.empty .big{font-size:56px}.empty p{font-size:14px}
.chat-panel{width:340px;min-width:280px;display:flex;flex-direction:column;border-left:1px solid #222;background:#1a1a1a;flex-shrink:0}
.chat-title{font-size:13px;font-weight:600;padding:10px 14px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title span{color:#fff}.chat-title .toggle{color:#666;cursor:pointer;font-size:11px}
.chat-title .toggle:hover{color:#aaa}
.gamelist{display:none;border-bottom:1px solid #222;max-height:140px;overflow-y:auto;padding:6px;flex-shrink:0}
.gamelist.show{display:block}
.gamelist .game-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;font-size:12px;color:#aaa;border-radius:6px;cursor:pointer;transition:all 0.15s}
.gamelist .game-item:hover{background:rgba(255,255,255,0.04);color:#eee}
.gamelist .game-item .gtitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gamelist .game-item .gver{font-size:10px;color:#555;margin-right:6px}
.gamelist .game-item .gdel{color:#664444;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:12px}
.gamelist .game-item .gdel:hover{color:#ff4444;background:rgba(255,0,0,0.1)}
.gamelist .empty-msg{color:#444;font-size:12px;text-align:center;padding:12px}
.msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:88%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start;background:#2a2a2a;border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:#4a6cf7;border-bottom-right-radius:4px;color:#fff}
.chat-input{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:1px solid #222;flex-shrink:0}
.chat-input input{flex:1;padding:9px 14px;border-radius:18px;border:none;background:#252525;color:#e0e0e0;font-size:13px;outline:none;font-family:system-ui}
.chat-input input::placeholder{color:#444}
.chat-input .send{width:34px;height:34px;border-radius:50%;border:none;background:#4a6cf7;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.chat-input .send:disabled{background:#2a2a2a;color:#444;cursor:default}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:4px 10px 8px}
.suggestions button{background:#252525;border:1px solid #333;color:#aaa;padding:5px 10px;border-radius:16px;font-size:12px;cursor:pointer;font-family:system-ui;transition:all 0.15s}
.suggestions button:hover{background:#333;color:#fff;border-color:#555}
.save-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999;display:none;align-items:center;justify-content:center}
.save-popup.show{display:flex}
.save-popup .box{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:24px;width:300px;max-width:90vw}
.save-popup .box h3{color:#fff;margin-bottom:12px;font-size:15px}
.save-popup .box input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#252525;color:#fff;font-size:14px;outline:none;font-family:system-ui;margin-bottom:12px}
.save-popup .box .btns{display:flex;gap:8px}
.save-popup .box button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:system-ui}
.save-popup .box .btn-confirm{background:#4a6cf7;color:#fff}
.save-popup .box .btn-cancel{background:#2a2a2a;color:#888}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:14px}
@media(max-width:768px){
  .main{flex-direction:column}
  .chat-panel{width:100%;min-width:unset;border-left:none;border-top:1px solid #222;max-height:50%}
  .preview{max-height:50%}
}
</style>

<div class="loading" id="loading">加载中...</div>

<div id="app" style="display:none;flex-direction:column;height:100%">
<div class="topbar">
  <div class="user" id="usernameLabel">👤 工作台</div>
  <div class="btns">
    <button class="btn-save" onclick="openSave()">💾 保存</button>
    <button class="btn-logout" onclick="logout()">🚪 退出</button>
  </div>
</div>
<div class="main">
  <div class="preview">
    <div class="preview-header">
      <div class="name"><span class="dot" id="liveDot"></span><span id="gameName">我的游戏</span></div>
      <div class="vers" id="gameVer">还没开始</div>
    </div>
    <div id="emptyState" class="empty"><div class="big">🎮</div><p>在右边聊天，游戏会在这里显示</p></div>
    <iframe id="previewFrame" class="preview-frame" style="display:none"></iframe>
  </div>
  <div class="chat-panel">
    <div class="chat-title">
      <span>💬 聊天</span>
      <span class="toggle" id="listToggle" onclick="toggleList()">📂 我的游戏 ▸</span>
    </div>
    <div class="gamelist" id="gamelist">
      <div class="empty-msg" id="gamelistEmpty">还没有保存的游戏</div>
    </div>
    <div class="msgs" id="msgs">
      <div class="msg ai">嗨！我是你的游戏开发助手 🎮<br>选一个类型，或者直接告诉我你的想法：</div>
      <div class="suggestions" id="suggestions">
        <button onclick="quickSend('我想做一个躲避敌人从上往下掉的游戏')">🎯 躲避掉落</button>
        <button onclick="quickSend('我想做一个跑酷跳跃的游戏')">🏃 跑酷跳跃</button>
        <button onclick="quickSend('我想做一个射击打靶的游戏')">🔫 射击打靶</button>
        <button onclick="quickSend('我想做一个贪吃蛇')">🐍 贪吃蛇</button>
        <button onclick="quickSend('我想做一个推箱子游戏')">📦 推箱子</button>
        <button onclick="quickSend('帮我做一个太空飞船打陨石的游戏')">🚀 打陨石</button>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="input" placeholder="说说你的游戏想法..." onkeydown="if(event.key==='Enter')send()" autofocus>
      <button class="send" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>
</div>
</div>

<div class="save-popup" id="savePopup">
  <div class="box">
    <h3>💾 保存游戏</h3>
    <input type="text" id="saveName" placeholder="游戏名称，如：鲨鱼追人" onkeydown="if(event.key==='Enter')doSave()">
    <div class="btns">
      <button class="btn-cancel" onclick="closeSave()">取消</button>
      <button class="btn-confirm" onclick="doSave()">保存</button>
    </div>
  </div>
</div>

<script>
var username='',gameCode='',gameTitle='我的游戏',version=0,gameStarted=false;
var messages=[],turnCount=0,maxTurns=15,DS_KEY='';
var SYSTEM_PROMPT="你是'游戏工坊'的AI助手，专门帮8-12岁儿童设计和开发网页小游戏。\n\n"+
"## 核心规则\n"+
"1. 只能做游戏。非游戏请求回复：'我只会做游戏哦～说说你想做什么吧！'\n"+
"2. 游戏必须用 Canvas 绘制，单文件 HTML，零外部依赖\n"+
"3. 完整代码用 ```html ... ``` 包裹，每次输出完整文件\n"+
"4. 代码控制在200行以内\n"+
"5. 先简短确认需求（一句话），再输出代码\n\n"+
"## 每个游戏必须包含（重要！）\n"+
"- ✅ 操控说明（WASD/方向键，手机也要能用）\n"+
"- ✅ 得分系统（分数/计数）\n"+
"- ✅ 胜负条件（生命用完/收集够/时间到）\n"+
"- ✅ 敌人或障碍（否则太简单）\n"+
"- ✅ 画布自适应屏幕\n\n"+
"## 如果小孩说得太模糊\n"+
"先问2-3个选择题帮他明确想法，比如：\n"+
"- '玩家是躲避敌人还是主动攻击？'\n"+
"- '敌人从天上来还是从左右来？'\n"+
"- '用方向键移动还是鼠标点击移动？'\n"+
"确认后再写代码，不要瞎猜\n\n"+
"## 迭代引导（重要！每次给出代码后必须追一句）\n"+
"代码后面一定要问：'要不要加个功能？比如：'\n"+
"然后给出2-3个具体的升级建议，紧扣当前游戏，例如：\n"+
"- 贪吃蛇 → '加个加速道具？' '碰到自己才死？'\n"+
"- 躲避游戏 → '加个Boss？' '加个血条？' '速度越来越快？'\n"+
"- 射击 → '换子弹有冷却？' '加不同类型敌人？'\n"+
"\n"+
"这样一来小孩只需说'好的'或点按钮就能继续优化，不需要自己想主意\n\n"+
"## 语气\n"+
"友好、鼓励，多肯定小孩的想法。用简单的话沟通。";

async function init(){
  try{
    var r=await fetch('/api/me');var d=await r.json();
    if(!d.loggedIn){location.href='/login';return}
    username=d.username;
    document.getElementById('usernameLabel').textContent='👤 '+username+' 的工作台';
    var cr=await fetch('/api/config');var cd=await cr.json();
    DS_KEY=cd.apiKey;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    loadGameList();
  }catch(e){document.getElementById('loading').textContent='连接失败，刷新试试'}
}
init();

function addMsg(text,isUser){
  var div=document.createElement('div');
  div.className='msg '+(isUser?'user':'ai');
  div.innerHTML=text;
  document.getElementById('msgs').appendChild(div);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
  // 移除旧的建议按钮
  var old=document.getElementById('suggestions');
  if(old)old.remove();
}

function quickSend(text){
  document.getElementById('input').value=text;
  send();
}

async function send(){
  var input=document.getElementById('input');
  var text=input.value.trim();
  if(!text||turnCount>=maxTurns)return;
  turnCount++;
  if(turnCount>=maxTurns){addMsg('🎉 今天做得很棒了！游戏已保存，明天继续吧～',false);return}
  
  addMsg(text,true);
  input.value='';

  var typing=document.createElement('div');
  typing.className='msg ai';typing.textContent='...';typing.id='typing';
  document.getElementById('msgs').appendChild(typing);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;

  messages.push({role:'user',content:text});

  try{
    var resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_KEY},
      body:JSON.stringify({model:'deepseek-v4-flash',messages:[{role:'system',content:SYSTEM_PROMPT},...messages],max_tokens:4096,temperature:0.7})
    });
    var data=await resp.json();
    var el=document.getElementById('typing');if(el)el.remove();

    if(data.error){addMsg('出错了：'+data.error.message+', 换种说法试试？',false);return}
    var reply=data.choices[0].message.content;
    messages.push({role:'assistant',content:reply});

    var codeMatch=reply.match(/```html\n?([\s\S]*?)```/);
    if(codeMatch){
      gameCode=codeMatch[1];
      if(!gameStarted){gameStarted=true;gameTitle=text.slice(0,20)}
      version++;
      document.getElementById('gameName').textContent=gameTitle;
      document.getElementById('gameVer').textContent='🔄 第'+version+'次迭代';
      document.getElementById('emptyState').style.display='none';
      document.getElementById('previewFrame').style.display='block';
      document.getElementById('previewFrame').srcdoc=gameCode;
    }
    var display=reply.replace(/```html[\s\S]*?```/g,'[游戏已更新到左边预览]');
    addMsg(display,false);

    // 代码生成后，给出迭代建议按钮（AI 文本里也应该有建议）
    if(codeMatch){
      var s=document.createElement('div');s.className='suggestions';s.id='suggestions';
      s.innerHTML='<button onclick="quickSend(\'好的，继续升级！\')">🚀 继续升级</button>'+
        '<button onclick="quickSend(\'加个Boss吧\')">👾 加Boss</button>'+
        '<button onclick="quickSend(\'让难度慢慢增加\')">📈 难度递增</button>'+
        '<button onclick="quickSend(\'加个排行榜\')">🏆 加排行榜</button>';
      document.getElementById('msgs').appendChild(s);
      document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
    }

    // 如果 AI 在提问（没有给出代码），加上提示
    if(!codeMatch && reply.includes('？')){
      var s=document.createElement('div');s.className='suggestions';s.id='suggestions';
      s.innerHTML='<button onclick="quickSend(\'好的，就按你说的做\')">✅ 好的</button>'+
        '<button onclick="quickSend(\'换一个吧\')">🔄 换一个</button>'+
        '<button onclick="quickSend(\'再给一个建议\')">💡 再给个建议</button>';
      document.getElementById('msgs').appendChild(s);
      document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
    }
  }catch(e){
    var el=document.getElementById('typing');if(el)el.remove();
    addMsg('网络出错了，再试一次吧～',false);
  }
}

function openSave(){
  if(!gameCode){alert('还没有生成游戏呢，先去聊天做游戏吧！');return}
  document.getElementById('savePopup').classList.add('show');
  document.getElementById('saveName').value=gameTitle;
  document.getElementById('saveName').focus();
}
function closeSave(){document.getElementById('savePopup').classList.remove('show')}

async function doSave(){
  var name=document.getElementById('saveName').value.trim();
  if(!name){alert('请输入游戏名称');return}
  var slug=name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g,'').slice(0,30)||'game';
  try{
    var r=await fetch('/api/save-game',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slug:slug,title:name,html:gameCode,version:version})
    });
    var d=await r.json();
    if(d.ok){closeSave();loadGameList();alert('保存成功！')}
    else alert(d.error||'保存失败');
  }catch(e){alert('网络错误')}
}

async function loadGameList(){
  try{
    var r=await fetch('/api/my-games');var d=await r.json();
    var list=document.getElementById('gamelist');
    list.innerHTML='';
    if(!d.games||d.games.length===0){
      list.innerHTML='<div class="empty-msg">还没有保存的游戏</div>';
      return;
    }
    d.games.forEach(function(g){
      var div=document.createElement('div');
      div.className='game-item';
      div.innerHTML='<span class="gtitle">'+g.title+'</span><span class="gver">v'+g.version+'</span><span class="gdel" title="删除">🗑️</span>';
      div.querySelector('.gtitle').onclick=function(){loadGame(g.slug)};
      div.querySelector('.gdel').onclick=function(e){e.stopPropagation();deleteGame(g.slug)};
      list.appendChild(div);
    });
  }catch(e){}
}

async function loadGame(slug){
  try{
    var r=await fetch('/api/load-game/'+slug);var d=await r.json();
    if(d.html){
      gameCode=d.html;gameTitle=d.title;version=d.version;
      document.getElementById('gameName').textContent=gameTitle;
      document.getElementById('gameVer').textContent='🔄 第'+version+'次迭代';
      document.getElementById('emptyState').style.display='none';
      document.getElementById('previewFrame').style.display='block';
      document.getElementById('previewFrame').srcdoc=gameCode;
      gameStarted=true;
    }
  }catch(e){alert('加载失败')}
}

async function deleteGame(slug){
  if(!confirm('确定删除这个游戏？'))return;
  try{
    var r=await fetch('/api/delete-game',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slug:slug})
    });
    var d=await r.json();
    if(d.ok)loadGameList();
  }catch(e){}
}

function toggleList(){
  var list=document.getElementById('gamelist');
  var btn=document.getElementById('listToggle');
  list.classList.toggle('show');
  btn.textContent=list.classList.contains('show')?'📂 我的游戏 ▾':'📂 我的游戏 ▸';
  if(list.classList.contains('show'))loadGameList();
}

async function logout(){
  await fetch('/api/logout',{method:'POST'});
  location.href='/login';
}
</script>
</html>

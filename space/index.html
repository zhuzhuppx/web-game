<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>太空射击</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#ccc;font-family:system-ui,-apple-system,sans-serif;min-height:100dvh;display:flex;align-items:center;justify-content:center}
.wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;width:100%;max-width:420px}
.hdr{display:flex;align-items:center;justify-content:space-between;width:100%}
.hdr h1{font-size:20px;color:#44ddff}.hdr .s{display:flex;gap:12px}
.hdr .s .l{font-size:11px;color:#6666aa}.hdr .s .v{font-size:18px;font-weight:700;color:#fff}
canvas{width:100%;touch-action:none;background:#0d0d1a;border-radius:8px;display:block}
.msg{font-size:15px;color:#8888bb;min-height:20px;text-align:center}
.btn{padding:8px 24px;border:none;border-radius:8px;background:rgba(68,221,255,0.15);color:#44ddff;font-size:14px;cursor:pointer;touch-action:manipulation}
.btn:active{background:rgba(68,221,255,0.25)}
.back{color:#555588;text-decoration:none;font-size:14px}.back:hover{color:#8888bb}
.mc{display:none;gap:8px;justify-content:center;width:100%}
.mc .row{display:flex;gap:8px}.mc button{width:48px;height:48px;border:none;border-radius:50%;background:rgba(255,255,255,0.06);color:#8888bb;font-size:20px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}.mc button:active{background:rgba(68,221,255,0.15)}
@media(pointer:coarse){.mc{display:flex}.hint{display:none}}
</style>
<div class="wrap">
<div class="hdr"><h1>🚀 太空射击</h1><div class="s"><div><div class="l">分数</div><div class="v" id="sc">0</div></div><div><div class="l">波次</div><div class="v" id="wave">0</div></div></div></div>
<canvas id="c"></canvas><div class="msg" id="msg">← → 移动 · 🔥 自动开火</div>
<div class="mc"><div class="row"><button id="sL">◀</button><button id="sF">🔥</button><button id="sR">▶</button></div></div>
<button class="btn" onclick="startGame()">🎮 开始</button>
<a class="back" href="/">← 返回</a></div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H,player,bullets,enemies,stars,score,wave,gameOver,frame,keys={};
function resize(){var w=Math.min(420,canvas.parentElement.clientWidth-4);canvas.style.width=w+'px';W=Math.floor(w*1.2);H=Math.floor(W*1.5);canvas.width=W;canvas.height=H}
resize();window.addEventListener('resize',resize);
function startGame(){score=0;wave=0;gameOver=false;frame=0;document.getElementById('sc').textContent='0';document.getElementById('wave').textContent='0';document.getElementById('msg').textContent=''
player={x:W/2-18,y:H-50,w:36,h:36,cooldown:0};bullets=[];enemies=[];stars=[];for(var i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:0.5+Math.random()*1.5})
loop()}
function spawnWave(){wave++;document.getElementById('wave').textContent=wave;var n=5+wave*2;for(var i=0;i<n;i++){setTimeout(function(){if(!gameOver){enemies.push({x:Math.random()*(W-30),y:-30-50*Math.random(),w:30,h:30,hp:1+Math.floor(wave/3),vy:0.5+wave*0.08,shootTimer:60+Math.random()*120})}},i*200)}}
function loop(){if(gameOver){drawGameOver();return}
frame++
// Stars
for(var i=0;i<stars.length;i++){stars[i].y+=stars[i].s;if(stars[i].y>H){stars[i].y=0;stars[i].x=Math.random()*W}}
// Player movement
var spd=4;if(keys.left||keys.a)player.x-=spd;if(keys.right||keys.d)player.x+=spd
player.x=Math.max(0,Math.min(W-player.w,player.x))
// Auto-shoot
if(player.cooldown>0)player.cooldown--
if(player.cooldown===0){bullets.push({x:player.x+player.w/2-2,y:player.y-8,w:4,h:12,dy:-6});player.cooldown=8}
// Bullets
for(var i=bullets.length-1;i>=0;i--){bullets[i].y+=bullets[i].dy;if(bullets[i].y<-20)bullets.splice(i,1)}
// Enemies
for(var i=enemies.length-1;i>=0;i--){var e=enemies[i];e.y+=e.vy
// Enemy shoots
e.shootTimer--;if(e.shootTimer<=0){var eb={x:e.x+e.w/2-2,y:e.y+e.h,dx:(player.x+player.w/2-(e.x+e.w/2))*0.01,dy:2};bullets.push(eb);e.shootTimer=60+Math.random()*120}
// Collision with bullets
for(var j=bullets.length-1;j>=0;j--){var b=bullets[j];if(b.dy<0&&b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){e.hp--;bullets.splice(j,1);if(e.hp<=0){score+=10*wave+10||10;document.getElementById('sc').textContent=score;enemies.splice(i,1)}break}}
// Collision with player
if(!gameOver&&player.x<e.x+e.w&&player.x+player.w>e.x&&player.y<e.y+e.h&&player.y+player.h>e.y){gameOver=true;document.getElementById('msg').textContent='游戏结束！得分:'+score}
// Off screen
if(e.y>H+50)enemies.splice(i,1)}
// Player hit by enemy bullet
for(var i=bullets.length-1;i>=0;i--){var b=bullets[i];if(b.dy>0&&b.x<player.x+player.w&&b.x+b.w>player.x&&b.y<player.y+player.h&&b.y+b.h>player.y){bullets.splice(i,1);gameOver=true;document.getElementById('msg').textContent='游戏结束！得分:'+score;break}}
// Wave spawn
if(enemies.length===0&&!gameOver)spawnWave()
draw();requestAnimationFrame(loop)}
function draw(){ctx.clearRect(0,0,W,H)
// Stars
ctx.fillStyle='rgba(255,255,255,0.4)';for(var i=0;i<stars.length;i++){ctx.beginPath();ctx.arc(stars[i].x,stars[i].y,stars[i].s,0,Math.PI*2);ctx.fill()}
// Player
ctx.fillStyle='#44ddff';ctx.shadowColor='#44ddff';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(player.x+player.w/2,player.y);ctx.lineTo(player.x+player.w,player.y+player.h);ctx.lineTo(player.x,player.y+player.h);ctx.closePath();ctx.fill();ctx.shadowBlur=0
// Enemies
for(var i=0;i<enemies.length;i++){var e=enemies[i];
// Draw alien body
ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);
var colors=['#44dd44','#dd44dd','#ff8844','#44ddff'];var col=colors[(e.hp||1)%colors.length];
// Body (UFO-like dome)
ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;
ctx.beginPath();ctx.ellipse(0,2,e.w/2*0.8,e.h/2*0.7,0,0,Math.PI*2);ctx.fill();
// Head dome top
ctx.fillStyle=col;ctx.shadowBlur=4;
ctx.beginPath();ctx.ellipse(0,-4,e.w/2*0.5,e.h/2*0.35,0,Math.PI,Math.PI*2);ctx.fill();
// Eyes (two big glowing circles)
ctx.shadowBlur=6;ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(-5,-4,4,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(5,-4,4,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;ctx.fillStyle='#111';
ctx.beginPath();ctx.arc(-5,-3,2,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(5,-3,2,0,Math.PI*2);ctx.fill();
// Antenna
ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.shadowBlur=3;
ctx.beginPath();ctx.moveTo(-3,-10);ctx.lineTo(-6,-17);ctx.stroke();
ctx.beginPath();ctx.moveTo(3,-10);ctx.lineTo(6,-17);ctx.stroke();
// Antenna tips
ctx.fillStyle='#fff';ctx.shadowBlur=4;
ctx.beginPath();ctx.arc(-6,-17,2,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(6,-17,2,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
// HP badge
if(e.hp>1){ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.hp,0,e.h/2*0.5)}
ctx.restore()}
// Bullets
for(var i=0;i<bullets.length;i++){var b=bullets[i];ctx.fillStyle=b.dy<0?'#ffdd44':'#ff4466';ctx.shadowColor=b.dy<0?'#ffdd44':'#ff4466';ctx.shadowBlur=4;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0}}
function drawGameOver(){draw();ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#44ddff';ctx.font='bold 30px sans-serif';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-15);ctx.fillStyle='#8888bb';ctx.font='16px sans-serif';ctx.fillText('得分: '+score+' | 波次: '+wave,W/2,H/2+25)}
// Input
document.addEventListener('keydown',function(e){var k=e.key;if(k==='ArrowLeft'){keys.left=true}else if(k==='ArrowRight'){keys.right=true}else if(k===' '||k==='Space'){e.preventDefault();keys.space=true;if(gameOver)startGame()}else if(k==='a')keys.a=true;else if(k==='d')keys.d=true})
document.addEventListener('keyup',function(e){var k=e.key;if(k==='ArrowLeft')keys.left=false;else if(k==='ArrowRight')keys.right=false;else if(k===' '||k==='Space')keys.space=false;else if(k==='a')keys.a=false;else if(k==='d')keys.d=false})
document.getElementById('sL').addEventListener('touchstart',function(){keys.a=true})
document.getElementById('sL').addEventListener('touchend',function(){keys.a=false})
document.getElementById('sR').addEventListener('touchstart',function(){keys.d=true})
document.getElementById('sR').addEventListener('touchend',function(){keys.d=false})
document.getElementById('sF').addEventListener('touchstart',function(){keys.space=true})
document.getElementById('sF').addEventListener('touchend',function(){keys.space=false})
startGame()
</script></html>

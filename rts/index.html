<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>红警·小规模冲突</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<script src="/sfx.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}html,body{overflow:hidden;height:100dvh}body{background:#0a0a1a;color:#ccc;font-family:system-ui}
.wrap{height:100dvh;padding:4px 6px 40px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.hud{display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;width:100%}
.hud span{color:#aaa}.hud b{color:#ffcc44;font-size:16px}#sel{color:#8888cc;font-size:11px;position:absolute;right:10px}
#c{max-width:100%;height:auto;border-radius:8px;touch-action:none;border:1px solid rgba(255,255,255,0.05);flex-shrink:1;min-height:0}
.info{font-size:12px;color:#ff8844;text-align:center;font-weight:600;flex-shrink:0;height:18px;line-height:18px;width:100%}
.btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;flex-shrink:0;width:100%}
.btns button{padding:5px 10px;border:none;border-radius:6px;background:rgba(255,170,68,0.12);color:#ffaa44;font-size:12px;cursor:pointer;touch-action:manipulation}
.btns button:active{background:rgba(255,170,68,0.25)}.btns button:disabled{opacity:0.25;cursor:default}
.back{color:#8888cc;text-decoration:none;font-size:14px;position:absolute;bottom:12px;left:12px;z-index:100;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:6px}
</style>
<div class="wrap">
<div class="hud"><span>💰 <b id="gold">1000</b></span><span id="sel"></span></div>
<canvas id="c"></canvas>
<div class="info" id="info"></div>
<div class="btns">
<button id="btnB" onclick="sfxResume();cmd('barracks')">🏠 兵营 200💰</button>
<button id="btnF" onclick="sfxResume();cmd('factory')">🏭 工厂 400💰</button>
<button id="btnRef" onclick="sfxResume();cmd('refinery')">🏗️ 精炼厂 250💰</button>
</div>
<div class="btns">
<button id="btnR" onclick="sfxResume();cmd('rifle')" disabled>🔫 步兵 100💰</button>
<button id="btnT" onclick="sfxResume();cmd('tank')" disabled>🛡️ 坦克 200💰</button>
<button id="btnHarv" onclick="sfxResume();cmd('harvester')" disabled>⛏️ 矿车 150💰</button>
</div>
<div class="btns">
<button onclick="sfxResume();cmd('rush')">⚔️ 全军出击</button>
<button onclick="sfxResume();cmd('retreat')">🛡️ 全军回防</button>
</div>
<a class="back" href="/">← 返回</a></div>
<script>
// === CONSTANTS ===
var GW=18,GH=12,TS=Math.max(28,Math.floor(Math.min(window.innerWidth-12,(window.innerHeight-180)*GW/GH)/GW)), W=GW*TS, H=GH*TS;
var c=document.getElementById('c'),ctx=c.getContext('2d');
c.width=W;c.height=H;
// Scale to fit viewport, keep aspect ratio
var scale=Math.min((window.innerWidth-12)/W,(window.innerHeight-180)/H,1);
c.style.width=(W*scale)+'px';c.style.height=(H*scale)+'px';

// === MAP ===
var map=[];
for(var y=0;y<GH;y++){map[y]=[];for(var x=0;x<GW;x++)map[y][x]=0}
// Mineral field center
for(var y=4;y<8;y++)for(var x=7;x<11;x++)map[y][x]=2;

// === GAME STATE ===
var uid=0,frame=0,sel=null,over=false;
var fx=[]; // death particles
var P={gold:1000,units:[],blds:[]};
var E={gold:1000,units:[],blds:[],aiCd:50,attackReady:false};
var moveSoundCd=0; // throttle movement sfx

function addBld(t,x,y,hp,o){var b={t:t,x:x,y:y,hp:hp,mhp:hp,o:o};(o==='p'?P.blds:E.blds).push(b);return b}
function addUnit(t,x,y,o){var s=t==='tank'?{hp:250,atk:35,rng:2.5,spd:0.025,rate:45}:t==='harvester'?{hp:200,atk:0,rng:0,spd:0.03,rate:999}:{hp:65,atk:10,rng:1.4,spd:0.028,rate:32};
  var u={id:uid++,t:t,x:x,y:y,hp:s.hp,mhp:s.hp,atk:s.atk,rng:s.rng,spd:s.spd,rate:s.rate,cd:0,o:o,st:'idle',tx:0,ty:0,dx:0,dy:0,xp:0,lv:1};
  (o==='p'?P.units:E.units).push(u);return u}

// Init
addBld('hq',1,1,600,'p');
addBld('hq',GW-2,GH-2,600,'e');
// Both start equal: just HQ, no free buildings/units

// === HELPERS ===
function hasB(o,t){return o.blds.some(function(b){return b.t===t&&b.hp>0})}
function hqOf(o){return o.blds.find(function(b){return b.t==='hq'&&b.hp>0})}
function eSpawn(type){var eh=hqOf(E);if(!eh)return;
  var bType=type==='tank'?'factory':'barracks';
  var fb=E.blds.find(function(b){return b.t===bType&&b.hp>0});
  var sx=fb?fb.x+1:eh.x+0.5,sy=fb?fb.y+0.5:eh.y+1.5;
  var exits=[[1,0.5],[-0.5,0.5],[0.5,1.5],[0.5,-0.5]];
  if(fb){for(var ei=0;ei<exits.length;ei++){var ex=fb.x+exits[ei][0],ey=fb.y+exits[ei][1];if(canPass(ex,ey)){sx=ex;sy=ey;break}};fb._spark=45}
  addUnit(type,sx,sy,'e');
  var nu=E.units[E.units.length-1];
  nu.st='moving';nu.tx=eh.x+0.5+Math.random()*2-1;nu.ty=eh.y+1.5+Math.random();nu._spawn=1}
function msg(s,t){var el=document.getElementById('info');el.textContent=s;if(t)setTimeout(function(){if(el.textContent===s)el.textContent=''},t)}
function bName(t){return{hq:'🏛️',barracks:'🏠',factory:'🏭',refinery:'🏗️'}[t]||t}
function uName(t){return{rifle:'🔫',tank:'🛡️',harvester:'⛏️'}[t]||t}

function near(u,list){
  var b=null,bd=999;for(var i=0;i<list.length;i++){var t=list[i];var d=Math.hypot(t.x-u.x,t.y-u.y);if(d<=u.rng&&d<bd){bd=d;b=t}}return b}
function closest(u,list){var b=null,bd=999;for(var i=0;i<list.length;i++){var t=list[i];var d=Math.hypot(t.x-u.x,t.y-u.y);if(d<bd){bd=d;b=t}}return b}
function moveToward(u,t,spd){var dx=t.x-u.x,dy=t.y-u.y,d=Math.hypot(dx,dy);if(d>0.2){
  var s=spd||u.spd;var nx=u.x+(dx/d)*s,ny=u.y+(dy/d)*s;
  var ox=u.x,oy=u.y;
  // wall slide: try straight first, then axis-aligned
  if(canPass(nx,ny,u)){u.x=nx;u.y=ny}else if(canPass(u.x,ny,u)){u.y=ny}else if(canPass(nx,u.y,u)){u.x=nx}
  if(u.x!==ox||u.y!==oy)u._moved=true;
  u.dx=dx;u.dy=dy}}
function canPass(gx,gy,self){var ix=Math.floor(gx),iy=Math.floor(gy);
  if(ix<0||ix>=GW||iy<0||iy>=GH)return false;
  // check buildings (allow leaving own tile)
  var ox=self?Math.floor(self.x):-1,oy=self?Math.floor(self.y):-1;
  var all=P.blds.concat(E.blds);for(var i=0;i<all.length;i++){if(all[i].hp<=0)continue;
    if(ix===all[i].x&&iy===all[i].y){
      if(!self)return false;
      if(self.t==='harvester'&&all[i].o===self.o&&all[i].t==='refinery')continue;
      if(!(ix===ox&&iy===oy&&all[i].o===self.o))return false}}
  // only enemy units at target tile block movement
  if(!self)return true;
  var allu=P.units.concat(E.units);for(var i=0;i<allu.length;i++){var ou=allu[i];if(ou.hp<=0||ou===self)continue;if(ou.o!==self.o&&Math.floor(ou.x)===ix&&Math.floor(ou.y)===iy)return false}
  return true}
function spawnFx(x,y,color,n){if(fx.length>200)return;for(var i=0;i<(n||8);i++){fx.push({x:x,y:y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3-1,life:20+Math.random()*15,c:color||'#ff8844',s:2+Math.random()*3})}}
function spawnBldFx(b){if(fx.length>200)return;for(var i=0;i<14;i++){fx.push({x:(b.x+0.5)*TS,y:(b.y+0.5)*TS,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-2,life:25+Math.random()*15,c:b.o==='p'?'#66aaff':'#ff6644',s:3+Math.random()*4})}}

function grantXp(u,amount){
  u.xp+=amount;
  var need=u.lv*20;
  while(u.xp>=need){
    u.xp-=need;u.lv++;
    u.mhp+=u.t==='tank'?30:15;u.hp=u.mhp;
    u.atk+=u.t==='tank'?6:3;
    u.rate=Math.max(10,u.rate-3);
    spawnFx(u.x*TS,u.y*TS,'#ffdd44',10);
    if(typeof sfxPowerUp==='function')sfxPowerUp()
    need=u.lv*20}
}
function muzzlePos(u){var cx=u.x*TS+TS/2,cy=u.y*TS+TS/2,angle=u.dx||u.dy?Math.atan2(u.dy,u.dx):(u.o==='p'?0:Math.PI);
  var barrelLen=u.t==='tank'?TS*0.4:TS*0.22;
  return{x:cx+Math.cos(angle)*barrelLen,y:cy+Math.sin(angle)*barrelLen}}
function spawnBullet(fx2,fy2,tx,ty,c){if(fx.length>200)return;var dx=tx-fx2,dy=ty-fy2,d=Math.hypot(dx,dy);if(d<0.01)return;
  fx.push({x:fx2,y:fy2,vx:(dx/d)*8,vy:(dy/d)*8,life:Math.ceil(d/8)+1,c:c||'#ffff44',s:1.5,tx:tx,ty:ty})}

function allTargets(o){var r=[];var src=o==='p'?E:P;
  for(var i=0;i<src.blds.length;i++){var b=src.blds[i];if(b.hp>0)r.push({x:b.x+0.5,y:b.y+0.5,hpRef:b,isBld:true})}
  for(var i=0;i<src.units.length;i++){var u=src.units[i];if(u.hp>0)r.push({x:u.x,y:u.y,hpRef:u,isBld:false})}
  return r}
function nearUnit(u,list){return near(u,list.filter(function(t){return !t.isBld}))}

// === COMMANDS ===
function cmd(a){
  if(over)return;
  if(a==='barracks'||a==='factory'){
    if(hasB(P,a)){msg('❌ 已有'+bName(a)+'，只能建一个',1500);return}
    var cost=a==='barracks'?200:400;if(P.gold<cost){msg('💰 金币不足！',1500);return}
    var hq=hqOf(P);if(!hq)return;
    var off=[[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2],[1,1],[-1,1],[1,-1],[-1,-1]];
    for(var i=0;i<off.length;i++){var nx=hq.x+off[i][0],ny=hq.y+off[i][1];if(nx<0||nx>=GW||ny<0||ny>=GH)continue;
      if(map[ny][nx]===1)continue;
      var occ=P.blds.some(function(b){return b.x===nx&&b.y===ny})||E.blds.some(function(b){return b.x===nx&&b.y===ny})||P.units.some(function(u){return u.hp>0&&Math.floor(u.x)===nx&&Math.floor(u.y)===ny});
      if(occ)continue;
      P.gold-=cost;addBld(a,nx,ny,a==='barracks'?300:400,'p');
      msg('✅ '+bName(a)+' 建造完成',2000);if(typeof sfxBlip==='function')sfxBlip();upd();return}
    msg('❌ HQ旁无空地！',1500);return}
  if(a==='rifle'||a==='tank'){
    var cost=a==='tank'?200:100;if(P.gold<cost){msg('💰 金币不足！',1500);return}
    if(!hasB(P,a==='tank'?'factory':'barracks')){msg('❌ 需要先建造对应建筑',1500);return}
    if(P.units.length>=40){msg('👥 人口已满！',1500);return}
    // Spawn next to production building, drive out
    var bType=a==='tank'?'factory':'barracks';
    var fb=P.blds.find(function(b){return b.t===bType&&b.hp>0});
    var hq=hqOf(P);
    var sx=fb?fb.x+1:1.5,sy=fb?fb.y+0.5:1.5;
    // Try alternate exit positions
    var exits=[[1,0.5],[-0.5,0.5],[0.5,1.5],[0.5,-0.5]];
    if(fb)for(var ei=0;ei<exits.length;ei++){var ex=fb.x+exits[ei][0],ey=fb.y+exits[ei][1];if(canPass(ex,ey)){sx=ex;sy=ey;break}}
    addUnit(a,sx,sy,'p');P.gold-=cost;
    if(fb)fb._spark=45; // building spawn animation
    var desX=hq.x+0.5+Math.random()*2-1,desY=hq.y+1.5+Math.random();
    var nu=P.units[P.units.length-1];
    nu.st='moving';nu.tx=desX;nu.ty=desY;nu.dx=desX-sx;nu.dy=desY-sy;
    nu._spawn=1;
    msg('✅ '+uName(a)+' 出厂！',2000);if(typeof sfxBlip==='function')sfxBlip();upd();return}
  if(a==='rush'){
    var tg=allTargets('p');if(!tg.length)return;
    var cx=0,cy=0;for(var i=0;i<tg.length;i++){cx+=tg[i].x;cy+=tg[i].y}
    cx/=tg.length;cy/=tg.length;
    for(var i=0;i<P.units.length;i++){var u=P.units[i];if(u.hp<=0||u.t==='harvester')continue;u.st='moving';u._rt=0;u.tx=cx+Math.random()*4-2;u.ty=cy+Math.random()*2-1;u.dx=u.tx-u.x;u.dy=u.ty-u.y}
    msg('⚔️ 全军出击！',1500)}
  if(a==='retreat'){
    var hq=hqOf(P);if(!hq){msg('❌ 基地已毁！',1500);return}
    for(var i=0;i<P.units.length;i++){var u=P.units[i];if(u.hp<=0||u.t==='harvester')continue;
      u.st='moving';u._rt=1;u.tx=hq.x+0.5+Math.random()*2-1;u.ty=hq.y+1.5+Math.random();u.dx=u.tx-u.x;u.dy=u.ty-u.y}
    msg('🛡️ 全军回防！',1500)}
  if(a==='refinery'){
    if(hasB(P,'refinery')){msg('❌ 已有精炼厂',1500);return}
    if(P.gold<250){msg('💰 金币不足！',1500);return}
    // Place near HQ
    var hq2=hqOf(P);if(!hq2)return;
    var off=[[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2],[1,1],[-1,1],[1,-1],[-1,-1]];
    for(var i=0;i<off.length;i++){var nx=hq2.x+off[i][0],ny=hq2.y+off[i][1];
      if(nx<0||nx>=GW||ny<0||ny>=GH)continue;
      var occ=P.blds.concat(E.blds).some(function(b){return b.x===nx&&b.y===ny});
      if(occ)continue;
      P.gold-=250;addBld('refinery',nx,ny,350,'p');addUnit('harvester',nx+0.5,ny+0.5,'p');msg('✅ 精炼厂建成，附赠矿车',2000);upd();return}
    msg('❌ HQ旁无空地',1500)}
  if(a==='harvester'){
    if(!hasB(P,'refinery')){msg('❌ 需要先建造精炼厂',1500);return}
    if(!hasB(P,'factory')){msg('❌ 需要先建造工厂',1500);return}
    if(P.gold<150){msg('💰 金币不足！',1500);return}
    var ref2=P.blds.find(function(b){return b.t==='refinery'&&b.hp>0});if(!ref2)return;
    // Spawn next to factory, drive to refinery
    var fac=P.blds.find(function(b){return b.t==='factory'&&b.hp>0});
    var sx=fac?fac.x+1:ref2.x+0.5,sy=fac?fac.y+0.5:ref2.y+0.5;
    var exits=[[1,0.5],[-0.5,0.5],[0.5,1.5],[0.5,-0.5]];
    if(fac)for(var ei=0;ei<exits.length;ei++){var ex=fac.x+exits[ei][0],ey=fac.y+exits[ei][1];if(canPass(ex,ey)){sx=ex;sy=ey;break}}
    if(fac)fac._spark=45;
    addUnit('harvester',sx,sy,'p');P.gold-=150;
    var hv=P.units[P.units.length-1];hv._toRef={x:ref2.x+0.5,y:ref2.y+0.5};
    msg('✅ 矿车出动',2000);upd()}
}

function upd(){
  document.getElementById('gold').textContent=P.gold;
  document.getElementById('btnB').disabled=P.gold<200||over||hasB(P,'barracks');
  document.getElementById('btnF').disabled=P.gold<400||over||hasB(P,'factory');
  document.getElementById('btnR').disabled=!hasB(P,'barracks')||P.gold<100||over;
  document.getElementById('btnT').disabled=!hasB(P,'factory')||P.gold<200||over;
  document.getElementById('btnRef').disabled=P.gold<250||over||hasB(P,'refinery');
  document.getElementById('btnHarv').disabled=!hasB(P,'refinery')||!hasB(P,'factory')||P.gold<150||over;
}

// === UPDATE ===
var cachedP=null,cachedE=null;
function tick(){
  if(over)return;
  try{_tick()}catch(e){over=true;msg('💥 出错了，强刷新重试',99999);console.error(e)}
}
function _tick(){
  frame++;var dt=1;
  cachedP=allTargets('p');cachedE=allTargets('e');
  // Player units
  for(var i=P.units.length-1;i>=0;i--){var u=P.units[i];if(u.hp<=0){spawnFx(u.x*TS,u.y*TS,u.t==='tank'?'#ffaa22':'#ff8844',u.t==='tank'?12:6);if(u.t==='tank'&&typeof sfxExplode==='function')sfxExplode();P.units.splice(i,1);continue}
    if(u.cd>0)u.cd-=dt;
    // Spawning unit: just move to destination, ignore combat
    if(u._spawn){var dd=Math.hypot(u.tx-u.x,u.ty-u.y);if(dd<0.3){u.st='idle';u._spawn=0;if(u.t==='tank'&&typeof sfxTankStart==='function'){}}else{moveToward(u,{x:u.tx,y:u.ty})};continue}
    // HP regen for lv3+
    if(u.lv>=3&&u.hp<u.mhp){u._rgCd=(u._rgCd||0)+1;if(u._rgCd>=90){u.hp=Math.min(u.mhp,u.hp+1);u._rgCd=0}}
    // Auto-acquire target (skip if retreating)
    if(u.t!=='harvester'&&!u._rt){var t=(u.st==='idle'||u.st==='moving')?closest(u,cachedP):nearUnit(u,cachedP)||near(u,cachedP);if(t){if(u.st!=='attacking'){u.st='attacking'}u.tx=t.x;u.ty=t.y;u.dx=t.x-u.x;u.dy=t.y-u.y}}
    if(u.st==='moving'){var d=Math.hypot(u.tx-u.x,u.ty-u.y);if(d<0.3){u.st='idle';u._rt=0}else{moveToward(u,{x:u.tx,y:u.ty})}}
    else if(u.st==='attacking'){
      // Always try to attack first if ready
      if(u.cd<=0){var t=nearUnit(u,cachedP)||near(u,cachedP);if(t){var wasAlive=t.hpRef.hp>0;t.hpRef.hp-=u.atk;u.cd=u.rate;u.dx=t.x-u.x;u.dy=t.y-u.y;u.tx=t.x;u.ty=t.y;var m=muzzlePos(u);if(typeof sfxPew==='function')sfxPew(u.lv);spawnBullet(m.x,m.y,t.x*TS,t.y*TS,'#ffff88');if(wasAlive&&t.hpRef.hp<=0)grantXp(u,t.hpRef.t==='tank'?15:8)}}
      // Move only if target out of attack range
      var d=Math.hypot(u.tx-u.x,u.ty-u.y);
      if(d>u.rng)moveToward(u,{x:u.tx,y:u.ty})
      else if(!(nearUnit(u,cachedP)||near(u,cachedP))){u.st='idle'}}
    // Auto-defend: ALL combat units rush to intercept
    if(u.t!=='harvester'){u._adCd=(u._adCd||0)+dt;
    if(u._adCd>25){u._adCd=0;
    var phq=hqOf(P);if(phq){
      var nearE2=cachedP.filter(function(e){return Math.hypot(e.x-phq.x-0.5,e.y-phq.y-0.5)<5});
      if(nearE2.length){
        // Closest enemy to HQ = highest threat
        var et=closest({x:phq.x+0.5,y:phq.y+0.5},nearE2);
        var adx=et.x-phq.x-0.5,ady=et.y-phq.y-0.5,ad=Math.hypot(adx,ady);
        if(ad>0.01){
          // Deploy to intercept: slightly forward of fence, spread out
          var defX=phq.x+0.5+(adx/ad)*(1.5+Math.random()*2);
          var defY=phq.y+0.5+(ady/ad)*(1.5+Math.random()*2);
          u.st='attacking';u._rt=0;u.tx=defX;u.ty=defY;u.dx=adx;u.dy=ady}
      }
    }}}
    // Harvester mining logic
    if(u.t==='harvester'&&u.hp>0){
      // First trip: drive to refinery, then start mining
      if(u._toRef){var d1=Math.hypot(u._toRef.x-u.x,u._toRef.y-u.y);if(d1<0.35){u._toRef=0;u._hs='go'}else moveToward(u,u._toRef);continue}
      if(!u._hs)u._hs='go';
      if(u._hs==='mine'){u._mt=(u._mt||90)-dt;if(u._mt<=0){u._hs='back';u._mt=0}}
      else if(u._hs==='unload'){u._mt=(u._mt||45)-dt;if(u._mt<=0){P.gold+=100;u._hs='go';u._mt=0;upd()}}
      else if(u._hs==='back'){
        var ref=P.blds.find(function(b){return b.t==='refinery'&&b.hp>0});
        if(ref){var db=Math.hypot(ref.x+0.5-u.x,ref.y+0.5-u.y);if(db<0.35){u._hs='unload';u._mt=45}else moveToward(u,{x:ref.x+0.5,y:ref.y+0.5})}
      }
      if(u._hs==='go'){
        var no=null,bd=999;
        for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){if(map[y][x]!==2)continue;var d=Math.hypot(x+0.5-u.x,y+0.5-u.y);if(d<bd){bd=d;no={x:x+0.5,y:y+0.5}}}
        if(no){var dd=Math.hypot(no.x-u.x,no.y-u.y);if(dd<0.3){u._hs='mine';u._mt=90}else moveToward(u,no)}
      }
      continue;
    }
  }
  // Passive gold income — always on while HQ is alive
  var phq2=hqOf(P);
  if(phq2){P._goldTick=(P._goldTick||0)+1;if(P._goldTick>=90){P.gold+=20;P._goldTick=0;upd()}}else P._goldTick=0;
  // Enemy AI
  var ehq2E=hqOf(E);
  if(ehq2E){E._goldTick=(E._goldTick||0)+1;if(E._goldTick>=90){E.gold+=20;E._goldTick=0}}else E._goldTick=0;
  var ehq=hqOf(E);var e_base_threat=ehq?cachedE.filter(function(t){return Math.hypot(t.x-ehq.x-0.5,t.y-ehq.y-0.5)<5}).length:0;
  var must_defend=e_base_threat>=2;
  if(must_defend&&!E._defending){E._defending=true;msg('🛡️ 敌军回防！',2000)}
  if(!must_defend)E._defending=false;
  
  // Group attack logic: gather 5+ then strike
  var e_alive=E.units.filter(function(u){return u.hp>0}).length;
  if(!must_defend){
    if(!E.attackReady&&e_alive>=3){E.attackReady=true;msg('⚔️ 敌军集结完毕，发起进攻！',2000)}
    if(E.attackReady&&e_alive<2){E.attackReady=false;msg('💨 敌军败退，重新集结…',2000)}
  }
  
  for(var i=E.units.length-1;i>=0;i--){var u=E.units[i];if(u.hp<=0){spawnFx(u.x*TS,u.y*TS,u.t==='tank'?'#ff6644':'#ff4444',u.t==='tank'?12:6);if(u.t==='tank'&&typeof sfxExplode==='function')sfxExplode();E.units.splice(i,1);continue}
    if(u.cd>0)u.cd-=dt;
    // Spawning unit: just move to destination, ignore combat
    if(u._spawn){var dd=Math.hypot(u.tx-u.x,u.ty-u.y);if(dd<0.3){u.st='idle';u._spawn=0;if(u.t==='tank'&&typeof sfxTankStart==='function'){}}else{moveToward(u,{x:u.tx,y:u.ty})};continue}
    // HP regen for lv3+
    if(u.lv>=3&&u.hp<u.mhp){u._rgCd=(u._rgCd||0)+1;if(u._rgCd>=90){u.hp=Math.min(u.mhp,u.hp+1);u._rgCd=0}}
    // Enemy harvester
    if(u.t==='harvester'&&u.hp>0){
      if(u._toRef){var d1=Math.hypot(u._toRef.x-u.x,u._toRef.y-u.y);if(d1<0.35){u._toRef=0;u._hs='go'}else moveToward(u,u._toRef);continue}
      if(!u._hs)u._hs='go';
      if(u._hs==='mine'){u._mt=(u._mt||90)-dt;if(u._mt<=0){u._hs='back';u._mt=0}}
      else if(u._hs==='unload'){u._mt=(u._mt||45)-dt;if(u._mt<=0){E.gold+=100;u._hs='go';u._mt=0}}
      else if(u._hs==='back'){
        var refE=E.blds.find(function(b){return b.t==='refinery'&&b.hp>0});
        if(refE){var db=Math.hypot(refE.x+0.5-u.x,refE.y+0.5-u.y);if(db<0.35){u._hs='unload';u._mt=45}else moveToward(u,{x:refE.x+0.5,y:refE.y+0.5})}
      }
      if(u._hs==='go'){
        var no=null,bd=999;
        for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){if(map[y][x]!==2)continue;var d=Math.hypot(x+0.5-u.x,y+0.5-u.y);if(d<bd){bd=d;no={x:x+0.5,y:y+0.5}}}
        if(no){var dd=Math.hypot(no.x-u.x,no.y-u.y);if(dd<0.3){u._hs='mine';u._mt=90}else moveToward(u,no)}
      }
      continue;
    }
    var et=nearUnit(u,cachedE)||near(u,cachedE);
    if(et){if(u.cd<=0){var wa=et.hpRef.hp>0;et.hpRef.hp-=u.atk;u.cd=u.rate;var m=muzzlePos(u);if(typeof sfxPew==='function')sfxPew(u.lv);spawnBullet(m.x,m.y,et.x*TS,et.y*TS,'#ff6666');if(wa&&et.hpRef.hp<=0)grantXp(u,et.hpRef.t==='tank'?15:8)}}
    
    if(must_defend&&ehq){
      var intruders=cachedE.filter(function(t){return Math.hypot(t.x-ehq.x-0.5,t.y-ehq.y-0.5)<5});
      if(intruders.length){
        // Attack if cd ready, always chase intruders
        if(u.cd<=0){var ct=nearUnit(u,intruders)||near(u,intruders);if(ct){var wa2=ct.hpRef.hp>0;ct.hpRef.hp-=u.atk;u.cd=u.rate;u.dx=ct.x-u.x;u.dy=ct.y-u.y;var m=muzzlePos(u);if(typeof sfxPew==='function')sfxPew(u.lv);spawnBullet(m.x,m.y,ct.x*TS,ct.y*TS,'#ff6666');if(wa2&&ct.hpRef.hp<=0)grantXp(u,ct.hpRef.t==='tank'?15:8)}}
        if(!u.cd||u.cd>0)moveToward(u,closest(u,intruders))
      }else{
        var distHome=Math.hypot(ehq.x+0.5-u.x,ehq.y+0.5-u.y);
        if(distHome>4)moveToward(u,{x:ehq.x+0.5+Math.random()-0.5,y:ehq.y+0.5+Math.random()-0.5})
      }
    }else if(E.attackReady){
      // Attack wave: push toward player HQ
      var hq=hqOf(P);
      if(!et&&hq){var d=Math.hypot(hq.x+0.5-u.x,hq.y+0.5-u.y);if(d>1.5)moveToward(u,{x:hq.x+0.5,y:hq.y+0.5})}
    }else{
      // Gathering: hang around HQ
      if(!et&&ehq){var dh=Math.hypot(ehq.x+0.5-u.x,ehq.y+0.5-u.y);if(dh>3)moveToward(u,{x:ehq.x+0.5+Math.random()-0.5,y:ehq.y+0.5+Math.random()-0.5})}
    }
  }
  // AI build/train (same rules as player)
  E.aiCd+=dt;if(E.aiCd>100){E.aiCd=0;
    var ehq2=hqOf(E);if(!ehq2)return;
    // Build priority: refinery > barracks > factory > train
    if(!hasB(E,'refinery')&&E.gold>=250){
      var offR=[[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2],[1,1],[-1,1],[1,-1],[-1,-1]];
      for(var ri=0;ri<offR.length;ri++){var rx=ehq2.x+offR[ri][0],ry=ehq2.y+offR[ri][1];
        if(rx<0||rx>=GW||ry<0||ry>=GH)continue;
        if(canPass(rx,ry)){E.gold-=250;addBld('refinery',rx,ry,350,'e');addUnit('harvester',rx+0.5,ry+0.5,'e');break}}
      if(!hasB(E,'refinery'))E.aiCd=-50
    }else if(!hasB(E,'barracks')&&E.gold>=200){
      var offB=[[1,0],[-1,0],[0,1],[0,-1],[2,0],[-2,0],[0,2],[0,-2]];
      var placed=false;
      for(var bi=0;bi<offB.length;bi++){var bx=ehq2.x+offB[bi][0],by=ehq2.y+offB[bi][1];
        if(canPass(bx,by)){E.gold-=200;addBld('barracks',bx,by,300,'e');placed=true;break}}
      if(!placed)E.aiCd=-50
    }else if(!hasB(E,'factory')&&E.gold>=400){
      var offF=[[-1,0],[1,0],[0,1],[0,-1],[-2,0],[2,0],[0,2],[0,-2]];
      placed=false;
      for(var fi=0;fi<offF.length;fi++){var fx=ehq2.x+offF[fi][0],fy=ehq2.y+offF[fi][1];
        if(canPass(fx,fy)){E.gold-=400;addBld('factory',fx,fy,400,'e');placed=true;break}}
      if(!placed)E.aiCd=-50
    }else if(E.units.length<40&&hasB(E,'barracks')){
      var hasF=hasB(E,'factory');
      // Train harvesters first, then combat units
      if(hasB(E,'refinery')&&E.gold>=150&&E.units.filter(function(u){return u.t==='harvester'&&u.hp>0}).length<3){
        var ref=E.blds.find(function(b){return b.t==='refinery'&&b.hp>0});if(ref){
          var efac=E.blds.find(function(b){return b.t==='factory'&&b.hp>0});
          var sx=efac?efac.x+1:ref.x+0.5,sy=efac?efac.y+0.5:ref.y+0.5;
          var exits=[[1,0.5],[-0.5,0.5],[0.5,1.5],[0.5,-0.5]];
          if(efac)for(var ei=0;ei<exits.length;ei++){var ex=efac.x+exits[ei][0],ey=efac.y+exits[ei][1];if(canPass(ex,ey)){sx=ex;sy=ey;break}}
          if(efac)efac._spark=45;
          E.gold-=150;addUnit('harvester',sx,sy,'e');E.units[E.units.length-1]._toRef={x:ref.x+0.5,y:ref.y+0.5}}
      }else if(hasF&&E.gold>=200){E.gold-=200;eSpawn('tank')}
      else if(!hasF&&E.gold>=100){E.gold-=100;eSpawn('rifle')}
      else if(hasF&&E.gold>=100&&E.units.length<3){E.gold-=100;eSpawn('rifle')}
    }
  }
  // Resources (no auto-gold, mining only)
  // Building death FX
  for(var i=P.blds.length-1;i>=0;i--){var b=P.blds[i];if(b.hp<=0&&!b._dead){b._dead=true;spawnBldFx(b);if(typeof sfxExplode==='function')sfxExplode()}}
  for(var i=E.blds.length-1;i>=0;i--){var b=E.blds[i];if(b.hp<=0&&!b._dead){b._dead=true;spawnBldFx(b);if(typeof sfxExplode==='function')sfxExplode()}}
  // Win/lose — count alive buildings
  var pa=0,ea=0;
  for(var i=0;i<P.blds.length;i++)if(P.blds[i].hp>0)pa++;
  for(var i=0;i<E.blds.length;i++)if(E.blds[i].hp>0)ea++;
  if(pa===0){over=true;msg('💀 失败！所有建筑被摧毁',99999)}
  if(ea===0){over=true;msg('🎉 胜利！敌方全灭',99999)}
  // Movement sound
  moveSoundCd-=dt;
  var anyTank=false,anyInf=false;
  for(var i=0;i<P.units.length;i++){var u=P.units[i];if(u._moved){u._moved=false;if(u.t==='tank')anyTank=true;else if(u.t!=='harvester')anyInf=true}}
  for(var i=0;i<E.units.length;i++){var u=E.units[i];if(u._moved){u._moved=false;if(u.t==='tank')anyTank=true;else if(u.t!=='harvester')anyInf=true}}
  // Continuous tank tread sound
  if(anyTank){if(!tankSoundNodes.length&&typeof sfxTankStart==='function')sfxTankStart()}
  else{if(tankSoundNodes.length&&typeof sfxTankStop==='function')sfxTankStop()}
  // Infantry footstep (periodic)
  if(moveSoundCd<=0&&anyInf&&typeof sfxMove==='function'){sfxMove();moveSoundCd=12}
  
  if(frame%8===0)draw();
}

// === RENDER ===
function draw(){
  // Ground
  for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){
    var gx=x*TS,gy=y*TS;
    ctx.fillStyle='#233823';ctx.fillRect(gx,gy,TS,TS);
    // Grass dots
    ctx.fillStyle='#2a442a';for(var d=0;d<3;d++){var dx=gx+5+((d*13+y*7)%(TS-10)),dy=gy+5+((d*17+x*11)%(TS-10));ctx.fillRect(dx,dy,2,2)}
  }
  // Minerals
  for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){if(map[y][x]===2){
    var gx=x*TS,gy=y*TS;
    ctx.fillStyle='#889922';ctx.fillRect(gx+3,gy+3,TS-6,TS-6);
    ctx.fillStyle='#aabb33';ctx.beginPath();ctx.arc(gx+TS/2,gy+TS/2,TS*0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ccdd44';ctx.beginPath();ctx.arc(gx+TS*0.35,gy+TS*0.4,5,0,Math.PI*2);ctx.fill();
  }}
  // Buildings
  for(var i=0;i<P.blds.length;i++)drawBld(P.blds[i],'#3355aa','#2244cc','#5588ff');
  for(var i=0;i<E.blds.length;i++)drawBld(E.blds[i],'#aa3333','#cc2222','#ff4444');
  // Units
  for(var i=0;i<P.units.length;i++)drawUnit(P.units[i],'#4488ff','#2266dd');
  for(var i=0;i<E.units.length;i++)drawUnit(E.units[i],'#ff5544','#dd3322');
  
  // Particlez
  for(var i=fx.length-1;i>=0;i--){var p=fx[i];p.life--;if(p.life<=0){fx.splice(i,1);continue}
    if(p.tx!==undefined){p.x+=p.vx;p.y+=p.vy;var a=1} // bullet, no gravity
    else{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;var a=p.life/35}
    ctx.fillStyle=p.c;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  
  // Selection
  if(sel){ctx.strokeStyle='#ffdd44';ctx.lineWidth=2.5;
    var sx,sy;if(sel.t){sx=sel.x*TS+TS/2;sy=sel.y*TS+TS/2}else{sx=sel.x*TS;sy=sel.y*TS}
    ctx.beginPath();ctx.arc(sx,sy,TS*0.5,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
    ctx.strokeStyle='rgba(255,220,60,0.15)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(sx,sy,TS*0.54,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
    var n=sel.t?bName(sel.t):uName(sel.t);document.getElementById('sel').textContent='选中: '+n+' HP:'+(sel.hp||sel.mhp)+'/'+(sel.mhp||sel.hp)}
  else{document.getElementById('sel').textContent=''}
  upd();
}

function drawPad(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x*TS,y*TS,w*TS,h*TS)}

function drawBld(b,wall,roof,accent){
  if(b.hp<=0)return;var x=b.x*TS+2,y=b.y*TS+2,s=TS-4;
  ctx.fillStyle=wall;ctx.fillRect(x,y,s,s);
  // Top accent
  ctx.fillStyle=roof;ctx.fillRect(x+2,y+2,s-4,s*0.3);
  // Details per type
  if(b.t==='hq'){
    ctx.fillStyle=accent;ctx.fillRect(x+s*0.35,y+s*0.3,s*0.3,s*0.35);
    ctx.fillStyle='#fff';ctx.font='bold 14px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',x+s/2,y+s*0.55)}
  else if(b.t==='barracks'){
    ctx.fillStyle=roof;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+s/2,y-s*0.2);ctx.lineTo(x+s,y);ctx.fill();
    // Door opens when spawning
    var spark=(b._spark||0);if(spark>0){var dw=spark/45*6;ctx.fillStyle='#ffdd88';ctx.fillRect(x+s*0.35-dw,y+s*0.3,s*0.3+dw*2,s*0.35);
      ctx.fillStyle='rgba(255,220,100,0.4)';ctx.fillRect(x,y,s,s);b._spark--}
    else{ctx.fillStyle='#886644';ctx.fillRect(x+s*0.2,y+s*0.4,s*0.15,s*0.15)}
    ctx.fillStyle=accent;ctx.fillRect(x+s*0.25,y+s*0.45,s*0.5,s*0.05)}
  else if(b.t==='factory'){
    ctx.fillStyle='#444';ctx.fillRect(x+s*0.35,y+s*0.2,s*0.15,s*0.3);
    // Chimney smoke + flash when spawning
    var spark=(b._spark||0);if(spark>0){ctx.fillStyle='rgba(255,180,60,0.3)';ctx.fillRect(x,y,s,s);
      ctx.fillStyle='#666';ctx.beginPath();ctx.arc(x+s*0.42,y+s*0.12-spark*0.5,3+spark*0.1,0,Math.PI*2);ctx.fill();
      b._spark--}
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(x+s*0.42,y+s*0.12,4,0,Math.PI*2);ctx.fill()}
  else if(b.t==='refinery'){
    ctx.fillStyle='#666';ctx.fillRect(x+s*0.3,y+s*0.25,s*0.4,s*0.5);
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(x+s/2,y+s*0.35,8,0,Math.PI*2);ctx.fill();
    // Pulsing glow when unloading
    var src=b.o==='p'?P:E;var unloading=src.units.some(function(u){return u.t==='harvester'&&u._hs==='unload'&&Math.hypot(u.x-b.x-0.5,u.y-b.y-0.5)<1});
    if(unloading){
      var pulse=6+Math.sin(frame*0.3)*4;
      ctx.fillStyle='rgba(255,200,0,0.3)';ctx.beginPath();ctx.arc(x+s/2,y+s*0.35,pulse+4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(x+s/2,y+s*0.35,pulse,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+s/2,y+s*0.35,3+Math.sin(frame*0.5)*1,0,Math.PI*2);ctx.fill()
    }else{ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(x+s/2,y+s*0.35,4,0,Math.PI*2);ctx.fill()}}
  // HP bar
  var pct=b.hp/b.mhp;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(x+1,y+s-6,s-2,4);
  ctx.fillStyle=pct>0.5?'#44ff44':pct>0.25?'#ffaa00':'#ff2222';ctx.fillRect(x+1,y+s-6,(s-2)*pct,4);
}

function drawUnit(u,col,accent){
  if(u.hp<=0)return;var cx=u.x*TS,cy=u.y*TS,r=TS*0.3;
  // Level upgrades appearance (different per faction)
  if(u.lv>=3){col='#ffaa22';accent='#ff8800'} // gold legendary at lv3+
  else if(u.lv>=2){col=u.o==='p'?'#88ccff':'#ff8844';accent=u.o==='p'?'#4488ff':'#cc4400'} // elite
  var sc=1+u.lv*0.06; // scale up with level
  ctx.save();ctx.translate(cx+TS/2,cy+TS/2);ctx.scale(sc,sc);
  // Direction
  var angle=0;if(u.dx||u.dy)angle=Math.atan2(u.dy,u.dx);else angle=u.o==='p'?0:Math.PI;
  ctx.rotate(angle);
  if(u.t==='tank'){
    var tr=r*1.3;
    ctx.fillStyle=col;ctx.fillRect(-tr,-tr*0.55,tr*1.8,tr*1.1);
    ctx.fillStyle='#333';ctx.fillRect(-tr,-tr*0.75,tr*1.8,tr*0.22);ctx.fillRect(-tr,tr*0.5,tr*1.8,tr*0.22);
    ctx.fillStyle=accent;ctx.beginPath();ctx.arc(0,-tr*0.08,tr*0.48,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.fillRect(tr*0.35,-tr*0.13,tr*1.3,tr*0.18)}
  else if(u.t==='harvester'){
    // Body
    ctx.fillStyle=accent;ctx.fillRect(-r*0.8,-r*0.6,r*1.6,r*1.2);
    // Ore cargo when loaded - bright gold, drawn before trim
    if(u._hs==='back'||u._hs==='unload'){ctx.fillStyle='#ffd700';ctx.fillRect(-r*0.7,-r*0.55,r*1.4,r*0.95)}
    else{ctx.fillStyle='#555';ctx.fillRect(-r*0.3,-r*0.1,r*1.0,r*0.06)}
    // Trim on top of ore
    ctx.fillStyle=col;ctx.fillRect(-r*0.8,-r*0.8,r*1.6,r*0.25);
    ctx.fillStyle='#aa8844';ctx.beginPath();ctx.arc(r*0.5,-r*0.3,r*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.fillRect(-r*0.8,r*0.5,r*1.6,r*0.15)}
  else{
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,r*0.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=accent;ctx.beginPath();ctx.arc(0,-r*0.4,r*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aaa';ctx.fillRect(r*0.2,-r*0.5,r*1.1,r*0.12)}
  ctx.restore();
  // Level star
  if(u.lv>1){ctx.fillStyle='#ffdd44';ctx.font='bold 9px system-ui';ctx.textAlign='center';ctx.fillText('★'.repeat(Math.min(u.lv,3)),cx+TS/2,cy-2)}
  // HP bar
  var pct=u.hp/u.mhp;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(cx+1,cy+TS-6,TS-2,3);
  ctx.fillStyle=pct>0.5?'#44ff44':'#ff2222';ctx.fillRect(cx+1,cy+TS-6,(TS-2)*pct,3);
}

// === INPUT ===
function get(e){var r=c.getBoundingClientRect();var s=W/r.width;return{x:Math.floor((e.clientX-r.left)*s/TS),y:Math.floor((e.clientY-r.top)*s/TS)}}
c.addEventListener('mousedown',function(e){e.preventDefault();sfxResume();var p=get(e);click(p.x,p.y)});
c.addEventListener('touchstart',function(e){e.preventDefault();sfxResume();var p=get(e.touches[0]);click(p.x,p.y)});
c.addEventListener('contextmenu',function(e){e.preventDefault();if(sel&&sel.o==='p'&&!sel.t&&sel.hp>0){var p=get(e);sel.st='moving';sel.tx=p.x+0.5;sel.ty=p.y+0.5;msg('📍 移动中',800)}});

function click(gx,gy){
  if(over)return;var f=null;
  for(var i=0;i<P.blds.length;i++){if(P.blds[i].hp>0&&P.blds[i].x===gx&&P.blds[i].y===gy){f=P.blds[i];break}}
  if(!f){for(var i=0;i<E.blds.length;i++){if(E.blds[i].hp>0&&E.blds[i].x===gx&&E.blds[i].y===gy){f=E.blds[i];break}}}
  if(!f){for(var i=0;i<P.units.length;i++){if(P.units[i].hp>0&&Math.floor(P.units[i].x)===gx&&Math.floor(P.units[i].y)===gy){f=P.units[i];break}}}
  if(!f){for(var i=0;i<E.units.length;i++){if(E.units[i].hp>0&&Math.floor(E.units[i].x)===gx&&Math.floor(E.units[i].y)===gy){f=E.units[i];break}}}
  sel=f||null;draw();
}

// === START ===
draw();upd();sfxInit();
var lastTick=0;
// Resume audio on visibility change (tab switch / screen wake)
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){sfxResume();lastTick=performance.now()}
});
function loop(t){
  if(!over){
    var dt2=t-lastTick;
    if(dt2>5000)lastTick=t;
    if(dt2>=33){lastTick=t;tick()}
    // Safety: win check every frame in case tick lags
    var p2=0,e2=0;
    for(var i=0;i<P.blds.length;i++)if(P.blds[i].hp>0)p2++;
    for(var i=0;i<E.blds.length;i++)if(E.blds[i].hp>0)e2++;
    if(p2===0){over=true;msg('💀 失败！所有建筑被摧毁',99999)}
    if(e2===0){over=true;msg('🎉 胜利！敌方全灭',99999)}
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</html>

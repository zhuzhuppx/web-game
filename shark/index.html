<!DOCTYPE html><html lang="zh-CN"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>鲨鱼岛夺宝</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<script src="/sfx.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{overflow:hidden;height:100dvh}body{background:linear-gradient(180deg,#0a1628 0%,#1a2a4a 100%);color:#ccc;font-family:system-ui}
.wrap{height:100dvh;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.hud{display:flex;align-items:center;justify-content:center;gap:12px;font-size:14px;flex-shrink:0;padding:4px 12px;background:rgba(0,0,0,0.3);border-radius:8px;width:90%;max-width:600px}
.hud span{color:#aaa}.hud b{color:#ffcc44}#msg{font-size:12px;color:#ff8844;font-weight:600;height:16px;text-align:center}
#c{max-width:95vw;max-height:70vh;border-radius:8px;touch-action:none;border:2px solid rgba(255,255,255,0.08);box-shadow:0 2px 20px rgba(0,0,0,0.4);cursor:crosshair}
.back{color:#8888cc;text-decoration:none;font-size:14px;position:absolute;bottom:12px;left:12px;z-index:100;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:6px;transition:all 0.2s}
.back:hover{background:rgba(100,100,200,0.2);color:#aaaaff}
#restart{color:#cc8844;font-size:14px;position:absolute;bottom:12px;right:12px;z-index:100;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:6px;border:none;cursor:pointer;transition:all 0.2s;font-family:system-ui}
#restart:hover{background:rgba(200,150,50,0.25);color:#ffaa44}
#shop{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,20,40,0.95);border:2px solid #886644;border-radius:12px;padding:16px;z-index:200;min-width:200px;text-align:center}
#shop h3{color:#ffcc44;margin-bottom:8px;font-size:16px}
#shop .btn{display:block;width:100%;margin:6px 0;padding:8px 12px;background:rgba(100,80,40,0.4);border:1px solid #886644;border-radius:8px;color:#ddd;font-size:13px;cursor:pointer;font-family:system-ui;transition:all 0.2s}
#shop .btn:hover{background:rgba(180,140,60,0.4);color:#fff}
#shop .btn:disabled{opacity:0.4;cursor:default}
#shop .close{color:#888;background:none;border:none;font-size:16px;cursor:pointer;float:right;padding:0 4px}
#shop .close:hover{color:#fff}
#joystick{position:absolute;bottom:50px;left:30px;width:100px;height:100px;background:rgba(255,255,255,0.08);border-radius:50%;border:2px solid rgba(255,255,255,0.15);z-index:150;touch-action:none}
#joystick .knob{position:absolute;width:40px;height:40px;background:rgba(255,255,255,0.3);border-radius:50%;top:30px;left:30px;transition:transform 0.05s;pointer-events:none}
#btnShoot{display:none;position:absolute;bottom:70px;right:30px;width:70px;height:70px;background:rgba(255,60,40,0.4);border-radius:50%;border:2px solid rgba(255,100,60,0.6);z-index:150;font-size:24px;color:#fff;touch-action:manipulation;cursor:pointer}
#btnShoot.armed{display:flex;align-items:center;justify-content:center}
@media(min-width:768px){#joystick,#btnShoot{display:none}}
</style>
<div class="wrap">
<div class="hud"><span>❤️</span><b id="hp">100</b><span>💎</span><b id="gems">0</b><span>🦈</span><b id="sharkhp">150</b><span>🏆</span><b id="score">0/30</b><button id="shopBtn" onclick="s_click()" style="background:rgba(100,80,40,0.3);border:1px solid #886644;color:#ffcc44;padding:2px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui">🏪 商店</button></div>
<div id="msg"></div>
<canvas id="c"></canvas>
<a class="back" href="/">← 返回</a><button id="restart" onclick="location.reload()">🔄 重开</button>
<div id="shop"><button class="close" onclick="document.getElementById('shop').style.display='none'">✕</button><h3>🏪 军事商店</h3><div id="shopScore" style="color:#ffcc44;font-size:12px;margin-bottom:8px">可用：0💎</div>
<button class="btn" id="btnHeal" onclick="buyHeal()">❤️ 血包 +50HP — 1💎</button>
<button class="btn" id="btnGun" onclick="buyGun()">🔫 强化武器 伤害+5 — 2💎</button>
<button class="btn" id="btnKnife" onclick="buyKnife()">🔪 匕首(自动近战) — 2💎</button>
<button class="btn" id="btnFlame" onclick="buyFlame()">🔥 喷火枪(近程灼烧) — 4💎</button>
<button class="btn" id="btnScope" onclick="buyScope()">🎯 瞄准镜 射程翻倍 — 3💎</button>
<button class="btn" id="btnAdrenaline" onclick="buyAdrenaline()">💉 肾上腺素 8s无敌+神速 — 1💎</button>
<button class="btn" id="btnBomb" onclick="buyBomb()">💣 手雷 范围40伤 — 3💎</button>
<button class="btn" id="btnMine" onclick="buyMine()">💥 水雷(鲨鱼触碰爆炸) — 2💎</button>
<button class="btn" id="btnTorpedo" onclick="buyTorpedo()">🚀 鱼雷(追踪50伤) — 3💎</button>
<button class="btn" id="btnShield" onclick="buyShield()">🛡️ 护盾 5秒无敌 — 2💎</button>
<button class="btn" id="btnSpeed" onclick="buySpeed()">⚡ 加速靴 20秒 — 1💎</button>
<button class="btn" id="btnBoat" onclick="buyBoat()">⛵ 炮艇(自动开炮) — 10💎</button>
<button class="btn" id="btnShip" onclick="buyShip()">🚢 战舰(重炮+高血) — 10💎</button>
<div style="color:#888;font-size:11px;margin-top:6px">靠近岸边篮子即可打开商店</div></div>
<div id="joystick"><div class="knob" id="knob"></div></div>
<button id="btnShoot" ontouchstart="doShoot(event)" onmousedown="doShoot(event)">🔫</button>
</div>
<script>
// === CONSTANTS ===
var W=Math.min(800,Math.max(300,window.innerWidth-20)),H=Math.min(600,Math.max(200,window.innerHeight-200));
var c=document.getElementById('c'),ctx=c.getContext('2d');
c.width=W;c.height=H;
var ISLAND_X=W/2,ISLAND_Y=H/2-10,ISLAND_R=45;

// === GAME STATE ===
var player={x:W/2,y:H-25,hp:100,mhp:100,gems:0,speed:2.8,radius:14,gun:false,gunCd:0,gunDmg:8,speedBoost:0,hasKnife:false,knifeCd:0,shieldTime:0,hasFlame:false,hasScope:false,adrenaline:0};
var shark={x:W/2+120,y:H/2-50,hp:150,mhp:150,speed:1.0,radius:22,state:'patrol',targetX:0,targetY:0,atkCd:0,hunger:50};
var gemList=[],bulletList=[],particleList=[],bloodList=[],fishList=[],foodList=[],boatList=[],chestList=[],mineList=[],torpedoList=[];
var keys={},mouse={x:0,y:0,down:false};
var score=0,gameOver=false,win=false,chestSpawnTimer=600; // first chest at 20s
var WIN_GEMS=30;
var sharkRespawnTimer=0,spawnDelay=180; // 6s respawn

// === INIT GEMS ===
function spawnGem(){
  var ang=Math.random()*Math.PI*2,dist=15+Math.random()*(ISLAND_R-25);
  gemList=[{x:ISLAND_X+Math.cos(ang)*dist,y:ISLAND_Y+Math.sin(ang)*dist,radius:8,sparkle:Math.random()*Math.PI*2}];
}
spawnGem();
initFish();
initFood();
shark.targetX=shark.x;shark.targetY=shark.y;

function initFish(){
  fishList=[];
  for(var i=0;i<8;i++){
    fishList.push({x:50+Math.random()*(W-100),y:60+Math.random()*(H-120),vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,radius:5,color:'#'+['88ccff','ffaa66','aadd88','ffcc88','88ddcc'][i%5]});
  }
}
function initFood(){
  foodList=[];
  for(var i=0;i<5;i++){
    var ang=Math.random()*Math.PI*2,dist=8+Math.random()*(ISLAND_R-15);
    foodList.push({x:ISLAND_X+Math.cos(ang)*dist,y:ISLAND_Y+Math.sin(ang)*dist,radius:5,type:i%3});
  }
}

// === HELPERS ===
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function msg(s,t){var el=document.getElementById('msg');el.textContent=s;if(t)setTimeout(function(){if(el.textContent===s)el.textContent=''},t)}

// === SHOP ===
function openShop(){
  document.getElementById('shop').style.display='block';
  updateShopUI();
}
function closeShop(){document.getElementById('shop').style.display='none'}
function updateShopUI(){
  document.getElementById('shopScore').textContent='可用：'+score+'💎';
  document.getElementById('btnHeal').disabled=score<1||player.hp>=player.mhp;
  document.getElementById('btnGun').disabled=score<2||player.gunDmg>=30;
  document.getElementById('btnKnife').disabled=score<2||player.hasKnife;
  document.getElementById('btnFlame').disabled=score<4||player.hasFlame;
  document.getElementById('btnScope').disabled=score<3||player.hasScope;
  document.getElementById('btnAdrenaline').disabled=score<1;
  document.getElementById('btnBomb').disabled=score<3;
  document.getElementById('btnMine').disabled=score<2;
  document.getElementById('btnTorpedo').disabled=score<3;
  document.getElementById('btnShield').disabled=score<2;
  document.getElementById('btnSpeed').disabled=score<1;
  document.getElementById('btnBoat').disabled=score<10;
  document.getElementById('btnShip').disabled=score<10;
}
function s_click(){
  var el=document.getElementById('shop');
  if(el.style.display==='block'){el.style.display='none'}else{openShop()}
}
function buyHeal(){
  if(score>=1&&player.hp<player.mhp){score--;player.hp=Math.min(player.mhp,player.hp+50);msg('❤️ 回复50HP！',2000);updateShopUI();updateUI()}
}
function buyGun(){
  if(score>=2&&player.gunDmg<30){score-=2;player.gunDmg+=5;msg('🔫 武器强化！伤害+5',2000);updateShopUI();updateUI()}
}
function buySpeed(){
  if(score>=1){score--;player.speedBoost=600;msg('⚡ 加速20秒！',2000);updateShopUI();updateUI()}
}
function buyBoat(){
  if(score>=10){score-=10;
    boatList.push({x:W/2,y:H-40,hp:80,mhp:80,type:'boat',cannonCd:0,speed:1.5,targetX:0,targetY:0});
    msg('⛵ 炮艇出动！',2000);updateShopUI();updateUI()}
}
function buyShip(){
  if(score>=10){score-=10;
    boatList.push({x:W/2,y:H-50,hp:200,mhp:200,type:'ship',cannonCd:0,speed:1.0,targetX:0,targetY:0});
    msg('🚢 战舰下水！',2000);updateShopUI();updateUI()}
}
function buyFlame(){
  if(score>=4&&!player.hasFlame){score-=4;player.hasFlame=true;
    msg('🔥 喷火枪装备！靠近鲨鱼自动灼烧',2000);updateShopUI();updateUI()}
}
function buyKnife(){
  if(score>=2&&!player.hasKnife){score-=2;player.hasKnife=true;msg('🔪 匕首装备！靠近鲨鱼自动攻击',2000);updateShopUI();updateUI()}
}
function buyBomb(){
  if(score>=3){score-=3;shark.hp-=40;msg('💣 炸掉鲨鱼40HP！',2000);
    for(var j=0;j<12;j++)bloodList.push({x:shark.x,y:shark.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,life:25});
    updateShopUI();updateUI()}
}
function buyShield(){
  if(score>=2){score-=2;player.shieldTime=150;msg('🛡️ 5秒无敌！',2000);updateShopUI();updateUI()}
}
function buyScope(){
  if(score>=3&&!player.hasScope){score-=3;player.hasScope=true;msg('🎯 瞄准镜！射程翻倍',2000);updateShopUI();updateUI()}
}
function buyAdrenaline(){
  if(score>=1){score--;player.adrenaline=240;msg('💉 肾上腺素！8秒无敌+神速',2000);updateShopUI();updateUI()}
}
function buyMine(){
  if(score>=2){score-=2;mineList.push({x:player.x,y:player.y,life:900});msg('💥 水雷已布设！',2000);updateShopUI();updateUI()}
}
function buyTorpedo(){
  if(score>=3&&shark.hp>0){score-=3;
    torpedoList.push({x:player.x,y:player.y,vx:0,vy:0,life:300});
    msg('🚀 鱼雷发射！',2000);updateShopUI();updateUI()}
}

// === TOUCH JOYSTICK ===
var joy={active:false,dx:0,dy:0};
var jstick=document.getElementById('joystick'),knob=document.getElementById('knob');
jstick.addEventListener('touchstart',function(e){e.preventDefault();joy.active=true;updateJoy(e)});
jstick.addEventListener('touchmove',function(e){e.preventDefault();updateJoy(e)});
jstick.addEventListener('touchend',function(e){e.preventDefault();joy.active=false;joy.dx=0;joy.dy=0;knob.style.transform='translate(0px,0px)'});
function updateJoy(e){
  var r=jstick.getBoundingClientRect();
  var cx=r.left+r.width/2,cy=r.top+r.height/2;
  var tx=e.touches[0].clientX-cx,ty=e.touches[0].clientY-cy;
  var dist=Math.hypot(tx,ty),maxR=40;
  if(dist>maxR){tx=tx/dist*maxR;ty=ty/dist*maxR;dist=maxR}
  joy.dx=tx/maxR;joy.dy=ty/maxR;
  knob.style.transform='translate('+tx+'px,'+ty+'px)';
}
function doShoot(e){e.preventDefault();mouse._clicked=true;sfxResume()}
function updateUI(){
  document.getElementById('hp').textContent=Math.max(0,player.hp);
  document.getElementById('gems').textContent=player.gems>0?'💎':'';
  document.getElementById('sharkhp').textContent=Math.max(0,shark.hp);
  document.getElementById('score').textContent=score+'/30';
  var sb=document.getElementById('shopBtn');
  var nb=typeof nearBasket!=='undefined'&&nearBasket;
  sb.style.borderColor=nb?'#ffaa44':'#886644';
  sb.style.boxShadow=nb?'0 0 8px rgba(255,170,68,0.4)':'none';
}

// === INPUT ===
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});
c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height)});
c.addEventListener('mousedown',function(e){mouse.down=true;mouse._clicked=true;sfxResume()});
c.addEventListener('mouseup',function(){mouse.down=false});
c.addEventListener('touchmove',function(e){e.preventDefault();var r=c.getBoundingClientRect();mouse.x=(e.touches[0].clientX-r.left)*(W/r.width);mouse.y=(e.touches[0].clientY-r.top)*(H/r.height)});
c.addEventListener('touchstart',function(e){e.preventDefault();mouse.down=true;sfxResume();var r=c.getBoundingClientRect();mouse.x=(e.touches[0].clientX-r.left)*(W/r.width);mouse.y=(e.touches[0].clientY-r.top)*(H/r.height)});
c.addEventListener('touchend',function(){mouse.down=false});

// === TICK ===
function tick(){
  if(gameOver)return;
  // Player movement (skip if shop open)
  var shopOpen=document.getElementById('shop').style.display==='block';

  // Speed: slower in water
  var onIsland=dist(player,{x:ISLAND_X,y:ISLAND_Y})<ISLAND_R-player.radius;
  var basketDist=40;
  var nearBasket=(player.x<basketDist||player.x>W-basketDist||player.y<basketDist||player.y>H-basketDist);
  var inWater=!onIsland&&!nearBasket;
  var baseSpd=player.speed*((player.speedBoost>0||player.adrenaline>0)?1.5:1);
  var spd=inWater?baseSpd*0.6:baseSpd;

  if(!shopOpen){
  var mx=0,my=0;
  if(joy.active){mx=joy.dx;my=joy.dy}
  else{
  if(keys['w']||keys['arrowup']||(mouse.down&&mouse.y<player.y-10))my=-1;
  if(keys['s']||keys['arrowdown']||(mouse.down&&mouse.y>player.y+10))my=1;
  if(keys['a']||keys['arrowleft']||(mouse.down&&mouse.x<player.x-10))mx=-1;
  if(keys['d']||keys['arrowright']||(mouse.down&&mouse.x>player.x+10))mx=1;
  }
  if(mx||my){var d=Math.hypot(mx,my);mx/=d;my/=d}
  
  var nx=player.x+mx*spd,ny=player.y+my*spd;
  // Clamp to bounds
  if(nx>player.radius&&nx<W-player.radius)player.x=nx;
  if(ny>20&&ny<H-10)player.y=ny;
  // Can't walk through island center (too dense)
  if(onIsland){
    if(dist(player,{x:ISLAND_X,y:ISLAND_Y})>ISLAND_R-player.radius){
      var ang=Math.atan2(player.y-ISLAND_Y,player.x-ISLAND_X);
      player.x=ISLAND_X+Math.cos(ang)*(ISLAND_R-player.radius);
      player.y=ISLAND_Y+Math.sin(ang)*(ISLAND_R-player.radius);
    }
  }
  }
  
  // Collect gem on island (only 1 at a time)
  if(onIsland&&gemList.length>0&&player.gems===0){
    if(dist(player,gemList[0])<player.radius+gemList[0].radius){
      player.gems=1;gemList=[];if(typeof sfxPew==='function')sfxPew(1)
    }
  }
  // Collect food on island
  if(onIsland){
    for(var fi=foodList.length-1;fi>=0;fi--){
      if(dist(player,foodList[fi])<player.radius+foodList[fi].radius){
        shark.hunger=Math.max(0,shark.hunger-15);foodList.splice(fi,1);
        msg('🍖 偷走了鲨鱼的食物！',1500);
      }
    }
  }
  if(foodList.length<3&&Math.random()<0.01){
    var ang=Math.random()*Math.PI*2,dist2=8+Math.random()*(ISLAND_R-15);
    foodList.push({x:ISLAND_X+Math.cos(ang)*dist2,y:ISLAND_Y+Math.sin(ang)*dist2,radius:5,type:Math.floor(Math.random()*3)});
  }
  
  // Deliver gems to any basket (all 4 sides)
  if(nearBasket&&player.gems>0){
    score+=player.gems;
    player.gems=0;
    msg('🎉 宝石已运回！',2000);
    spawnGem();
  }
  
  // Gun: player has gun when carrying gems
  player.gun=player.gems>0;
  document.getElementById('btnShoot').className=player.gun?'armed':'';
  player.gunCd=Math.max(0,player.gunCd-1);
  
  // Shoot shark (not from island, requires fresh click)
  if(player.gun&&player.gunCd<=0&&mouse._clicked&&shark.hp>0&&!onIsland){
    var dx=shark.x-player.x,dy=shark.y-player.y;
    var dd=Math.hypot(dx,dy);
    if(dd<(player.hasScope?500:250)){ // shooting range
      bulletList.push({x:player.x,y:player.y,vx:dx/dd*8,vy:dy/dd*8,life:40});
      player.gunCd=10;
      if(typeof sfxPew==='function')sfxPew(0);
    }
  }
  mouse._clicked=false; // consume click

  // Bullets
  for(var i=bulletList.length-1;i>=0;i--){
    var b=bulletList[i];b.life--;
    b.x+=b.vx;b.y+=b.vy;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H){bulletList.splice(i,1);continue}
    if(shark.hp>0&&dist(b,shark)<shark.radius+4){
      shark.hp-=player.gunDmg;bulletList.splice(i,1);
      for(var j=0;j<3;j++)bloodList.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3-1,life:15});
      continue;
    }
  }
  
  // Food on island
  for(var i=0;i<foodList.length;i++){
    var fd=foodList[i];
    var fc=['🍎','🍗','🧀'][fd.type];
    ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(fc,fd.x,fd.y+4);
  }

  // Treasure chests
  for(var ci=0;ci<chestList.length;ci++){
    var ch=chestList[ci];
    var ct=Math.ceil(ch.timer/30);
    var ctStr=ct>=60?Math.floor(ct/60)+'m'+(ct%60)+'s':ct+'s';
    ctx.fillStyle='#8b6914';ctx.fillRect(ch.x-12,ch.y-8,24,16);
    ctx.fillStyle=ch.unlocked?'#ffd700':'#6a4a0a';ctx.fillRect(ch.x-10,ch.y-6,20,12);
    ctx.fillStyle='#aa8830';ctx.fillRect(ch.x-8,ch.y-4,16,3);
    ctx.fillStyle='#ffd700';ctx.fillRect(ch.x-2,ch.y-6,4,12);
    if(ch.unlocked){ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText('🔑',ch.x,ch.y-12)}
    ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';ctx.fillText(ctStr,ch.x,ch.y+18);
  }
  
  // Shark AI
  if(shark.hp<=0){
    if(sharkRespawnTimer===0){ // Just died
      for(var ci=0;ci<chestList.length;ci++){if(!chestList[ci].unlocked){chestList[ci].unlocked=true;msg('🔑 获得宝箱钥匙！快去开箱',2500)}}
    }
    sharkRespawnTimer++;
    if(sharkRespawnTimer>=spawnDelay){
      shark.hp=shark.mhp;shark.x=ISLAND_X+(Math.random()-0.5)*200;shark.y=ISLAND_Y+(Math.random()-0.5)*200;
      sharkRespawnTimer=0;shark.atkCd=0;shark.state='patrol';
      msg('🦈 新的鲨鱼来了！',2000);
    }
  }
  
  var dShark=dist(player,shark);
  if(shark.hp>0){
    var hungry=shark.hunger<30;
    if(dShark<350&&!onIsland&&!nearBasket&&!hungry){ // Chase only when not hungry
      shark.state='chase';
      var ang=Math.atan2(player.y-shark.y,player.x-shark.x);
      shark.x+=Math.cos(ang)*shark.speed*(dShark<120?1.5:1.0);
      shark.y+=Math.sin(ang)*shark.speed*(dShark<120?1.5:1.0);
      
      // Attack player
      shark.atkCd=Math.max(0,shark.atkCd-1);
      player.knifeCd=Math.max(0,player.knifeCd-1);
      // Knife auto-attack
      if(player.hasKnife&&player.knifeCd<=0&&dShark<shark.radius+player.radius+20&&shark.hp>0){
        shark.hp-=10;player.knifeCd=60;
        for(var j=0;j<3;j++)bloodList.push({x:shark.x,y:shark.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-2,life:12});
      }
      // Flamethrower: burns shark when close
      if(player.hasFlame&&dShark<shark.radius+player.radius+30&&shark.hp>0){
        shark.hp-=3;
        for(var j=0;j<2;j++)bloodList.push({x:shark.x+(Math.random()-0.5)*20,y:shark.y+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*3,life:8,color:'#ff6600'});
      }
      if(dShark<shark.radius+player.radius+8&&shark.atkCd<=0){
        if(player.shieldTime>0||player.adrenaline>0){shark.atkCd=30} // shield blocks but shark still recoils
        else{player.hp-=12;shark.atkCd=30;
        for(var j=0;j<4;j++)bloodList.push({x:player.x,y:player.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,life:18});
        if(typeof sfxExplode==='function')sfxExplode()}
      }
    }else if(shark.state==='chase'){
      shark.state='patrol';
      shark.targetX=ISLAND_X+(Math.random()-0.5)*250;
      shark.targetY=ISLAND_Y+(Math.random()-0.5)*250;
    }else{ // Patrol around island
      var dT=dist(shark,{x:shark.targetX,y:shark.targetY});
      if(dT<10||shark.targetX===0){
        shark.targetX=ISLAND_X+Math.cos(Math.random()*Math.PI*2)*(ISLAND_R+60+Math.random()*120);
        shark.targetY=ISLAND_Y+Math.sin(Math.random()*Math.PI*2)*(ISLAND_R+60+Math.random()*120);
      }
      var da=Math.atan2(shark.targetY-shark.y,shark.targetX-shark.x);
      shark.x+=Math.cos(da)*shark.speed*0.7;
      shark.y+=Math.sin(da)*shark.speed*0.7;
    }
    // Clamp shark near island (keep out of island + don't go too far)
    var sd=dist(shark,{x:ISLAND_X,y:ISLAND_Y});
    if(sd<ISLAND_R+shark.radius+15){
      var sa=Math.atan2(shark.y-ISLAND_Y,shark.x-ISLAND_X);
      shark.x=ISLAND_X+Math.cos(sa)*(ISLAND_R+shark.radius+15);
      shark.y=ISLAND_Y+Math.sin(sa)*(ISLAND_R+shark.radius+15);
    }
    if(sd>350){
      var sa=Math.atan2(shark.y-ISLAND_Y,shark.x-ISLAND_X);
      shark.x=ISLAND_X+Math.cos(sa)*340;
      shark.y=ISLAND_Y+Math.sin(sa)*340;
    }
  }
  
  // Fish movement + shark hunger
  for(var fi=0;fi<fishList.length;fi++){
    var f=fishList[fi];
    f.x+=f.vx;f.y+=f.vy;
    if(f.x<30||f.x>W-30)f.vx*=-1;
    if(f.y<40||f.y>H-50)f.vy*=-1;
    f.vx+=(Math.random()-0.5)*0.1;f.vy+=(Math.random()-0.5)*0.1;
    if(shark.hp>0&&dist(shark,f)<shark.radius+f.radius+5){
      if(shark.hunger<80){shark.hunger=Math.min(100,shark.hunger+20);fishList.splice(fi,1);fi--}
    }
  }
  if(fishList.length<5&&Math.random()<0.02){
    fishList.push({x:50+Math.random()*(W-100),y:60+Math.random()*(H-120),vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,radius:5,color:'#'+['88ccff','ffaa66','aadd88','ffcc88','88ddcc'][Math.floor(Math.random()*5)]});
  }
  if(shark.hp>0){shark.hunger=Math.max(0,shark.hunger-0.05)}

  // Chest spawn & logic
  chestSpawnTimer--;
  if(chestSpawnTimer<=0&&chestList.length<1){
    chestList.push({x:80+Math.random()*(W-160),y:60+Math.random()*(H-140),timer:1800+Math.random()*3600,unlocked:false});
    chestSpawnTimer=600+Math.random()*600; // next chest in 20-40s
    msg('📦 海上漂来一个宝箱！',2000);
  }
  for(var ci=chestList.length-1;ci>=0;ci--){
    var ch=chestList[ci];
    ch.timer--;
    // Player collects unlocked chest
    if(ch.unlocked&&dist(player,ch)<player.radius+20){
      var loot=Math.floor(Math.random()*4);
      if(loot===0){player.gunDmg=Math.min(30,player.gunDmg+8);msg('🔫 武器箱！伤害+8',2000)}
      else if(loot===1){player.speed+=0.3;msg('⚡ 速度药剂！永久+0.3',2000)}
      else if(loot===2){player.hp=player.mhp;msg('❤️ 满血复活！',2000)}
      else{score+=3;msg('💎 获得3颗宝石！',2000)}
      chestList.splice(ci,1);updateUI();
    }
    // Expired
    if(ch.timer<=0){chestList.splice(ci,1)}
  }

  // Speed boost countdown
  if(player.speedBoost>0)player.speedBoost--;
  if(player.shieldTime>0)player.shieldTime--;

  // Boat AI
  for(var bi=boatList.length-1;bi>=0;bi--){
    var b=boatList[bi];
    // Follow player
    var bdx=player.x-b.x,bdy=player.y-b.y,bd=Math.hypot(bdx,bdy)||1;
    if(bd>60){b.x+=bdx/bd*b.speed;b.y+=bdy/bd*b.speed}
    // Shoot shark
    b.cannonCd=Math.max(0,b.cannonCd-1);
    if(shark.hp>0&&b.cannonCd<=0&&dist(b,shark)<350){
      var bdx2=shark.x-b.x,bdy2=shark.y-b.y,bd2=Math.hypot(bdx2,bdy2)||1;
      bulletList.push({x:b.x,y:b.y,vx:bdx2/bd2*7,vy:bdy2/bd2*7,life:50});
      b.cannonCd=b.type==='ship'?25:45;
    }
    // Shark attacks boat
    if(shark.hp>0&&dist(b,shark)<shark.radius+b.radius+5){
      b.hp-=b.type==='ship'?3:6;
      if(b.hp<=0){boatList.splice(bi,1);msg('💥 船只被摧毁！',1500)}
    }
    // Clamp to bounds
    if(b.x<30)b.x=30;if(b.x>W-30)b.x=W-30;
    if(b.y<40)b.y=40;if(b.y>H-30)b.y=H-30;
    b.radius=b.type==='ship'?16:12;
  }

  // Adrenaline
  if(player.adrenaline>0)player.adrenaline--;

  // Mines
  for(var mi=mineList.length-1;mi>=0;mi--){
    var mn=mineList[mi];mn.life--;
    if(mn.life<=0){mineList.splice(mi,1);continue}
    if(shark.hp>0&&dist(shark,mn)<shark.radius+15){
      shark.hp-=30;mineList.splice(mi,1);
      for(var j=0;j<10;j++)bloodList.push({x:mn.x,y:mn.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-3,life:20,color:'#ff8800'});
    }
  }

  // Torpedoes
  for(var ti=torpedoList.length-1;ti>=0;ti--){
    var tp=torpedoList[ti];tp.life--;
    if(tp.life<=0||shark.hp<=0){torpedoList.splice(ti,1);continue}
    var tdx=shark.x-tp.x,tdy=shark.y-tp.y,td=Math.hypot(tdx,tdy)||1;
    tp.vx+=(tdx/td)*0.3;tp.vy+=(tdy/td)*0.3;
    var ts=Math.hypot(tp.vx,tp.vy);if(ts>5){tp.vx=tp.vx/ts*5;tp.vy=tp.vy/ts*5}
    tp.x+=tp.vx;tp.y+=tp.vy;
    if(dist(tp,shark)<shark.radius+5){shark.hp-=50;torpedoList.splice(ti,1);
      for(var j=0;j<15;j++)bloodList.push({x:tp.x,y:tp.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-5,life:25,color:'#ff4400'});
    }
  }

  // Particles
  for(var i=bloodList.length-1;i>=0;i--){
    var p=bloodList[i];p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;
    if(p.life<=0)bloodList.splice(i,1);
  }
  
  // Win condition
  if(score>=WIN_GEMS&&!win){
    win=true;gameOver=true;
    msg('🎉 胜利！所有宝石已运回大陆！',99999);
  }
  
  // Die
  if(player.hp<=0&&!gameOver){
    gameOver=true;msg('💀 被鲨鱼咬死了… 刷新重来',99999);
  }
  
  updateUI();
}

// === DRAW ===
function draw(){
  // Sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a3a5c');sky.addColorStop(0.5,'#2a5588');sky.addColorStop(0.85,'#1a4477');sky.addColorStop(1,'#0a3050');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  
  // Water waves
  ctx.fillStyle='rgba(20,80,160,0.3)';
  for(var wi=0;wi<30;wi++){
    var wx=(wi*37+Date.now()*0.02)%W,wy=H-60+(wi*23)%40;
    ctx.beginPath();ctx.arc(wx,wy,15+Math.sin(wi+Date.now()*0.003)*8,0,Math.PI);ctx.fill();
  }

  // Beach strips on all 4 sides
  ctx.fillStyle='#c2a060';ctx.fillRect(0,0,W,20);ctx.fillRect(0,0,20,H);ctx.fillRect(W-20,0,20,H);ctx.fillRect(0,H-20,W,20);
  ctx.fillStyle='#d4b878';ctx.fillRect(0,18,W,6);ctx.fillRect(18,0,6,H);ctx.fillRect(W-22,0,6,H);ctx.fillRect(0,H-22,W,6);

  // Delivery baskets on 4 edges
  var baskets=[{x:W/2,y:10,label:'北'},{x:W-10,y:H/2,label:'东'},{x:W/2,y:H-10,label:'南'},{x:10,y:H/2,label:'西'}];
  for(var bi=0;bi<baskets.length;bi++){
    var b=baskets[bi];
    ctx.fillStyle='#8b6914';ctx.beginPath();ctx.arc(b.x,b.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a08030';ctx.strokeStyle='#6a4a0a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(b.x,b.y,8,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font='bold 9px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🧺',b.x,b.y);
  }
  
  // Fish in sea
  for(var i=0;i<fishList.length;i++){
    var f=fishList[i];
    ctx.fillStyle=f.color;ctx.beginPath();ctx.ellipse(f.x,f.y,f.radius,f.radius*0.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.x+f.radius*0.5,f.y-f.radius*0.2,1.5,0,Math.PI*2);ctx.fill();
  }
  
  // Palm trees
  for(var ti=0;ti<4;ti++){
    var tx=80+ti*180,ty=H-25;
    ctx.fillStyle='#5a3a1a';ctx.fillRect(tx-3,ty-40,6,40);
    ctx.fillStyle='#2a6a2a';ctx.beginPath();ctx.arc(tx,ty-45,30,0,Math.PI);ctx.fill();
    ctx.fillStyle='#3a8a3a';ctx.beginPath();ctx.arc(tx-15+ti*8,ty-50,20,Math.PI*0.3,Math.PI*0.9);ctx.fill();
    ctx.beginPath();ctx.arc(tx+15-ti*6,ty-48,18,Math.PI*0.1,Math.PI*0.7);ctx.fill();
  }
  
  // Island
  var ig=ctx.createRadialGradient(ISLAND_X-10,ISLAND_Y-10,5,ISLAND_X,ISLAND_Y,ISLAND_R);
  ig.addColorStop(0,'#e8d898');ig.addColorStop(0.6,'#c8a858');ig.addColorStop(1,'#8b6914');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(ISLAND_X,ISLAND_Y,ISLAND_R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#6a4a0a';ctx.lineWidth=2;ctx.stroke();
  // Sand details
  ctx.fillStyle='rgba(255,255,200,0.2)';
  for(var si=0;si<8;si++){var sx=ISLAND_X-ISLAND_R+30+(si*17)%(ISLAND_R*2-40),sy=ISLAND_Y-ISLAND_R+20+(si*23)%(ISLAND_R*2-30);ctx.beginPath();ctx.arc(sx,sy,4+si%6,0,Math.PI*2);ctx.fill()}
  
  // Gems on island
  for(var i=0;i<gemList.length;i++){
    var g=gemList[i];
    g.sparkle+=0.08;
    var pulse=Math.sin(g.sparkle)*0.3+0.7;
    ctx.fillStyle='rgba(255,100,200,'+(0.6+pulse*0.4)+')';ctx.beginPath();ctx.arc(g.x,g.y,g.radius*pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=pulse;ctx.beginPath();ctx.arc(g.x-g.radius*0.3,g.y-g.radius*0.3,g.radius*0.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  
  // Food on island
  for(var i=0;i<foodList.length;i++){
    var fd=foodList[i];
    var fc=['🍎','🍗','🧀'][fd.type];
    ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(fc,fd.x,fd.y+4);
  }

  // Treasure chests
  for(var ci=0;ci<chestList.length;ci++){
    var ch=chestList[ci];
    var ct=Math.ceil(ch.timer/30);
    var ctStr=ct>=60?Math.floor(ct/60)+'m'+(ct%60)+'s':ct+'s';
    ctx.fillStyle='#8b6914';ctx.fillRect(ch.x-12,ch.y-8,24,16);
    ctx.fillStyle=ch.unlocked?'#ffd700':'#6a4a0a';ctx.fillRect(ch.x-10,ch.y-6,20,12);
    ctx.fillStyle='#aa8830';ctx.fillRect(ch.x-8,ch.y-4,16,3);
    ctx.fillStyle='#ffd700';ctx.fillRect(ch.x-2,ch.y-6,4,12);
    if(ch.unlocked){ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText('🔑',ch.x,ch.y-12)}
    ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';ctx.fillText(ctStr,ch.x,ch.y+18);
  }
  
  // Shark
  if(shark.hp>0){
    ctx.save();ctx.translate(shark.x,shark.y);
    var sAng=Math.atan2(player.y-shark.y,player.x-shark.x);
    if(shark.state==='patrol')sAng=Math.atan2(shark.targetY-shark.y,shark.targetX-shark.x);
    ctx.rotate(sAng);
    // Body
    ctx.fillStyle='#5588aa';ctx.beginPath();ctx.ellipse(0,0,shark.radius,shark.radius*0.5,0,0,Math.PI*2);ctx.fill();
    // Darker top
    ctx.fillStyle='#4477aa';ctx.beginPath();ctx.ellipse(0,-shark.radius*0.2,shark.radius*0.9,shark.radius*0.35,0,0,Math.PI*2);ctx.fill();
    // Fin
    ctx.fillStyle='#336688';ctx.beginPath();ctx.moveTo(-shark.radius*0.3,-shark.radius*0.5);ctx.lineTo(0,-shark.radius*0.9);ctx.lineTo(shark.radius*0.3,-shark.radius*0.5);ctx.fill();
    // Tail
    ctx.fillStyle='#336688';ctx.beginPath();ctx.moveTo(-shark.radius,-shark.radius*0.15);ctx.lineTo(-shark.radius*1.4,-shark.radius*0.6);ctx.lineTo(-shark.radius*1.4,shark.radius*0.6);ctx.lineTo(-shark.radius,shark.radius*0.15);ctx.fill();
    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(shark.radius*0.5,-shark.radius*0.2,shark.radius*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(shark.radius*0.55,-shark.radius*0.2,shark.radius*0.1,0,Math.PI*2);ctx.fill();
    // Teeth
    ctx.fillStyle='#fff';
    for(var ti=0;ti<3;ti++){ctx.beginPath();ctx.moveTo(shark.radius*0.7+ti*6,shark.radius*0.05);ctx.lineTo(shark.radius*0.6+ti*6,shark.radius*0.25);ctx.lineTo(shark.radius*0.8+ti*6,shark.radius*0.25);ctx.fill()}
    ctx.restore();
    // HP bar
    var shpPct=shark.hp/shark.mhp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(shark.x-25,shark.y-shark.radius-14,50,6);
    ctx.fillStyle=shpPct>0.5?'#44ff44':'#ff2222';ctx.fillRect(shark.x-25,shark.y-shark.radius-14,50*shpPct,6);
  }

  // Boats
  for(var bi=0;bi<boatList.length;bi++){
    var b=boatList[bi];
    var isShip=b.type==='ship';
    ctx.save();ctx.translate(b.x,b.y);
    var ba=shark.hp>0?Math.atan2(shark.y-b.y,shark.x-b.x):0;
    ctx.fillStyle='#5a3a1a';ctx.fillRect(-(isShip?14:10),-6,isShip?28:20,12);
    ctx.fillStyle='#8b6914';ctx.fillRect(-(isShip?12:8),-5,isShip?24:16,10);
    // Cannon
    ctx.save();ctx.translate(isShip?10:7,0);ctx.rotate(ba);
    ctx.fillStyle='#333';ctx.fillRect(0,-2.5,isShip?14:10,isShip?5:4);
    ctx.fillStyle='#555';ctx.fillRect(isShip?13:9,-1.5,3,3);
    ctx.restore();
    // HP bar
    var bhpPct=b.hp/b.mhp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-(isShip?14:10),-(isShip?14:12),isShip?28:20,3);
    ctx.fillStyle=bhpPct>0.5?'#44ff44':'#ff2222';ctx.fillRect(-(isShip?14:10),-(isShip?14:12),(isShip?28:20)*bhpPct,3);
    ctx.restore();
  }
  
  // Player
  ctx.save();ctx.translate(player.x,player.y);
  var pAng=Math.atan2(player.y-H/2,player.x-W/2)+Math.PI;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,player.radius*0.5,player.radius*0.8,4,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.fillStyle='#3a6a3a';ctx.fillRect(-6,-8,12,16);
  ctx.fillStyle='#4a8a4a';ctx.fillRect(-5,-6,10,12);
  // Head
  ctx.fillStyle='#ffcc88';ctx.beginPath();ctx.arc(0,-12,7,0,Math.PI*2);ctx.fill();
  // Hat
  ctx.fillStyle='#5a3a1a';ctx.fillRect(-8,-18,16,4);ctx.fillRect(-6,-22,12,5);
  // Arms
  ctx.fillStyle='#ffcc88';ctx.fillRect(-10,-5,4,8);ctx.fillRect(6,-5,4,8);
  // Legs
  ctx.fillStyle='#3a3a6a';ctx.fillRect(-5,8,5,8);ctx.fillRect(1,8,5,8);
  // Gun if armed
  if(player.gun){
    var gc=player.gunDmg>8?'#ff8844':'#444';
    ctx.fillStyle=gc;ctx.fillRect(6,-8,player.gunDmg>8?4:3,14);
    ctx.fillStyle='#333';ctx.fillRect(5,-8,player.gunDmg>8?6:5,3);
    if(player.gunDmg>8){
      ctx.fillStyle='rgba(255,136,68,0.4)';ctx.beginPath();ctx.arc(8,-1,6,0,Math.PI*2);ctx.fill();
    }
  }
  // Gem indicator
  if(player.gems>0){
    ctx.fillStyle='#ff66aa';ctx.globalAlpha=0.5+Math.sin(Date.now()*0.01)*0.3;
    ctx.beginPath();ctx.arc(8,-15,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText('💎',8,-13);
  }
  // Knife if equipped
  if(player.hasKnife){
    ctx.fillStyle='#ccc';ctx.fillRect(-12,-3,2,10);
    ctx.fillStyle='#888';ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-15,-5);ctx.lineTo(-8,5);ctx.stroke();
    ctx.fillStyle='#5a3a1a';ctx.fillRect(-8,7,4,3);
  }
  // Shield visual
  if(player.shieldTime>0){
    ctx.strokeStyle='rgba(100,200,255,'+(0.4+Math.sin(Date.now()*0.02)*0.3)+')';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,player.radius+6,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
  // HP bar
  var hpPct=player.hp/player.mhp;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(player.x-25,player.y-player.radius-14,50,6);
  ctx.fillStyle=hpPct>0.5?'#44ff44':'#ff2222';ctx.fillRect(player.x-25,player.y-player.radius-14,50*hpPct,6);
  
  // Bullets
  for(var i=0;i<bulletList.length;i++){
    var b=bulletList[i];
    ctx.fillStyle='#ffff44';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,1.5,0,Math.PI*2);ctx.fill();
  }
  
  // Mines
  for(var mi=0;mi<mineList.length;mi++){var mn=mineList[mi];ctx.fillStyle='#444';ctx.beginPath();ctx.arc(mn.x,mn.y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(mn.x,mn.y,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='8px system-ui';ctx.textAlign='center';ctx.fillText('💥',mn.x,mn.y+3)}

  // Torpedoes
  for(var ti=0;ti<torpedoList.length;ti++){var tp=torpedoList[ti];ctx.fillStyle='#558';ctx.beginPath();ctx.ellipse(tp.x,tp.y,8,3,Math.atan2(tp.vy,tp.vx),0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(tp.x,tp.y,2,0,Math.PI*2);ctx.fill()}

  // Blood particles
  for(var i=0;i<bloodList.length;i++){
    var p=bloodList[i];
    var pc=p.color||'rgba(255,60,40,'+(p.life/20)+')';
    ctx.fillStyle=pc;ctx.beginPath();ctx.arc(p.x,p.y,2+p.life*0.1,0,Math.PI*2);ctx.fill();
  }
  
  // Win overlay
  if(gameOver&&win){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 40px system-ui';ctx.textAlign='center';ctx.fillText('🎉 胜利！',W/2,H/2-30);
    ctx.fillStyle='#fff';ctx.font='18px system-ui';ctx.fillText('宝石全部运回大陆！',W/2,H/2+15);
    ctx.fillText('刷新页面再来一局',W/2,H/2+45);
  }
  if(gameOver&&!win){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 36px system-ui';ctx.textAlign='center';ctx.fillText('💀 阵亡',W/2,H/2-20);
    ctx.fillStyle='#fff';ctx.font='18px system-ui';ctx.fillText('刷新页面再来一局',W/2,H/2+20);
  }
}

// === LOOP ===
function loop(){
  tick();draw();
  if(!gameOver||win)requestAnimationFrame(loop);
  else draw(); // show game over screen once
}

// === START ===
updateUI();loop();
</script>
</html>
